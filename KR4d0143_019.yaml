body:
  text: 丹陽集卷十九宋葛勝仲撰五言律詩次韻大人待次吳陵邑五首待次吳陵邑身修道日章蘭陔留古郡花縣得鄰鄉未即摶扶上端嫌代斫傷蕭閒文墨外樂趣問濠梁待次吳陵邑優哉閲嵗年鳯池疏海角鶠閣竦城顛蒔藥時分穎栽花自溉泉新篇談笑就寄自魯邦傅待次吳陵邑行趨寶婺邦䓗蘢連越岫澄徹泳桐江八詠風生座雙林月映窗勝遊知不晚官履欲飛雙待次吳陵邑常安揭小軒祗從支遁隱不問景純言顔巷居多樂陶廬似少喧朝歌屈虞詡清切未殊恩待次吳陵邑鸝黃報早春紅歸花蕾淺青到栁梢新窮約那趨俗虗緣自葆真榮枯多反衍坐笑黨頻頻和送張元方南京掾下位沉英俊青編樂自多官曹依緑水詞筆注黃河初日嗟貪鼠今年未飲鵝陪京資祿養何計免奔波題橫林館治劇知非稱投閒得退棲聊從詩酒汚頓免簿書迷幻界榮枯小真乘寵辱齊橫林孤館靜辰發踏荒雞題須江驛寓館飄風雨髙文耀日星原注驛有賈黯碑閒身關歷覽左宦在零丁不見雌雄行原注事見子厚詩空存長短亭襄陽知漸近峴首映寒坰次韻李子京宋城道中詩三首沙岡牛酒市渺岸指前程斷梗隨鷗逺殘霞與鶩平原注一云雨腳因風斷濤頭薄暮平村聲喧坱莽林影倒澄瀛俗物難遮眼支離病骨輕通塗了無畏清世足章程擊壤民風樂持衡國勢平米鹽豐道路桴鼓靜寰瀛佳氣葱葱近心隨過鳥輕積纍三冬學淹通萬古程孤髙吳子札該洽蜀君平曹事今司李官封近接瀛公侯階有漸五斗未容輕寄題海㑹晚實軒素節清霜重金苞照座隅根深容四老品貴入三都騷客真宜友侯封未易奴舊時書兩廟感事涕沾濡原注元豐中先祖先人各嘗賦其詩壁間嵗久不存今住持宗定來索親筆授之登攙雲亭和工部兄韻危亭聳山巔縈紆一徑穿林深將蔽日濤怒欲浮天江北迷堤樹淮南起餉煙結庵容寄傲從此息攀緣次韻和慶善逰圓覺寺歸四首時僕亦方自徑山歸青鞋訪雲水僧饌飫茭蒲落拓人誰識迂愚世所無鷃鵬從物化牛馬任人呼世事何須問諸公在禁途步屧尋幽子談𤣥孰造微離羣雖念獨選勝遂忘歸世路從爭席年華逼授衣平生付雙瑣手撫送鴻飛招提行問道末學倦編蒲不際方為際應無令盡無歸來聊自賦隱去謝人呼宦路分夷險平生誰識途黃花兼露重白鳥帶烟微雲伴淵明出風隨曾㸃歸經丘携芰製視膳輟蘭衣景物供清興詩髙直欲飛夜歸不寐流鶯驚節物樂事二毛前山簡不堪醉淵明方欲眠談餘愁似繭坐久腹如蟬日出重遊衍殘花有杜鵑原注謂之映山紅次韻慶善九日二九依辰至追歡付麴生竹根拚醉卧菊蘂正牽情杜曲酬佳節陶翁愛此名吹花更吹帽相值得豪英慶善再和復和異縣逄佳節羇愁太瘦生黃花真解事白首緩傷情十日尚堪醉一杯猶有名眼前多勝士何必洛中英幽居二首幽居無俗韻勝事特關心研度疲三豕床敷戲一禽覆舟棊自戒中聖酒時斟蕭灑侯來訪忩前緑透林名勝音塵隔懷賢自渴饑千巖聳秀處一榻獨懸時盛夏衣裳懶深林枕簟宜招邀何以待數卷謫仙詩即事二首四月麥已熟清寒久不禁林深來蜀魄屋破絶燕禽幽屛兒仍出貧居病更侵蕭然北忩下趺坐獨求心巷轉柔桑陌門依緑栁橋因人嫌碌碌拔俗自超超嫩碧半篙漲殘紅一眼飄卑棲有微分斥鷃得逍遙試墨為適閒中趣晴忩試墨卿磨研輕有暈條暢細無聲紫玉浮雲净寒煙㸃漆明鳥鳴春晝寂一笑萬緣輕微雨小飲客至閽人辭以出令追路已不及偶作昨日持三白今朝解八支聊為犀首飲儘笑虎頭癡冠履從來懶杯鐺且自持是中多樂趣勿遣外人知題庵壁葛翁携葛姓小愒葛橋邊葛泉出蘿葛一𣲖自潺湲咫尺葛山觀金丹問葛仙耳孫忝瓜葛行隱葛山巔龍井古甃泓澄淺涓涓似有源蒸雲驟遊宇吹雨忽翻盆泉伏微如蠋泥蟠肆任蚖嶄然頭角見坐禠葉公魂龍堂一室飛山腹蜿蜒像設精班傳五色貴食辨百花名睡頷應難探雲鱗詎可嬰從祈得甘澤棲壁有碑銘觀山謁蔣叔明靜趙鄰叔汝翼二墳寒食觀山道佳城隔壠分趙公今不武蔣老去修文歌薤猶前日栽松已插雲生平各投分絮酒薦蒿焄昭懷皇后挽歌詞二首天作元符合哀榮極始終陵陪永泰近禮視孝章隆匰主躋新廟廞衣賁下宫柏城連獻愍蕭瑟夜臺風寂寞崇恩殿飈輪去弗還尊名千古外顯冊兩朝間座冷金釭暖香消玉釡閒神逰返姑射脫屣謝塵寰李楚老尚書挽歌詞三首席寵三台後疏恩八座榮朝廷真大蔡邊鄙更長城戾社符刀夢王墀識履聲隂功歸壤子衮衮出名卿東里推人傑西清列從班袴襦康二蜀裘帶靖三關赤白囊無警朱丹轂遂還登龍門舊貴奕葉道家山得謝恩重起追榮爵更崇龍蛇新嵗忌鵷鷺舊行空圖象人懷惠尊名帝念功遭時淹陳實大耋偶相同方待制挽詞二首瑣闥樞機地儲闈羽翼人蕝儀容典備校厯閏餘親雲路箕乘說泉臺嶽返申荀龍行濟美交舊獨傷神佳城釃酒奠長夜殞星知今代儒林傳諸方德政碑朝廷躬蹇蹇丘壑自怡怡安得研幾士推窮妙萬蓍莫子憲中奉挽歌詞三首嗜學唯何甚飛聲實久如郎星頻省户卿月轉周廬桂奠房祠酒藝殘冊府書音容千古外墳檟閟南徐材資合黃閣器業偃朱轓教府依模範樞庭驗討論成梁繄杜預障水幸王尊二紀朋僚舊追懷慟寢門令子承家學諸儒擁後塵無雙問江夏第一擢平津宣諭傳黃甲褒稱對紫宸公師有追賁行慶密章新致政朝奉親家丁公安常挽歌詞二首節概松千丈聲華桂一枝牽絲始遊宦解組遽安時人美拋官早身嫌了事遲反真聊示病曾不謁巫醫貫籍明光殿頥神通德門慶源來化鶴髙隱謝驚猿冕紱承前範箕裘付後昆論婚情義重祖載獨傷魂胡誠甫朝散挽歌辭學擅敷門邃年躋賜几尊降嵩鍾秀氣逰岱返英魂宰樹黃巖拱房祠赤紱昏密章行胙國有子大公門凌丞事挽詞二首銓材今秀孝較德古沉𡨕已悟桃花理猶翻貝葉經妙觀存述造隂德有平停今夜稽山道天沉處士星紫誥恩華重青綸命服榮無香然玉釡有子勝金籝禪解超尊宿鄉評服老成棘人深孺慕捧土作佳城許處士挽詞二首場籍聲華茂家庭志意修光隂歸翰墨器業謾林丘學府空雞跖賢書誤鶴頭門基多克荷衮衮出公侯濉陽忠烈後泊水老成人庠校推模表州閭訓睦姻决疑辭郭璞營急似陳遵碑字深無愧鑾坡得從臣魯國太夫人楊氏挽歌詞四首教子青雲上持身白業中挾醫來相第賜襚出宸𠂻鸞誥前恩在魚軒舊轍空東方妙喜國斷取作幽宫未肖甘泉像先疏曲阜封春秋綿六紀甘毳極千鍾逺日朝廷趣容車郡國供吳人交惻楚相杵夜停舂鱣堂推胄貴蟬冕嫓夫榮玉釡香無驗金輝館已迎鵲梁占胙土龜墨報佳城今代誰詞伯刋碑逺德聲子貴今台輔才髙古藎臣與民開夀域為國斡洪鈞㑹友傷陶髮迎師憶孟鄰欒欒親負土腸斷冢邊麟五言長律學正郭勉夫示詩次韻答之有道家聲逺沉機足幹時松生非培塿檀伐待淪漪虎脊卑凡乘蛾眉疾衆姬一鳴驚伍舉千里器王圭德令溫溫著名香藹藹馳披莊問同異執禮判嫌疑操尚傾涓子才華進客兒適齊非鼓瑟逃楚笑吹箎藝苑髙三絶書庠肅五儀涌泉推敏思翻水播英辭計吏趨蘭省諸生偃璧池行殊師也過論鄙釋之卑默識扳安世多方劣惠施風標寒似玉機警利如錐髙翥千齡鶴前知五總龜碎金珍謝傅餘錦夢丘遲謬學邯鄲步工施渾沌眉文科將赫奕榮路即威夷器業今為重功勳士所期他年青竹上凜凛看名垂勉夫示詩鳴其窮甚哀因次韻答之極其貧悴之態而卒勉之以科舉庶廣其意也落落超餘子干時命未當摧傷窘文陳拓落尚書庠賨貨無山積毛羣缺谷量蝸廬寒不展龍具夜何長牘謾三千富年侵四十彊有車乘下澤無夢入髙唐藜糗甘珍薦桑樞自峻堂書傭跧淨院舂賃寄修廊異鬼時相笑鄰家許借光低佪涸轍鮒進退觸藩羊原憲貧非病榮期樂處常財雄劣程鄭資巨笑秦楊甫里田多潦潯陽徑就荒白駒嗟逸豫黃鳥怨遺忘薪乏支離束錢空趙一囊晨餐煩乞米夜讀待然糠詞藝聞精敏名聲已激揚登榮將赫奕處困暫徊徨志氣宜軒翥文辭忌怨傷逐貧髙賦就豐廪換龜腸中秋和韻凉夜清商半層空素月初騰清來洞戶委照入空廬銀海亭亭上金波煜煜舒纎阿今夕御少昊昔年墟魄射澄瀾倒光涵脫葉疏階􅕴生乍足庭桂落堪鋤東鄙人摛藻西園客燕胥未髙尤瀲灔當午更踟躇氣挾金飈爽光從玉宇攄鑑圓疑傍架輪正若依輿影挂千林上明同萬里餘雲開無㸃綴火退覺虛徐滉漾吞星彩晶熒遡日車驚枝翻異鵲減腦謝遊魚田淨瓊初種窗明雪未除胡牀情戀嫪小舫興勤渠珠盛輝兹水潮髙壯尾閭傾寒滌肝胃揚彩媚衣裾郡古休敲榜官閒置簡書萬家興釂鼓愷樂旐維旟次韻逄叔喜雪始見穿簾隙俄驚照屋山春容先苑樹夜色誤城關砧積疑鋪練盆消若盜環酒醇懷泛蟻詩敏過求鷴滉漾迷珠澤便娟掩玉顔人飢氈共咽馬凍薦難慳勢急因空亂形移任地班舞深爭巧黠囀細弄幽閒淮右提師入山隂訪友還江湖禽影斷絃木未須彎次韻李倅安上喜雪兔苑佳賓集龍山上瑞臻微飄方自弄亂灑忽無垠剪水層空墮裝春病枿新繽翻投隙巧歷亂㸃衣勻急每隨風陳髙將擁日輪階閒鋪六出簷重壓千鈞片落梅初謝毬飄栁未顰賞清疑不夜驚晚誤司晨朔漠寒沙起湘吳美酎陳地荒包委瑣木朽蓋輪囷舴艋尋幽客蝸牛卧冷人稍晴芳意動散䇿共尋春再和皚皚盈尺瑞及此臘前臻滉漾連三暮縈盈遍九垠青腰隂巧露白帝羽儀新坤軸埋藏厚天潢瀉落勻瑶林變園榭縞帶逐車輪膏潤歸農畝雕裁自化鈞吟寒詩膽健裝冷嫵眉顰㸃袖朝正日侵鞾立仗晨境同秋月淨句鄙散鹽陳白玉藏千室黃雲卜萬囷江臯迷宓女姑射想神人早晚晴光動郊原探早春十二月初四日逰吳山院穩坐踰年矣渾消髀肉頑兩兒挾籃輿十里訪吳山佛老聊施佞官曹未畏瘝煙林穿窈窈嵓溜揭潺潺樓觀修篁外招提翠麓間嶝危愁憊力潭淨怯衰顔身縛何因脫心紛得暫刪嵗窮嗟俯仰境勝彊躋攀臘出因休吏晡歸及閉關相將投此幘永伴黑衣閒走筆追記十二月九日潭頭之逰三益得豈易一逰營亦難地偏如避俗春早自排寒霖潦逄初霽年華念欲單搘笻卜遐眺挈榼展清歡茶塢千家密梅林十里寬幽尋窮窈窕危陟遍㠝岏有地堪肥遁幽人卜考槃後前羅峻嶺左右繞驚瀾西望雙藤老南瞻巨石盤千章叢古木九畹秀崇蘭手板看蒼翠軍持上激湍醉鄉因蟻酎水厄為龍團晚景雲低樹歸途雨壓冠原注一作濺鞍明驚烽火逼小艇起前灘十二月二十三日立春中散兄棣華第六㑹特盛是日天大雪小孫女出綵幡勝及花桞精巧夜漏且五鼓方罷既歸不得寐偶成律詩紀事拜呈中散兄兼簡公任阜民詳定侍郎道祖簽幕判院朝提轄奉議卿任寶録待制異縣逄春啓羇懷百不堪頻傾次道釀聊喜阿雲談棣蕚仍清集辛盤助半酣綵幡驚節物玉屑瑞田蠶太簇律初應德星堂不慙共誇筵秩秩那羡府潭潭濟美三公後原注謂章劉二家逃禪二老參原注謂中散兄及巳清歡時擇勝冲操自亷貪丹荔來閩部黃魚出嶠南雲泉烹賜茗羅帕薦珍柑經醉香浮座言歸鍾動菴蕭然文字飲共賦鹿鳴三六言詩六月六日大暑市中無肉庖厨索然作六言三首翠竹碧梧入望紫茄白莧供槃未辦楚王雞跖難求閔叔豬肝常饌素諳苜蓿忍飢何必檳榔自歎麞頭鼠目難辭蟬腹龜腸三白舊甘蔬食八關聊復齊支蟻酒似聞將熟蟹螯應得重持再和三首晨飱僅有醢豆夜飲應無燭槃屬饜何取雞肋委順甘為鼠肝野步自鋤蘆蔔輕塵試煮桄榔坐喜青芻入眼不須紫笋搜腸臘毒雖無後悔轉雷已覺難支異饌那施方文寒泉且飲軍持七言律詩二陳作書懷詩亦次韻山城真稱著寒儒繞屋青蒼似故居吏牘糾紛慙磔鼠齊厨蕭索待泔魚懶如園令將移病窮似虞卿合著書賴是豐年民氣樂夢回時見旐維旟圄空訟息復遇肆眚庭事蕭然蒙良器解元寵詩輒以二章為謝一官銅墨付疏頑嵗好人和偶未瘝東畝黃雲穈芑卧北扉青草纆徽閒鵠亭夜覺寃氛靜蠅筆晨驚霈澤頒倪耄歡謡歸帝力風人溢美但赬顔編户相安易得情年來狴犴每刑清庭閒不復施梧象俗朴聊同示草纓牘背僅能平枉橈需頭那復覬褒榮原注來詩有皇皇繡斧幾時來願採民謡獻天子之句人言官事無由了暫得居官事了名次德林新亭詩韻缿訟無多得暫閒結亭聊就碧鮮間胡床寄目中宵月手板支頥四面山楂帶水禽流淺瀨帆隨煙艇轉前灣登臨似與塵寰隔况復朋從接笋班次韻子充九日建天寧道場罷遂逰堯祠悒悒無聊坐學宫銜杯阻共玉西東祝延精舍臣心重擇勝叢祠友好隆休嘆青衫淹小縣且從烏帽落商風喜君句法無糕字始信才華夢得同次韻德升逰堯廟頽垣老屋寄荒村八彩修眉儼若存古砌荒凉無厯草奠觴牢落想衢樽雲山繞郭清如活烟艇搖波渺欲翻循牒歸來同勝賞免煩諸友為招魂九日汝明留郡中不遂同逰以詩見寄次韻三年卜築慕幽人九日無歡愧病身始謂窺臨陪勝友那知岑寂度蕭辰醪敷卷白欣初熟菊蘂舒黃正斬新聞道小蠻新教舞歸時呼客莫辭頻題觀音院弱水無風到海山慈容親覲紫旃檀亭亭寶剎凌雲近湛湛清池潄玉寒橘熟獨垂紅萬顆竹迷曾蒔碧千竿熱官步武何容到散秩須知第一官諸生絶糧偶作二首示勉夫庖厨落寞不堪聞彈鋏無魚甑有塵誰識簞瓢顔氏樂可憐鮭菜庾郎貧固窮始合稱君子臨難聊須語細人曳褷長歌商頌在未應懟憾去來頻飢腸愁坐耳無聞放飯先疑甑拾塵聞說食功非食志政宜憂道不憂貧佐饔但有思嘗者執㸑初無欲凊人好向計臺勤自列文移見卻已頻頻次韻劉卿任阜民對假菊花嘗新酒隆冬急雪舞淄澠那得鮮鮮細菊呈何處幻師來衒巧此花詞客最鍾情盈尊更值醪敷熱下筯仍欣鱠縷頳應笑蓬蒿張仲蔚忍寒獨坐到黎明次韻德升見懷米廪無喧似結廬一簷寒竹伴幽虛閒開桑落傾浮蟻淨展藝籖拂蠧魚頻枉詩筒從我讀已留齊壁待君書二千石子人中爽風月髙情更起豫次韻德升再講酬唱蓮社追攀每愧心詩盟此假偶重尋孤髙舊壓元和體清警新聞正始音龜洛賦成應奪錦雞林價重定酬金自憐潦倒無佳製東望家山但越吟次韻蔡安度秀才賦鹽法更鹽策利源開瀕海熬波亹亹來貢篚燒羊謾南北原注髙昌國貢鹽南燒羊山者理粗北燒羊山者理細嘉籩形虎間榛梅煆圭捶璧嚴疆域積雪飛霜阜貨財滋味佐饔周九土栁星端合祀壇垓青州試院次監門韻四首呈同事李無咎補之簽判王柏立之劉及至父二宰鄭與權存道司户李致志道縣丞朱顔幕府美如英庇邑優間閉訟庭語掾氣剛工論事講郎材拙只橫經相從此地初披霧却望遙天想聚星速發試題乘不備母令掩耳及驚霆東秦人士富豪英鄉老賓賢上帝庭玉笋未知誰得地金籯聞說賸通經雄夸氣各千雲漢妙製文多煥斗星水鏡諸公標鍳在大聲從此起非霆樽酒重陽泛菊英此時應得到家庭奔趨試席雖深貫囚鎖文闈苦未經夢入故園時栩栩愁侵衰鬢欲星星評文賴有金閨彥敏手從來號震霆前山雲物望英英拘窘無從出户庭蓋衆未知除患術居閒聊喜衛生經客塗淫滯將彌月王事勤勞每戴星已恨歸期誤占鵲阿香何苦更飛霆再次韻四首呈至父茂宰才名莫與京久宜遷擢潤朝廷儒林傳記夸三篋聖域淹通貫十經豪縣暫頒天子詔清資已應議郎星危言峻節他年事肯向威顔懾震霆棘繞重門晝亦扄白袍搖筆坐中庭摛詞綿密多根道論事軒昻各傳經學博素推通德里名髙先動進賢星知誰吉夢如揚輦一石龍駒落大霆文卷縱橫未易名欲搜佳筆送王庭去留彼我心無著工拙錙銖眼盡經老信虛名真畫餅忙知急景甚飛星自憐考閲專精甚不覺猝然柱破霆披卷疲勞亦暫停相擕欵睇聚閒庭繪圖細閲吳生品茗碗分評陸子經榜帖未應憑主第文窮端已送奴星毬場縶鎖驚踰月可信流光甚疾霆出院有期呈同院二首門前輿馬已紛紛猶爾癡迷校藝文山色未容飛蓋賞市聲時得隔牆聞裴頭黃尾皆前定王後盧前謾自分頗憶安居卧齊榻淨看香霧起微焚旅懷牢落倦文瑒憲網拘攣出處妨眼力半消嫌夜燭腰圍頓減怯秋霜到家㑹是揚三喜取第誰同郭八郎趣駕莫孤糕酒㑹東籬菊蘂已金黃次韻祝守康鹿鳴宴贈諸先輩清香畫㦸燕儒流場籍英材喜博收奮袖談辭爭落落摳衣矩步更秋秋新篇奬激華如衮公議歸懷綴若旒蘂榜登榮即從政定知果藝過由求觀光六十富豪英賓送春闈屬巨卿樂采舊知多藻茆燕敖今喜食蒿蘋糊名選藝無私見置醴優賢有頌聲成就旋歸充貢職魯人歆艷始知榮次韻祝邦直廷題飲鳯泉萬里溪源出小池喬林修竹映清輝遷鶯榜內偏留落飲鳯泉邊習遁肥逰覽忽紆都騎貴稱夸更得綵毫揮故山水石那優此肯為低腰便賦歸示友卿飛藿蕭蕭晚自零來時灌木始欣榮每因勸學添文思却為回文動旅情好逐諸儒勤釋菜莫憂貧嫂便轑羮似聞闞澤中宵夢月裏分明有姓名次韻若拙碧線泉掉繚穿橋一線過濟南金色漫浮波共疑園客春投繭直恐針神夜過河貫脫已遺交甫珮縷飛如擲幼輿梭晚風披拂俄中斷拆襪雖長苦不多諸生詣府見留再任偶作示勉夫二首魯堂詩禮號多儒文席非才誤詔除賢路久妨顔已厚儒宫相借計誠疏化鵾未敢圖飛翼搏虎誰能復下車詣府自言無以稱空銜諸彥意勤渠安閒喜得伴林居分教無功恨有餘閔貢政為投劾計何蕃空上乞留書論文每愧瑕疵汝廷譽何煩爼豆豫誰識白雲千里念終更計日望吾廬
