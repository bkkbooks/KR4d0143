body:
  text: 丹陽集卷五宋葛勝仲撰啓復修撰謝兩府啓殊廷汜掃幸簉迹於臞仙祕殿疏榮或厠名於墨客稍從抆拭曲荷生成伏念某者奮自羈單進蒙簡擢逶迤持祿深戒鄙夫之事君骯髒徇公妄期君子之謀道一昨超登侍從進長膠庠雖無成德逹財之功粗有畏法遵繩之志欽惟寄屬每自激昂杜請託則深咈於人情多建明則顯違於時論雖學子粗安其朴拙而憸人潛議於中傷孤根易搖小器先溢青蠅交集白簡厚誣凡可排根而傾擠無不誕謾而崇飾彼正異放麑之惠固優為掇蜂之讒上賴照臨止投間左莠言甚巧類成葉於三年幽憤莫申將降霜於五月惟神聽之難罔而天道之好還旋聞邦誣莫逃聖鑒畀虎豺而不食禦魑魅以逺行四門穆清百揆時敘惟兹枉橈屢乞辨明敢期曠蕩之恩稍加麗正之職此蓋伏遇某官心存體國道廣濟時惠顧窮人起伊尹納溝之念磨礲治具肩傅説作礪之誠致脫丹書漸還清貫儻未填於溝壑誓仰報於陶鎔汝州到任謝兩府啓起於宫祠付之民社自顧散儒之陋謬當良吏之求亦既撫封莫知報德竊以魯山沃壤汝水名邦密拱兩都新被節旄之渥旁連四輔舊稱屏翰之雄當承流宰牧之權必赴功膚敏之士而某生姿遲鈍涉世闊踈途如阮籍之窮性有汲黯之戅學初為已妄期造道以逢原仕則慕君敢替當官而徇義顧多取於公器復顯忤於要權致爼豆楚者幾稀而魚肉涉者甚衆駭機一發溢惡交興惟鋭進之邦朋方上搖於國是從而下石易若吹毛獨賴睿明燭知誣罔雖褫職輦轂之下獨賦祿湖海之濵方齊得喪於環中而置恩怨於度外以退縮為安身之計以靜默為進德之階敢覬矜憐稍加收用此蓋伏遇某官膺天大任佐時有為積纍治功若農夫之望嵗銓量人品如匠者之度材袁安不忍於錮人傅説但期於迪后肆令衰懦復與簡求某敢不防患周身指覆車而自戒牧民涖政憂製錦之或傷賀趙鎮撫啓周尊師帥之職實總全師唐分藩鎮之權旁提支郡於惟盛旦復舉舊章敷求忠亮之賢付畀土疆之重恭惟某官材資傑出智略挺生早被眷於宸廷屢出持於使節頃當艱險備罄忠嘉諒惟制檢之榮即有齋壇之拜賀運使劉龍圖啓祗奉恩輝寵除漕寄凡依庇賴交集歡愈恭惟某官學貫儒流望髙時論以盡言不諱而挹巍第以忠訴無隱而光諌垣躋峻職於西清扈慈闈於南土預元戎之婉畫曲盡訏謨領將漕之提封更榮申命行聞召節入冠從班某猥以散材獲居屬郡欽聞光渥第極歸依賀運使郎中學士啓祗膺詔旨榮總督司先聲所傳公議咸喜恭惟某官宏材挺特雅量粹夷學有淵源綽著淹通之譽言無枝葉裁成體要之文輒自望郎出當膚使諒未聞於暖席已寵拜於持荷藐自孤蹤獲棲大庇顧章紱之所繫瞻履幕以末繇日俟按臨稟承約束與運使啓仕途太戅合歸湖海之濵朝論兼容尚叨獄市之寄幸兹昧陋託在庇存恭惟某官敦厚而疏通粹和而端亮躋榮䇿府知博貫於丘墳將命計臺復登聞於課最賦輿不擾金榖如流諒惟注意之深即慶非常之寵某祗膺宸檢改佩守符惟斷斷之無他實惓惓而慕義頃棲大蔭固已荷於包荒今託提封行復欣於承教賀胡發運啓祗膺宸檢就陟使權統九路之輸將當列城之刺舉凡依庇賴交集歡欣恭惟某官忠有古人之風學為王者之事憲府夙推于忠鯁中臺作振于維綱益隆黼扆之知外領繡衣之寄逮兹推擇愈著光華調發邦儲暫倚成于心計超遷內務行亟拜于除書賀提刑啓祗膺溫詔出總祥刑凡預庇庥共深欣抃恭惟某官望髙朝論忠簡上知入踐要繁夙預月卿之寵出當憂顧屢膺星使之權佇聞贊書峻陟華貫某誤紆郡紱適邇使麾不惟仰託於眷存實幸欵承於教警答秀州知府曽學士啓祗奉明綸改臨重鎮幸依鄰庇遽辱書辭恭惟某官德宇粹溫詞華秀拔世濟其美紹器業於相門官修其方敷教條於郡寄撫對云始結課已優方聮册府之清班行正禁途之譽命祝頌至切稱述奚殫賀金陵曽修撰孝藴啓吳都重鎮位居藩伯之榮書殿華資職號儒林之貴時維雋哲仰副眷懷恭惟某官清時羽儀群辟冠冕智仁勇以兼劭德爵齒之皆尊雖遭時屢歷於險夷而挺志弗渝於忠藎入居朝廷則蓍龜庶事出臨方靣則衡尺衆材表此百城暫倚兵鈐之重間于兩社即登宰路之華伏念某受知素深去德滋逺中緣艱棘久自屏藏寖冒甄升遽罹貶逐夤緣幸會再依庇賴之仁險阻艱難尤切歸投之素屬官常之有守望履幕以無階賀王修撰啓祗奉恩輝榮升論撰有識交慶不謀同辭恭以某官學探道原望髙時論事每試而皆可政無往而不宜頃膺一札之書出領三城之寄雖藩宣所賴因任既以纍年然績用登聞褒進殆無虛月行被追鋒之召就頒挈槖之除某代匱陋邦依寶鄰之千萬蒙惇雅契枉華翰者再三感愧之深敘陳罔既回河陽王待制啓被命十行升華兩禁民遂借留之願朝有因任之公凡預遊從交深欣抃恭惟某官天資敏鋭德宇粹溫理窮性命之端事燭古今之表英辭振玉逸氣凌雲郤桂一枝卓爾儒林之秀和松千丈挺然大厦之資自結聖知出當方面河水東泊鄙鄰國之白圭長橋卧波小平津之杜預報功崇德果疏持槖之榮尊主庇民行拜秉鈞之召某備貟鄰境託芘卿雲方修慶之未遑遽騰箋之先辱具為感戢難既敘陳賀冬啓二首一陽襲管氣滋緹室之和五物書雲瑞見候臺之應惟時賢哲繁擁休祥恭惟某官材擅儒林望髙朝論富金籝之奧學挹珠網之巍科大邑試材鸞暫棲於枳棘清班拔士鳳將集於梧桐順履天元茂膺帝祉清臺課厯逢七政之同躔黃祲占年見五雲之紀瑞惟時賢哲繁擁休祥恭惟某官性天髙明才地敏給敷政無施而不可涖官所至而有聞大邑庇身暫倚撥煩之重嘉猷告后即攄經逺之謀兹順履於天元諒茂膺於帝祉答周舍人賀冬啓律回葭管登臺爰紀於祥雲星次斗躔推䇿載迎於長日方一陽之來復宜百福之類升恭惟某官文秀時髦學優聖域簮法冠於烏府侍香案於螭坳致美善於親暫屈藩維之寄告謀猷於后行膺夢卜之求諒經剛長之辰即有詔除之渥謝王奉議以寧啓寵以書辭申之文卷言溫布帛雖退恧於過情字挾風霜實仰欽於衆製聞暴公子固久見元德秀乃初頻阻傾蓋之歡深恨揚舲之遽顧蒙縟禮加惠陳人大鼎烹雞逺器尚淹於小用明珠彈雀珍文弗悮於輕投揣分何堪捫心知感答卓奉議啓載膺宸檢獲綰郡章約結無竒獨傾心於名士嗜好殆絶尚抵掌於髙文辱示書辭獲窺學植屈廷臣之嚴重同邑子之進趨方何遜劉孝綽則多少俱工比鮑昭謝靈運則遲速皆美恐為品藻之纍但深藏弆之榮答張省幹啓枉道見存陳詩為貺峥嶸髙論驚所飬之益深璀璨大篇知見禮之加重豫章何必七年而見威鳳蓋由一羽而知矧在上庠屢以仲舒為舉首獲交諸父又熟阿戎之清談契闊流離寤寐傾渴三年於此矣固多脫頴之流一言以蔽之罕見無邪之美仰惟此賜宜在珍藏答孫宣教啓二首誦汝墳之章少有干榮之意廢蓼莪之什晚興弗洎之悲比竊食于真祠偶藏身于偏壘實先人之舊治有元祐之政聲悼嵗月之不留愴音容之如在敢謂某官曲敦髙誼追記曩遊特紀述于雅言以發揚于潛德賦五君之詠獻不待于諱辰誦百汰之金問何勞于曲室感荷之至敷敘奚殫談經敗績獲寄迹于小邦聞善若驚猶傾心于諸彥敢謂某官曲敦雅好過採虛名忘固陋而寵以書辭慰孤寂而示之文軸見許詢之逺致自爾伏膺賞沈約之寄音敢忘擊節豈特珍藏于書簏固將共託于詞林佩服至深敷陳罔既答曹宣教啓校藝奏名疏恩賜第事光舉首榮動朝端恭惟某官為君子儒知古人體學深窮于聖域文獨步于賢關千丈喬松知有棟梁之用五枝仙桂實為門閥之光某夙賞髙文欣聞譽命敢圖謙眷亦損書辭雖欽造述之工恐纍遊談之實一第溷子耳聊為進士之階集賢有人哉行慶選掄之寵答張學銘啓何武先即學宫始之傳舍朱博不喜儒吏深惡議曹既操術之不同宜治道之相逺比緣休吏稍欲崇儒意雖粗勤禮實不腆敢期髙誼載以雅文施挾求奢每自慙于寒乞要輕用重亦恐纍於品題敢戢至深敘陳罔既除顯謨閣待制謝兩府啓白簡驟攻久投冗散丹書一洗復玷髙華恩與為新德何以報伏念某文質無所砥材能不及中會初載之博延繇常途而躐進冒庠序師儒之長參言語侍從之流嶢嶢固人道之難全碌碌實鄙心之不肯鼠銜窶數知非容穴之謀蜩決榆枋不羡圖南之便果罹謗鑠旋辱辨明起於置散之真祠付以承流之樂土圖回百緒黽俯二年朝廷不憶一州雖慙前咎民庶借留滿嵗粗有公言屬積厲於衰門遽纒哀於伯氏念藐諸孤方賴同爨故蕞爾邑未可輕歸不悟衷言俾躋邇列既沗輔郡二千石之印綬又直文考十九載之圖書靜推所蒙端有攸自此蓋伏遇某官股肱元聖屏翰萬邦以佑賢輔德為經濟之謀以遵制揚功為寅亮之實用仁心而引類動義槩以恤淹贊翊事機獨提綱而頓領吹噓時彥詎拔本而塞源乃因肆眚之恩上廣隆寬之施西廂寓直雖叨序爵之榮東閣撇裾尚恨趨風之逺賀太宰啓光膺渙號册拜冢司周公之覯繡裳爰是皇于四國仲山之補衮職蓋以事于一人夷夏共瞻宗祊蒙福竊以盛世以置輔為重志士以得時為難抱經綸之業者或困迹于草萊都廊廟之位者或貽羞于竹帛由才位齟齬而難合故勳業寂寥而無聞天將福于斯民世特生于良弼恭惟某官斯文木鐸王國元龜學貫天人而博窮載籍以來辭該象數而盡屈能言之類英聲茂實夙推先覺之賢峻節忠規篤守後凋之操自預聞于大政益眷注于淵衷遵制揚功中轄著彌縫之助奉公履正東臺存繩糾之功果符夢卜之求遂冠鈞衡之峻贊又新之政已寅亮于天工開衆正之門共行熙于帝載伏念某小器窘用孤根易搖久困風波幸託帡幪之芘未填溝壑悉歸播植之公湖州到任謝兩府啓出刺周南曽微優最改臨吳會更勉後圖祗荷生成伏深榮懼伏念某簡編糟粕之學場屋骩骳之文用此躋榮可名僥幸推移從祿類衆狙之賦三選軟畏人慕靈龜之藏六樂就外服以畢餘年昨分一面之符未報三年之政雖免曠瘝之責遽纒伉儷之哀未能擊缶以忘情亟欲卜岡而就窆懇求近地稍便私門荷大臣之用心付小麾而如志惟吳興之樂土萃江左之名賢抒峯存三癸之名峴嶺標五花之勝白蘋洲上著騷客之風流紫花瀨邉有茶山之燕賞敢圖推擇誤及庸虛此蓋伏遇某官惇厚惠和忠清直亮丕揚可大之業輔成不拔之基斂袵廟堂致藜藿之不採提衡品類直桃李以無言某敢不祗誦德音勉睎循吏庶幾一得仰報萬分答海門知縣啓逺貽書疏復枉詩文辭華髙步於上京才義不慙於小雅舌耕滋久瞻奧學於胸中腹藁便成湧佳言於筆下雖云出衆顧輕示人誦讀爽然政恐文卷之盡流傳逺甚居然紙價之髙仰竿牘之甚勤識弦歌之多暇雖菁華之悅目揆涼薄以頳顔不敢當蒙但知感戢答王知縣啓百謫交至暫整單裝兩怒既消復還舊治老守有蒙成之幸邑子遂依仁之公竊以愷悌撫循昔稱良吏掊克偷快今號軼材既務守官固當罹咎雖粟邑換尹賞職益以卑而內史愛倪寬殿更為最果緣公議特勉後圖願益專於所聞以卒相於豫治鄧州到任謝執政啓愚誠上逹懇求避於親嫌朝論兼容特改除於郡寄撫封云始揣分知榮伏念某才不足於治劇濟繁學不足以鈎深索隱早緣識擢嘗獲在前晚以愚憃久從外補留滯周南之境奔趨吳會之郊嵗琯七周未始僥求於內舉國門三過其誰肯致於裏言每處順以安時姑深根而寧極惟兹巨屛素號樂郊敢圖生成舉是寄屬此蓋伏遇某官功弼乃后道覺此民擴伊尹納溝之仁懋傅説濟川之業弛張因革躋國勢於安常小大浮沉器人材而式序肆令孤拙獲此便安韋狀員推豈敢責成於參佐召父杜母庶幾追繼於循良鄧州謝范左丞啓祗膺宸檢謬當方伯連帥之權趣引郡章獲繼巨德元勳之後荷恩實重揣分增榮伏念某文不輩於時流學僅傳於家法幸緣親擢稍躐常塗方幅員遍庠序之時五冒師儒之等暨朝廷興禮樂之際三居綿蕝之官雖事功無毫髮之微而議論有金石之固豈宜乘隙遂爾易心中緣背馳久困外補蕭望之各從所好晉荀息不食其言嵗籥七更詎肯僥求於內舉國門三過何階入覲於中宸惟兹大邦夙號樂土猥當出刺深愧食浮伐柯在前既仰承於舊政鄰輝不逺又獲借於餘光恭惟某官天庭寶臣海內詞伯險夷否泰在峻節以不渝進退行藏視古人而無愧方廟堂之闕位佇渙號以揚庭獨専國柄之崇仰贊時雍之會重惟浮賤過荷奬知近緣假道以登門幸獲望塵而侍坐加籩豆之踐仍許造於後堂窺雲漢之章遂遍觀於崇宇雖大賢折節以下士而小已揣分以難酬感幸之深敷宣莫罄與范左丞致虛啓絲綸示眷藁塊奪情將正位於鈞衡姑承流於屏翰縈懷所擊控避莫從恭惟某官學洞古今忠存社稷早登文陛服在諌垣仰昭正父之功力奮爭臣之節贊裨紹述一言可以興邦擯斥朋邪三進蓋嘗及霤久持從橐擢預政機方亮采以奮庸忽銜哀而去位上方側席民亦具瞻與其失夔契之忠毋寧奪曽閔之孝果聞大渙趣使遄歸諒惟朝事之初即播弼諧之命某屬拘營職莫遂望塵輒陳竿牘之儀少伸寰海之慶再與范左丞啓確守禮經蓋欲表儀當世曲從誠請是為體貌大臣鬱四海之具瞻篤三年之通制有識交頌不謀同辭恭惟某官氣稟天和學優王佐讜議早扶於國是忠規屢讋於邦朋爰録勳庸遂參機政王臣蹇蹇方盡瘁以輸忠棘人欒欒遽銜哀而去位祗膺奪服聊免造朝仁者安仁固不忘於子職孝乎惟孝深上動於天聰豈惟君子之光實使懦夫有立上執政啓經邦碩輔阻窺數仞之墻刺郡冗僚屢枉五雲之字瞻風莫遂結念增勞恭惟某官識逺而非小知器博而宜大用幽經奧牒盡究生民以來大册髙文坐屈能言之類獨緣儒效自結聖知涖經事而知其宜臨大節而不可奪補衮正上公之枋賜履昭元戎之權示大壯於端闈實資制作頒上化於陽館更賴燮調不違咫尺之顔如倚左右之手爰從枚卜起付鈞衡祕殿聨榮入告嘉謀於后鼎司爰立日下膏澤於民諒在邇辰更膺正拜伏念某方依覆露夙荷奬知悵滯迹於西州阻曵裾於東閣永言瞻頌難喻端倪賀提舉監丞啓祗奉帝綸顯持使節先聲所至公議咸歸恭惟某官學窮古聖人之原材出見大夫之右頃膺推擇入踐要繁惟摘山煮海之權實富國強兵之利變通成法內則掌於冢司提按列城外則諉之部使暫煩直指即慶遄歸某坎壈餘年依棲大庇日佇軺車之至庶諧履幕之瞻賀湖州秦守啓對揚便殿具輸獻納之忠擢領輔藩優畀承宣之寄先聲逺播公議咸歸恭惟某官材冠士林望髙時論學識九流之廣文追三代之醇夙推廊廟之姿久屈雲霄之步果膺拔舉峻履髙華寵之禁嚴論撰之資付之山水清幽之地自副車而陟守實聳州縣之榮觀以介弟而繼兄更作衣冠之盛事諒未遑于暖席已夙駕于追鋒某潦倒材踈陸沉嵗久亦安身于林壑獲託庇于帡幪側聞鳳詔之頒日佇隼旟之至其為欣望莫罄敘陳賀宇文寶文時中知湖州啓西清寓職總內閣之圖書南土專城作行朝之屏翰命出九重之邃歡騰千里之遙恭惟某官直諒而多聞宏毅而任重量吞千頃腹貯五車詞章特擅於家聲伯仲並登於政府召還蜀道初畀乘軺改命吳興復膺剖竹光生四水榮動五亭黃蘗山前續江淹之文采白蘋洲畔繼栁惲之風流諒惟開府之初即有追鋒之召某久緣固陋坐竊安間雖陶令已歸於田園而龐公不入於城府徒託二天之庇阻修一刺之恭賀陳大資與義知湖州啓以心膂臣而暫辭機政以股肱郡而來布教條旌纛再臨山河增重恭惟某官式是百辟媚兹一人文辭獨行於中朝器業藹聞於早嵗繇北扉之清近擢東府之贊襄天賦之才蓋天下士而非特國士人究其實乃社稷臣而何止功臣初違咫尺之顔如失左右之手昔之往矣留千里之袴襦今也來兹被三公之衮繡行聞召節登拜冢司賀汪少卿思溫知湖州啓虔命拜州差辰開府股肱帝室潤分九里之河父母侯邦庇擴二天之覆恭以某官望髙朝匠學冠時髦文體要以精深器恢宏而凝劭入居九列當牒訴浩繁之司出領一麾得山水清逺之地承流伊始頌德攸同某鄉廬頃遭鬱攸之災浮家暫寓窮僻之壤退惟困躓辱在帡幪陶令已歸田園但知退聽龐公不入城府尚阻進趨謝蔣縣丞汝功啓伏蒙某官撥簿領之沉迷喜親戚之謦咳逺迂都騎來顧衡門寵以長箋既遂盍簮之願示之衆製更諧擊節之觀仰惟鄉曲之英蚤擅文章之譽三年學而至于榖已極淹該一卷書而立之師更求博約惟他時之所到豈小智之易量感佩之誠敷陳罔既賀中書侍郎啓祗膺中詔入侍西臺翊贊萬幾克懋格天之業踐更二府共歆稽古之榮渙號誕揚敷天咸喜恭惟某官德尊一代智傑萬人衆推為王佐之材自任以天下之重體道則六通四闢而咸在應事則千轉萬變而不窮早被簡知亟躋華顯洎居常伯適在版曹以邦用封靡為近憂以民力凋耗為深患間緣造膝之對力陳逆耳之言不患失於在前寧輸忠而補外屬嗣皇訪落之始當強鄰俶擾之初罙入都城日有舉烽之警環觀諸將誰為戡難之人旁採師虞顯疇嘉績起公於師帥之任付公以宥密之司旋降芝函改臨鳳沼光輔惟新之政大開至正之門載纘武功以銷未形之患誕敷文德增築太平之基式副具瞻行膺爰立伏念某多仇少與數免稀遷迹滯南冠莫遂望塵之幸魂飛東閣徒深頌德之誠賀范留守致虗啓爰擇剛辰已開留府陵寢增重嵩洛有光凡預庇存交深欣抃恭惟某官經邦碩輔命世真儒以堯舜孝弟為尊主之謀以稷契忠嘉為奮身之術早躋大用蒞經事而知其宜自勵匪躬臨大節而不可奪特輟燮調之任一蘇衆大之區暫此居留著赤舄几几之望行聞入相賦緑竹猗猗之詩賀平江知府胡舍人啓奉選勞之新渥躋次對之舊班屏翰有光朝廷增重恭惟某官英豪間氣道德名儒學窮六籍之醇文起八代之陋討論潤色崖因珠而不枯險阻艱難草以風而知徑顧惟劇郡既訖外庸龍已升雲乃眷攀鱗之舊魚方縱壑更逢激水之寬諒在遄歸即膺巨用澆瓜為惠坐令一境之安采菲不遺更荷五雲之及賀吳少宰啓顯膺綸綍册拜鈞衡一言興邦獨定公于社稷百官承式亟冠位于疑丞天人具孚華夏咸喜恭惟某官膺天大任為世真儒早以異材遍躋膴仕紫微司制衆欽華國之文青瑣納言自許經邦之䇿謀猷屢告權近不容久安均逸之居益養具瞻之望繼鋒車之峻召陟玉堂之近班凛然松柏之後凋卓爾蓍龜之前識臨大節而不可奪可謂稷契之忠遭變事而知其宜贊成舜禹之事俄寇氛之俶擾致神器之震搖諸老生語如寒蟬見大夫竄若狡兔天祐國步公輔政機智略如神而從容于倉猝之時言辭如湧而啓發于睿神之聽力排出狩之議坐成堅守之功不移宗彛再造王室宋昌之迎代邸謀協天心謝安之擊淮淝威破冦膽爰膺帝制進秉國成大開衆正之門力贊惟新之政竄斥壬佞拔舉滯淹形孝愛之風念宸𠂻付託之重謹號令之出繩祖武艱難之初太平之期指日可俟某羇單之迹撲拙自將欣聞大號之揚倍激懦衷之慶又賀少宰啓光膺典册進拜鈞衡君陳之入告謀猷久隆帝眷周公之丕視功載遂總國成綸綍誕揚朝野交慶竊以坐廟堂而謀王體秉機柚而亮天功上則燮和于隂陽外則鎮撫于華夏用人得失繫國重輕故當光明盛大之時必有魁偉俊傑之輔假羽翼而橫絶強精神而折衝恭惟某官本朝宗工斯民先覺有經天緯地之文而濟以淹該之學有尊主強國之術而持以肅括之誠方掄材三舍之初即冠名羣俊之上紙價驟貴衆共服于文鳴帝席屢前上特驚于見晚粵從詞禁擢預政機遵制揚工上繼承于先烈料敵制勝盡開拓于故疆果符審象之求亟付贊元之重無偏無陂已簡記于淵𠂻有猷有為佇擴攄于逺業伏念某斗筲小器刀筆下材册府交文嘗預俊逰之末銓曹浮食亦叨職守之聨流落七年浮沉三郡欽聞大渙竊抃危悰久困風波今幸帡幪之庇未填溝壑永依播植之公賀張樞密啓被宸廷之優眷升樞管之要塗國步必安海隅相慶竊以朝廷之基大治獨倚柄臣兵戈之擾中原無甚今日協贊中興之業實賴本兵之賢蓋時平則庸常措畫而有餘運否則雄傑馳騖而不足既選於衆必惟其人恭惟某官學窮載籍以來文冠能言之類屹然威望之重何止金湯淵然智略之明共推蓍蔡蚤緣際遇亟踐髙華執憲霜臺繩糾著正人之效摛詞禁苑艱虞繄內相之謀果採衆諧遂膺大用坐運籌於帷幄方折衝以精神飭武備而俾姦凶褫魂敷文德而俾民俗按堵而某身投真館名竄丹書雖王陽在朝不敢效貢公之喜而干木既進亦竊預西河之榮賀樞密啓光奉宸輝峻升樞密詔頒中外喜動兵民竊惟宥密之司實負幾深之託載用有嗣方備預於武經克壯其猷宜倚毗於人傑惟智局之劭故足以訓齊軍政惟威望之著故足以懾服逺人果緣公論之歸寵付戎昭之重恭惟某官生逢休運自致亨塗早攄告后之嘉猷久負禦戎之上䇿謀略之重則隱如敵國名節之懋則配彼上臣昨困險艱草因風而知徑退從間左實在夜而愈光召還喉舌之官遂正股肱之任握兵之要雖倚重於珠鈐秉國之鈞即奮庸於石畫賀富樞密啓拜恩丹陛冠位紫樞萬口騰歡四方聳聽竊以明主有興衰撥亂之志惟得賢則能亮天工藎臣有見危授命之忠惟得位則能奮舊業上既有特異之眷下必收非常之勳恭惟某官德量深醇謀猷宏逺直亮本於世閥忠義出於天資責難之恭以文武未墜於地將順其美非堯舜不陳於前早緣補衮之司進二本兵之寄坐攄素藴入贊沉機挺挺祖風夙秉威懷之略蹇蹇臣節大施經濟之才果協師虞進長樞管方將芟夷氛祲盡闢漢唐之土疆崇振紀綱恢復祖宗之勳業某方縻逺郡阻慶髙閎頌詠之勤敷宣罔既
