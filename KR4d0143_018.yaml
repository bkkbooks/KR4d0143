body:
  text: 丹陽集卷十八宋葛勝仲撰七言古詩同子充遊堯祠見交代李行正詩追用李太白舊韻因亦次韻呈子充俗物敗人意作吏七不堪朅來東䝉遇歡友角立傑出推江南英材百鍊揮利刃夷量萬頃澄寒潭弱齡文采照金殿荏苒立境衣猶藍銅章來踏瑕丘鼓邑屋歡康無疾苦春風郊外正微酣笑指叢祠兩驂舞猛拋簿領追芳哲不遣韶光浪湮滅戲看油碧聲如雷桃已蒸霞柳飛雪超然危立俯河干抱城清泗鳴驚湍謫仙秀句但碑板無復真跡龍蛇蟠君不見聰明文思撫寰海四表上下騰光彩破椽欹折爐無煙豪氣英風亦何在荒郊遺趾望中來遐想千古令人哀祖龍巡幸亦瑣瑣從臣徒向蒼珉開豪華豈復靈光殿峻峗誰知季武臺耿耿星河掛窗牖未跨歸鞍猶捧手同門早嵗氣橫秋年大飢寒依秫酒俗儒醒醉尚不分金馬玉麟名逺聞小縣鳴弦煩卓令冷閣問字疲子雲五斗不歸俱委瑣邂逅為僚天贊我金蘭縞紵未足誇嵇吕命駕何其賖官寺相望無百步泮林正對河陽花坐令莊舄忘吟越亦復無心戀魏闕蒲酒相從未有涯祭竈請鄰才一月記夢詩并叙新定姜補之十一月二十日讀書齊中疲極假寐夢與半山老人相遇於長干白下之間大相談賞且授以巨硯曰余昔所用也舊史載此類事皆為文藝顯名之兆因作記夢詩二首頥堂晝卧清且閒了無塵霿來相關俄然正夢半山老練裙葛帔泉石間抵掌稱談因餉硯微凹浮墨光如電自言翻經視草時落紙雲烟皆倚辦山頽梁壞空遺祠覺讀其書寐見之勉令勳德復藹藹佳兆若此真非衰少瑜昔夢青鏤筆江淹重錦完成匹明當辭藝驟驚人千里從今期一日元豐功成身退閒鍾山小築掩松關莘莘學子求卒業說經閙若闤門間木鐸兹文繄筆硯紫綬垂腰眼嵓電似聞一日置心猿道德功名無不辦配食孔廟時蒸祠子生其後不識之文章津源已默付名爵豈待顔髮衰向來李嶠夢雙筆至今辭藻無倫匹納鑑唾口難細論謂言不信有如日補之見和復次韻二首仙曹無事身得閒午睡絶惡呼當關榻施籧篨獨展轉夢覺不離周孔間官出硯州初乏硯過眼羅紋如過電半生用一即墨侯頗欲易之貧不辦舊聞夢硯湘君祠乃今神異真類之秣陵真儒豈虛授文字之祥昌不衰擘箋亹亹稱名筆正始微言欲儔匹終當辭藻瑞朝廷更請焚膏勤繼日原注蔣道支蓄魚硯二十年匆失之見夢曰逰湘水為二妃所留後於湘君祠獲焉出異苑逸驥未遇虛王間鹽車垂耳猶間關夢中一眄逢伯樂遺以舊物戃恍間斧柯山神護珍硯採琢往往興雷電欲求潜璞滿書簏顧豈咄嗟便能辦禱求苦用中牢祠何如假卧輒得之池塘句好有神助文字格力何因衰莫嗟筮仕困刀筆聘材行即肩羣匹速將妙語醉衰翁鸂䳵飛灘知不日原注興雷電祭以中牢皆出栁公權論硯從人求鰒魚海邦邾莒固多品此族稱珍乃其伯瀋泉湘瀹付饔宰薑桂煎調奉佳客視書已覺明病眼㸃酒偏能醒醉魄君看憂憤不眠人快啖取厭亦何擇豈如吾曹飲文字輿臺不復霑餘瀝昔官餘杭飽下筯兩載杯盤厭凡核朅來瑕丘問鮭萊樽爼遍索未云獲願從褚公棄千萬免使劉郎鞭二百刁馬河上書事呈提舉張聖用稻人掌稼存周書蕩以溝洫蓄以瀦為田一夫顧尚爾有大於此其亡諸所以當時多善嵗黍稌髙下無萊汙史公引漳變舄鹵鄭國注洛通廞淤寂寞井地已不復二子興利猶居居常平新書出聖考嵗積羡入為留儲毫釐不以給公上補助力役寬農夫意謂舍此欲富國不幾緣木求淵魚猗歟吾皇始即阼駿惠成憲追前摹民田利病特經意詔俾海縣交修豫芻言輿議滿青匭論及刁馬尤勤渠一勞暫費不足憚要使長利相乘除水衡銜命出護役使節適野同伻圖勸勤警惰詔賞罰尺一徑下隨都俞擇材分幹自不乏猶如采芑從菑畬薨薨畚插事疏鑿坎坎鉦鼓催勤劬伍符尺籍用兵法保受圑結從州閭施功塹中每絶蚓得肉道上時銜烏河流廣深事股引清波漲緑涵靈胥勸農使者舊京兆眉嫵曾畫閨房姝魯邦都尉古循吏謀視韓許直庸奴經營土功費心畫埤益王事成仙臞清明不歸對花栁獨冒埃壒馳軺車香名巍巍鏤翠琰績用藹藹飛皇都橫流不𣸪灌旁郡萬室按堵安田廬陪京沃壤袤千里旱乾水溢從今無誰言釃渠百世利政在起役三旬餘荒功經始自勿亟煩爾訖事歌驪駒役夫雲翔指千萬北返曹濮南青徐願修厲禁比川澤張官督察稱衡虞謝人惠筍籜龍初萌豹文㸃味闕盤飱心正慊二公好事為髠鋤一日分甘香掩冉小靳全勝沈道䖍縱取何殊范元琰趣令庖宰事燒煮未怕旁人呵聚斂白醪赤米最相稱紫蓼緑葵當少貶驗長須知韓老嗜稱寃却笑盧同儉遙憐萌出盛家林豈不懷歸畏官檢願君繼餉走輿𨽻莫遣煙篁拂崖廣喜元舉歸溪東作舍已蓋茒溪西築庵新立棟水雲參錯出十里妙寄方嗟無與共忽聞故交還五嶺聊喜居鄰依二仲臺評早嵗冠神羊儒館文華推白鳯詔除每下輒避寵才術小試已驚衆炎荒雖云去國逺皇華要是為時用故為懷歸逐我輩露章求免疲護送自言嶠南官不惡峻峯危嶝頻飛鞚挽葛屢上羅浮顛披雲亦到朱明洞看山却憶家林好夜夜幽棲來旅夢而今歸隱寄天放却憶修途真定痛猿鶴相向為家禽松菊未荒憐手種碧鮮脫籜髙繞屋白墮敷醪香出甕從今莫厭數招尋持鰲共費宫祠俸試建溪新茶次元述韻舶舟初出建溪春紅箋品題苞蒻葉低昻輕重如美人等衰銖較知難躐格髙玉雪瑩𠂻腸品下膏油浮面頰太丘胸中有涇渭包裹携來充博帖稍發下駟已驚眼香味髙竒光煒曄不肯花前殺風景憑花為謝穿花蝶更看正紫小方圭價比連城真稱愜病渴羌人洗煩滯好睡兼旬便愁攝異時風流貴公子喜悅藏珍令口囁莫辭七碗攪枯腸有酒沽君夜燒蠟次韻去非謝前教授餉澤州瓦硯錫花蒸成一壞土聨坳即墨元光舞飛鴛餘韻照文房吕翁心機同刻楮髙平沃壤真土膏硯與龍尾為朋曹剛柔得中不坯甈共推妙手能甄陶郎官小樣知名久何須對面供十手講郎尚有千載人要此編摩論臧否請加什襲傳後昆阿買不獨書八分紗帷晝靜棐几滑克肖鼻祖能綴文次韻去非題紫邏洞一麾謬作東諸侯邂逅兩玉陪遨逰引泉疊山作竹洞持以奉客充淹留㶁㶁清流出潭底辟疆萬箇那勝此竒礓文六照幽亭雅稱幼輿巖石裡人所應無君盡無哦詩擁卷窮晨晡指物程形直題署便欲相稱詩董狐雲水相從樂復樂汝陽太守自賓幕不用飛章乞㑹稽聳秀交流看巖壑次韻去非梅花造化小兒心戀嫪偏向氷花施巧妙冷禁霜帶曉寒飄清宜月綴微雲照已與鳴鳩傳酒信更乞遊蜂供蜜料交情萬里寄春色度曲五更吹怨調半樹臨溪抵死香一枝倚竹嫣然笑寒姿疏影太幽獨靜女貧姝真窈窕世言嘉卉出靈山我疑異種來圓嶠肯挑俗子炫穠麗只約騷人伴吟嘯少陵牽興催衰白廣平被惱回剛峭徑須相過夀此花市逺無肴只藜藋次韻去非留别餘子碌碌不足數太丘晚出吾所許淹盤此境未金馬邂逅相逢慰銅虎與超宗語不知寒從季逺遊那覺暑祥琴臯月歘戒行征馬譙門聊出祖平生種學與績文自信扶圭兼綴組分無桃葉把歌扇只有松枝當談麈行裝未辦纒頭帛衣食何施擇木羽從來文豹深隱霧此去老蛟真得雨長卿蜀肆初滌器伯鸞吳廡曾舂杵青雲直上不作難那復笑人憂鄧禹喜宗丞姪病愈向來聞汝拙將理五日寢瘵未藥喜醫良未遇肱三折愛切徒勞夜十起欣聞安泰風愈檄莫嘆清癯肉消髀徑須營度還詩債要看筆端翻峽水原注姪有圍字韻詩未和奉同李倅安上賦崔白沐猴杏花空山無人春風驕撲撲晴杏開香苞嵓深谷峻無與賞攀枝騰踏帷飛猱大梁崔白舊所見絹素落手因揮毫巧為紅艷狼籍勢撲蔌幡灑歸蓬蒿王孫惜花有深意預憂雨橫兼風豪故來跳觸看零亂妙思臨寫形無逃貴人錦囊舊藏貯文闈傳玩叢英髦東平儒仙首留詠詩價與畫相爭髙直云何用辨真假徑須對此呼香醪誰知真花却時暫不如丹粉還堅牢髙君贄公􅬐兼數職奔走疲甚以詩勞苦之曉鼓逢逢天未白呼火攝衣干典客青衫手板階石前磬折擎拳若無骨還將束矢聼情僞更向團絲分枉直糟漿逆鼻走兵厨播糠眯目司平糴翩翩輕輿行若飛濯濯單紈汗如滌趨局何曾過八磚端居未暇移百甓歸家往往犬迎吠得肉時時鳥攫食長材要自萬鵬程初筮聊淹一雞肋徑須黽勉彈其冠未用低佪尤此幘左馮舊事今復繼敏手州人驚霹靂邑尉姜補之師仲枉詩甚寵率爾酬和去年詔鎖春官闈桓桓文陳如熊羆激昻辭章爭自售獵取豪俊幾無遺五更榜帖亂人鬼九衢姓字奔輪蹄維時謬從宗伯後喜子入彀名髙垂楓宸臚傳預供奉杏苑開宴常追隨那知巖邑大如斗邂逅聨事同勞疲民頑奊詬號難治心怯畏縮將安施幸蒙幹略整紛冗間以文義相娛嬉忘形未肯遽爾汝執禮乃或論生師固知風味去人逺九牛何止爭毫釐平生最喜我輩士角巾野服同委蛇爾來亭午已休吏五百彌月閒鞭笞城南桐竹富蕭瑟城北溪漲清淪漪頗願吾僚哀老子遨逰使得時伸眉送許師德訪我金溪船繫柳一杯醑我真天酒原注酒名露華騰裝欲赴清油幕才得伸眉俄振手家聲文采照東南洛師吳郡乃所監羔纁繼辟不容避聊脫黃帽穿征衫元戎器業光鼎軸百萬貔貅為部曲仰分憂顧新登壇慎柬英僚佐推轂平生韜略攄一朝佇看烽靜無氛妖將軍三箭天山定千羣塞馬嘶風驕少川兄貧悴甚見屬求寓館未遇好事者聊作詩以寄因以速之我兄弱齡推了了手不停披今髮縞人中滯論能立判筆下陳言皆力掃多如雞跖歎積學大似牛腰看屬藁敗絮自擁不言寒書床坐穴那知老逆旅無人識馬周除舍何當館孫寶水波未合急相過漱醪聊緩憂心搗寄題吳江王文孺份解元臞庵臞庵散人築隱居自稱山澤之臞儒邀風貯月有亭觀以道自廣何其臞三江雪浪魚龍窟千古浮天仍浴日乍吞涯涘歸醉胸時卷波瀾入吟筆天儲此景非寒窘經營傑觀規相凖萬株蒼石雲斸根十頃紅蕖波照影異時璧沼搖毛錐同門太半通金閨一班一級何足道賦歸有此知為誰境清恍與塵寰隔髣佛天隨舊行迹聞道朱黃近筆牀定有叢書增笠澤次韻慶善九日舍南自灌五畝園滿種黃花待親識明朝酒熟當夀君卷白不許餘涓滴湖海浮家作寓公醉醒幸與騷人同一座盡傾塵表物不須舉扇障西風再和慶善但將詩酒樂重陽呫囁深嫌程不識已呼明月倒芳樽更浥滄波供硯滴多聞素仰百六公飄零邂逅笑語同明當數助擊鮮品鼻頭出火耳生風送慶善之江隂南州地氣真火維午暑勢若遭蒸炊風亭水榭不救暍如何泛役衝炎曦四年遵路俱六月叩門急義非君誰小蓬暑行分不免著書暫卷春秋帷借船屢枉逸少字質錢敢以班史辭一麾尚與數人共西江得水知何時况復外事繼嬰擾主孟頻歌烹伏雌天其或者降大任必先空乏其儲資老人索居寓澤國蛙黽同處時迎醫麥麴芎藭兩未效政須健論扶衰疲君今捨我那遽反落寞何用伸吾眉大恐尺一亟招選徑從儳道趨天墀嘲淵明代答按原本此首前有嘲淵明一首今編入七絶君不見七百石了麴蘖事二千石充雀鼠耗澆腸果腹固有餘糟丘米山何足道不如酒盡仍從酒家覓瓶中粟空聊乞食依韻和子有教授姪寄雪詩空中紛霏誰剪水夜半天窗明蠟紙天將竒寶借詞客使酒驅詩難但已紅爐活火然松明閒施博局呼明瓊區中無此清絶境疑是縮地來蓬瀛從來聞說三吳道飄瞥郊原看最好且願留為不夜城揮戈却日還穹昊講郎才韻今可人聞客欲至顔津津急掃階庭施木屑跋馬去作陶家賓衛卿弟和詩佳甚復和一首俗人雪句如翻水陳言堪弔剡藤紙子詩清如扇上讃使我三歎不能已妍姿與雪爭輕明白戰不道飛瑶瓊西神山畔芙蓉水好招煙艇浮澄瀛千巖不必山隂道何處輕飄看不好百觚判斷速呼客莫待睍消還畀昊天儲此景娛閒人貯瓶潑茗甘流津茅簷從此便歸隱不待人呼祁孔賓衛卿弟賦詩見貽和答一首時有從軍之興我如老屋人多閲骯髒如君真可悅長塗未騁駒伏轅窘步無堪鮒依轍諸賢衮衮位華顯獨子棲棲困巖穴何妨虎子聊一探况是龍泉未虞缺前時羮稀客告去爾日瓶空糧又絶不緣閔已賦牢愁獨為傷時拭清血燕頷食肉骨素竒龍額封侯計非拙勉旃矍鑠出據鞍收卷毛錐從此决次韻鄭維心逰西余山雲巘瓌竒甲震州不須幽境更旁搜從來知是通侯國此段方從勝客逰閏嵗春遲空水樹雨時溪漲失沙洲吾衰久矣欲何適更為前山一上樓顧余峯好鎖雲烟入寺窺臨信所傳衣袒右肩從衲子屐除前齒陟山巔一杯相屬真宜釂四者難并偶幸全亭號弄雲誰作記紫樞當日筆如椽明月峽李庇山記皮陸詩紀述茶事真歷歷枕流亭北池七里萬仭插天雙石壁懸崖倒掛天銀河武敏尚存西楚迹昔賢招尋多好事例以姓字刋巖石青瓊緑髓茶始生報春鳥鳴山晝寂茶民研膏柏黑粘香焙鑿山深二尺急程苞貢御簾開宫娥進水傾寒碧只今玉食嵗不供舊事獨有山英識羇人水厄不厭數耿耿不寐幾通昔他日重來覔舊題應嘆流年如矢激工部兄新治小閣壘土為火爐戲作勸召客簡許開尊殺青竹爼有肥羜簋饛粟招呼未聽洗盞聲故復吟哦小詩促能使將軍賞不貧請召宗姓仍及身擁爐便是入窟室於粲灑掃情無文我今愁如居廣栁萬斛量之應更有內典暫輟算海沙羣經尤慵開户牖政欲酣暢融心神村郊魚鳥皆來親不憂坐上無武子羣從一一天麒麟大父通議無恙日開軒燕處有桐孤峙因名琴軒初不措琴嘗作記叙意而偶失藁本故今家集不載比者興之姪閲故書得之見貺喜而成詠呈六兄工部兼簡弟姪嶧陽竒軒髙參天對以華屋名琴軒軒中寄傲隱君子方瞳鶴髮臞儒仙閒中默契絲桐理不待徽絃出宫徴栁惲筆捶佐屬文淵明手撫聊寄意一篇叙此藏巾箱歘爾六丁下取將世無安世誰默識才異束晳孰補亡神物護持今復出數紙蛟蛇親手澤敢辭援筆補遺編謾致區區貽厥力諸人各見和復和一首我祖還笏歸樂天不羡戴冕兼乘軒掃門笑傲寄元趣一龕相對惟金仙辭藻翩翩能析理字字清竒中商徴響泉韻磬初不施見色聞聲自真意從來家學傳青箱祿侈萬石今方將此篇不愁暫飛去天相斯文終不亡孫曾秀傑今層出餘慶仰承君子澤莫言臨絶似獲麟請看筆頭扛鼎力沈必先殿院與求用䇿字韻賦詩見贈謹依韻和時居盛林菁山遽用檀公䇿水村來作浮家客五年霄漢隔音塵此假相逄喜折屐荒陂難覔鈷鉧潭胸中丘壑有人傑烏臺坐逼癡牀南見事風生勇成癖逆耳爭先貢皂囊造膝仍頻對宣室只今道梗淹荒村汲直未肯儕公孫時平已見龜墨食尺一行催覲文石蒙維心示謝必先尚書餉筆佳什時維心方刋正三國史輒依韻攀和谷口之孫材刃銛如針處囊立見尖平生苦心在墳索入月猶未髙騎蟾若嫌夀史六十五論次未必三長兼與時諱惡難僂指為米溢美堪掀髯浪言張華為輟筆至今詆者口不箝因持衆製事編削管城雖老聊復拈明明褒譏淆涇渭欲向素王師謹嚴已刪卧龍無將略過實仍刋諸葛瞻原注陳夀與二人有隙故稱亮無將略瞻名過其實東陽尚書助述作束頴分餉出寶奩自言宸廷夙霑賜今以歸奉餘不潜原注維心自號餘不山潜雞距鹿毛青鏤管品制一一形標籖昔冠神羊書白簡痛擊姦佞如針砭并與書法奉君子大書特書不可淹懸知南董奮直筆首於三馬誅姦憸次韻王得之方池父子玩月先生夜不眠愛月真癡絶呼兒飲文字桃黍聊一雪清光入酒墮胸次照見萬卷非涉躐商容皓氣寒徹骨况是氷輪圓不缺中宵影倒萬頃池上下金盤兩澄徹廣寒靈媛多飛瓊煙凝露曖收羣聲漁冷跳波聞靜岸鵲驚繞樹當前楹辭直道山來膝上郎君吟興紛縱橫詩成父子定知已門有佳兒真寧馨不須靈液玻璃碗一夢瑶臺亦非逺楊泰初權縣丞數寄示詩文作詩紀謝關西家世東都相褫褐十年今始壯一官棲棲百僚底衆製翹翹萬夫上憶昔曲臺尸列卿謬厠春闈慙哲匠英俊下沉勢欲拔文章橫流期少障榜中上第溷元結堂下一言驚叔向頻蒙古錦倒清篇更枉長鬚問無恙詳觀歎賞欲投筆退恧粗疏堪覆醬吾衰文意已蹉跎鳯閣當求舍人樣原注謂亳守曽叔夏程良器嘉量解元許為寫照作詩求之虎頭千古丹青傑誰言黠中有癡絶手揮五絃真勝詣頰染三毫更超越自言四體媸或妍顧與妙處無相關炯炯雙瞳㸃圓碧筆下頓覺神明還程郎言語妙天下畫復通靈能變化掃除俗骨畫如詩摹寫天機詩似畫竹齊溪嶼數相從似蒙儃儃窺塵容詆呵衆史露拙迹疑有心畫藏胸中寒鄉鼠目麞頭子葛帔練裙謝龜紫幼輿政自丘壑人試為寫傳嵓石裏次韻范昌齡大有慶新居我家渺在澄江浦泛宅來依白蘋渚客居十載席為門上蓋茅茨下榛楚邇來作舍倒歸資聊為兒曹庇寒暑千嵓萬壑相嫵媚似以身嘗為地主樓外煙霞邀吐句堂中墳史供稽古嵗晚居身可否間簮裳束閣饒安閒深愧詞人相爼豆鶴書應不愧鍾山先君忌飯僧悟空興之姪有詩和韻君不見毗耶居士人天英化佛億萬文室盈清晨香積一盂食厭足一切緊法力又不見手捉麈尾生公廬說經妙藴幾無餘豈惟緇素日㑹面粉碎虛空雨花片我生歸命海潮音况復劬勞諱日臨三孤遺像涕沾臆建齊達觀趨禪閾悟空誰是悟真空門前灌木吟悲風贈星洲僧了然禪林古有一宿覺講席嘗聞一遍照凡馬十駕及駿骨況子秀頴顔齒少星洲巖壑鎖煙雲千柱浮空覺王廟似聞焠掌作書淫乍或橫肱䆒心要明窗淨几學參𤣥二塗一得可前料香浮牛首禮圓光唄似魚山勝長嘯聞熏大士豈忘言機鋒默贊潮音妙和陳簡齊韻馬鞭雖長不及腹山林朝市兩角逐華堂誰掛元吉麞坐使朱門變林谷龍章鳯姿自有種山野頭顱未為辱長沙寫真得天趣下視馮尹皆奴僕君不見青州劉幡得異草能遣死麕骨再肉又不見廣平射麕變浮屠因罷校獵投金鏃兩幅陵陂槲葉香儔侣共樂春草長昻頭妥尾無所畏窘拘知勝觸藩羊原注元吉善畫麞尤精槲葉依韻和興之姪一真那有黑白業佛槖枉用為書篋人人反照自圖成說甚一花開五葉了無結習便超脫因有罣礙生怖懾山鬼窟中求活計𤣥關欲透知何劫匝天遍地自心源若解承當真要捷樹林水鳥皆法音露柱幡竿光煒燁世上盲聾喑啞人試問道師作麼接寄題伸仲芳美亭漁舟一出桃源路煙鎖雲埋迷舊處那知九龍有仙村漫山灼灼花無數人言却老是此花只今已似劉晨家微風披拂飛紅雨杲日照耀蒸紅霞似聞花間新結宇醉吟多是神仙侣更求人面相映紅我欲叩門求雪黍圓復師將遊四明用道祖韻作詩贈行禪宗不減宿一覺文性還同照一遍啞羊豈是一流人漆瞳爛爛巖中電機緣未遇閟金提雲水光中挂衲衣定回時起橐駝坐秀句一吐胸中竒過我郡齊那聽去衮衮談𤣥侵日暮西風吹面作新凉騰裝欲指鄞江路一庵錢料山幽深欲拋印綬聊招尋倦遊歸來問無恙東第飄然正角巾招道祖簽判嘗暑酎辱示佳篇紀事輒依韻奉和且約再氷釀云君不見兵火連年擾江漢一介藎臣無斷斷列城守將遁或降那得捐軀顔與假鏖兵喋血八年間西失平夏北折蘭奔軍知是何雞狗坐想飛將張與關草莽臣謀未云獲且復澆愁傾大白平時徒有扇障塵一笑未辨鬚纒帛相邀聊共聖賢中但愁燭跋鴟夷空沉酣不畏輕出舌驚懼懸知不入胸午夜醉歸聞踏月林影灘聲助清絶糟兵好向水村營壑谷正為吾曹設儒生嗜酒多有之髙陽酩酊無所缺莫言酌我慎無多休彈賀若唱回波騰騰相送入無何二十五日道祖滄浪亭落成召㑹東園延袤不論畝樹梓成行俱楚楚方池瀰漫漲漣漪藕花清酣嬌欲語臨流新築滄浪亭斧斤斷手邀落成蘇家風月舊無價千金買得亭和名穹廬飲馬吳江水長洲萬井紅烟起齊雲樓觀委寒灰那有相家歌舞地稽山别乘今豪英肯將勝事頽家聲青氊舊物今在眼髣佛北牖仍東榮把盞聊為主人夀亂離已往空搔首請看前日閙巫醫豈有閒情舉樽酒朝來大火落南躔已覺病骨蘇凉天剩搗橙虀斫鱸鱠全家醉倒秋風前流杯美哉洋洋曲流水碧可染衣清徹底我傾山資結茅舍兩載經營端為此春風上已一月前小試禊事來水邊胡床醉坐略少長羽觴輕泛隨洄㳂道人護戒無酒欲笑挹清波作醽醁崖蜜相和代引滿自言過免三十六隨緣戲劇亦何嫌勝逰從來支許兼久知世味如嚼蠟未應貪著中邊甜次韻道祖大水君不見緑槐䕃夏搖千門移秧遍野繅盈盆天公忽作彌月雨憂嵗上勤黃屋尊我家茒廬劣容膝隨水傾摧非瑞室街衢生魚堪佐饔簷霤垂龍欲穿石仰天又見興油雲乾雨誤㸃波連村馬牛不辨固其理蛙黽同處何容論休歎棲苴接飛翼林端㑹見賓紅日木饑水毁儻時運救灾行看恩洋溢同道祖及子舍遊茶山歸因成寒窗送曙雞一鳴尋山蓐食天初晴水口溪窮為停棹步携東坦仍添丁虎頭巖髙山色好竹輿遙睇眼為青花瀨濛濛勝紫氣微花拂袵聞芳馨岌峩懸臼與天接腳力欲趂飛猱輕此邦佳處遍尋陟夫差所顧獨未經兹逰野服穿不借自勝五馬仍雙旌憶昔貞元守修貢木瓜堂廡輝山扃兩邦歌舞競姝麗榖雨不許遨頭醒只今金沙雜榛莽空照華髮垂星星近澗喧豗泉㶁㶁逺峯嬌膩雲英英山僧意勤苞紫笋傾蓋一笑無平生息黥補劓有甘寢夢覺起作逰山行新池水涸股引于前溪辱道祖來觀吾廬新築薰風堂其下方池手親掘畚插初無鄰里相垠隅那有波瀾濶旱涸俄驚拆龜兆灌輸未免翻龍骨街南大浸卷滔滔巷北小渠來汨汨膠杯忽覺水痕漲抱甕免嗟人力竭已憐紅芰浹枯荄更喜頳鱗救濡沫幽居勝事快先睹上客髙軒為輕出蛟龍好在且泥蟠他年豈復池中物初得庵基於青山用立方韻請道祖同賦身閒那贈繞朝䇿來作菁山數旬客結庵痛謝九流賓輕重嫌人分履屐才通箭道菖蒲潭幼輿政合居山巖鬭健更須升絶頂接天巨浸浮東南從來不辦王濟癖石磴騎危甘腳歷欲將土木化荆榛坐嘆清風來入室練裙葛帔居山村共怪膏粱相國孫祝雞為鄰言不食自此相從煮白石道祖見和復賦一首人言不飲第一䇿况我携貧來作客破衣任笑頻見肘斷鞋不辦時新屐公材公望非丁潭世人誰許瞻巖巖豺狼滿道生理窄立錐方卜南山南十年丘壑幾成癖澄懷坐想真歷歷難希蔣詡開三徑且學陳蕃事一室時危花栁自村村未害含飴仍弄孫淡飯且安禪悅食儲錢更買竒礓石大暑新居納凉和小子韻至後金柔伏日三旱氣焚宣勢如惔火井湧沸烟生嵐鶴髮遺老素未諳我居瀕澤深耽耽修廊飛廡賢僧庵薰然好風來自南如甘露門開瞿曇如客懷氷吐清談有亭自雨臨深潭不假凉草生毿毿天日炎赫反所貪我窮儲無石與甔枵然飢腹空婪酣后皇矜憐百不堪免使熟爛聊包涵王城衮衮穿朝衫跨馬揮汗流朱藍獨逃靡盬侍魚泔坐享逸樂捫心慚用立方韻二首山村艱食宇晝合齊鉢相呼坐僧榻今朝瘦羊忽入饌云是餕餘徹膢臘年大才疏合退休尚玷恩華只自羞賞延亹亹來踵武命服童孫尚羇午仕宦由來須遇合未遇杜門寧穴榻尊無泛蟻浪經春突有懸貆偶乘臘郡印還官得小休桑樞席門何足羞幽居不羡裴掌武緑野堂前橋號午立方闢小閣附火興之姪作詩勸㑹客次韻吾兒𤣥學師老懷嚴持月六八關齊新來五辛不入口坐使妻歎生不諧自言丈室淨名量惟期禪侣來存訪栗里豈獨尊常空亦乏秦聲亂舂相朝來天雨瑶花霏句如連璧來交輝鹿柈茶果亦易具不爾恐致膏肓譏幻界政應頻燕喜酒盡為謀當更起趨庭為爾復緩頰一杯既空難但巳
