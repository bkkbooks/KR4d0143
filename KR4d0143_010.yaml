body:
  text: 丹陽集卷十宋葛勝仲撰跋跋錢伸仲東坡詩卷東坡賦詩時三十九嵗矣其末云安道令賦有旨哉伸仲襲藏嵗久庚戌兵冦并與墳籍散後八年始復得之天宫貴重始類六丁之取將神物護持終聞二劒之復合云爾跋曹職方詩卷故贈職方副郎曹公夢得以經術德誼髙蹈州里工篇什篆𨽻自號松蘿山人景德祥符間隱然名動江左一時名賢尊仰之殁九十五年某為休寧令得其詩一百七十篇讀之句法雋逸既又於諸僧藍見榜額大字筆勢竒偉每想其邁往不羈之氣今觀此詩顧結字遒楷屬辭精深且遇在政者謹甚又知公禮法士也前輩詞藝類不拘一律則世以聲畫臆論人物豈能髣佛徒觀公以逢掖處家巷而州將尊禮之以詩先焉其賢亦可槩見跋洪慶善所藏東坡書杜詩并判訟牒昔張長史判訟牒筆迹高妙常熟老人猶知日陳牒求判而藏之况東坡迹乎若其勝日暇時瑣窗棐几取精筆妙墨而書詩史中尤動人句其冝藏弆又非判牒比也跋褚遂良臨蘭亭帖昭陵嘗恨虞永興死無與論書者魏鄭公曰遂良下筆遒徑甚得逸少體即日令侍書又當時爭以逸少書求售真偽莫分獨遂良論所出談者不復敢異是篇河南所臨固冝與永和筆迹亂真也跋吳子華帖光化天復間唐祚如綴旒此何等時而子華兄弟營求塗轍猶如此其切乃知天下有道而以靜退望人士蓋未易也跋洪慶善所藏本朝韓范諸公帖祖朝勳德大臣磊落相望而此數公為之傑身生晚恨不及見之今觀其筆迹如登龍門之坂侍熒煌之座而聞河漢之無極也紹興甲寅十一月已亥謹書時與慶善同寓寶溪跋蔡君謨帖君謨尺牘作行草諸體皆其妙絶可藏云第一紙是嘉祐五年自泉南赴召至省時道中與章伯鎮耶跋君謨與唐彥猷論其弟直諫帖參預唐公介居言責日對便殿擊丞相潞公甚力時君謨立螭坳親見之退而稱其風操配古人且以所論不從為不幸公形尺牘而不復畏避時相蓋嘉祐至和以前士風質直端亮類如此跋法照闍黎君謨帖祖姑清源君實與君謨嫓德君謨尺牘抵諸大父無虛月故豫家藏其迹甚富今觀法照講師所蓄帖僅二十餘字而點曳之工使人尋玩無斁殆所謂百不為多一不為少者耶跋蔡潮州豫大父草書帖古人善書類欲其子似已大令幼時右軍掣其肘輒喜庾家小兒賤家雞安西每以為言今蔡隱君妙於藳書不以授其子獨課以力學當時水墨積習為無關身名輕重故爾耶跋魯公與李禺并林文節公與其祖帖三翁還笏里居不在東阡在北陌杖屨時相往來此固世間第一流人扳而與之周旋固冝乃若齒爵相絶而痛折節下士非以一世人物為已任者未或能之跋河中守章公援刺血上表乞父內徙帖唐昭陵用李英公不疑以其不負李密也用魏鄭公不疑以其不負前宫也故河中守章公嘗以文辭冠天下士其上章徽廟為父求內徙實出身血書之雖極哀切無他枝辭以明父勳德獨曰言寡過而未能論大節而可託又曰頃受先帝知遇最能承以孤忠今蒙陛下存全豈獨忘於大德父之忠績不必纍數千言而昭然著見動寤萬乘有餘矣非言語妙天下者能之乎今上饒使君孝誠動天錫以進本既刻之金石以示搢紳後為石室家次藏之以傳無窮忠孝大節萃於一門綿三世見之嗚呼休哉跋陳去非右丞畫山水觀此筆所謂積雪帶餘暉青峰出山後夕嵐飛鳥還等語如在目中信其詩畫同出於天機也談者謂右丞詩合國風畫山水楊子華之聖信然跋醉道士圖范長壽何長壽筆法師僧繇並有醉道士圖傳於世自顧陸子華之後人物推博陵為中興此圖信可珍也跋與可竹造物亭毒之妙此君能發之此君生植之妙與可墨君能發之與可墨君之妙東坡詩文能發之後之人士殆不必措一辭題佛本行經元祐庚午嵗侍先君官此邑丁內艱嘗誦萬壽經藏後二十有八年自大司成出領宫祠寓居再閲大藏七月二十七日終此帙為考光祿妣永嘉夫人追福時先君捐館十四年矣跋劉知言默所書華嚴經近時人士執親喪類書華嚴以追福然豫謂滯於名相則雖碎妙高以為筆㪺溟渤以供硯書龍宫之微塵品若海雲千二百嵗之久殆未足以酬罔極也而况三十九品乎若知法無生滅佛常現前則涉筆之際所欲薦者已應念超脫矣知言既臻道有之妙因觀其所書經偶題跋道雲刺血書經同郡比丘道雲護毗尼精苦募衆誦妙法華經七百萬卷將并其爵里納之清涼藏中又自出身五根衆繕寫此經十過細字僅若蠅頭而點曳綿密類水墨積習至工者紹興乙卯季秋九月三日携一本至寶溪見觀曰將捨廬山之雲居豫偶問之曰能仁所説法華子既已書矣不知威音王佛所説二十千萬億偈洎日月淨明德佛所説八百千萬億那由他偈洎日月燈明大通智勝文殊等佛及菩薩所説將何以書豈以父母未生時血書耶願以見觀雲居禪德淵藪也當有知豫言者跋涵山法清師書法華經經云終不以小乘濟度於衆生佛自住大乘又云我本立誓願欲令一切衆生與我等無異此世雄出世之一大事因緣也是經佛最後説闢聲聞辟支歸一乘名不斷佛種故書持者影福無量丹陽居士觀清師所書經隨喜三歎之餘因書跋周仲嘉發菩提心語後馳千里者始於布武為九仞者始於覆簣為世調御不受後有大事也而始於發無上道心法湧禪師黑衣之龍象而江遺公搢紳之無垢也立訓以垂世而仲嘉能勇行之三嘆之餘因書其後
