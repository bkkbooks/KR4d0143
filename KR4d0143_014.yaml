body:
  text: 丹陽集卷十四宋葛勝仲撰墓志銘宣義郎致仕王公墓志銘公王氏諱繹其先京兆萬年人晉代徙貫四明有諱文序者仕錢氏為奉化令吳越國除從歸朝又徙蘇州今為平江府永冠著姓文序生愈舉進士五對策於廷入官卒贈右金吾衛大將軍於公為曽祖金吾生琚歷廣西淮東二路提點刑獄贈左武衛大將軍於公為祖武衛生安仁知沅州軍州事娶長夀縣君丁氏生公公字彥成懋德自立處家庭孝恭慈良有愈色之順居鄉黨清正願慤無擇言之闕該覽羣籍尤邃於易手抄諸儒章句數萬言家貧屢空不營資業客或啓勸輒酬以他語奉身貶約遣諸子受業給其費顧豐泰已而二子棠裳以詞藝顯名相繼拔上舍第效官近境公往來更就其養在公府簡默不交人士設棋罫自為勝負置酒鐺自為獻酬容色間暢人莫窺其際子孫所為有不當其意者不顯鐫斥微示以意僮役或盡嵗無所譴罰性寬如此紹興元年天子合祀天地於明堂時棠知湖州烏程縣裳知秀州海鹽縣丞上章聨封授公宣義郎致仕明年春棠諗於朝乞去位侍養詔除主管西京中嶽廟方是時某為吳興條其政迹表留以自佐會後太守翰林汪公繼以請詔俾還職因取急與裳自海鹽迎公至縣治三月某甲子卒於烏程年數七十有二且死語家人曰先賢臨絶有主無神鬼驚忤者吾今政爾不亂與頮畢泊然而逝無遺令一語娶東平安氏郢州防禦推官沖之女贈孺人賢操實克嫓德前卒子三人棠左承議郎裳左奉議郎鏜幼未仕孫男女十有二人歿後二十有六日與孺人合葬於吳郡天平山之北初公里居專以教子孫後食其祿者十餘年以生受朝封二息並時官浙右兩州賔客豪傑若民吏皆德公之子爭贊善奉觴為夀病則交迎醫歿則致奠醊者相屬故時論推為哀榮焉棠裳學術文辭秀出流輩所交惟賢所涖號治執喪哀臞於送終無所不盡與余遊俱習乃見屬以銘銘曰性介而通德清而容嗜學劬躬不諱其窮有子俱逢祿釡有饛禋祀合宫名聞帝聰肇享爵封命服惟𠂻眉夀令終祖考其從後礽顯融且侯且公其柏其樅過者必恭文林郎薑公墓志銘薑姓本出天水太公望封營丘後世為田和所滅子孫散徙而天水之薑曰肱曰維顯名史氏至恪公輔相唐髙宗德宗益號冠姓君其裔也諱周臣字仁輔世居睦州建德莫知其始徙曽祖考及祖考延德考逸皆不仕君少孤母李夫人訓使學專精自厲已而文詞經術隱然稱諸儒中元豐八年進士第調溫州永嘉江寧德化二縣尉部索夙盜囊橐過抵悉知之相戒毋得覘君境人賴以安遷衢州録事參軍聽獄明審每甲乙參凖以鉤取事情不強以楚掠文致其罪故獄無頗纇竟案有可矜輒為奏讞所全宥甚衆在勢者材之辟監洪州豐城市易務滿嵗會省官罷改明州象山縣丞逢受寶恩遷文林郎數行令事為政簡易人便安之未滿秩復會省官罷君性溫良謙退居官不以武健干名所至稱長者隱約自守祿賜緣手匱竭不營歸資鬻舊業幾盡識者清之暇日以所謂梵書者自娛進官淹晚聊不嬰意校吏考十一不絓銖髮過差竟以州縣職沒其身悲夫配南郡張氏子三人男師孟嘗貢禮部師仲第進士將仕郎師季舉進士女長歸同郡陳夷簡次歸開封何至德一尚處孫男一人某令休寧與師仲為僚喜其齒少自立於載籍博涉精記誦説數千百載事如目擊既又聞兩昆弟皆嶄然見頭角意其門户且興亡幾何君來過師仲見君以德善自晦粥粥若不能言固知流澤有在也政和元年二月壬戌終於休寧子舍夀五十七諸孤奉喪歸卜十月已酉窆建德鄉平碧之原走書泣請曰先人行治微夫子銘且湮沒義不得辭銘曰有所激以昌其氣惟學之嗜故壯而仕無所麗以直其躬惟義之從故老而窮祚德自天嶷嶷三子慶充門閭君其不死著作佐郎陶公墓志銘晉著作佐郎陶淵明之後十六世有孫曰直夫字次汲仍居潯陽仕宋亦佐著作大觀三年年四十七二月庚寅以疾卒官陶氏本鄱陽人吳平徙廬江之潯陽有名丹者為吳揚武將軍是生晉荆州刺史長安郡公侃於淵明為曽祖而公之曽祖鑑為左監門衛大將軍祖稷大理寺丞父舜咨第進士終宣德郎公嗣舉進士中第調建昌軍司户參軍官有殊政會詔諉諸道察良吏江西使者以公應令遷雄州防禦推官知亳州録事參軍改教授懷州談經授業切磋懇至自逺著録者甚衆遭外艱去職學徒恨不得卒所聞泣餞者踵相逮也服除又教授徐州時三舍賔興法始頒方郡衆未曉習公能推廣德意區别科指行之不少盩傍郡取則焉明年集貢士試京師徐土人士卒占異等遷太學正改宣德郎提舉梓州路學事召對詢勞移晷先是蜀部學廪不繼公至則披圖考籍録乾沒吏一人置之理籠利源以豐嵗入窒姦隙以裁日用養士之費始羡遷監察御史入祕書省為著作佐郎逢受寶恩轉奉議郎公生質秀頴不凡綜練經學廣窺衆善專精或積嵗不踰閾元豐中補太學弟子員年少耳然志尚風旨魁然出老先生右一時賢雋皆慕與之交七年秋充貢賦居第一海內誦其文辭及為吏砥節首公敕身自約惴惴惟恐過差氣貌嚴正雖燕不墮處交朋間無擇言之闕居喪舉動遵禮紀而毁戚獨過制事寡嫂甚於兄之存字其孤不啻已子有文數百篇初宣德府君不喜吏職浮沉管庫數年亟謝事歸家巷故公亦濡迹埋光不及擢序而族昆節夫以儒學將略致位侍從屢殿大邦終龍圖閣學士正奉大夫胄閥益顯矣公娶張氏亦同志趣後公二年卒男曰欣女一人皆幼能舉公及公妻之喪以政和元年二月壬寅合葬於江州德化縣先生鄉之原且求豫銘以識葬者尚書司封員外郎悅龍圖閣公子也銘曰潯陽之城柴桑之里靖節之家有賢孫子不慕榮利間靜少言官止著作以屈為伸其尚類也視此刻文江隂胡君墓志銘君諱哲字明叔常州江隂人少為諸生力學問嘗試于鄉又嘗試廣文館不售即謝去隱居啓山之陽泛觀典籍以求志二親春秋髙念所以娛其意者乃築圃結亭藝木芍藥千本服老萊衣日侍杖屨容與其間州里稱其孝後益喜交賢士賔至如歸修具甚設資業為替弗計也性徑正而曠逹聞人不善必面折之緩急叩門者不以有無為解一時巨公名德多從之周旋因得其筆牘藏之甚富常語人曰吾窮於世老矣然於古人知慕醉吟先生於今人獲從東坡公樂飲於西湖之上竊自幸也晚節刻意宗乘聞道於大通禪師得死生之理宣和七年十月庚子寢疾革誦般若心經數過留偈四句有形遷性不動之語泊然而逝享年七十大父欣父惟恭不仕男二人端彥端文君夙以翰墨畦徑親指教故其文皆曄然可觀端彥再貢禮部人謂以經術文詞策名致顯位不在其身而在其子均也一女未嫁孫男四人千里千能餘未名君以十二月某甲子葬於縣之昭聞鄉祈仙里之原而見屬以銘銘曰奔名而夸毗瘠義而豐資虛生而懵道心之微欻與世其長辭以君之清操逹識而視之吁其可悲江隂趙君墓志銘常州江隂趙君諱越字彥中資夷淡而趣髙明少喜視書上論千載人以筆端涇渭之補太學弟子員卒學師友交譽不幸踵丁三母憂積十餘年不獲于試無階自奮崇寧中朝廷大興三舍法羅天下英俊君春秋髙矣猶率子弟鼓笥趨鄉校在勢者欲以八行薦之君以宿儒尚多辭焉已而子弟相繼貢辟雍省識者知其訓飭自君出也家世饒資曽大父某不仕父某與其弟秉義郎汝弼同籍五十年身任勤劇而縱其弟結交當世名公偉人雍睦聞東南故君生而漸濡孝友之訓洎專家政於生業厚薄贏耗一不以嬰意亦不取以自封靡至人以緩急叩門未嘗有已怨族女若甥貧無齎送皆為具奩橐擇夫嫁之同産妹既嫁貧不能以自存則并其夫與子養於家百須皆滿其意雖久弗厭也宗黨稱貸五十萬輒折劵不復索君以財發其義大率類此故生業寖薄而鄉閭稱長者初娶張氏朝散郎通判信州贈光祿大夫諱磐之女十有七而歸婦德如老成人閫內無退言繼室郭氏朝奉大夫諱附之女賢有操行今宜其家初光祿公見君文竒之妻以長女及觀文殿學士東平吕公帥餘杭君以文贄一見器許復以甥女郭氏歸焉禮部侍郎張公漴光祿仲子也與君少俱學且嘗娶君之妹以其所著易説十卷上釋經局莆田蔡公讀而竒之以某年某月某甲子卒於家夀五十六有詩文數百篇以自名其窮頓挫踔厲可喜男廷幹以某年某月某甲子遷張氏之窆合葬君於縣由里山之原四女長適奉議郎江陵府江陵縣丞馬毅次適迪功郎章之邵次適從政郎廣德軍曺掾程元弼一尚幼孫二人曰祐曰祐廷幹躬孝踐行每以君不朽計為孜孜故君葬既久而幽刻不輕屬人以某與君皆光祿公壻相習乃謁銘焉銘曰為善而貽令名不必祿爵始榮其親也種德而燾餘慶不必顯貴在其身也以財市義家雖瘠而德不貧也夷考行事而昭之其與古賢者鄰也中奉大夫葛公墓志銘昔漢文帝延見近臣必求天下長者而置諸位其近臣進對間亦問曰某何如人某何如人上曰長者皆一時隆貴人也以故風俗醇厚中外又安號稱大治後世鋭於功利右材左德篤厚君子不以武健愈快者往往不究於用如公者多矣可勝恨哉公諱師望字興周江隂軍人少孤貧自力學問舉進士兩薦開封紹聖元年中第調亳州衛真縣主簿遷平定令知廣德吳二縣監在京南炭場通判筠汀揚曺四州主管南京敦宗院提舉鴻慶宫太平觀仕四十年以長者著名字官自宣德郎十遷為中奉大夫孫傑察訪淮南挾御香至衛真朝謁太清宫詢老君殿立侍二像為誰或對以唐明皇文宗公曰開元中明皇幸亳太子亨扈行今像乃明皇肅宗非文宗也傑以其多識器之治平定有風迹任刺舉者交薦諸朝遂改秩在廣德尉得盜希賞文致其罪抵死公察其寃從末減蒙活者數人邑子以輿梁壞請輸財於官治新之梁成而羡數百緡郡守檄取以佐公帑公謝不與悉還之民無幾何州縣在事類以貪墨被訴部使者臨按之獨公在政廉白乃歎曰廣德清操豈不能律汙吏哉髙安民喜嚚訟公能陪輔其長使郡中清汀州元夕張燈郡學生數人與寺僧競因敗其燈纍百計二千石怒且笞辱之公從容開説謂人固有跅弛而工文業者奈何以一眚廢衆士守不聽一日攝事悉放出之後拔第顯擢者踵相躡時賊擾東南人士北渡維揚者日數十艘州牧貴人不敢干以私則惟公之求公為奔走勞來供其百須一不闕賔至如歸而交德焉在興仁遇宦者出括民田勢焰薰灼凡不曲意阿附者必罹中傷坐是賜罷而晏然未嘗關懷也公性沉靜而夷曠燕居如齋雖盛暑對家人必整冠履至為吏一以矜慈麗大罪者必求生麗小罪者每從恕雖自隱其德而所至民親愛之去則遮道而戀慕夙知禍福皆前定故自安分義不肻行險以幸遇合官桐川日嘗夢謁靈濟廟神告以冥數曰後日官至中奉時始通朝籍卒如其言初公令平定時丞相唐公恪董漕事行部至邑見廷無逋事民無退言語人曰使吾部令皆若是復何憂乎自是深知公後佐丞相徐公處仁于淮南事有異見輒抗顔爭辨徐公不以為忤更賢之靖康中二公相繼登鼎軸推轂故吏屬甚衆而公未嘗曵裾奏記於其門免絶課當進官一等逢赦當賜三品服皆匿不自言曽祖惟安祖中敏不仕父錫纍贈太中大夫母李氏贈碩人妻先令人閭丘氏今令人衛氏男曰禔右迪功郎洺州永平丞曰祺右從事郎常州晉陵尉女長適進士趙格次適左正言陸震次適駕部員外郎洪興祖孫男三人昭登仕郎二未名孫女二人紹興二年公感疾不知人閲數刻復蘇書韻語二十八字有一生方便過人之語且為先令以授諸子五月甲子日終神明不亂於死生之變春秋八十明年八月丙申葬于鳯戈鄉之丁陸原諸孤以某謂公為兄實熟其行治來請為銘乃泣而銘之曰葛氏江隂世為聞家肫肫中奉嗣德振華以學策名葆和安雅稽其行治終始長者弗競弗夸城府坦夷至德感神神實相之告之冥符桐川之廟爵第四品卒如所告位止州佐所畀者年天祚吉履簮紱綿延鳳戈之藏卜云其吉銘以昭之兹謂不沒葛君墓志銘紹興元年冬十月某解秩吳興郡居景山族子開真自江隂來拜且泣曰先人不幸以七月丙辰終方病殆時忍死言葬必於青暘亡母之兆銘以屬叔父開真不孝既以其月辛酉葬矣銘敢以治命請豫亦泣曰小子忍銘吾兄耶明年二月書來速銘則為論次而銘之江隂葛氏其先避亂自廣陵徙居簮紱相承百餘年世有名德其晦迹不仕者亦皆恂恂謹飭以操行自將君諱權字執中江隂葛氏子也曽大父惟明大父定父淳俱不仕大父贈官至朝散大夫君少涉學嘗事科選已而謝去專營資業以奉親養生送終無悖禮姻族緩急輒賙貸之空無者每折其劵生而篤厚老而康強且死神爽不亂春秋七十有二娶康氏子二人曰開真去病女四人皆有從孫男女二人初大父女兄歸樞密直學士蔡公君謨君珍其筆迹儲之甚富復能記其詩文行事故一時賢士喜從之遊嘗見語曰吾欲築第面惠山以居而隂陽家之説拘忌數年吾老矣不能待也因趣鳩工時方域休咎一不問卒成華屋遂燕處之適談者多其曠逹云銘曰天賦之德復與之齡體魄措此惟以永寧張太安人王氏墓志銘贈通直郎晉陵張公諱某之室太安人太原王氏其先自幽州徙家山陽祖某千牛衛將軍父某左班殿直太安人端靖而敏悟略涉傳記言動不妄十有七而歸七十有九而老八十有九而終少壯為賢婦晚為夀母其宜張氏凡七十有二年維張氏在東南推衣冠顯姓仕有並時至九卿者號東西卿家太安人始歸克嫓其夫之德事姑欽愛兼至凡尊嫜行若姻戚媪御咸慶其姑得孝婦洎專家政幹理有條序菲於自奉而所識窮乏悉賑之晚增築室廬若知其後且大者篤老精悍無疾日紬佛書求死生之理比易簀無一語亂敕家人掖坐而絶實宣和七年七月乙未也子七人宰為奉議郎陜州司録寅再貢禮部宏舉進士有名宦從事郎信州刑曺事宇宣教郎守奉議郎監察御史實數占成均異等女三人適進士潘民用曹謖蔣軺孫男十有五人美成康成德成信成師成友成士成餘未名孫女三人初太安人子衆而貧窶無資未嘗以嬰慮盡使努力為諸生以舊所憶衆書手抄教督夜分猶課厲衆子嚴憚若師既久居益貧或勸其變業征利者苐笑不應無幾何子皆明習經學軒然著名字監察公繇州里首送擢第又舉詞學兼茂科中之大觀初三子復同榜以上舍入仕州將表其閭曰椿桂太安人御安輿從子之官轍環數郡夫婦華髮同享擊鮮柔滑之奉逆送者道相屬也以子恩封孺人又進今封最後見其子自御史府章求郡以養於是有識雜然譽歎以謂微此子不能寵其母凡州閭稱德善之報及母子之德以為可願必指太安人之家云太安人卜葬得歿之年十二月庚申其兆在武進縣南鄉千墩村而見屬以銘某謂諺有之學家多士大夫為學之利太安人所不及見者蓋未憗也因論次其行事而繫以銘曰其屯弗戚其求弗棘其勤弗易其報弗忒其亨弗瘠其銘弗泐樊宜人蔡氏墓志銘紹興五年春右朝散大夫主管台州崇道觀樊滋德淵訪余於吳興曰吾妻宜人蔡氏不幸以去年七月終願得子銘以識葬且曰宜人曽大父諱仲謀官至太中大夫生左朝奉大夫元康元康生沅州軍事判官邦直宜人其季女也唯樊蔡氏並為衢州西安之望族夙通婚姻宜人始垂髫柔明秀警吾父金紫公吾母文安郡夫人愛之求為吾婦凡與之齊者若干年尊嫜曰是善事我娣姒曰是善輯我媪御依其仁族黨稱其睦而吾以為有閨閫之助也始吾既葬二尊於塔山卒喪躊躇不忍去而從仕宜人啓曰薦香火而護樵牧宜有佛廟衆財不可私取以為悅盍以已力營之因斥賣其裝不留一簮而築室一區延僧主之後劇賊起新安姦人所在嘯聚衣冠墟墓類遭發而吾二塋獨無恙吾嘗里居謀所以賙宗族之窶貧者吾妻曰所朌么麼彼且緣手而盡曷若營不匱之利於是裂慶牆鄉之别業為義産且以戚迹定多少之差嵗給之而人賴以炊者衆焉吾鄉涉步數郡往來之湊故有浮桁袤數十丈會為水敗行者病涉吾妻不資於衆垂槖而新之宣城飢米斗錢二千吾適佐郡吾妻勸吾盡出田祿賑之日為饘粥食餓者南陵飢甚則市他米諉邑令增給自是大姓爭發廩而蒙活者不勝計宜人勇於仁類如此奉釋氏至虔卒之前六十日夢人告以絶羶葷後當坐去及易簀神爽不亂召子若婦訓敕諄諄俄結印坐逝夀五十有五纍封宜人男三人國輝右迪功郎江州録事參軍國均國寶皆進士女適右承直郎監潭州南嶽廟葛立方孫男女合十二人以紹興某年某月甲子葬某鄉之原立方余冢息也因稔知宜人之賢行且崇道君仕以才奮厯職中外勞烈有聞而居鄉見謂修潔必有相之者又其言信而可復乃序而銘之金紫公諱某仕至某官金紫光祿大夫其贈也文安郡夫人姓某氏銘曰孌彼淑哲來嬪聞家令德是茂靖專柔嘉以財易仁懦者驚嗟帝錫顯號每恩輒加錦韜象軸書贊之華胡德之豐而夀不遐將燾厥後隂施豈差我銘幽宫惟信匪誇徐太令人葛氏墓志銘太令人常州江隂葛氏贈吏部尚書諱某之孫承議郎贈太中大夫諱某之女葛氏族大且顯凡女子許字必求天下名士令人年既笄辨慧婉嫕太中與其兄工部尚書某皆愛竒之為訪佳對而金陵徐君安道受經舒王以才識為髙第中治平某年進士甲科隱然有雋傑之稱遂以歸之其後入御史府為監察入中臺為郎奉使諸道風節端亮名譽尊顯卒官中大夫京西轉運副使令人閫助為多中大夫求所生戴氏十年始得既歸性髙嚴令人奉養如嫡刺測微旨無銖髮忤戾撫姒婦之孤踰已子單復之服製必先之逮其長為謀家室垂槖不吝嵗時享徐氏祖考不以饌羞委僮侍遇父母尊親之黨恩意均一從夫若子宦四方中外宗姻靡日不嬰念服衰至小功緦聞訃皆摧慟以喪禮自律逢諱日蔬食閲經以資其福盡齒不懈太中所嗜蕷栗之屬輒不忍食宦遊舊境復經歷未嘗不涕泗也性淑靈而篤孝尤加人以夫恩封永昌縣君以子恩封普寧縣太君再封太令人政和七年八月壬申終于京師夀七十有三崇信釋氏日課其書且奉其齋戒屬纊不亂呼子與婦執其手曰吾訣矣泊然而瞑子六人男永朝請郎行太常寺主簿奕通仕郎知衛州新鄉縣前卒女長適承事郎常州江隂令李孝逺次早卒次適通直郎武學博士朱天錫次適宣教郎知平江府長洲縣陸棠孫男二人女一人永以學行知名薦踐師儒之選自中大夫即世令人食其祿者十九年晚節寢病綿劇視絮縻藥至夜不解帶人士稱之卜葬得令人卒之年某月甲子祔中大夫之封在江寧府上元縣莫府山以某於令人為兄子且先君通奉與之相友愛見屬以銘因泣銘曰性篤孝士所難乾其身行之安嫓其良訓厥嗣詔三封夀六紀源有衍報必豐在後人不于躬莫府原龜墨食千萬年安且吉妻碩人張氏墓志銘宣和四年五月乙丑碩人張氏歿於汝州公府時某領郡以妻亡諗於朝求移守吳興詔許之六月護喪歸常州留二息奉柩而趨治既卜葬得地於江隂縣由里山之原復諗於朝取急以視窆詔又許之遂以五年四月已酉襄事敘其行事而泣銘之曰碩人世籍常州宜興諱濩字靖薑朝散郎贈通議大夫諱磐太碩人姚氏之女宜興之張世以儒學顯而姚氏在金壇為舊門碩人於女憲婦順耳目擩染不習以能元祐中通議公為漣水軍我先人開府儀同三司府君佐之同寮且同郡復聞其女賢為某授室既歸不逮事皇姑溫國夫人事先人盡孝衣服食飲親在視寒暖早晏之節愈久滋益恭於財痛自節縮而儲積其餘以供公上銖髮不自蓄初叔季二媦未行先人念擇對之不易碩人請以女妹歸以兄二姓交信之遂與禮部侍郎今知徐州張公合好後三年季妹許嫁今丞相王公時碩人從豫官太學先人敕使歸董蠶織縫紉之事既訖嘉禮先人喜津津謂某曰尚平之纍已畢若釋重負而婦助我居多嵗中迎養後如京師會先人棄諸孤碩人送終廞飾盡禮持喪踊躃如制於時二兄俱未卜繼室幼稚滿前無衣家徒四壁立碩人裒掇纎細均已子保視以濟于艱難其後某比預廷選二兄俱宦輦轂下闔門數百指共室同㸑而姻戚並時顯仕嵗時燕集軒騎填里門碩人雖處介婦而調娛承順曲致恩意中外無怨訾一辭祀葛氏之祖考饌非手調芼弗進也喜浮屠學日誦其語食不擊鮮奉觀世音尤力課所謂大悲咒者數以萬億計嘗得寒疾濵死觀世音現白衣瓔珞像升卧榻以楊枝荆芥祓其體尋汗浹頓愈人士紀以詩文者甚衆在臨汝力疾朝中嶽既還一夕神識去體家人環泣諸子若妾媵各剔股燬臂灼頂以禱觀世音像復現光相滿室黎明驟蘇安全四十一日始不幸轉識不亂談者謂纍善之報云初封同安縣君進封宜人恭人後遇恩及擬封兩封碩人前後訓詞皆稱其賢操春秋四十有九男立方從事郎國子監書庫官立中迪功郎河北鹽香勾當公事立器國子生前卒立卓尚幼女長適文林郎越州州學教授許暘前卒次適承務郎登聞鼓院劉封一未嫁孫三人碩人祥順祗修善區處事於書通大致持身玉霜始豫未第閨房百須一不相關既仕數以戇直賈禍流離落漠而碩人能以義命相譬曉嗚呼繼自今無相我者矣悲夫銘曰委禽兮結褵嬪豫三十年兮家室之宜我辜于天兮奪其所與齊年不配德兮夢人授之以蓍生於建平而歿於臨汝兮藏於大江之湄幽穸之詩不以諉人兮聊寫情而含悲
