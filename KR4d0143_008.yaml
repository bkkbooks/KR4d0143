body:
  text: 丹陽集卷八宋葛勝仲撰記重摹太宗皇帝御書飛白玉堂記紹聖初天子躬親聽斷登用耆傑協圖康功光昭祖宗之遺憲而崇起之其大者固已措諸政教而福天下矣其纎悉者亦欲恢顯而不沒也于是翰苑之臣建言臣幸得以文墨俟罪禁近國有寵恩侈賜而淟汨不宣無以夸艷等輩臣之耻也昔太宗賞飛白玉堂等四字惠貺詞臣而院榜未易雲章奎畫鬱而不揚殆無以蕩天下耳目臣願敕有司掇取玉堂二字臨倣而揭之俾觀聽者咸知太宗眷禮儒臣甚渥且使臣等夙昔窺望有榮耀焉惟陛下幸察制曰可由是淳化睿藻巍然玉堂之上矣有旨命為文以獻臣竊惟太宗皇帝手提干將佐佑太祖芟夷逋穢蕩五強冦如燎毛髮紹祚之始獨晉人未訖天誅金鼓一臨蒲伏請命餘分閏位既平既一三辰宣精戎貉軌道農扈奏功俗富無窶熙熙乎納俗軒農之右矣固宜繁林芿之觀盛金匏之奏雍容無為明示得意而曽無樂此也方且恢儒右文遊意六籍引天下瓌俊納之禁途機務間隙則披懷虛已與之榷略墳素嚴除西清婆娑翰墨伸紙濡掃以貺賚臣下咸足以寓懲戒而激忠讜嗚呼其規摹深逺哉尋其宸畫之工前無倫對心應手得飛動變化旁點斜階含蓄精意八文六義隂藏陽覩殆非八十一家所能窺見髣佛譬猶昭回之光下照羣物蒸燭烏能抗之哉初蘇易簡以詞學被眷遇恩禮隆浹他學士莫及嘗進讀翰林志上賜詩二章因書四字寵之謂曰異日為玉堂美事易簡拜賜即集僚佐競玩縱觀詔遣中謁者馳賜尊酒日命內饔具膳于時大丞相李昉以下咸即席賦詩以歆艷其寵上曰諷卿等詩益知儒墨之盛而學士之榮也夫待之重則人不敢自輕遇之勤則人不敢自懈聖人蓋將為後來勸豈専為易簡設哉惟飛白始蔡雍而唐文皇髙宗嘗以賜劉洎郝處俊其迹雖與今略同而輕重實不相凖蓋太宗於洎容其登床攫取則禮廢髙宗於處俊以六翮待之而緣事退斥則恩亡是皆瑣瑣不足望太宗餘光而字畫工否尚不論也嗚呼眷奬臣下非太宗無以昭其仁丕揚前美非先帝無以篤其孝凡我視草之吏永敬之哉臣愚疵賤不能究盡聖德姑記梗槩云臣謹記宗正寺少卿壁記昔周之盛時封同姓五十三國而公族之居王朝者甚衆始置宗正以糾正之所謂彤伯為宗是也後世因襲不改先漢位九列後漢秩中二千石率用宗姓唐制卿一人從三品少卿二人從四品雜以同姓異姓充選天祚宋德宗庶繁衍景祐中始詔推擇屬近望髙者二人判大宗正事至纂修玉牒屬籍則用他官兼領神宗皇帝董正治官肇置九寺深惟慶系之重聖神在天實鑒臨之且奕世帝籍若譜牒昭穆之序皆𨽻宗正不可與他寺等故班秩特髙然卿少虛位弗置專以丞董寺事者以有大宗也上嗣位廣延衆正大修廢官崇寧某年始命鄧佑甫為少卿已後復三代賔興法念宗子之俊秀穎異者亦宜教養而官使之詔即廣親諸第建六學凡三舍校試升遷法悉視雍泮而以寺長二總之宗正選益重矣逮今十餘年間所閲二十餘人類能以勳績自見為時名臣可謂盛哉寺故有玉牒殿籍屬堂面勢褊曲室字湫陋不稱天子尊祖睦族之意嵗在丁酉詔徹太醫學以廣寺治發德音委大匠護役不數日而屋若干區為之一新既落成因集前人名氏且敘建寺首末併刻之使後來得以考觀焉軍學記桐川學故棲城北治平三年知制誥錢公公輔知軍事病其湫隘相城東南得寬間亢爽面山背市秀氣磅礴之地徙焉後歷嵗三十軍守右正言孫公諤復新而大之穿池瀦水以育芹藻頖林之盛稱雄江東自是邦人賜第于庭者踵相躡建炎己酉兵火學不燼者十三嵗在戊午丹陽洪侯自臺郎出守始用幣先聖視荆棘瓦礫之墟愀然弗怡慷慨自念古之學凡蕝禮閲樂習射考藝養老受成獻囚告馘無不即焉政治不可以一日弛則學宜亦如之豈當計時之險夷而為緩急崇替哉故魯頌修泮宫而鄭刺廢學校吾其可諱勞愛費以毁墉傾屋纍後人邪明年正月發羡財調冗卒募衆工約舊制而興役七月乙未告成肅賔佐生師耆老行鄉飲禮落之會先聖四十八世孫尚書副郎端朝來省廟實預在席儀門正殿授經之堂𨽻業之舍若廥廪膳爨之所莫不雄深巨麗以文正范公嘗為掾曹初迎師加惠學者因增置房祠祀之倣闕里廟繪伯魚子思二侯像于堂東西殿故位十哲而無羣弟子像侯諏家語史記諸書定為七十子又古今儒先二十有六人皆繪于壁俾從命祀凡樽爵豆登篚洗之屬傳經考古更製而簿正者無慮數百器斥間田之在官者為永業以食來學者聚古今墳籍且萬卷以迪多聞之益季課月試親論辨而升黜之旁郡學子鼓笥而歡趨者相屬也郡人欲刻石紀其事以無忘侯之德猥以屬豫豫謂自艱難用武以來仕者以墉壑賦箕為急或嬰意庠序類指為左計故兹學廢且十年至以論堂貯麴而教官之舍更處他官及侯鼎來事不謀於僚屬費不資於士民奮然改築則厦屋百區不旬嵗而訖工蓋天下事因循茍且則雖小不立先定其志而持以不息之誠則雖大必就惟吾黨之學道者亦然非特是役也後之絃歌饘鬻於是者能不因常人之廢墜而潛心聖道拳拳鑽仰則由聖人牆仭而升堂覩奧不難也功業之炳煥特餘事耳嗚呼大學之道豈謂摛章繪句登場覔舉而已哉侯意儻在是故豫樂書以告焉侯名興祖字應善由分教吳興召見登館閣於書無不讀尤邃於春秋二禮皆箸為義説推其素學而施有政宜不紊於次第也使所涖者大其見效將如何哉紹興十年三月丙子記錢氏遂初亭記吾邦之賢有御史錢公安道以徑節危言伏一世其仲弟曰持道以沖操自晦於文籍詩酒之間嘗作遂初亭於梁溪居第之東偏日與賓客遊居而樂之無幾何族人取均輸子錢而居第若亭併籍于有司會大姓有怙勢者風縣官骩法沒入之而以自售持道嘆曰先人之廬所以庇子孫者不可自巳而為勢奪因三走京師上章自訴而復歸焉又二十有二年而火于金人亭之不燼者十六其子紳掇取遺材改築於漆塘之墅既斷手則又嘆曰是常失而復得常僨而復興是又天相其初志而遂之也乃復用故名榜之而屬余為記余謂斧木於山費不能一金而必取廢材為之者蓋孝子日視榱棟之舊而雨露悽愴之感生焉示不敢忘其先也然不廢其遺棟者其孝小不墜其道德者其孝大伸仲始仕軒然以名節自命所至有直聲及賜對所論有人不敢及者談者謂挺挺有先御史風烈已而勇自退縮結屋數十楹於嵓壑佳處取舊所聚書數萬卷伏讀之茂林修竹竒葩異草可以舒憂隘而快窺臨者靡不備引泉而瀦之為髙下之池三度地而荒之為大小之亭四食宫祠之祿以自怡者至六滿秩是殆又欲以先君子之隱德自勵雖然君子之出處視時與道亦何常之有彼安山林而不知出狃榮利而不知返皆一曲之士也昔晉孫興公隱居會稽逰訪山澤纍年作遂初賦以寄意天台山賦亦云世事都捐若無經世意矣及大司馬溫欲徙都洛陽衆恟懼不敢為異獨興公上疏極論之今雖欲逃名而名歸之雖欲避世而世即之仕政恐不免然則不尋遂初賦而起為時用行有日矣紳今為朝請郎伸仲其字也并系以詩骯髒睎儒先夸毗畏家戒九萬鵬程賒三四狙公賣無寧歸却掃初服遂沖槩功名付噲等登臨從湛輩此亭襲嘉名永矢佩先誨緑筠寒脫籜蒼松老欹蓋家儲內閣書辦與聖賢對投幘謝家國預事那可再不學孫興公婆娑陳利害序陳去非詩集序世言詩能窮人唐李太白號謫仙然以樂府忤妃子卒厄窮不振劉夢得坐種桃句黜刺連州白樂天坐新井篇黜佐湓浦孟浩然賈閬仙輩俱有能詩聲然以詩忤明皇宣宗終坎壈州縣故言詩能窮人者取是為左驗豫謂詩非惟不能窮人且能逹人今夫窮閻挾䇿之士生右文世病碌碌無以自表見爾使其能以詞藝逹細氊之視而被華衮之褒則塗轍之升一嵗九遷不為鋭孰謂詩人例當窮哉參知政事西洛陳公諱與義少踔厲不羣篇籍之在世者無不讀既讀輒記不忘政和三年以上舍解褐分教輔郡益沉酣書傳大肆於文詩天分既髙用心亦苦務一洗舊常畦徑意不拔俗語不驚人不輕出也宣和中徽宗皇帝見其所賦墨梅詩善亟命召對有見晚之嗟遂登册府擢掌符璽向進用矣會兵興搶攘避地湘廣泛洞庭上九疑羅浮雖流離困厄而能以山川秀傑之氣益昌其詩故晚年賦詠尤工搢紳士庶爭傳誦而旗亭傳舍摘句題寫殆遍號稱新體今天子夢想名士以臺郎召還以詩文被簡注遍掌內外翰無幾何遂以器業預政所謂詩能逹人公殆其一也彼有旌殿閣微涼之句而親題禁苑賞春城飛花之句而擢守宣城者誠么髍不足道紹興壬戌毗陵周公葵自柱史牧吳興郡剸裁豐暇取公詩離為若干卷委僚屬讎校而命工刻板且見屬為敘蓋將指南後學而益永功名於不腐在詩有之載色載笑匪怒伊教又曰有斐君子終不可諼兮賢侯處心一舉而二美具可無述哉中散兄詩集序虛室先生宣和五年以中臺郎賜對上意鄉之且拔用先生以所親當國力求間秩歸避請寄之嫌以退為進人士驚其難能自是浮沉里門絶意華顯會金兵南下居第僦業俱火廪祿不供兒妾濵于飢寒而晏然無隕穫之色奔馳避地禪寂求志之餘不廢作詩傷時憂國感慨憤發一以章什舒意一日閲舊藳斷自初任以來擇其合者以嵗月先後編削成集凡若干篇離為若干卷屬某為之序謹按先生結髮學問與兄弟同受教於先人少師清孝公非疾病未嘗一日去書不觀歷代史若百家雜説皆手抄而心記名髙衆俊既入官文藻益宏肆掾琅琊日嘗考究其州山川地理古迹姓氏應典籍者為書上于九域圖志局精深詳博為天下第一首膺進秩之寵蓋先生所長不特詩而已昔司馬遷歷逰郡邑故文增秀傑之氣張燕公得江山之助故詩極凄惋之美先生以使事行天下幾半名山峻壑瑰偉卓絶之觀無所不歷今其詩粹清而氣壯平淡而趣深亦豈勝逰之助耶平時與伯氏太史金紫公若羣從酬唱居多以卷軸之富故不仿李義竇羣兄弟共為聮珠花蕚集以行於世昔王筠論家集謂崔氏應氏纍葉文才然不過父子三兩世爾未有名德重光爵位相繼人人有集如吾門者也豫於江隂葛氏亦云先生諱和仲字堯卿虛室蓋其居也於是為右中散大夫提舉江州太平觀舅氏續千字文序昔梁武帝得王逸少所書千字文雜亂不可讀命陳郡周興嗣次為韻語以便臨玩後世謂之千文歐陽率更張長史道人智永輩各有藁書本行於世舅氏侍其公亦好草聖書千文尤工好事者時得之輒以鑱石又嘗以巧意遷避興嗣所用字别製千言貫穿經傳詞義粲然豫章黃魯直見而抵之以書曰引辭連類使不相抵觸甚有功當與凡將急就並行也千文為天下官府若市井簿領會數之用久矣今增以續文合二千言凡取一字為毋配以次字為一號展轉相乘可計二百萬之數於世用豈小補哉公博學善屬文此特一時弄筆為戲耳乃為簡牘無窮之用竊嘗謂棫朴微物也而薪之槱之可以享上帝養聖賢不龜手之藥賤業也而習以水戰大敗越人取封邑事小而用大者在古多有之豈特是書而已哉公皇祐元年進士屢刺名郡所蒞有政績官至朝散大夫贈金紫光祿諱瑋字良器段拂教授字序武威段拂字去塵金陵學士大夫也余為汝州始識之周旋既習因告之曰塵固當去昔楚三閭大夫曰安能以皓皓之白蒙世俗塵埃乎謝幼度之親譏其學識不進曰為塵務經心為天分有限又六入之塵實與覺背背塵始能合覺凡此皆塵之宜去者也王導舉扇障西風曰元規塵汚人王戎謂夷甫自是風塵表物夫元規雖有當國召蘇峻之失終不失為名士而夷甫作三窟以自固季年諂石勒以祈免死雖塵汚人與風塵表物皆未必信要之論人物者以濯濯絶塵為貴也今吾子氣調邁往輔以學問為文詞卓然絶去翰墨常徑分教三郡所至人士皆喜之慈祥粹和與物無忤不必矯揉自與道合豈復有塵可去哉荀卿子曰諌爭輔拂之人社稷之臣國君之寶也國有大議奮然嬰鱗逆耳規欲解紛排難而寧以身為僇辱百世之下猶凛凛有生氣此豈患失鄙夫所能為哉吾聞士不自輕然後能任天下之重吾子斂然靖退自遇若九鼎他日進未易量也願以光輔若寶臣為字贊能長老字序始豫為吳興聞智海禪師能公遍參諸方得教外别傳之旨為其黨所宗即檄住德清之順慶院後五年豫擕家就食吳興之别業寓景山寺則智海在焉蓋自順慶改尸禪席相從纍月見其身護毗尼以律徒衆人益多之師字無會居一日謂豫曰以能為會因緣出現於世其有濟物利生之功假使具智辨人滿吻伽沙有百千萬億舌於那庾多劫不能讃述佛功德之少分然一言以蔽之者曰仁而已故世尊號能仁其徒服佛之服誦佛之言行佛之行皆廣佛之仁者也而傳正法眼藏為道俗判瞽而發蔀則廣仁為尤大敢請易字廣師勉之矣他日豫退歸山林聞江湖大叢林有善知識為佛法作師子吼而椎鍾擊鼓粥飯數千人者必師也夫書後書淵明集後三首淵明為建威參軍從都還阻風於規林賦詩落句云靜念園林好人間良可辭是嵗晉隆安四年春秋三十六明年赴假還江陵夜行塗中賦詩落句云投冠旋舊墟不為好爵榮蓋壯齒作吏而丘壑之志已堅卒踐其言自彭澤歸優遊家巷二十有二年以沒與謝傅東山之志異矣歸田園居詩第六篇所謂種苖在東臯禾生滿阡陌者非淵明語也蕭統湯休之輩不能辨猥置集中東坡居士盡和陶詩亦次此篇之韻殊可笑按文選江淹作雜體詩三十首以擬三十人有邯鄲託曲於李竒士季假論於嗣宗之説此篇政淹擬淵明作爾文選統所纂東坡非不精選理者皆不能證此乖誤何耶南史稱淵明自以曽祖晉世宰輔耻屈身後代自宋武王業漸隆不復肯仕信然豫觀其讀史贊首述夷齊云二子避國相將海隅天人革命絶景窮居次述箕子云去鄉之感猶有遲遲矧伊代謝觸物皆非蓋自况也頃在東魯有以淵明畫像見觀者豫贊之云欲仕則絃歌必求欲隱則著作不就欲卧則遣客而醺酣欲飲則從客之邂逅欲辭則檀道濟之粱肉必麾欲取則顔延年之貨泉亦受夫惟任真自得而頴脫不羈所以為無懷葛天氏之民而超三季之澆陋者乎淵明於阿舒輩始作詩命之繼作詩責之終作訓曉之且曰吾黽勉辭事使汝幼而飢寒抱兹苦心良獨罔罔又以同財共居為治命無惑乎杜拾遺笑其挂懷抱也後漢逸人王霸見其友令狐子伯子車服有光儀矩甚適而其子歸自田畝蓬頭歷齒因愧卧不興乃知父子恩深雖外軒冕士視身榮悴如二五與十而於子則不能忘懷每如此雖然淵明知任真而已豈預恤後世之譏議若拾遺能觀物反身則知愛阿舒與宗文何以異歸去來辭自序云仲秋至冬在官八十餘日自免去職乙已嵗十一月也乙已乃義熙元年而晉史云義熙三年解彭澤印綬去淵明自序不應誤當以乙已為正逰斜川詩序云辛丑正月五日與二三鄰曲同逰斜川詩云開嵗歘五十以紀年考之辛丑乃隆安五年淵明始三十七若癸丑則義熙九年淵明四十九正與詩合當以癸丑為正五六月北窗下涼風何處無之何人不遇至心與景會遂能背偽合真自致於羲皇上者獨淵明而已其詩云蕤賔五月中清明起南颸不駛亦不遲飄飄吹我衣歸來引亦云風飄飄而吹衣意淵明進禦冦乘風之理因以覩道也至若樹木交蔭時鳥變聲輒歡然有喜豈在物耶聲塵種種皆道所寓惟淵明領此昭明太子指間情一賦為白璧微瑕且謂亡作可也審爾則詩人之變風楚人之離騷皆可刪矣晉孝末塗沉湎酒色何知非諷刺上耶其序云張衡作定情賦蔡雍作靜情賦皆有助於諷諌綴文之士奕代繼作豫觀張衡定情有云想踰里兮折杞檀懼尨吠兮我所驚與國風何逺蔡雍靜情亦名檢逸魏文帝愛之因擬作正情賦且命陳琳徐幹王粲阮瑜應瑒並作其後如陸機之間懷袁淑之整情皆佳筆也謝惠連亦嘗作百許字未就而卒詞人深以為恨使淵明此賦果可無作則登徒長門髙唐神女等賦統何為著之於選耶子瞻為徐州誚淵明無絃不如無琴後悔其言之失淵明自祭文云辭逆旅之館且歸於本宅蓋反其真之説也子瞻復詆之云生獨非真死獨非寓未知何時復悔也窮逹命也出處時也不可預計至若孝悌之行若人之朝飱夕膳不可一日闕者韓退之傳歐陽詹云讀其書知其於慈孝最隆余於淵明亦云古今人士頌淵明德美衆矣罕有頌其孝友者作五孝傳贊自天子至庶人寄寓深矣哀程氏妹悲敬逺仲德弟文尤為悽惋至於凱風寒泉之念興而述外祖孟家傳念禮服昭穆之逺而作贈族祖詩蓋所謂永錫爾類者邪淵明垂死之文讀之令人恍然自失與今世悟道坐脫立亡者何以異其曰惟此百年夫人愛之懼彼無成愒日惜時乃知其退歸不仕平生功用在此也
