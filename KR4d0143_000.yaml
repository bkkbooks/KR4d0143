body:
  text: 提要丹陽集二十四卷别集類三宋臣等謹案丹陽集二十四卷宋葛勝仲撰勝仲字魯卿丹陽人紹聖四年進士又試學官及詞科俱第一官至華文閣待制知湖州紹興元年乞祠歸十四年卒諡文康事迹具宋史文苑傳據其壻章倧所作行狀稱有文集八十卷外集二十卷初刋板於真州兵燹殘缺隆興甲寅知州事宋曉補之自跋其後淳熙丙午知州事姚恪又為重鋟中書舍人王信為之跋自明以來傳本遂絶今永樂大典所載以類裒輯得文十五卷詩七卷詩餘一卷又附録行狀諡議為一卷共成二十四卷王信跋及章倧行狀並稱宣和北伐之時勝仲貽書蔡京力言其不可然宋史本傳不載此事集中亦無此書又稱由兖州教授入為太學正時上幸學多獻頌者勝仲獨獻賦上命中書第其優劣勝仲為首今集中亦無此賦他如本傳所載論郭天信不當提舉議歷所論僖祖廟增置殿室不必毁其奏議並佚不存又所稱官諭德時為仁孝學三論獻太子者今惟存孝論學論餘無可考則其散失者已多然觀其四分之一亦足以見其大凡矣勝仲為太府少卿時能拒盛章之援引知汝州時能拒李彥之括斂知湖州時能拒朱勔之求白雀鸂鶒其節甚偉歷典諸州皆有幹略再知湖州遭逢冦亂復有全城之功其官績亦足以自傳本不盡以文章重即以文章論之在南北宋間亦裒然一作者也歐陽修嘗輯建隆至治平故事為太常因革禮一百篇勝仲官太常卿時復手續其書為三百卷故于當代典制最嫻官諭德時嘗纂歷代太子事迹為承華詔媺又考論諸史為評古篇故於古今成敗最悉崇寧三年居父喪盡閲釋氏大藏經故所著作往往闡明佛理惟青詞功德疏教坊致語之類沿宋人陋例一槩濫載於集中殊乖文體今凛遵聖訓並從刪削庶益為全美云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
