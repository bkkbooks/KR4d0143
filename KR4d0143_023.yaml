body:
  text: 丹陽集卷二十三宋葛勝仲撰詩餘浣溪紗九首詠梅東閣郎官巧寫真西湖處士妙傳神嫣然一笑臘前春鬭好雖無氷骨女相宜幸是雪髯人且煩疏影入清樽木芍藥三首可惜隨風回旋飄直須燒燭看嬌嬈人間花月更無妖濃麗獨將春色殿繁華當合衆芳朝南床應為醉淘淘通白輕紅溢萬枝濃香百和透豐肌丹山威鳳勢將飛玉鏡臺前呈國艷沈香亭北映朝曦如花惟有上皇妃鬭鴨欄邉曉露沾華堂醉賞軸珠簾插花人好手纖纖遮護輕寒施翠幄標題仙品露牙籖詞人遺恨獨江淹賞芍藥樓子包金照眼新香根猶帶廣陵塵翻階不羡掖垣春不分與花為近侍難甘溱洧贈閒人如羞如怒獨含顰少藴內翰同年寵速日出後堂并製歌詞侑觴即席和韻二首今夜風光戀渚蘋欲教四角出車輪金叉離立座生春神女恍驚巫峽夢飛瓊原是閬風人詔封後院寵儒臣溪岸沈深屢泛蘋傾城容見此推輪可憐虛度二年春暮暮來時騷客賦朝朝新處後庭人天留花月伴羇臣小飲盤裏明珠芡實香尊前堆雪膾絲長何妨羌管奏伊凉翠葆重生無復日白波不釂有如江壁間醉墨任淋浪贈妓東道殷勤玉斚飛華燈傾國擁珠璣玉奴嫌瘦玉環肥縹眇幸聞緱嶺曲參差猶隔夏侯衣放開雲月出清輝訴衷情友人生日清明寒食景暄妍花映碧羅天參差捍撥齊奏豐頰擁芳筵逢誕日揖真仙託爐烟朱顏長似頭上花枝嵗嵗年年減字木蘭花公弼姪初授官以此勸酒辛勤場屋未遇知音甘陸陸詔録遺忠一札天書下九重鵝城初命此去青雲應漸近解褐恩新今嵗吾家第四人西江月五首正月十七日與文中自邑境遍逰歙黟祁門山水十九日在黟邑洞靈觀夜燕二首羇宦新來作惡窮途誰肯相從追攀十日水雲中情誼知君獨重寂寂回廊小院𡨕𡨕微雨尖風鳯山香雪定應空昨夜疏枝入夢山鎮紅桃阡陌烟迷緑水人家塵容誤到只驚嗟骨冷玉堂今夜莫對佳人錦瑟休辭洞府流霞峯回路轉亂雲遮歸去空傳圗畫三月初六日席上代監酒和晚路交逰緑酒平生志趣青霞霜風時節近黃花泛宅舟將鷁畫不分兩溪明月夜深只屬漁家今朝清賞寄情涯肯向榮途索價叔父慶八十㑹瑞獸香雲輕裊華堂繡幕低垂人生七十尚為稀况是釣璜新嵗登爼青梅的礫明欄紅藥芳菲天教睂夀過期頥常對風光沈醉與王庭錫登燕集作清樾已生晝寂孤花尚表春餘象牀筠簟燕堂虛初過晚天微雨圭璧新來北苑鱸蓴未減東吳捧觴紅袖透香膚不浥翔龍烟縷醉花隂次印師韻東皇已有來歸耗十里菁山道凍枿萬株梅一夜粧成似趁雞鳴早年時清賞曽同到先仗逰蜂報抖藪舊心情一笑酬春不羡和羮詔瑞鷓鴣工部七月一日生辰火雲欲避金風至秀氣充閭初降瑞去家丁令却歸來還燕懸弧當日地金章紫綬身榮貴夀福天儲昌又熾怪來一嵗四遷官還遇當生元太嵗浪淘沙四首十月十九夜賞菊我愛菊花枝浥露偏宜旋移佳種一年期照眼黃金三徑爛可但東籬秋老摘花吹敢恨開遲只愁一夜便香衰待插滿頭年大也且泛芳巵九月十八日與千里賞菊三首又見菊枝新色淺香勻老人衰病卧漳濱雖是無聊仍置酒幸有嘉賓不用怨蕭辰不似芳春請看金蘂照金樽今夜花前須醉倒直到黎明歌闋鬭清新檀板初勻畫堂新築太湖濱好是黃花開應候聊宴新賓上客即逢辰况是青春上林開宴錫堯尊今夜素娥真解事偏向人明娛老子亭新丹堊初勻萬株金菊繞溪濱折向華堂遮醉眼聊用娛賓紅燭夜將辰廣座生春月波新釀入芳樽好向花前拚爛醉不負承明鷓鴣天五首賞菊二首黃菊鮮鮮帶露濃小園開遍度春風自篘玉醴酬秋色旋洗霜須對曉叢香在手莫匆匆尋芳今夜有人同黃金委地新收得莫道山翁到底窮采采黃花鵠彩濃吹開一夜為霜風已邀騷客陶元亮不用歌姬盛小叢秋易老莫匆匆齊山髙興古今同欲知此地花多少一眼金英望不窮九月十三日攜家逰真意亭燕集二首婆律香濃氣味佳玻瓈仙碗進流霞凝香清滌髙陽醉靈液甘和正焙芽香染指浪浮花加籩禮盡客還家貫珠聲斷紅裳散踏影人歸素月斜小榭幽園翠箔垂雲輕日薄淡秋暉菊英露浥淵明徑藕葉風摧叔寶池酬素景泥芳巵老人癡鈍强伸睂歡娛莫遣笙歌散歸路從教燈火稀新春玉琯還飛換嵗灰定山新棹酒船回年時梁燕雙雙在肯為人愁便不來衰意緒病情懷玉山今夜為誰頽年時梅蕊垂垂破肯為人愁便不開木蘭花盧姊生辰談圍曽蔽青綾帳林下中年敦素尚烟波偶趂一帆風却鎖雲扃來就養自從悟得空無相身把虛空來作樣大千沙界抹為塵未比無生真夀量鵲橋仙二首七夕凉飈破暑清歌縈坐缺月稀星庭户瓜華草草具杯盤喜共浥初筵零露天孫東處牽牛西望勸汝一杯清醑精靈何必待秋通為一洗朦朧今古闕偶天津輕渡却笑姮娥孤皎平時五夜似經年問何事今宵便曉雲車將駕神夫留戀更吐心期多少支機休浪與閒人莫倚賴芳心素巧南鄉子四首三月望日與文中諸賢泛舟南溪作栁岸正飛綿選勝輕逰漾碧漣笑語忘懷機事盡鷗邉萬頃溪光上下天菰葦久延緣不覺遙峯靄暮烟對酒莫嫌紅粉陋嬋姢自有孤髙月姊仙九日拂檻曉雲鮮銷暑樓危竦半天曽是攜賓當薦九開筵度水縈山奏管絃黃菊映華顛千騎重來已六年樓下東流當日水依然更對周旋舊七賢九日用玉局翁韻作呈座上諸公晴日亂雲收人在蘋香栁惲洲溪上清風樓上醉颼颼共折黃花插滿頭佳客獻還酬不負山城九日秋苕碧荇青供酩酊休休楚客當年浪自愁九日黃剛定再索席間作秋水瑩精神靖節先生太逼真談麈生風霏玉屑津津爽氣泠然欲侵人一座盡生春滿引瓊觴已半醺更把黃花夀彭祖原注事出魏文帝書盈盈數闋新聲又遏雲虞美人四首酬衛卿弟見贈二首三年曽不窺園樹辛苦螢忩暮怪來文譽滿清時柿葉書殘猶自日臨池春秋新學卑繁露黃卷聊堪語家人不用寄歸詩行看升平樓外化龍歸一輪丹桂窅窊樹光景疑非暮天公作意在兹時掃盡微雲㸃綴展清池樽前金奏無晨露只有君房語驪駒客莫賦歸詩東道留連應賦不庸歸原注一作共踏青槐碎影夜闌歸題靈山廣瑞禪院靈山法㑹何曽散此地神光滿丁公潭下百雷霆疑是銀河挽下一齊傾髙橋飛觀連雲起檻外驚湍水大磯才過小磯來應有天孫靈馭月中回自蘭陵歸冬夜飲嚴州酒作嚴陵灘畔香醪好遮莫東方曉春風盎盎入寒肌人道霜濃臘月我還疑紅爐火熱香圍坐梅蘂迎春破一聲清唱解人頤人道牢愁千斛我誰知臨江仙九首上已日逰海昌王氏園呈吳宰效及中散兄倦客身同舟不繫輕帆來訪癯仙春宵元巳艷陽天夭桃方散錦髙栁欲飛綿千古海昌佳絶地雙鳬暫此留連通宵娛客破芳樽蘭亭修禊事梓澤醉名園燕諸部使者二首自古吳興稱冷僻菰城水浸潾潾回星難望使車塵如何三日飲併有五行人文似枚臯加敏速記書易若張巡幕中無用郤嘉賓他年浮棗㑹莫忘兩溪春千古烏程新釀美玉觴風過潾潾歌聲未辦起梁塵九天扶侍客來作繡衣人夙有詞華驚一覽傳聞獻頌東巡未應握節久賓賓一封馳詔㫖却醉上林春與葉少藴夢得上已逰法華山九曲池流杯小樣洪河分九曲飛泉環繞潾潾青蓮往事已成塵羽觴浮玉甃寶劍捧金人緑綺且依流水調蓬蓬釂鼓催巡玉堂詞客是佳賓茂林修竹地大勝永和春嘲尉姜補之託疾卧家郊外黃埃端可厭歸來移病香閨象床珍簟共委蛇耆婆尋草盡天女散花遲小雨作寒秋意晚簷聲與夢相宜冷侵羅幌酒烟微試評書五朵何似畫雙睂席上和呈中散兄及吳令三月初六日寶觀岧嶤飛雉堞登臨恍欲升仙野桃官栁襯吳天春風寒食夜遺恨在封綿聞道東滇才二里銀濤直與天連憑誰都卷入芳尊賦歸歡靖節消渴解文園章園賞瑞香二首二月風光濃似酒小樓新濕青紅碧琉璃色映羣峰更移金鑿落來賞錦薰籠詞客舊留月旦此花清軟纎穠未饒蘭蕙轉光風赤欄呈雅艷翠幕護芳叢雪壁歌詞題尚濕春風又見輕紅一枝斜插映頭峰不辭連夜賞銀燭透紗籠白髮欺人今老矣樽前羞見繁穠清香尤嫪虎溪風海棠須避席佳種謾蠶叢二月二十二日錦薰閣賞花詞檻外竒葩江外種嬌春未減鞓紅畫樓晴日斂雲峯佛香來海岸蜀錦薦燈籠今夜那憂殺風景酒花來鬭妖濃江梅冷淡避春風明年來縱賞應醉綺羅叢定風波二首與葉少藴陳經仲彥文燕駱駝橋二首千疊雲山萬里流坐中碧落與鰲頭真意見娛吾已領烟景不辭捧詔久汀洲老去一官真是漫溪岸獨餘此興未能收留與吳兒傳勝事長記赤欄橋上攬清秋共喜新凉大火流一聲水調聽歌頭况有修娥兼粉領佳景謝公元不礙滄洲平昔短檠真太慢氣岸老來都向酒杯收雲水光中修褉事猶記轉頭不覺已三秋蝶戀花八首春夜即事二首二月春遊須爛漫秉燭看花只為晨曦短髙舉蠟薪通夕看紅光萬丈騰天半寄語平時逰冶伴不負分隂勝事輸今假燈火休催歸水院殷勤更照桃花面只恐夜深花睡去火照紅粧滿意留賓住鳯燭千枝花四顧消愁更待尋何處漢苑紅光非浪語棲靜庭前都是珊瑚樹便請催斟鳴酹鼓明朝風惡飄紅雨疊前韻二首百紫千紅今爛漫舉燭輝花莫厭燒令短酒裏逢花須細看人生誰是英雄半安得紅顔為老伴妙舞花前楊栁誇身段已倒玉山回竹院清香不斷風吹面已過春分春欲去千炬花間作意留春住一曲清歌無誤顧繞梁餘韻歸何處盡日勸春春不語紅氣蒸霞且看桃千樹才子霏談更五鼓剩看走筆揮風雨和王亷訪風過漣漪紋縠細十拍香檀驚破文禽睡野蔌溪毛真易致風流未減蘭亭㑹擊汰千艘供洛褉映水垂楊萬縷拖濃翠小海一聲波上戲殷勤留客千金意同安生日二首雨後春光濃似醉著栁催花節物侵龍忌繡褓香閨當日瑞紫蘭宫墮人間世歌管停雲香吐穟碧酒紅裳共祝魚軒貴天上阿環金籙祕龜齡鵠夀三千嵗共樂堂深簾不捲惻惻寒輕二月春猶淺續夀競來歌舞院龍涎香襯鮫綃段畫棟朝飛雙語燕端似知人著意窺金盞栁外花前同祝願朱顔長在年齡逺章道祖生日安石榴花濃緑映解愠風輕政是朱明令衮繡元臣門户盛童孫此日懸弧慶夜燕華堂添酒興黃紙除書逺帶天香䞉欲挹苕波供續命不須龍護江心鏡漁家傲初創真意亭於南溪逰陟晚歸作二首嵓壑縈回雲水窟林深路斷迷煙客茅屋數椽擕杖舄人寂寂侵簷萬箇琅玕碧倦客羈懷清似滌更無一㸃飛埃迹溪漲慢流過几席寒湜湜鳬鷖㸃破琉璃色疊疊雲山供四顧簿書忙裏偷閒去心逺地偏陶令趣登覽處清幽疑是斜川路野䔩溪毛供飲具此身甘被煙霞痼興盡碧雲催日暮招晚渡遙遙一葉隨鷗鷺江城子和無言雪詞飛身疑到廣寒宫玉花中興何窮酒貴旗亭誰是惜青銅飄瞥三吳真妙絶銀萬里失西東華堂紅蠟暖歌鐘卷簾風賞空濛豐頰修眉鶴􅌁擁仙翁欲作氍毹花底客清漏永禁城重驀山溪三首送李彥時出門西笑千里長安道不用引離聲便登榮十洲三島畫船珠箔蘋末水風凉隋岸栁楚臺人景與人俱好應憐見晚玉殿生清曉正是妙年時步承明謀身須早軺車膚使新遂凱歌回恩綍重綵衣輕嘉慶知多少穿天節和朱刑掾二首望雲門外油壁如流水空巷逐朱轓步春風香河七里冶容炫服摸石道宜男穿翠靄度飛橋影在清漪裏秦頭楚尾千古風流地試問漢江邊有解珮行雲舊事主人是客一笑强頒春燒燈後賞花前遙憶年年醉春風野外卵色天如水魚戲舞綃紋似出聽新聲北里追風駿足千騎卷髙岡一箭過萬人呼鴈落寒空裏天穿過了此日穿名地摸石俯清波競追隨新年樂事誰哀老子使得暫遨逰爭捧腹乍憑肩夾道遊人醉滿庭芳任昉嘗為新安太守風流名迹圖經史牒具載感今懷古作百不為多一不為少阿誰昔仕吾邦共推任筆洪鼎力能扛不為桃花祿米讎書倦一葦橫江招尋處徒行曵杖曽不擁麾幢山川真大好魚磯無恙密嶺難雙聽訟訴多就樵塢僧窗嵗月音容逺矣風流在遐想心降雲煙路搜竒弔古時為酹空缸原跋二首文康葛公文章粹雅敻絶當世士夫仰之儼如山斗凡所著作流布於人間者孰不珍藏而喜讀之曩者洪君出守儀真固嘗鏤板以惠學者比以兵火蹂踐散失殆過其半曉不忍斯文之墜因學糧之餘搜訪舊本命工補闕庶可傳之永久在曉雖不能繼三篋之美譽而亦可以足四部之藏也歟隆興癸未仲夏甲寅日右朝請大夫知真州軍州主管學事兼管內勸農營田事宋曉題葛文康公以文章名世世之名能文者舉推尊之信簉乏綸闈與公之孫給事邲遊從容論議得公平生為多公妙齡擢上第以三經試學官應博學宏詞科俱第一徽宗幸太學時以賦頌奏御者千餘篇詔近臣第之以公為首於是譽益重雖然兹公餘事爾公為大司成數言時政得失忤貴要意褫職奉祠處之晏如也起知湖州過京師以書抵當路勸母北舉其言有曰天下無事則宰相安宰相生事則天下危以今觀之識見過人逺甚豈特古所謂綴文之士哉有丹陽集傳於世儀真舊嘗鋟板經兵火不全姚君恪為守復刋之屬余識嵗月因筆一二以發幽光之緒餘使後進得以窺前輩之學姚君本書生纍與賓薦雖登武爵凡事能潤飾類此淳熙十三年七月初一日朝奉大夫試中書舍人兼修玉牒官王信跋
