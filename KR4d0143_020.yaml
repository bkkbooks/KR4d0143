body:
  text: 丹陽集卷二十宋葛勝仲撰七言律詩將至襄陵二首西風寥栗不須悲雲日輕明政自竒逺岸緑飄梧䙘䙘疏林紅露棗離離味廽新醑愁眉破凉入單紈病骨知試問夜窗燈火讀何知蚊蚋撲緣時千里崑崙一月風乘流初不恨途窮南陔就養晨昏樂東榻忘懷笑語同牛酒故應推汴上鱸蓴那復念吳中明朝繫纜襄陵驛試上髙原望鬱䓗君山飯僧薦考妣元述示詩次其韻負郭簷楹古道場山形連接楚人黃原注君山與黃山接千尋寶剎留幡影萬里滄波對練光問膳香蘭無復日霑襟青血自成行才收英器還遵路三昧髙僧笑我忙次韻敦仁教授述懷十載文華蓋衆英州庠微祿代躬耕半生甘為方穿礙此假那因曲木驚折角談經於道勝低簮下匕以身輕兩朝大典資編削莫向西風厭宦情近蒙夏蒙夫之文教授用贈太守韻見貽輒復和答百家六藝日披吟問學淵源已造深舊直蓬山無俗夢今官槐市有清隂公餘緑綺乘閒撫客退黃庭每自臨官冷定知塵滿甑誰人褁飯慰愁霖伏䝉逹之學諭以詩寵眷生日次韻酬謝窮通誰復問東龜材命由來略可推去惡敢言除畝薤律貪聊慕拔園葵百年永悼懸弧日一顧垂當解印時詩句清新褒借甚却嫌無當玉為巵段去塵教授示書以茶菊自况作詩謝之髙標落落敢評題託物銓量庶似之娛客精神真北苑可人風味劇東籬雲腴鬭早驚先出霜蘂禁寒屬後期便欲相稱為二陸居然桑苧與天隨旬休延聖院納凉周澶州招飲呈德升詩二首年來形迹苦西東邂逅招提一笑同世事休論癡黠半物情都在聖賢中地靈蒸鬱疑無著友勝喧囂自不通借與方床寬六尺道人知有竹間風講席朝來得暫停藍輿同入法王城清壺照座三棱瑩小扇搖風六角輕方罫共爭棋上劫頑盆更酌酒中兵佳賓更賴王思逺霜氣能令暑氣清元巳日王循德孝迪招飲方池宏道兄有詩奉和以紀一時之事浮爽清波正日遲出郊修禊屬芳時幸陪飛觀朋簮盍未覩華堂舞袖僛原注宏道兄有舞者甚麗未之見也命中已于三耦見爭雄仍向一枰知愛君多藝能傾坐豈但流觴記逸詩伯兄以家園亭名書壁間因作壁間亭榜記家林獨住雲泉宿昔心千里故園應好在十年羇宦阻登臨鍾儀長自操南語莊舄何曾忘越吟松菊未荒歸有約不知富貴定誰淫伯父致政通直取謝靈運詩句作蕭散堂賦詩次和寄二首神武門髙早掛冠首嗟榮路久淹蟠詩辭故故推靈運禪語時時對道安書字不誇雲五朵卧閒偏怯日三竿遐齡清德全真樂誰識榮期善自寬青雲誰羡猛飛翰解組歸來分屈蟠唯以道腴從已味肯將心法逐人安林迷曉嶂雲千疊舟漾春塘水半竿退隱州閭名愈重坐令鄙薄化敦寬賀十八叔父及嬸氏受恩封聖渥便蕃奬義方靈椿雙夀慶華堂品開京秩紆藍綬告錫脂田閟錦囊家世百年逄盛事庭闈一日拜恩光列封更及諸郎貴祿釡交迎福熾昌和堯卿兄喜孝卿兄登科興賢賜第集英春勸學應從孟母鄰黃甲科名新赫奕青雲岐路肯因循暴鰓昔恨登龍晚飲羽今驚中鵠親雲陛開陳三道要寧容舉首屬他人堯卿兄改官升朝作詩紀賀三首交親衮衮上青雲冷局辛勤自奮身玉陛臚傳瞻覲久金閨通籍寵光新功名此去未為晚富貴儻來那有因預喜郊封榮禰廟弟兄同列拜恩綸冷不遷官似子雲但知謀道不謀身文髙書局恩華舊秩改朝班慶自新此去功名應自致從來力命固相因榮塗萬里通無礙峻陟行看奉帝綸引對天墀獲望雲固知儒學不孤身均輸它局交論薦元㑹登朝正履新夕秀共誇披未振夜光那復困無因持荷入侍從兹始龜紫應卑五兩綸次韻堯卿兄詩酒中興三首可惜虛行淮汴路不憂無繼是巴箋任貧任病須歡伯更拙更慵猶短篇好拉嘉賓傾若下剩鈎華藻染由拳離羣他日乖觴詠馬腹何因更及鞭舟行詩酒兩相牽豈暇觀書理廢箋金榼興䦨多半醉錦囊才亂罕終篇吟哦有味增閒適酩酊忘形謝曲拳年大此鄉疑可老宦塗羞鬻賈人鞭耻向權門事鞾板懶於驛路奏書箋芳醪不厭三千盞嘉頌時為十二篇吟裏情懷清似洗醉中身世小如拳伯倫子美真豪逸風味平生願執鞭奕棊有進勸工部兄召客索居湖海欲忘憂瓜葛相呼事奕秋方罫互贏多有進圓盆更酌早為謀格髙誰是州中正米賤休沽縣督郵及取春光尚堪賞莫辭醉倒更扶頭次韻韓景賢承議自金陵沿檄宣歙道中見貽二首循牒騰裝冒苦寒傷離愁思定應寬剸煩獄市才稱健奔命郵亭嵗欲䦨赤米素鹽厨寂寂清泉白石路漫漫到家尺一應催召聞說知音正執桓搖毫傾刻便成章弱冠名標桂籍香倉氏官閒聊自喜荆州望重豈能方髙談不辨連三日敏識空驚下五行留落更煩勤慰諭誰知寵辱漸能忘五月望日㑹食普滿院夜歸作詩二首呈文中縣丞玉老禪師江斆王彧懷氷髙韻暑天寒况有波瀾在筆端可但風流稱不墜故應哺啜亦堪觀坐曹行赴陳蕃榻待戍方彈貢禹冠戒食每煩臨蔔瓠慙無斗酒鹿盈柈簿書填委我何堪茶串擕尋井水甘幻境豈能喻十十禪機聊喜契三三竹風敲玉清音迥荷雨跳珠緑影涵檀施敢夸蒲塞饌欲因盧至戒慳貪原注是日續盧至經二十四日葉氏林亭燕集成句呈文中縣丞執熱何從避火雲山居岑寂背城闉昻霄木老清隂厚針水秧齊翠剡新鮓熟慣醒虞匠酒扇輕堪障庾公塵凉飈拂袵容吾共自意無懷以上人葉佐卿隆見和復次韻答之扇上閒題隴首雲揚風擕過海寧闉于飛鷺識觀光早前列龜看入貢新㑹見文辭驚乙覽莫嫌衣袂㸃京塵升平樓下臚傳日共指中朝第一人和少藴石林谷草堂三首寵辱循環厭宦情蓋頭茅屋手親營清泉橫道疑滋穴翠袖圍居似化城不擬身名炫俱泰且圖心跡遂雙清半庵閒地如容我便足徜徉了一生雲峯帶竹似伊川山溜甘于九隴泉離世未應多怨誹葆真聊自樂虛緣漫郎擬酌窪樽酒逋客慙馳驛路烟敢請著書詳勝致千秋萬嵗遣人傳妙年涉筆賦城蕪嵗晚無歌擊唾壺曾是北扉稱內相却來東嶺伴寒儒原注石林谷近朱氏兄弟閒來真隱編成傳靜取飛仙貌作圖豪氣年來除已盡元龍雅意卧江湖呈去非嗣宗曠逹早相逄更喜林間識仲容林蕚集中陪唱和幽棲谷畔許過從雲飛隴首髙情逺楓落吳江好句重梁棟他年知有用齊前楚楚一株松婺源祁門二令母年八十求為保官注家便闕慨然慕之作詩二首自悼庭闈無復薦芳羶烏鳥哀情每泫然遊子但吟春草句門人欲廢蓼莪篇風枝數效臯魚泣水菽難攀子路賢空羡鄰封二佳令兒啼八十夀親前迎養京都突未黔蒼黃荼毒血霑襟百年過隙知難復三釡纒哀政自深不為鱸蓴歸亦好獨甘羊棗果何心寄言世上斑衣子溫清應須競寸隂周文之彥質運使巡按海寧追憶曩嵗與伯仲同奉板輿之樂感慨賦詩不惟辭藻格力清蔚髙邁且足以敦孝悌而厚風俗昔夏侯湛作詩示潘嶽曰此文非徒溫雅乃别見孝悌之性因次韻和二首褰帷巖邑特從容憶惜鴒原㑹一同樂孺共營蘭薦膳劬勞爭報棘吹風繡衣握節新恩重綵服承顔往事空三紀光隂真插羽依然小市夕陽中披雲初獲接音容賢勝風規自不同凛懍威明將使指恂恂孝悌訓民風競傳清唱紙騰貴爭識皇華巷欲空尚有壁間真墨彩匣藏留在給園中贈覺僧首并序建初寺如覺道人禪學髙深護戒不墮讀書工文尤精於三篆有照齊集行於江左為僧首纍年即求退在勢者檄住慧滿禪院亦辭不就道俗皆尊鄉之某到官時春秋七十有三矣獨少重聽而精明不衰連枉詩文皆清麗可喜殆當與靈徹浩初輩抗衡黑衣中未易得也因為二詩以贈道貌堂堂老不臞照齊佚閣送居諸斷常不著安禪後尋伺皆空入定餘護戒獨持螺畫行翻經時作鹿輪書山城為令真非惡更喜遊從得浩初上堂慵算海邊沙分衛寧甘向七家篆筆頗疑傳棗木方袍不羡賜蘭芽名髙白社推尊宿才比紅樓更麗華連枉清篇洗塵滓緘藏留與里人誇原注唐廣宣上人以詩應制詔令住安國寺紅樓院專以詩供奉樂天贈詩云紅樓許住清銀鑰翠輦陪行踏玉墀靜林寺妙行堂前疏碧鮮壺中軒外疊㠝岏山門靜對清油濶佛閣寬圍碧玉寒蠟屐喜隨談理客饋漿驚見字民官開山老侃留遺像試問何如釋道安次韻工部兄除夕見寄三首異縣飄流十載窮年華又見轉和風春逰已陡驚梅白夜集猶疑共燭紅藍尾方嗟形影隔蒼頭俄喜信音通麥秋時節搖歸掉禪榻相從話苦空原注除夕獨坐縣齊偶記香山居士隱几詩云行年三十九嵗莫日斜時方寸如死灰寂然無所知老杜守嵗詩云四十明朝過飛騰暮景斜誰能更拘束爛醉是生涯因成長句二首呈衣器是嵗豫年數三十九是日持六齊霜毛垂領病摧頽嵗晚流年四秩催一自貶官瞻日逺兩經除夕歎星回梅吹畫角餘寒盡柏欲飛觴暖律來嵗莫日斜還隱几心同白傅守寒灰江城流落嵗還新懶作雕蟲問大鈞月盡嘉平餘景刻年侵彊仕尚沉淪晚持禪悅惟三白曉簇春盤又五辛肯把生涯供爛醉黎明學不動心人維心以詩送花果栽次韻奉乞花栽旋旋移退師老圃自安時新荄應待天陽發生意先從地脉知異縣聊尋郭駝傳他年敢忘角弓詩庭柯只作怡顔具肯比侯封逐利宜送胡彥師職方迎親赴闕二首詞華標韻出鄒枚要路飛翔見軼材編削終篇辭右府袤延飛詔入中臺碑刋棠蕚如敦實衣曵荆蘭似老萊五兩風輕清汳路迎船魚笋助南陔簮筆文昌作望郎暫拋台史護衣香摛辭曾是金聲奬程奏親逄玉色康祿洎千鍾榮􅎵瀡圖分九服職封疆到都右衮如相問為說飄流鬢已霜侍讀官程伯禹以賜茶寄汪敦仁處厚教授䝉惠四胯以詩紀謝講罷清隂轉緑槐露芽珍賜下銀臺品髙逈壓仙人掌味絶堪名瑞草魁分貺雖從稽古出看題知自邇英來晴窗碾試供詩社先聼聲轟萬壑雷次韻宏道逰三官院園時余往辟雍不果往晚擕勝友共揚鑣應厭家鬟捻紫簫逮得暇時能有幾每逄佳處且相邀大夫髙挹髯龍操公子閒窺白鴈標獨恨抗塵乖寄賞偶飛輕蓋四門橋詠槐蔽日干霄過百圍龍蛇夭矯半天垂蟠根不老應千載合抱橫分見九枝學市濃隂能幾許公庭轉影不多時那知山谷無斤斧坐與𡨕靈結後期鄧子文裳辭曹枉道相過且出往還詩見示次韻二篇上呈區區蘇李未應師句法中涵屈宋姿華貫即今方慎柬異材如此㑹深知飄飄氣概輕餘子凛凛規摹擴大兒老厭交遊翻覆手欲於士遜結心期獨學離羣政自傷寵臨何幸不遺忘莫嗟黃繖稽掀擢行看青𡨕指忽荒好問徒知積雞跖登塗曾不倦羊腸衡州言語髙天下秀拔如君實肯堂次韻正臣朝議見寄二首解組歸來遁里門慶源貽後繼臧孫幽尋此日扶鳩杖榮遇當年駕鹿轓髙義共夸賢者出亷風端遣薄夫敦紫壇熙事專優老盼篚行看下九閽儒學推稱第一流乞言堪入告嘉猷長閒氣味安三徑難老光隂傲十洲談理清風生玉麈覆名殊寵謝金甌方瞳大隱年兄弟營道應居最上樓次韻答王聲見贈平生未分作臞仙抵㧙英豪不直錢效智連年居定鼎䇿勳何日上凌煙髙情獨寄猗蘭操壯志應存寶劔篇途轍懸知騰上速請看火色映鳶肩和目疾韻幻翳乘虗近漆瞳輕雲蔽月有無中廢書暫阻讎三豕妨射何因落兩鴻慧眼小清知吉夢藥師經驗表竒功疾平豈但開巖電反照觀身覺內通幽居書懷六首材疏出仕久知難境勝謀居自考槃反抱關為知道在賴閒處著得身安離騷每向醉中讀周易仍于病裏看萬頃煙波時擊汰浟浟籊籊弄晴竿環堵翛然一畝寬更無塵霧苦相干森森佳樹木奴實湛湛清池地鏡寒三益時瞻玉界尺一杯何用肉臺盤官閒坐享無功祿更恐風人刺伐檀觀名計利了非真何似江湖習隱淪户小但期茶當酒家貧那有蠟充薪五花自喜風翻簟一角人看雨墊巾上界神仙多護短不辭長作葛天民不識癰疽與瘠環柴門雖設自常關木雞養就都無纍芻狗陳來分合閒聊復讀書牛背上誰能橫槊馬蹄閒子亭結築臨溪面瓢飲新來待學顔我貴從教知我希靜觀物化養天機名呼池面遊魚狎縷繫梁間舊燕飛安石困應存逺志姜維那遽覔當歸人生安樂他何恤悵望鄉枌與願違清時鴛鷺正充庭何事抽簮喜退耕百步穿楊防偶蹶一巵賞畫保先成獺皮冠小隨時用猪鼻車低取意行官柳野梅春意動莫教詩酒負平生謝太守惠茶林亭凍卉未芳華已享先春正焙芽活火急呼湯餅客緘囊來自使君家破看鮮馥欺瑶草煮驗漂浮漾棗花不預頭綱評四品恍驚流落滯天涯新茶壑源苞貢及春分玉食分甘賜舊勳水厄陽侯宜避席天隨陸子合同羣珍同內府新蒼璧味壓元豐小矞雲便請加籩先果腹鵝無留掌鱉添裙謝通判惠茶用前韻色味新香各十分可無桑苧與書勳打門贈我令呼客好事知君最出羣飲罷清風引仙闕睡餘妖夢破朝雲貧無列屋纎纎手捧碗齊眉但布裙次韻郭大夫昌朝見寄泗上頻䝉訪寓公十年乖隔馬牛風誰知邁往青雲士尚寄哀遲白髮翁浮食即今尸靖館育材當日謾儒宫寄聲有道勞虛奬窶籔方安鼠技窮中秋夜宿舞陽精舍居心純靜眼無塵此夜清光遍廣輪乖隔謾嗟千里共澄明還是一年新已拋世外無窮事獨喜尊前見在身却憶帝城通夕看清歌百闋㑹三人二月三日逰風穴白雲寺呈通判二首世傳三穴起長風此理誠難識所從覺性未能參七祖原注寺有唐髙師僧塔號七祖禪禪扄聊欲訪千峯原注寺碑隋大業中號千峯寺桃溪遡日紅霞爛麥隴酣春翠浪濃簿領回回清興少乍尋巖壑愧塵容秀野班春過梵宫賢僚况復肯相從風緣禦冦來幽穴雲為淵明出逺峯柳色直將波共緑花光疑與酒爭濃一庵此境堪肥遁寄語山靈幸見容四桂坊并引燉煌令狐吉先首以文藝第進士其季茂之夀域子建皆繼登科並時顯仕為冕紱盛家余為汝州榜其坊曰四桂豈獨寵門閥之懿且以勸來者蘂榜連年詔墨黃聨翩恩綬月中香家聲舊踵三槐位儒學今標四桂坊酬唱共傳花蕚集笑談應聚德星堂門同列㦸知非晚更遣鄉評服義方吾家故事子姪登第必有酬獻詩什去嵗立悌立經二姪並中科選未有慶以詩者偶示四韻充閭秀氣我家多又喜雙龍並化梭同榜連榮追紹聖原注豫與伯兄大成同中紹聖四年第傳名躋甲首宣和原注順之權之并䝉恩升甲吾家前未有朝班鳴玉猶升舍原注順之為奉禮郎以國子上舍生試入等冠嵗橫金又中科原注權之中科日巳服紫錫帶四葉登華誰得似㑹看盛事入編摩次韻覺心道人遊郡園牢落踰年坐斗州窺園逄勝輒遲留招邀風月千章木收拾峯巒百尺樓雲葉悠揚疑獨鶴浪花浮動想飢鷗道人知被烟霞錮當是空門第一流留二季父二首敢向明時歎滯淹得官迎飬富魚鹽百年永抱雙親恨五斗猶欣二父霑夀耋名應書緑字康寧藥不待青黏虛堂梧竹饒幽趣正好端居養智恬羈宦栖栖易感懷一秋聊得病顔開幸蒙南巷擕家至更喜東床自逺來鵠髮二翁頻撰屨鴒原羣從共銜杯家山莫便懷中隱風月躋攀更幾回原注郡有清風樓明月觀和若拙弟說汝州可居巳約卜一丘韻汝海膏腴人共說封疆况是接同州指囷待惠知無日負米躬耕㑹有秋林下要須三徑足橐中更莫一錢留飰抄雲子當同飽官職來遲且自休次韻陸嵓老祠部見寄五首山城岑寂偶分麾聊欲藏瘝一再期豈有聲華如所譽得非朋舊猥相欺久欽黃髮嘉猷壯初喜青天宿霧披尚恨匆匆還執别不容重醉習家池繞郭芙蓉十里城畫橋煙水接東瀛蘋洲倒照蒼山影花瀨遙聞白苧聲問舍求田應犯慮浮家泛宅未忘情催科拙似陽公考敢覬屏風録姓名溪南溪北梵王宫踴甓亭亭聳半空紅靺鞨沉山帶日碧琉璃淨水無風雲迷翠閣參差見舟艤朱橋繚繞通泚筆憑誰寫東絹盡將煙景薦重瞳詞場弱嵗以文鳴落落寒松見老成劇郡神君頻結課中台郎位早飛聲當年威令千人廢此日精神一座傾欲試閒窗鴻筆健春容詩軸燦瓊英鏡中雙鬢未全華退隱林泉意緒嘉春圃帶煙鋤徑草夜燈和雨看簷花神能自衛同干越老更知塗似渥窪文注五河初不竭從來惟屬士衡家次韻何總管等慈寺詩二首寺門修竹映長楸景似江村事事幽山疊青螺雲繞屋月升紫磨水明樓夢中他日應知路天上從今與寄愁競病將軍功已就却將髙興賦滄州古寺蕭清汝水湄寓公仍有庾征西機輪宛轉春寒磑浮線縈紆漾小溪入定僧閒多却掃深春人去自成蹊一杯相屬知何日成事因須共到齊伯氏喪歸有日遣立方祭奠靈轜東下啓銘旌羇宦惸惸逗楚城遣奠聊憑貽厥力銜哀遙致友于情虎闈典教曾同遇鴈塔書名亦並榮齒脫髮稀吾老矣可堪回首望前楹次韻景純將赴襄陽眷戀里第枳棘棲鸞豈所宜鹽車服驥暫韁鞿少而好學書饒讀壯不貪榮譽自歸重去故山拋小隱懶趨名路觸危機寄言漢廣徜徉者聊賞風光且莫違蒙若拙寵次陳敏彥振韻三和彤墀日覲赤霜袍何苦懷歸問大刀吳坂未逢驚騕裊豐城行見拭豪曹廟堂仄席方求助管庫飛芻莫諱勞即向詞垣摛外翰當年仙桂幾枝髙寺居岑寂近方袍貧舍分􅏨每借刀𨽻事舊聞輕叔寶讀書今却笑敖曹珍姿渾厚韜和璞利刃堅剛敵孟勞桂樹獨生千仭表太丘家世顯名髙韶顔祕殿賜恩袍白首山城始夢刀竹塢有詩緣二妙棠隂無訟賴諸曹消閒不廢持螯飲結課曾微汗馬勞更擬松江理煙艇如歸亭上踵三髙次韻宋景純寄陳去非昆仲雲臺獻納愧先賢端合塵迷簿領閒政似陽城惟下下文如祖詠只班班著書大似屋中屋擇祿甘從山上山揣分量材宜置散敢於造物怨偏慳叔父承事用先公舊韻作詩次韻和呈西笑惟擕插架書雍容車騎不求都觀光鳯闕前蹤在寄恨鴒原往事徂喜見教忠躋顯仕勉從迎養涉修途新詩清婉追棠棣樂孺當年共究圖和元方寄若拙弟託覔顔淵之五十畝韻下田彌望股清流謀食誰言必本州且復種粳資口腹早知籍稻載春秋擕家便可隨豐儉仕國從今委去留饘粥粗供吾事濟寸心安靜得休休䝉若拙見和復次韻逸氣軒軒蓋搢紳後來之秀子其人文如范曄無空設學似揚雄已大醇記問五花能奪簟風標一角共傳巾怪來吐句皆清警胸次應無庾亮塵伏䝉孝立朝請同年赴九日燕集翌日以佳篇須酒謹依韻上謝新稻翻匙羮芋魁殷勤重客肯相陪醉歸已徹重城漏睡起應尋十日杯欲得杜康連榼至原注選詩以杜康為酒名因令毛頴寄辭來扶頭往餉宜頻釂更喜輸租罷與催邇日詩卷承若拙編為小集見示且有詩因次韻驪珠魚目兩無遺卷袠深煩為析釐賦詠粗疏慙短筆原注自謂賡酬刻畫賴連枝似聞警䇿耽佳句何用編摩載惡詩敢請冠篇重作序二難文采勝延之次韻景純後圃宴集擕裝過我路漫漫聊命杯鐺為禦寒漏月竹疏憐影碎干霄楸老見根蟠城頭飛屐千峯逈樓角憑欄六幕寬尚欲相留過殘臘小園佳致雪中看景純到汝數日遽求别僕固不敢留客然宋伯舉軒為兄蘇勤道大寧為婦之兄遽見去似非人情輒賦是詩率二僚留之奉留髙客敢同黃恃有親親與鴈行樂孺誠宜賦棠棣盤桓何畏嗇檳榔敬通叔逹無爭論法護僧彌各擅長二義周官如問得且看姜被莫騰裝懋南博士暫出廽邑以盛藻見觀謹依韻奉和二首五十之年嵗又開劾歸不勇尚徘徊家徒四壁謝金埒第乏一區慙玉杯彊欲安心師逹磨懶談真我類投灰吾僚輕作經時别猶喜民謡挽得回公退蕭閒閉息深從來縣譜用山隂威稜少霽髯垂几才韻頻將筆捶琴取急卧家聊小憩捧符還郡却幽尋風流若把名香擬堪作盈斤百和沉提宫工部兄擕家見過輒成律詩二首上呈剝啄欣聞夜叩關相迎一笑解愁顔枉帆雖落十人後原注某到官䝉兄弟見訪者巳踰十人矣謂少川才孺道卿友卿子可紹疏逹卿衛卿逹可夢錫過飯今成五郡間原注某官守五郡並䝉兄見顧謂錢塘東魯漣水汝海及今霅川自役其身慙鞍掌無求于世羡蕭閒何如赴隴從招隱却遣幽叢問小山相逄雖幸慰暌離憂患仍年觸境悲琴與俱亡念同氣原注謂長兄大成缶猶難擊愴齊眉筋駑肉緩奔名懶意廣才疏見事遲只待歸資堪問舍一封投劾去追隨福國諱日夀寧院作呈工部兄一官隨牒浪推移不到名山二十期踴甓獨存煨燼日布金重見鼎新時舊逰已起人琴恨原注頃嵗屢陪光祿兄逰淨供還增奩鏡悲賴是一般官拓落林泉深處得追隨近闢祿隱軒建瓢飲亭季父以詩寄題和韻稚節爭名翰墨場中年習隱水雲鄉遭時有幸常溫飽濟世無能分退藏山色不於羈客祕日華端為散人長身閒却笑東方朔避世金門傲武皇次韻景純見寄叙相從之樂許昌舊姓有文儒得得西來過燕居訪我肯題門有鳯館君深愧食無魚鄣泥難為清逰惜便面頻將好句書尚遣雅才淹簿領好賢誰賦衛干旟奉酬景純道中見寄之什慙無才望照簮紳剖竹藩房誤長人堪笑為官常拓落獨知取友愛真醇吏休時著煎茶帽客去今閒漉酒巾曷日清揚重㑹面劃開河漢滌心塵友鄉寄謝并月波酒和其韻長鬚剝啄叩柴扄令弟官清逺寄聲擲句已欣資藝圃漱醪兼賴破愁城牽絲聞說恢材力露板應連上姓名猶憶具區分袂處孤帆一㸃愴離情原注昨赴南陽友卿至震澤相餞次韻叔才幽居二首世塗艱險動難諧學士深居但柏齊紫翠當門流水過碧鮮遮檻好風懷角巾家巷便髙枕手板公廷厭沒階天地百年真逆旅誰能巧宦役筋骸粗才濩落與時乖湖海幽居一竹齊月徑清逰疑不夜風窗髙趣到無懷身閒有分白蓮社地禁無心紅藥階只待匡廬官秩滿一章程奏乞殘骸次韻工部兄見寄三首影落䢴溝是我家端來吳地寄生涯蝸廬困卧身何擇蝶夢時歸路不遐幽徑任荒陶令菊閒門聊蒔邵侯瓜西還約醉中秋月屈指同襟尚阻賖文采清華自一家行身所到詎能涯學該古昔仍知要識造髙明豈不遐英晤早明當道李勤書頻事鎮心瓜似聞憂國頭今白法㑹無錢想尚賖朱門十萬一貧家鼓枻西歸悵未涯數米稱薪嗟隱約望雲臨水負幽遐清音且聼雉登木曲路任從蠅集瓜午飯蕭然無膾鯉須知滋味已能賖次韻叔才以詩卷見還有作委巷歌謡愧斐狂雷門布鼓背生芒鳯毛忽爾驚懸罄魚目真能引夜光義重肯為流俗變意勤仍以古風將怪來巾笥多珍玩獲奉英遊已五霜昌化紫霄閣次長老仲希賦溪山佳處不須招未到心旌每動搖漸喜田園挽陶令敢將筆硯伏君苗黑雲含雨迷江館白鳥衝煙映市橋回首海寧驚謫夢挽舟猶記笏垂腰
