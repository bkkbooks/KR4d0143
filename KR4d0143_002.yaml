body:
  text: 丹陽集卷二宋葛勝仲撰表謝特賜諡先考清孝表鄉書程奏仰蘄揚善之公廷議具孚特被易名之寵恩光下逮感涕無從中謝竊以名者實之賔必考一時之德諡者行之迹永垂萬世之傳禮欲示于勸賢義特嚴於節惠魯無駭則生有正卿之貴衛公叔則請於將葬之時若乃爵未及而特崇窆已久而追命自非絶德曷勝殊榮仰惟先臣夙有卓行飲冰自勵清每畏于人知負米服勤孝實由于天稟十年辭祿而養志一介不取以律貪蹈曽閔之所難扳夷齊為可慕善每為而最樂徒信所聞道雖暗而日章其傳自逺敢圖二美上逹四聰略省户之參稽置禮官之訂議特旌潛德俾受大名此蓋伏遇皇帝陛下公聽並觀兼容泛愛同帝堯之稽象法湯后之立賢不吝飾終特甄收于片善未嘗忘逺曲崇奬于下臣爰霈恩綸來光泉壤殞百身而莫贖永悼循陔想九原之有知尚期結草謝降詔不允乞外任表教而知困竊幸退藏道以觀能尚寬澄汰親奉德旨之奬勵繼膺溫詔之撫存宜去而留以榮為懼中謝伏念臣蚤蒙擢序馴致髙華聮禁塗供奉之班躐黌舍師儒之長冒居厥次未報隆恩輒乞其身實緣私義蓋明倫善俗之時希遇則育材成德之任至難無作人之助則為曠官無授業之長則徒廢學如臣愚陋涉世闊踈可謂人師雅無重望於斯碌碌屢荷容容遍塵胄子之官久妨賢者之路鼯鼠窮於五技難復進為鷦鷯巢於一枝庶安拙守故因次對自勉治民敢意包荒尚容遊食奬以評文之當賁之振職之稱既蒙踰衮之褒復荷出綸之渥大哉之言誕播蕞爾之迹有光此蓋伏遇皇帝陛下豐照直中乾剛獨運懋昭大德遹求多士之寧灼見俊心深識百辟之享肆憐平進更責後圖誓殫分教之勤少報兼容之施休寧知縣謝上表躐厠儀曹愧匪小材之纍日除還銓部猶叨大邑以庇身荷恩難名報德無所中謝伏念臣人門俱下仕學並輕雖偶竊於科名本自甘於州縣識拔誤除于師席編摩進直於書林佐二宗英預掌銀潢之津派登延册府獲窺金匱之圖書每自疚於超踰豈復睎於擢序久尸官於省户曽乏建明屬議禮於宗祊遂成瘝曠蠡何施於測海蚊果困於負山特煩簡禮之嚴上瀆冕旒之邃止從澄汰實戴矜容此蓋伏遇皇帝陛下堯釐百工舜明庶物黜陟必先於考績賢愚咸使之遂情若此無能尚有攸處臣敢不承流宣化勉報政於三年念咎省愆誓輸忠於九死大司成謝上表入持禁橐已愧超遷進長經黌更叨因任循涯虛受程奏懇辭膺詔旨之弗俞錫服章而加賁亦既就職深虞纍恩中謝伏以兼三代之學以明人倫同四海之風而暨聲教大申孝弟之義交獻賢能之書歷年滋多明效灼見小子有造預鼓篋者千人海邦率從來執經者萬里惟時教法特軫淵𠂻責古人大全則薦降德音示聖經奧旨則親為訓傳蓋躬教立道之君處上則育材首善之臣至難方廣詢求以専屬任而臣學非得已才不加人行誼不足為世之範模文藻不能作經之鼓吹偶自朝廷興學之始首叨方郡分教之官玷禮曺郎屬者四年預胄席師儒者三等所能何有每遷益髙雖賔賢養士之規模粗知本末顧成德逹材之績效蔑有毫釐不悟異恩就躋邇列此蓋伏遇皇帝陛下誕敷文德遹圖康功久於道而化成不忘樂育主其心而慎治更務能官察臣所守之靡他貸臣已試之無驗猥加曲澤使勉後圖誓畢微生仰酬洪造謝江州太平觀表躋榮命教濫居學省之華負罪投間尚竊祠宫之適寬恩下逮感涕橫流中謝伏念臣學術空踈性資愚拙本為貧而干澤寖席寵以逢時俾遊英俊之躔盡出聖神之造班陪從橐秩冠儒宫顧惟何人輒膺是選果緣冒處遂致疾顛仰繄亭毒之私猶頒餼廪之厚此蓋伏遇皇帝陛下德侔天大恩均父慈擴仁恕以并容亶聰明而臨照深閔向隅之戚特從祝網之寬退居寂寞之濵得從優逸上答生成之賜更誓糜捐謝復右文殿修撰表殊庭遊食深幸安全祕府疏榮特從甄序隆恩下逮感涕橫流中謝伏念臣學不造於道真材不周於世用自奮寒苦三收詞藝之科寖冒寵嘉四躐師儒之等欽承綸綍俾長膠庠退量羊質而虎皮何補鳶飛而魚躍骯髒但期於報國顓愚實昧於周身惟行法已咈於人情而處事每違於時論怨仇交積釁咎易乘猥自劾歸親乘訓奬慰留之詔始下搏擊之疏繼聞凡可排根而中傷無不崇飾而誣衊莠言甚巧惑投杼於三人幽結莫申類降霜於五月賴乾坤亭育之施察風波險陷之危曲示優容止投間左微生易殞聖造難酬旋聞邦誣靡逃天鑒阿比附會著在德音放逐流離屏之荒服臣之所坐豈假自明遂令流露之餘曲被便蕃之澤稍賁集賢之職漸刊司敗之書此蓋伏遇皇帝陛下覆露萬邦帡幪庶尹風揮日舒而専斷雲行雨施以均慈蹈舜之文哲而審官體湯之寬仁而宥過肆令浮賤不遂棄捐恩已重於丘山實踰始望身未填於溝壑誓竭孤忠汝州到任謝表序道山之祕職已荷疏榮殿陸海之名邦更蒙起廢苦心易感危涕自零中謝伏念臣器識無以加人學問本期治已會睿神之博採旅俊哲以同升遍歷清塗皆非素望直棧傳廄雖知戒于回邪方穿運車顧每難于諧合昨承人乏進長國庠雲漢為章于天何裨化養日月有明必照獨荷矜全數侍清間薦膺訓奬維時邦汋方擅臺評凡可傾擠而中傷無不誕慢而崇飾倘非洪造豈有餘年矧退黜僅及再周而恩渥已更三至既察采苓之罔遂叨剖竹之榮濵九死而復生殞百身而曷報此蓋伏遇皇帝陛下宏規籲俊大德容愚曠然兼覆之恩仁為已任展也大成之業善與人同故雖無庸不使終否臣敢不益殫夙夜之力少紓宵旰之勤懲沸羮而吹虀更防後患羡淵魚而結網勉企前修謝改寶豐縣名表建節近藩已旌地寶錫名支邑更荷天慈閭井祗歡山河增重中謝竊惟汝郡密拱神臯欎蔥之佳氣旁連汪濊之湛恩光被是興寶藏以表珍符沓來丱人砥貢玉府夤緣蕞爾之境申錫美哉之稱此蓋伏遇皇帝陛下富擅無倫化行有截爰正名於百物以彰信於兆民甸服用光信書惟永臣謬膺優寄躬被德音言順事成實佩褒康之寵政平訟理益圖報塞之方為輒奏儀曹馬俊公事放罪謝表讞獄非疑自姦罪譴疏恩過厚特骫憲章荷德自天措躬無地中謝伏念臣中緣擢序外預使令兢兢詔令之遵齪齪簡書之畏謂獄者天下大命而刑本君子盡心寧失不經上體好生之德何度非及顧無閲實之良輕黷九重特寬三尺此蓋伏遇皇帝陛下斤斤之明進日恢恢之網如天知非法吏之深文爰貸守臣之妄發臣敢不知逃簿責益務簡孚觀過知仁幸不書於一眚咸中有慶庶圖報於萬分謝除顯謨閣待制表竄名簡札久姦刑史之誅寓直圖書忽玷侍臣之選驚魂返幹感涕交頥中謝伏念臣於世無庸以身得察不繇援助遍歷髙華自信直前未免木鴈之纍周防慮害又乏蓍龜之明遂招貝錦之言上瀆細氊之聽仰承辨究曲賜保全起之祠宫付以民社義命大戒方勵志以力行富貴危機實無心於叨取矧惟伯氏獲綴近班甫依日月之光遽淪霜露之疾顧滿盈之招損復愴盡之傷生方圖幽屏於衡門敢意寵登於巖閣此蓋伏遇皇帝陛下在帝陟降憲天聰明體堯之大以容愚用舜之中而忘過念兹簮履之舊援之溝瀆之中臣敢不黽俯事勞緝熙問學命輕於羽期徇道以忘身誓有如江願輸忠而報國湖州謝到任表服勞盡瘁敢擇地以求安積釁挺災輒籲天而瀝懇豈圖名郡驟假畸人中謝伏念臣褦襶無庸骯髒難合入塵禁近深慚乍佞而乍賢出預承宣惟知畏首而畏尾迫于多瘠尚爾自營荷臨照之末光遂寬間之素志惟苕霅之勝壤號吳越之樂郊杜牧之三啓請行王逸少二代繼守豈期泛宅之地乃獲専城之居此蓋伏遇皇帝陛下體文王之淵懿以官人蹈虞舜之聰明而臨下畀矜無告特為相攸仰稱慈憐誓當勤䇿挈紫荷橐徒夢想于清都坐白蘋洲幸日陶于化國鄧州謝上表危誠自列本緣三互之嫌洪造曲從改涖一麾之寄奔走奉職經營戴恩中謝伏念臣早幸逢辰過叨序爵容臺蕝禮往來數預于討論教府育材伯季迭居于長二實備聞于德意敢中畫于初心旋以拙踈久坐流落既不肯逐巧點妍而射利又不能變節易操以隨時嵗籥七更徒或夢逰于帝所國門三過何階入覲于天儀進無扳聨之因退守靖共之素惟兹楚境蓋昔鄧墟令臣領之為幸多矣此蓋恭遇皇帝陛下蹈虞舜孶孶之善廓武王斤斤之明攬治具而畢張鑒人材而翕受少原之簮惟舊未忍棄遺豐城之劍可求聊加拂拭臣敢不布龎洪之惠澤佩煩悉之訓詞為國矢謀雖身逺嚴徐之列與民興利尚志睎召杜之風再任湖州謝表復舊歷之近班已叨式序付嘗為之便郡更荷就除不涉道塗即交印紱中謝伏念臣任過其量德慊於榮內之代匱於京師遍陪禮樂學校之寄外之服勞於郡縣備諳簿書獄市之煩自黷真祠屢更嗣嵗敢圖起廢復玷承流今所領州昔嘗任事法令具在誰言厦屋之帡幪民俗可知妄指甘棠之蔽芾今兹器使實纍詔除而臣益老無堪積憂多畏動而輒礙豈能遊刃以解牛去已復來徒類下車而摶虎此蓋伏遇皇帝陛下運天德以君世纘帝緒以膺期體道時巡擇賢共治特加申命更勉後圖惟自誓於糜捐庶少寬於憂顧馳朱丹轂敢從事於燕遊探赤白囊第謹修於備禦謝除顯謨閣待制表奉混元香火之祠獲從安便直永裕圖書之閣復玷髙華方課職以投間顧冒恩而席寵辭不獲命懼何以堪中謝伏念臣江海腐儒布韋冷族以身自勵妄期兄弟於古人賦命多竒動輒參辰於時態昨膺申命來撫舊封當帑庾空匱之時適衣冠流寓之衆長鞭不及馬腹寧免多仇割雞焉用牛刀敢言易治拙踈若此汰免是宜敢期肆眚之隆寬不以曠官而賜隔還青氊之舊物綴紫橐之清班此蓋伏遇皇帝陛下時邁其邦日新厥德攬智瘝而兼用作威福以並行蕩蕩巍巍每擴堯天之覆左左右右特從湯網之寬臣敢不知幸之不可常念德之宜有報益堅素守更勉後圖謝賜厯日表五首仰求天步運太極之三辰俯授人時協洪範之五紀祗膺詔旨灼見聖心中謝伏以考中星之合見而生昏明課九道之發斂而定冬夏積大餘小餘而綜數辨陽厯隂厯以求端雖云觀象之常未若紀元之密開綴文之局而演議推立極之日以為元鑿井耕田共識作訛之候連珠合璧間無杪忽之差恭惟皇帝陛下化妙範圍仁深覆育循堯之道以閏月而定四時用夏之正坐明堂而朝羣后臣出守支郡辱賜新書豈徒尊閣以知榮敢不奉承而加畏協用五紀永執其中猷告多方不匿厥旨仰推天步俯授人時中謝竊以設南正北正之官實繄順帝辨西陸東陸之候所以序年惟章分蔀元之不差則析因夷隩之攸敘厥惟舉正乃克求端恭惟皇帝陛下官天地以範圍厯日月而迎送清臺雜候既謹於疇人陽館誕頒每先於嗣嵗惟聖時憲以初為常臣謬厠承流寵膺錫本昔嘗庀職慙無綜數之能今幸牧民願廣正時之惠協用五紀砥日而無失日之差允釐百工後天而有奉天之謹中謝竊以帝嚳序星辰而著衆唐堯欽厯象以授人厥惟盛明必精推步顧紀元之衍數本基命以求端閏餘靡乖宿離皆正恭惟皇帝陛下恩涵品庶道格昊穹坐行政之堂定四時而成嵗頒在躬之厯斂五福以錫民臣敢不祗奉璽書寅遵神策昔緣推澤嘗預於討論今冒承宣敢忘於尊閣發政施仁誕布自天之詔歸餘舉正特頒砥日之書職在承宣敢稽播告中謝竊以南正北正以司天地羲仲和仲以理隂陽惟分至啓閉之預和則風雨晦明之可候肆於獻嵗之始大宣告命之文恭惟皇帝陛下寅奉夏正率循堯道靣稽天若欽授人時俯察仰觀千嵗之日可致下蟠上際萬物之生得宜夙推步於清臺繼頒宣於方郡志以定言行以出令拜賜札以璽書祗膺周誥奉萬年之神厯允協夏正上體求端敢忘承式發春獻嵗誕臨行政之堂舉正履端昭示在躬之厯凡叨寵錫悉被恩榮中謝伏以鳳鳥呈祥定分至啓閉之候蓂莢紀瑞辨作訛成易之方起消息而正閏餘分辰野而步躔次五者來備各以序萬物之生得其宜蓋惟保乾道之和乃能致帝者之用恭惟皇帝陛下紹隆景命光宅丕圖調玉燭而和四時在璇璣而齊七政連環合璧仰無杪忽之差轉扇飛灰俯有桴鼓之應肆頒告朔爰及守臣敢不虔稟聖謨率循彛憲焉知天道昔嘗預於討論不違農時今第嚴於遵奉代皇子辭官表仙源襲慶曽微橫草之勞睿檢疏榮遽被苴茅之寵輒輸危悃仰冒隆威伏念臣姿實滯冥質非岐嶷本支錫羡當詵詵揖揖之辰德齒甚微愧穆穆皇皇之美方上煩於顧復冀少迪於顓蒙敢圖敷號之揚廷特相奧區而燾社秩均揆路寄重帥旄惟茂勳明德之可居豈弱植幼齡之敢冒伏望皇帝陛下俯矜愚欵追寢贊書名器至公特正君臣之分悃誠獲訴益隆父子之恩代皇子再辭官表循墻懇避既瀝於愚衷賜履疏榮未回於渙號仰蒙覆露輒再冒陳伏念臣託體天支承顔帝扆銀潢分潤日承鞠育之恩金輅啓封敢意褒揚之寵顧未親於保傅已視秩於公師相南土以建旄保東方而受社並疇多賦併衍真租皆非分義之所安敢罄懇誠而再瀆伏望皇帝陛下至明旁燭大度兼容俯矜髫齔之姿特寢絲綸之命朝廷之上庶絶於叨逾父子之間何容於偽慢代皇子謝授官表程奏上干冀回於成命恩言狎至終閟於俞音祗受寵靈第蒙榮灼中謝竊以勝衣佩印存漢室之舊章晬日錫封實本朝之故事敢圖庸昧亦玷褒揚伏念臣質異徇齊年方稚孺屬椒聊之繁衍聮棣蕚以輝華顧子職之未供荷王靈之先及建節旄而賜履按輿地以建邦命服九章粲威儀於上宰元戎十乘峻節制於帥垣曽是孱微併叨寵奬此蓋伏遇皇帝陛下堯親九族舜闢四聰念生子之在初雖多男而授職誓永堅於忠孝庶上答於生成代謝賜名表趣令安位已被恩綸諭使更名更紆親札宸廷馭幸閭府增華中謝竊惟名以制義者禮之經言惟作命者上之寵惟叔虞季友之類父命有稽而唐武蔣義之倫君賜為重臣逢時獨幸奠食久浮敢圖賤名更出睿意憐其許國之志使堅戴后之誠問于申繻不犯廢山之戒比之程昱更超加日之榮此蓋伏遇皇帝陛下雖聖弗居以慈為寶肆推曲澤以賁餘年三月而名雖動已孤之感千載之遇更懷難報之思代嗣濮王謝升等表祗受寶符永佑基圖之固載頒睿渥曲惇族屬之私凡預庥涵交深呼舞中謝竊惟濮王之支裔皆為英祖之懿親論小宗則勢實綿聮視正統則稍為踈逖因禮有等衰之辨故法從降殺之文戚單者既罷賜名行卑者遂無縻爵生息寖廣貧富不均韙聖度之獨觀裁宸章而親定謂自義率祖雖或貴於斷恩然立愛惟親固無嫌於廣孝爰因熙事丕變舊章官以行而迭升爵因名而更制情文俱盡恩義兩隆磐石相維更益廟祧之重綸言下逮永為戚邸之光此蓋伏遇皇帝陛下聖德盡倫王功恤隱體堯仁而惇九族紹舜孝以協重華肆令葛藟之生共仰蓼蕭之澤願深圖於報稱當共誓於糜捐代謝宣詔再入翰林表禁林清切登用詞臣家巷光華喧傳詔使仰膺申命實載隆恩中謝竊以冠內朝供奉之班代中扆訓詞之任粵自前世號為要津資東里潤色之材處北門獻納之寄扉開銅式地祕金鑾樂府立成乃有謫仙之譽嘉謨參決因存內相之名矧在聖時勃興文治睿藻獨髙於敻古諸臣莫望於清光雲漢為章獨昭回於萬物風霆敷號將鼓舞於四夷宜得名儒以當內制而臣衰遲無用窽啓弗靈問學久踈矧久廢而將落文詞甚陋又已試而罔功何期過采於虛名復使升華於故職預擁經於帷幄參酌史於青編是皆劇榮併兹虛授此蓋伏遇皇帝陛下宏規逺撫聰聽旁周圖回萬化以更新收攬衆材而求舊殊私所逮懇避弗俞奮發詞章雖莫追於作者激昻忠義當不愧於古人代謝不允乞外表忱辭冒進冀乞其身恩旨俯頒俾安厥位叨榮未已席寵更慙中謝伏念臣獨荷聖知再司邦計本圖尺寸上報丘山衰疹所嬰筋骸知馬力之竭劇職寖廢智謀同鼠技之窮懼速大呵上孤殊奬爰即威顔之座具輸肝膈之誠為聖人氓丐就祠庭之佚避賢者路冀辭省户之華不悟眷留中加慰撫此蓋伏遇皇帝陛下疏觀萬化原省衆材察其籲天本非擇地特加因任使勉後圖大哉一札之言永期尊閣蕞爾百身之殞曷稱恩私代辭官表旌􅎶所指肇闢遐疆綸綍載頒例增崇秩敢緣私分進冒隆威中謝竊以遹求厥寧蹻蹻聖神之造冞入其阻桓桓仁義之師飭偏校以鷹揚係名王而蟻伏鋪敦積石奄有臨洮初無遺鏃之煩坐致舞干之格曠古未賔之地悉入版圖窮荒始附之民交通鞮譯仰繄睿斷用砥膚公如臣謭才荷國重寄曽乏幄中之畫少禆閫外之竒乃緣䇿勳亦叨序爵矧預聞於政事已屢玷於恩華儻無止足畏避之心必有亢滿顛躋之慮伏望皇帝陛下監觀本末惠顧始終憐其深懼於髙明察其非涉於偽慢斷從公論追寢命書位必勞升盛世固無以虛授利因義勝愚衷亦幸於少安代謝授官表興師奮伐吉語遽聞疏爵疇功恩言濫至懇辭弗獲祗受若驚中謝竊惟洮陽之奧區實為隴右之故壤地形控厄天聚富繁早紆先帝之經營尚習狂童之矯據神機默運聖武嗣興詢謀將才指授廟算不淹浹日坐取列城強弩何難於射癰震霆不及於掩耳遊魂假息望旗鼓以驚奔泥首歸誠襲冠裳而欵附震疊三河之外鋪敦青海之隅用夏變夷皆繄睿略因人成事豈有微勞敢圖近弼之頒恩亦使瑣才而居寵此蓋伏遇皇帝陛下英威服逺盛德容愚土宇版章中外禔福謂義已加於不齒故賞寧僭於罔功特示睿慈俾霑優渥昆夷駾矣欣聞正域於四方元首明哉敢獻無疆之萬夀代謝朝參減拜表便蕃曲澤屢沐矜憐疲曳微軀特從優假禮稍寬於擎跽心深負於凌兢中謝伏念臣生值休明坐尸華顯奠食久浮於真館疏榮更畀於戎旃雅無橫草之功少圖稱效徒有負薪之疾上軫眷懷乃知極辨之朝蓋有常尊之分敢意惓惓之厚施特鐫僕僕之多儀此蓋伏遇皇帝陛下德冒臣鄰庥㴠戚屬謂禮雖宜於下拜而恩或出於非常因屈威顔俾蘇衰薾馬力將竭已逃顛踣之虞鼠技既窮尚誓糜捐之報代謝敕設表內苑贊書叨蒙宣召太官宿設更沐示慈荷蒙便蕃省躬殞越中謝伏念臣初非博綜繆辱詳延修飾討論何補聖謨之懿飲食燕樂遽蒙臺饋之頒此蓋伏遇皇帝陛下優異詞臣恢張國體因其涖職之始訓以稽古之榮臣得盡心逺繼鹿蘋之盛物無失性更同魚藻之和徒愧屬饜莫知上報代兖州謝上表潞子名邦方膺守寄魯侯舊壤誤沐詔除已稅道塗敬頒條約中謝伏念臣羇危少與謹朴自將涉獵簡編粗識誠身之趣平均法令稍知布政之經徒欲少亢於衰門詎肯求通於曲路微如鼴鼠方自足於飲河勢若窮猿固未遑於擇木握蘭省户剖竹藩方自視數竒皆非始望矧岱宗之重鎮存闕里之故家支邑民淳狴牢罕繫屬城盜息桴鼓稀鳴豈伊衰遲曽是畀付兹蓋伏遇皇帝陛下建五皇極奉三無私宣化承流雖博求於夀俊匿瑕藏疾亦兼採於愚矇臣敢不推廣上仁循緣舊俗布中和而樂職戒煩苦之傷恩尚有毫釐仰紓宵旰代沂州謝上表泛掃真祠方自安於祿隱改臨樂土忽誤玷於除書仰冒大恩退慙小邑中謝伏念臣江湖冷族庠序鯫生遭時博延與士彚進擢佐水衡之重曽靡荒功再將使節之嚴廑無乏事遽升華於蘭省獲欵對於楓宸橫草無勞自愧含香之選負薪有疾因求襆被之行蕭散再期優遊三徑敢圖紀録復被使令矧所領州昔嘗試吏雖嵗月驚於云邁而父老喜其復來此蓋伏遇皇帝陛下施實德以厚生圖康功而遹駿敷求良吏分列逺邦因誤聽聞遂叨識擢臣敢不布朝廷寬大之澤謹惠文纎悉之科誓勉後圖庶逃幽黜代謝賜御書千字表辭榮弗獲煩一札之恩綸示眷有加錫千文之草聖昭回在望冗末增華中謝伏念臣久玷近嚴薦膺寄屬當制禮作樂之運竊幸預榮方崇儒重道之辰獨蒙加惠溫言慰藉曲澤分頒仰惟奎畫之文實出神機之妙卧筆逺嗤於秃兔正書何取於怒猊肆筆而成非由水墨之積習為章于上宜有神物之護持不悟蔀居忽叨珍賜此蓋伏遇皇帝陛下睿文冠古獨智窮神道積于厥躬不忘典學天縱之將聖又極多能因點翰於燕間特疏恩於禁近寫之金石永圖尊閣之藏燕及雲來共侈眷憐之寵代謝對衣金帶馬表腰束九環併荷笥衣之寵圉頒四牡仍加鞗革之華感劇曳婁榮生罄控中謝伏念臣少罹堙厄自守羈單服止弊裘輕暖敢睎於狐貉乘惟下駟權竒絶望于龍騋不悟遭逢薦膺錫豫此蓋伏遇皇帝陛下緝熙政治寤寐雋良恩示解衣俾勵素絲之節意存市駿寵頒赤汗之珍粲粲陳庭駉駉在廄於其視職出以疏榮鵜翼不濡俱積叨塵之愧蟻封可試庶無顛沛之傷代髙麗王謝賜太平御覽表悃誠上訴懇求祕府之文恩渥繼頒曲徇殊鄰之請始終展誦俯仰兢榮中謝竊以太宗皇帝自誠而明惟睿作聖即古而克永世遜志而敏厥修往行前言已并包於聖學博聞強識更兼利於儒林肆命詞臣廣裒事類囊括千經之藴網羅百氏之言公孫數萬之詭辭披圖可見虞初九百之小説開卷盡知嘗資睿覽於西清益萃靈輝於東壁討論至當炳若丹青而不渝倫類相從煥乎朱紫之有别論纂實繄於鴻博流傳尚隔於要荒臣僻處小邦粗惇末伎在漢則伊秩嘗聞於入學於唐則吐蕃亦見於舊經輒援舊比以上干果奉睿恩而賜許叢沓簡編之富光華象緯之傳豈伊龍閣之珍藏乃作雞林之祕寶兹蓋伏遇皇帝陛下深慈恤隱夷量包荒以孝奉先故誕布前朝之美以仁柔逺故曲從異域之求念臣嘗獻於逸書憐臣夙朝於北宇申錫皇文之千卷俾參舊約之八條肆是誤恩猥沾遐裔臣敢不敬銘厚賜詳繹羣言流播三韓共仰文明之化分傳五族俾知賚豫之私
