body:
  text: 丹陽集卷三宋葛勝仲撰書上揚州蹇尚書書某南州細人材智下無所取雖服讀儒衣書而器能無一加人者今大名守林公不知其不肖而稱之於朝俾得預試校官蓋棄其蕞爾之官守挈之而西川陸走二千里留公車者凡三見朔月也因是得曳裾卿相之門而側聞聖天子初政矣方將封殖中外瓌俊耆傑環布列位使輸智力共圖康功故未及御殿而尺一搜賢急於星火韓公自定往黃公自亳往蔣公自慶往其餘諌垣詞掖學省藏室之臣粲然一新皆自外寄召也尚書忠義耿耿議論剛正勳閥暴著上方願見竊謂宜如曹相國促治裝行即召矣某也寄住淮海幸望履下過不自料請間可乎語曰貌言華也至言實也又曰狂夫言而智者擇焉又曰君子善謀小人善意竊意主上見尚書勞問之外必訪以天下大計施設所宜先者儻跽而進曰神宗皇帝創立憲令大功數十天下歸仁先皇帝駿惠紹復不敢失墜天下稱孝今惟取兩朝成憲而踵之國是定矣嗚呼言脫於口而利被海縣功施社稷忠與望説爭衡名與天壤相弊也某之心天下之心也某之言天下之言也某所望於尚書亦天下所望也尚書毋謂某位卑言髙狂斐僣越而誅之嵩髙峻極加以一塵雖未云益豈有損乎尚書獨不見晉伯宗漢龔遂事乎晉伯宗乘傳過絳辟傳曰梁山震傳人曰山有朽壤而震何怪焉及見晉侯果問具以傳人語對晉侯大説龔遂自渤海召王生曰即上問何以治渤海必曰此聖人之功非老臣之力帝曰安得長者之言哉遂即曰乃掾史教臣夫伯宗非不及傳人也王生非賢於龔遂也然二子披心析肝而信之師用其言動寤萬乘者言中於實會於時而納之有素故也拳拳之誠實在於此若夫飾猥蔓之辭籧篨戚施以事容媚非惟某所不能想亦尚書飫聞而厭聽矣干冒尊重無任戰越之至上兖州太守書某聞濯金浣錦取魚鹽則貴有求賤之勢培山益海資塵露則大有納小之理商君佐秦氣焰可炙而趙良以苦言藥之狄梁公峻節雅望為唐名卿而元行沖願備藥籠中物夫踈賤之士騁辭開説以干大吏未必無一得之慮此兩士者足以觀矣願賜須臾之間宿留瞽言何知無毫釐毗助萬一耶嘗觀昔善宰郡者布政處事趨時循俗而弛張無一定之論故力寡功倍而民歌舞之崔郾治虢不笞一人及涖鄂則誅罰一不貸其説以謂陜土瘠民勞吾撫循不暇鄂土沃民剽非威不能治也栁仲郢尹京兆政稱嚴明人莫敢犯及鎮河南則以寬惠其説以謂輦轂之下先彈壓郡縣之治本惠養也若二子語政庶乎不謬通方之訓矣閣下以名士典郡所至有異等之效塗歌邑誦襲滿人耳果何以得此聲趙魏之間哉豈非能觀察風俗隨宜制變故邪且閣下以趙之俗剽悍而嗜冦魁桀而侮法赭衣滿道桴鼓相聞故痛以法繩之銖兩之姦不舍強梁褫氣不敢迹境閣下之至上黨適嵗荐飢殍者塞塗于是推行荒政已責緩刑俾豪右振廪而千里皆果腹焉惟知緩急先後之方故寬猛異施而兩郡各治及乎詔書明揚改付東魯車轍未至而閭里之士偷度臆計以為是必致隆于學校矣今旌麾所臨之地即古泰山魯二郡也宣精在上奎婁為文宿畫野在下洙泗為儒鄉闕里之堂矍相之圃故基遺址歷歷在目故其俗守經學其人多秀令號稱禮義儒學之國凡虔命而撫封者率以文教先焉亦猶趙之當用猛潞之當用寬也今視事彌數月矣條教既修威令既立雕瘵者蘇矣跋扈者戢矣下至金榖米鹽簿領期會倉猝冗末無不垂省獨郡學未有半辭及焉今齋堂傾圮蕪棘不除生師栖栖有陳蔡絶糧之色閣下亦有意乎儻如朱慱所謂俟堯舜出而陳説之則無如之何矣昔魯僖公旗色鑾聲親臨泮水之上飲先生君子以酒而順彼長道故淮夷徐宅莫不來同此前事之驗也抑又聞論事而不逺嫌者宋人有勸其鄰伐不祥之木從而請薪之類也薦言而不俟信者婦始入門而戒其僕無笞服之類也某待罪教職望履幕之日淺而遽貢狂直疑若自為道地上之則失于不待信次之則病于不逺嫌惟寬明君子諒之而已答李集正書某愚不肖經學行誼不能超絶等類謬恩推擇使授業魯郡懼不振職私懍懍也單車始至人士見迎者百數獨足下奮然寵以書辭猥見褒假且望僕以尊顧眄剪拂之重僕雖不敏敢不因來示所稱述而廣之以曉左右者之聽昔項槖七嵗為孔子師潁川荀淑髙自標待於名士少推許一日見黃叔度於汝南逆旅中竦然異之謂曰子吾之師表也王戎之於阮步兵禰衡之於孔北海少皆二十嵗而相與為歡友河內之遊平原之薦著事者以為美稱也蓋師取四術友求三益年齡後先正自不校足下引韓退之之辭曰生乎吾後聞道也先乎吾吾從而師之意謂僕年雖尚弱而宜居師表之位顧僕何足當之徒以黽勉祿仕有不得已者昔韋中立見栁子厚于南州欲北靣就弟子列子厚逡巡遜却不受至退之則不然作進學解以誨諸生又為師説以授李氏子抗顔為師不顧怪罵夫二子以文藝卓越固為一世宗仰顧或抗或遜矛盾如此何哉退之任教職子厚居散地故也僕雖暗滯而代匱黌宇茍有銖髮裨補固不敢以犬馬齒少為解矣試以一事塞雅意足下屬詞雖工而許與不自愛恐論議士它日不以標鑒相許也商周灝噩之文章卓然傑出于千百嵗之上聖人不生斯文未易再覩今以牽強酬應之文輕見比擬不太誣乎至論宏辭舍劉栁而獨推陸贄裴度甚善是欲以名義公閥見勉也三復嘆息謹受教矣上監職書某嘗聞何武行部先即學宫延見諸生試其誦論課以得失已乃入傳舍問墾田見二千石其恢尚儒雅有如此者又聞竒章公始隨計京師聲望未白韓退之欲與延譽因携皇甫持正闞亡而過之大書其門曰某日愈湜同謁由是僧孺之名籍籍動等輩其成就後進有如此者每涉傳記究觀逹人勝士所為魁然拔俗逺甚未嘗不置卷遐想以為曠數百年未易再睹誠不自意親於其身而見之恭惟閣下以聰明之才位部刺史崇儒拔士之聲嘈嘈乎列郡私固已藏諸胸中矣今兹車轍馬足始至魯郊戴褷垂纓之士方且引脰拭目以觀所為然而金榖未問也簿領未核也囚繫未慮也牒訴未閲也道從傳呼先臨泮水之上降輿躋階欵謁廟堂要笏沃酹槃躃磬折退即學庭延見胄子雍容垂接與白屋亢禮悼稍食之觳薄嘆室廬之頽陋慨然有意賙而新之兹非何武之用心歟某受性方拙既不能激昻奮迅以為身謀又不能喔咿乾沒以追時好韋編棐几自守窮約閣下乃欲卯而翼之屈二天之尊禮一介之賤使行路指目曰是雖無似然巨公嘗一聘矣吳坂之鳴安知無三倍之價兹非昌黎之好事歟矧自近世逹官大吏類以刀筆期會為急至于教化本原往往浸不屑意視校學之庭則曰此虛器也顧師儒之職則曰此左局也輕衊菲薄以儒為戲彼又烏知三綱五常所繫而薦紳大夫所從出乎獨閣下逺覽深識留情藝文施設緩急輕重與世異趣瞶者警焉洙泗儒風將配疇曩而於樂泮水之頌不得専美於前日矣吾道賴以掖持後來因之競勸豈特某與逢掖諸生受賜而已哉爵躍蹈舞實為天下賀也私布腹心惟閣下察之謝曽運使書某至愚極陋不敢自齒於搢紳諸公過聽謬使斆學魯郡視職滿嵗而經以疑質者無訓發之功文以瑕求者無詆呵之效大懼瘝曠以羞儒林惟是繕完室廬營度稍食竊竊然為諸生庇身糊口之計姑欲杜衆毁而塞吏議如是而已間者使車按臨始獲肩隨掾吏趍走幕下幸蒙不以常輩知遇妄以胥宇繼粟為請退念位卑而劘上交淺而求奢不揣其本而惟末是圖三者皆宜得誅絶之罪心口默計不寒自栗敢圖厚德闊略不問又從而聽許之意無猶豫之疑文無勘詰之擾一日而賙三十萬觀聽者驚焉方縣官經用窘急之秋領使事營輯嵗計籠絡利源毫釐纎屑稍可紓目前有司之急者無不取也𣙜酤龍斷與夫州邑之賦少闕常額則奉職之吏望風伺指憂虞惴栗之不暇今獨無功而受厚賜自非大人君子留情風教進誘後學詎肯瘠彼肥此耶洙泗鄉校有幾廢復興之漸圓冠侈袂騰頰頌譽皆曰上之德我者如是不激昂奮勵則為匪人魯道庶乎興矣功利之博與三十萬之費輕重小大為如何哉若夫區區嗜學之心不為憂米鹽亂因得卒業又不至失職而去此義恩及於一已而非敢私謝者也抑又聞士伸於知已尚敢以一事浼聽仙源縣學賜田嵗租具在而田無所歸甚有可併之理閣下盛名雅望朝廷方取信誠能書盈尺之紙轉以上聞不傷公私不戾文法其勢宜必得此邦受賜又非特三十萬而已也峩峩大石深刻頌美者不在他門而作為聲詩者亦且不勝聽矣偶進記為謝又因以請惟執事實圖之上白祭酒書某聞江左辭格變永明體抉微倡始實自隱侯辨平頭上尾之差示切響浮聲之奧慷慨著論以謂靈均以來此祕未覩故後來人士爭宗仰之或擊節賞帶坻之句或援筆擬回文之銘于時有文章冠冕述作楷模之諺凛凛乎儒流盟主矣宜其自髙待遇特慎許可然而鑒奬後輩惟恐一士名譽不由已立也故見王筠則曰自諸賢零落玩好殆盡不意疲暮復遇盛德一見朱異則曰天下惟有文義碁書卿皆取去何獨不亷一見江革兄弟則曰御二龍於長塗騁逸驥于千里一見范岫則曰范公該博胡廣無以加也一見孔休源則虛已引接位之朝貴之上而與之商略文致觀顧歡秀才䇿則曰過江未有此作觀何思澄廬山詩則曰已所不逮觀劉協文心雕龍愛其文理每陳諸几席觀劉顯上朝詩稱其藻拔至寫諸齋壁雖劉之遴乳童曹景宗盩夫而片語寸長未嘗靳齒牙餘論也乃若談地理而詢崔慰祖議禮器而質劉士深寧以身受遺忘之譏而樂為二子延譽又其用心懇到者也其深閉固拒不少假借者特鍾嶸一人將嶸果無可稱録耶或嗜好酸醎人各異也雖然隱侯身為佐命功臣位處端右多士榮稿出其舌端而泯默寒蟬無所援引則雖有題品人物之長亦徒虛美而已故史家猶以無所薦逹少之恭惟閣下以名士識拔為朝廷巨公學期于見聖而不肯誦記傳注文貴于明道而不肯尋治聲韻度越隱侯百等矣承平恢儒逢掖競勸懷圖挾術者雲會學省而詔書屬以司成之任又非艱難時祭酒比也竊謂山林畎畝窮閻隘巷魚鹽板築弋獵負販與夫冗僚末位一藝可録而聲迹沉下未徹當塗之聽者皆閣下責也昔諸葛孔明髙卧南陽王景略習隱鄴都未有以愈人非徐庶徐統出力而逰揚之則亦秉耒之下農鬻畚之賤伎爾張茂先賦鷦鷯宋廣平賦梅花託意引類以自表見阮嗣宗蘇味道一見而器之故隱然名重于世卒為望人閭巷士欲自致于青雲之上非得先進巨人羽翼而雌黃之無以致也伏惟水鏡者動心焉若乃針邪説之膏肓振前言之木鐸使元豐成均之政令煟然勃興此自閣下所優為方將延脰擲耳而觀聽其效不復云云干冒崇重無任悚悸之至回施仲亷秀才書某啓盛暑特煩顧寵且書文編見教迫于行役未暇周覽已觀經史首篇貫穿典籍辨正謬誤皆衆儒所未到非鴻博好古之士孰能為之嘗鼎一臠知天下之味則二十篇之書皆名筆也唯中間論春秋趙穿弒其君吾子謂丘明移之趙盾遂罹喪明之報若爾則穿果自弒而盾不知也宣子雖傳載其美非一然此則不容不知髙貴鄉公之弒論者不肯以惡歸成濟而歸賈充又不肯歸賈充而歸典午故有但見其上之語由此言之南董立史法以戒萬世而孔子因之所以誅首惡也似不可輕議其它論易二典皆可以感發後學欽嘆不已序引宜得顯者以取重于世而僕非其人也既不敢承命并書復納幸亮之上前宰相書某七品冗吏抵罪竄逐得邑嵓壑間自安貧賤之分忽忽校吏考不敢數以竿牘塵記室退念幸蒙相公不以常輩知遇曩雖得罪于朝廷未得罪于名義今𨽻迹丹書低簮把板為折腰吏相公豈以屯厄遽移眄接之恩哉因飾固陋之辭敘悃誠自通願垂須臾之聽使畢其説某竊在昔名節之士操守素定事至物來以其素定者處之不計禍福利害而叛其所學也輕于蹈患害而重于隨時改度喔咿俯仰故能風節嶤然與霜日爭光伏讀舊史竦然慕之曩者誤沐過聽得備官使貴戚有沮撓教法者抗章繩之近習有猥見辟置者潔身去之此皆分義之常而相公廣坐談賞此其意豈以碌碌凡流見望哉提挽不已遂得厠列文昌顯曹常欲激昻奮拔稍自效見以報恩奬而未有路會相公暫解鈞軸遂邪説叢興中執法建議紛更上及僖祖殿室表裏影響合為一辭某非不知脂韋享厚福婞直賈竒禍獨念名教至重期待甚深不當選軟瘝厥官因援引古義謂不當罷奉常諸僚是之繼為奏議以上風憲不容相次斥逐直注醜地某得邑黟歙有湯鑊最沸之稱投身于兵戈殺越之鄉鬭智于牒訴紛紜之地心疲神竭與九死為鄰而處之甘如飴蜜者趍􅋵定也意相公未燭首末故詳布腹心此言朝聞夕填溝壑無復遺恨恭惟相公光輔聖政八年勳名德澤旁照華裔極天下金石竹帛不足銘功而頌美拔士數千百人置之顯列山陬水濵惟恐鑒采未至可謂無負于人士矣今兹懇謝機政頥神燕處薄海內外黃童白叟猶知歌狼跋九罭之詩引領以望而况門下士哉雖然名士之用舍世運繫之非人力也孔子曰天之未喪斯文也匡人其如豫何孟子曰天欲平治天下當今之世舍我其誰哉伏冀珍練眠食為天下自重答王齋長書某才智學問無足算録又方竄逐于朝宜人士擯而弗顧吾子獨惠然見存抵以書幅且引李白不願萬户侯願識韓荆州之語何嗜好趍尚與俗背也韓朝宗行事雖史篇漏逸而白推以為人物之權衡且踵門求見資以收名定價其非碌碌凡士審矣顧僕何足以擬之然有以知吾子好學求益之意深也昔之名儒巨公聞某所有賢士則汲汲求見未必不甚于士之求之故皇甫規喜見王符則曰徒見二千石不如一逢掖桓大司馬喜習鑿齒則曰三十年讀儒書不如一詣習主簿以吾子齒壯氣鋭敏于文詞稍自奮激則潛夫之篇魏晉之論不難及也此政鄙心所願交况逃空谷而喜足音之時乎承暫留縣學僕以職事當日夕繼見承音旨之日未艾也深竊自幸因敘以為謝答李解元書某自入境蒙人士以書見及者十數遣辭立意褒與過甚皆非僕所敢當至吾子書辭比擬大非其類周公孔子大聖人也如僕輩未免為鄉人豈可同年共世而語哉禮曰擬人必於其倫昔栁子厚牧栁州有杜溫甫者以書為贄亦有周孔之説子厚皇遽遜避至纍數百言夫子厚雖有附麗匪人之過然文章妙一世學問亦不碌碌且猶云爾况僕輩又逺子厚數千丈乎雖佩厚意然不敢領納吾子文辭婉縟固自愈人惟太不慎品藻此亦夏璜之微瑕也因載書為謝併以相曉與程嘉量秀才書數辱見臨猥示造述昨日復拜雅貺開編疾讀如逰玉圃於藍田之郊如聞咸池於洞庭之野􅋏耳驚目方咨美之不暇乃有師資之説何撝挹過乎栁子厚於韋中立猶遜避不敢當况吾子學識加中立數等而僕望子厚萬里乎雖然語有之矣學所入者淺體所安者深間習禮容不如式瞻儀度諷誦遺言不若親承音旨又曰望之儼然乃不言之益與田蘇逰忘其鄙心則夫求當世望士與之周旋乃吾子之善學苐僕非其人爾必欲規磨則書辭論子厚似太過子厚節操視退之雖父子然文章兄弟也子厚不敢以師表自處退之獨抗顔為人師既作師説以著傳道解惑之益又為進學解以誨諸生非其不同意者退之分教四門館則授業乃其職子厚方錮散地不呶呶召閙取怒爾古賢勝人處事自有次第吾子以為何如披讀有暇時過縣齋以既所欲言者與制置發運書初春氣和恭惟神相忠嘉台候萬福某碌碌郡寄實𨽻部封日託大庇寧不知德伏奉咨目委以經制羡緡均糴二萬斛具悉雅意施行則粟出於萬室違命則罪集於一身某豈不知自謀實以弊邑乃水國蛙黽之與同處東南嵗漕百五十萬斛而吳興獨無半菽之輸則土地不産米明矣去嵗雖僅得下熟而暴風為孽於垂實之時收數不能什六比郡荐飢舟楫運致者尾相銜也今在市之米殆可粒數而中下户己無鍾釡之積矣朝廷方復轉運之舊弊邑當輸米四萬餘斛日夜鞭笞科督殆將如額而民已病矣今米價正踴一斗將三百餘儻以百錢糴一斗何止倍蓰之償則必有流徙飢殍之困所以纍承公􅊾不敢從命又况執事元奏請止於平江常秀三郡均糴初無吳興之文則是執事已知吳興非産米之地矣今乃欲移嘉禾所賦於不腆弊邑瘠此以肥彼未燭所以也就使旋降朝旨比旨下恐亦已過時難輸矣伏望台照惠顧此方特寢前命豈惟某受賜實數千萬户戴不資之德謹専介布腹心干冒使威無任皇恐待罪之至答顔教授書衰羸不堪當世用尚得竊吏二千石之祿以糊其口私意吳興人士淵藪必有卓犖氣義之士握筆􅋵牘日相規磨使不干于罪戾而到官彌月閴然未有聞也忽得來示詳復纍千言析理敘事汪洋昭晰若五湖東傾不見涯涘固深服左右之工於文矣不知僕之不肖使有所建明以蘇民之急又竊服左右處心積慮之依于仁也昔王生嘗以言警龔遂而任延亦以禮感龍丘僕無似何以得此所條預買誠中時病近嵗縣官經用不足給直每後時又胥史賕私公行更復輕重上下其手使齊民重困矯革之急誠當如奉漏甕而沃焦釡然所陳四弊亦尚有可論者願他日更僕議之得暇時過郡齋不宣與胡學士書甘露僧至奉四月五日示問具審長夏向暑寓居僧㕓種學味道菽水孝養文履佳福乖隔十有一年中間家國之變可駭可痛可憂可唁衆多如髮皆蒙詳敘筆勢瀾翻既喜詞藻之日新交情鄭重又諳眷與之不替幸甚幸甚所寄刻漏銘典雅似陸佐公而𨽻法似劉寬碑普賢像記竒崛似栁子厚而安養三贊以辭逹意似玉局老人久矣不見斯作也雖自知岨峿疲暮之人窮口談譽不能增公銖髮之重顧夙嗜在此政自不能不擊節賞味爾百圍之木干霄蔽日必飽霜雪之摧抑風雨之震凌然後能回萬牛而中大厦古來賢聖類因流離竄逐勞筋苦志空乏拂亂然後能以名德垂世而傳後退之貶陽山投身于蛇虺蠱毒之地畫字于鳥言夷面之人後謫揭陽冒海氣蒸霧之毒有鱷魚颶風之憂可謂困窮矣終為一代名臣太史遷南逰江淮上會稽窺九疑泛沅湘北涉汶泗講業齊魯困厄鄱薛過梁鄭而歸登穹山峻谷之嶄絶目大川激流之奔注以佐其豪拔之氣而著書五十二萬餘言遂為史家之冠吾友頃者蒼梧之遷踰年始會恩往返萬里川陸艱險無不歷嵓壑瑰瑋無不觀前二説殆兩得之豈造物者有意降大任歟况復一二巨公軒輊而爼豆之公義既伸舊爵旋復而一蹙青雲指日可俟則前夢不足道也某晚塗薄祐第二子昨緣鎖廳預薦因逗留拱州與其姊及姊夫俱為金人所掠至今不知存亡初聞實不賴生日逺日忘偶留殘息屏居江壘會科調不堪命避地吳興依薄業以糊口今四年矣所居號寶溪連甍一大聚落日須租辦而十里有菁山隱庵林谷竒勝時以煙艇往來又里中屋廬雖屢遭灰燼而書籍偶無恙近者輦至數簏頗有遮眼之具長子立方繫官雲間欲歸未遂一一薦聞恐公念見及也往嘗以韻語敘懷寄澶淵不識見之否所令作普賢贊固願以筆舌結華藏之緣况事迹殊異如此敢不在念續當馳寄也公學識文詞逈出儕輩豈久間者行用矣千萬保衛以須
