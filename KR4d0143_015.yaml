body:
  text: 丹陽集卷十五宋葛勝仲撰行狀朝奉郎纍贈少師特諡清孝葛公行狀公諱書思字進叔姓葛氏其先嬴姓夏后封國於葛後因氏焉世籍廣陵唐天祐中有諱濤者避孫楊連兵之禍徙江隂家之其子容太宗時以髙年有德賜爵公士為公髙祖公士生祥髙蹈不仕娶焦氏是生惟甫纍贈開府儀同三司吏部尚書尚書娶吳氏封陳留郡太君生公之考曰密進士擢第卒官承議郎纍贈通議大夫公之母胡氏後母陳氏封安定潁陽二縣君以公升朝恩加贈建德懷仁二縣太君纍贈碩人公幼聰警不勤外傅八嵗賦詩出語已驚人既長刻意學問淹通六經尤深於易春秋他傳志無不周覽強記世父兵部尚書以學行為世儒所宗嘗讀其文語通議曰是子名第不足言後日且以文義顯已而莆陽蔡公襄丹陽邵公亢交口譽歎之頭角嶄然羣進士中矣三薦開封嘉祐八年王文公較試讀其所為孔子事道論大加激賞因擢置異等次舉為陳公襄蔣公之竒所知於數千人中以第三人薦之學者誦其文辭以為軌式熙寧中初以經義取士公中六年進士第調睦州建德縣主簿方是時通議公以清節髙尚退老於家抱道履德貶詘世味不迹城郭公夙以祿釡為急至是益堅請迎養之官而通議難之公勸請懇切屢獻詩什敘白華之意而通議憚行終弗許公意不自得謂曽子一日不肯離親豈能以五斗移素志公之知已方位要近所親與公厚者咸勸以仕進且謂就養左右孰若榮名顯親孝之大也通議亦數以此意譬曉公而志不可奪遂投劾侍養自爾居親側積十餘年不治田園不事遊覽専以供養為職凡通議公飲食寒暖之節衣食單復之宜藥劑增減之度皆未嘗以屬僮侍也疾雷甚雨中夜必興問起居平時家庭逆探其心志所向不敢少戾既絶祿廪兒妾濱于飢寒晏然不恤大臣有嘉公志行者表為泗州州學教授亦弗就也其後親年大耋法許擇官自便且免赴部又通議公命使從官確許偕行始乞監湖州新市鎮於是通議公滋倦于出遊矣特憐公孝誠懇到勉為裝行公得由前志色養夷懌油然不知關征之卑而鎮戍之陋也當是時衣冠推為父子之美處期年通議捐館公行服過禮柴毁加人雖身疾不御肴酒雖妻病不歷房閫雖盛暑不釋苴葈終制不變每號呼撫臆哀動行路既久如始喪者日誦大藏經以追冥福時公年稍髙在禮當不致毁又以寢苫病臂然終不肯解菜逺近皆服其篤行以為難能服竟不忍去家墓人或勸之仕公不應又纍年同升進士方穀為江隂令貽書勉之始出調開封府封丘縣主簿數行令事政有恩惠縣人德之移和州防禦推官知楚州漣水縣丞縣居淮海上遊方置軍壘號難治公能以政術佐其令縣以大治在勢者才之數諉公攝劇邑及平決旁郡滯訟皆以濟辦審克稱瀕海産鹽嵗輸他路不資時任漕計者欲穿支家渠以紓鹽艘泝淮之險及舟卒並緣為姦之患會同列首鼠持兩端因􅊾公經畫之公為巡視地勢荒度土功具言經久之利且條上其所以然主議者倚公為重渠成公私便之嵗潦視田能忤上官指悉蠲民租人以為賜也公恬於仕進不求薦達然一時牧守監司皆以公行純孝素著繇盡子職而致沉滯故人人爭欲出已門而薦牘交上秩滿廷見改宣德郎求間局還里中遂監常州酒大吏為有私而屬公骫正法者能力拒之雖逢怒弗顧也遷奉議郎徽廟即阼恩遷承議郎賜緋衣銀魚加武騎尉知婺州永康縣不赴就差監秀州鹽稅務課羡當進秩恥不自言序遷朝奉郎被命即歎曰吾在事之日淺然官得加其親賞得延其子冒國恩厚矣尚何求即解印綬請老公為人莊重寡欲淡于榮利遊京師足不迹貴人門故仕卒無所遇合連枉管庫人為矜惻而公安恬無悶曰吾知當職而已雖小物必親所居以安遇名軒自號虛子言遇無定遇而安有常安也居官智慮淵邃小心周慎性矜慈惻怛或盡嵗無所譴罰然至誠格物人不忍欺紿事以振舉所至稱長者去輒懷之為吏無銖髮過差其見得尤亷計日受奉雖半菽不妄取公田嵗入多推以豫民市物如將傷之每倍給其值清苦自刻不殖貨利尤物玩好一無所惑遇人之急賙之不計有無沒之日至橐無一金製衣以殮當世清之舉錯以義理自律不敢差跌於人無戚踈貴賤皆恂恂卑體下之燕居家庭無替墮之容與人尺牘雖薄遽字未嘗輒草也平生不妄語鄉人為不善者不畏法而畏公之知熙寧乙卯嵗大飢斗米數千錢人相食公發已廩以食飢人賴以全活者甚衆公於外行無不至而孝友尤出於天資從古人中求殆無以抗十一嵗遭建德憂衰毁如成人已知不茹葷矣事後母至孝能得其歡心通議沒追慕白首不衰時物未祭不先食寒燠之變必在視家廟嵗時蒸嘗如見其享平居兢兢以其嘗所告戒者自勉一言及之未嘗不涕泗也伯兄書元長一嵗父事之恩意始卒無間言公官漣水時兄為舒州望江縣令同𨽻淮南部使者及六路發運諸公有捨兄而薦公者輒移書遜避乞改薦兄不許則封􅊾還之人或笑其迂而公力行之其後公改秩而兄舉者不應格公曰吾獲寸進心無愧矣鞠三母之弟如一拊循視遇甚厚處叔季者自結髮教誘至於成人諸壻擇對引為已任卒皆得名士歸之多顯者孤甥嫠妹盡力周撫課諸子於學而不付以家事文辭義訓皆自指教崇寧三年幼子勝仲官學省聞公得謝取告迎侍公不得已至京師暇日多賦詩自適喜為巨篇強韻識者服其老而精強當時顔色滋澤步履輕健記問審諦無異壯者不幸冬十一月二十九日終于城南里第屬疾甚微神明不亂衆醫更視不問方藥顧告以死生常理瞑目無所係戀與諸子論説詩文雍容如常時親書先令戒以薄葬泊然而逝夀七十有三公篤信釋氏奉其戒律晨興香火持誦不輟自壯訖老言行忠信不欺於心故轉識甚異蓋信力所薰也訃聞薦紳若州里知識皆痛悼之生平著文離十卷辭理精詣夸誕浮躁之語一不關筆號安遇集三子纍遇大禮及三經擬封纍贈公官至少師贈正奉大夫訓詞有曰亷靖樂道悃愊無華養志就間久為親而辭祿引年謝事乃有子以克家贈光祿大夫訓詞有曰髙行清修奧學通贍潔亷守義共推靖退之風愷悌宜民衆賴寬平之政贈特進訓詞有曰葆醇履坦譽問素休鍾德之祥嗣有賢子踵侍從橐為時藎臣宣和六年本州官及進士錢詵等具列行實申常州乞備申朝廷依張舉徐積例特加賜諡以勸為善知常州劉光以聞尋蒙賜諡清孝制曰君子篤于行已不繫窮通之殊朝廷樂于旌賢固無存歿之間協稽羣議垂賁幽光故任朝奉郎賜緋魚袋致仕贈少保葛某奧學承家髙節映世亷靖樂道人默化於鄉閭豈弟近民政自孚於郡邑顧惟天稟之異卓有古人之難辭榮祿以養親逺追曽氏之義正弊衾而易簀何愧黔婁之清鍾其餘休克有賢子繼躋從列咸以儒稱邦典追榮已陟三孤之貴鄉閭紀實願垂一惠之稱爰錫美名用褒潛德松楸改色載承雨露之濡綸綍藏家永作雲來之勸緬惟靈識亦克顧歆可特賜諡清孝贈少師訓詞有曰經行自著藹然君子之風政事甚明亦髙循吏之舉不究於用以蓄厥休觀上訓褒稱如此則公之德可知矣娶侍其氏右正議大夫泳之女纍贈秦國夫人溫良賢孝實克嫓德先公十四年卒公以崇寧五年十一月已亥葬縣之青暘鄉郭莊之原子四人次仲試大司成兼修國史鄆王景王肅王府直講恤章贈正奉大夫纍贈少保儀仲鄉貢進士和仲右中奉大夫勝仲左正議大夫充顯謨閣待制孫男十八立隆右承議郎通判鎮江府立方右通直郎立悌左奉議郎宗正寺丞立中右迪功郎立教常州排岸立亷立象皆右丞事立經左朝奉郎直龍圖閣立柔右從事郎立民通仕郎曽孫邢舉進士郛郇皆登仕郎郯邰皆右承務郎郢登仕郎鄰右承務郎郁䣐習進士邸將仕郎餘尚幼謹撰世次行實為一通上于太史謹狀太中大夫大司成葛公行狀宣和三年正月庚子大司成葛公寢疾革詔飭太醫診治越翌日燕紫宸殿上小語左右訪安否以不祿聞上驚曰當是為庸醫所誤嗟悼久之特贈正奉大夫賻恤加常數敕本屬供葬費置官濟辦員外置州通判一員董之上其子若干人惟葛氏世序自晉雅川為散騎常侍居丹陽至公之六世祖自廣陵徙貫江隂故今為常州江隂人公諱次仲字亞卿曽大父惟甫贈吏部尚書大父密中慶歷進士第以承議郎得謝贈官至通議大夫父書思中熙寧進士第以朝奉郎得謝贈官今至開府儀同三司公父子以清德純孝顯名雖仕不遇合遺澤餘慶實燾厥後公與季弟舉進士聮中調泰州海陵縣尉移常州宜興縣丞未行除吉州州學教授遭父喪服除為國信條例所檢閲官進北道刋誤志會當改秩併遷奉議郎逢受寶恩進北使泛例遷承議朝奉郎除太府寺丞遷朝散郎提舉京西南路常平召見談治道纚纚可聽上品之謂曰使事不足以屬卿行召用矣至部未閲月果拜度支員外郎踰年遷户部逢幸省恩遷朝請郎公佐邦計歷左右曹周知經用出入盈縮之數及常平開闔斂散之本蠧弊根穴悉窒之預修續免役書百餘帙除辟雍司業是時朝廷尊榮中外無事上方鄉儒術而諸皇子齒寖長英敏絶異之姿聞天下既以次行冠禮出就外傅妙簡僚寀以調護之首以公兼嘉王侍講授經資善堂未幾建安文安二郡王出閣又兼講官轉朝奉大夫遷宗正少卿賜紫衣金魚進宗藩慶系録仙源積慶圖及預修玉牒轉朝散朝請二大夫其後安康濟陽廣平三王及鎮國公出閣皆以公為講官於是並領七府訓授矣政和八年春嘉王與天下貢士羣試集英文詞學識翹然出寒俊右唱名第一公入謝臚傳趣使前諭以教導有勞宜褒賞俄被批旨特轉行一官遂為朝議大夫上愈益欲諸王篤學問詔講官毋得兼他職除公直龍圗閣提點東太一宫專講事已而朝論謂不可妨公塗轍嵗中除中書舍人遷給事中直講如初先是有旨下中書後來皇子就學更不除他吏止以公兼領公意殊不敢當會嘉王進封鄆建安文安開國景肅相繼出居蕃衍宅因抗疏自列曰陛下過私小臣使待罪勸講今三王既即外第而安康諸王尚宅中禁非惟臣學淺薄困於好問且相距逺窮日之力不能周願專直蕃衍講席其他分命賢俊且使臣逃尸祿之譏不勝大願上不能已從之轉中奉大夫同修國史升翊善進哲宗寶訓遷中大夫加食邑三百戶爵丹陽縣男除大司成致仕遷太中大夫公侍王府閲七年説經無慮數十萬言凡典籍所載嘉言善行日陳數千條捃托殆盡至古人忠孝大節輒反覆言之間誦説詩文政事以資聞見之益諸王每質疑問事撰述輒就商榷求跋法書名畫甚衆府第章表並時亟索操筆立就各極其工宫中傳誦之公每進對上未嘗不稱贊諭之善與輔臣語亦謂公靖共持重得學官體一日在前上從容曰鄆王學甚進作大字尤佳乞就外第劄子乃親製可取視之因譽公公頓首遜謝在王府三被錫服兩推畀其弟駕幸蕃衍賚金帛甚腆諸王各屢揮翰寵之嗚呼盛矣惟天祚神聖並生天材以侈神明之胄而公以孤臣蒙擢序居職纍年出入禁闥遍遊邸第謹孚周慎不挂過差遂結聖知入侍帷幄可謂儒者之榮遇矣廬陵多士𨽻弟子籍常三千人公分教當興學之始以善誘著于人聽暨董宗子六學及二璧水皆以德義師表人士每較試無不厭衆心外制特不試而用在瑣闥論事鯁亮凡出命未允若除授不諧衆望皆封還之數相大禮若夏祭冬祀明堂耕籍受寶皆預執事至若廷試貢士奏告諸陵率皆在選中公操尚剛方議論慷慨常以輸忠報國為心處家庭篤孝友執二親之喪毁瘠踰制日誦藏經雍穆羣弟無間言自開府即世今十七年不異㸑于經術泛濫疏達非疾病未嘗一日去書不觀晚節尤信內典日課般若洎屬纊神爽不亂訃聞士大夫下至閭巷莫不痛惜之而諸王尤極嘆悼各致賻送以將其意文章典雅清麗成一家言遺藳三十卷少喜為詩自晉宋以來騷人所賦靡不記誦嘗為集句詩三卷盛行于時年五十九薨母侍其氏溫國夫人妻先令人冨春孫氏今令人范陽盧氏皆有賢操子六人立隆國子監書庫官立悌太常寺奉禮郎立亷承務郎立象通仕郎立會承事郎立民通仕郎女一人適宣教郎提舉京東路鹽香馮晉孫男女各一人諸孤卜某年月日葬公江隂縣屠墓村之原敢乞銘以傳不朽謹狀祭文祭慕容尚書文公素康強略無疾恙不期信宿遽以薨聞天子驚嗟曰喪良輔東塗咨嘆曰殞嘉賔凡百搢紳相與悼惜矧聨親好䀌傷如何惟公妙齡連擢科第致位侍從越十五年名節光明論議宏偉具載史牒且詔無窮友悌孝慈古今所罕年不配德咎將誰歸財無偏藏家徒四壁藐孤孀婦一飽無期輤車啓行痛貫心膂聊陳沃酹言不能文祭劉尚書文魂兮歸來汨徂南土越五期些忳惛而愁約魂一日而九升些怵惕不寐精摶摶而渙泄些殞命海浦不生反於土門些魂兮歸來南荒巳久留不可復止些下潦上霧炎海萬里些厭火之民猛火出其口些蛇山鱷水王虺騫些魂兮歸來無上天些一夫九首甘人而投之深淵些九閽杳深巫咸不可呌些魂兮歸來無下此幽都些土伯九屈逐人駓駓些北酆三府寒靈不可入些魂兮歸來入王畿些天恩洋普反禪栖些蕙宇藥房乃故居些閭童社叟來妥安些魂兮歸來反家庭些仲氏叔氏歸黃英而主祭些繩繩三息徒跣泣血護全匶些家人稚孺昔糊口四方今合歸於家些魂兮歸來公既有此內美重之以修能些畦留夷與揭車雜申椒些雖鬱邑而侘傺終令名之不磨些人生一世若大夢些禍福壽夭皆幽運之所繫些簀中牖下均一死些魂兮歸來跂足以俟些后皇神明揭天日些尺一屬下昭厚誣些丹筆之籍寬三宥些行有雨露洗沉寃些魂兮歸來歆此嘉旨些菰粱鼎臑和致芳些楚酪吳酸恣所嘗些公之仲婦我中女些大恩不報負公於幽明些繫官湖海阻循題而哀號些攬淚承睫聊寓哀以文些祭劉頒政文昔長此邦公來逆我道義周旋三改槐火惟政與文猥見許可時平訟清舒嘯而坐五亭携觴四水泛舸去職七年家國俱禍及再臨郡我往拜公公病卧閣華堂穹崇語及時事洟涕交胸衆製見抵文猶不窮盜起事拿闊于遊從十日不見遽罹鞠凶嗚呼哀哉惟公妙年詞藻英發文場掄魁經黌俊傑書扳鍾張才儷管葛謂當青冥闊步髙躡晚塗跋疐意殊不屑薦更州麾連持使節布政合宫著書省闥在公為窮在人為達晚祚一子天其乘除有孫繩繩且大公閭惟我固陋日困羽書食不遑暇阻送輤車遙致奠醊泣血漣如何以侑尊如玉生芻祭王修撰文三季以後士夫所養以顯為是趨營擾攘以巧為得噂沓匆罔喪已山崖得止銖兩朅朅我公介特骯髒志尚恬夷情塗坦蕩二十餘年州縣疲鞅聊不嬰意以道自廣上官薦之始被識賞天府事叢擢佐其長遊刃有餘弊訟無枉召對在前帝方虛想曰汝有子天才英爽中詔內務是職是掌淵謀嘉謨豫所寄仗能教之忠惟豫汝奬卿大鴻臚汝諧汝往父子要津紳紱所仰萬鍾百年謂當安享遽兹不淑善人誰倣訃音上聞帝為悵惘賻賵之厚詔發內帑右文密章有光泉壤孝子拜恩僕僕稽顙寒族通姻行實稱丈輤車遵路載瞻遺像一觴寄哀文諗親黨平江祭外祖父母墓文某薄祐不天未弱冠失所恃嵗朔流邁凱風寒泉之感未嘗輒忘也舉杯棬而阻飲撫奩鏡以興悲况其所自出其敢忘哉仰惟二尊德善在躬慶覃後裔是生仲舅為時名臣載誕淑女來嬪禰廟雖音容已邈而肸響如存某伏念生不及膺宅相之褒殁未能效立傳之報逺詣幽宫式瞻松檟因陳薄醊仰覬迪嘗祭外舅張朝散文元豐季年公墨諌紙攄忠論事慷慨竒偉可罷可行曰此曰彼逆鱗敢嬰懦者興起流離十霜以困自喜紹聖簡求擢官大理邇臣揚言秩中御史帝曰汝俞召升軒陛開陳纚纚朝綱國是帝用嘉之言傾其耳謂當施行徑躋華仕如何南箕寖成哆侈佐郡饒陽進尺退咫天不憗遺乃終於此惟公少時趣尚洵美浮念雜好如棄塵滓沉涵羣經該總百氏隂陽星厯醫卜方伎一物不知為身之恥蓄藏既多奮發無幾間關沒身命也天只昔我弱齡從親漣水公實竒之有譽無訿謂器萬乘謂駒千里恩勤綢繆乃妻以子出入門牆且踰一紀不我鄙愚數載撫視孰謂半塗遽失憑恃公之介婦又實女弟贄幣未行已隔生死丹旐有翻言旋歸止遣辭寄哀泣濡脯几尚想平生歆此嘉旨再祭外舅文嗚呼我公才非命值襟量宏逺如此而所享止于中壽器業浩博如此而所涖止于半刺位稍進矣而或困於左遷上欲用矣而中輟於浮議蓋事之不如意者常十之七八而學之稍得施者無百之三四豈志大者終落落以難合而才髙者亦嶢嶢而多忌不然何為進方寸而退已尺前既跋而后亦疐也耶雖然萬有俱空百年如寄善取名者必圖不腐之傳能徼福者必計不資之利公之名節方光於時論而子之仕進且都于顯位以彼此而乘除殆短長之不異然而感今悼往不能不嘐嘐以長號者徒以扳聨于親懿而已也嗚呼昔合好于二姓逮濡留于三嵗荷恩育之綢繆服胸懷之樂易悼從祿之﨑嶇遽興嗟于殄瘁㩦孥奠觴涕盈兩眥仰惟平生庶其歆醉祭張侍郎文獲從公遊四十餘年始研席之博約繼親好之聨綿仕自初筮而至禁從嵗自稚節而至華顛其間所更之世故蓋未易以言宣進退榮悴之變夷險利害之端有離有合有悲有歡而終始之不渝者荷恩意之拳拳去年春公罷廣魯我罷浙川相逢於濉水之上俱止棹而言旋約歸東阡與北陌欵㩦杖履於林泉豈期公遽卧於腹疾嬰二豎而災纒嗚呼哀哉惟公挺學識之精博企道德之高堅遍躋華貫為世名賢雖不究於大用而忠言峻節蓋貽萬世之傳我巳具載於幽刻兹固得以略言嗚呼哀哉公妹歸我已痛隔於黃泉我妹妻公乃遽奪其所天平生華屋孤幼滿前悼幻境之變化於余心獨何能無慨然迫逺日之告吉將就窆於新阡撫棺奠訣感涕流漣祭亡兄司成文我辜於天天不我喪罰其元昆闔門百口有如水木拔本塞源來諗遷陟書墨尚濕訃音在門變慶為弔心摧肝裂哀號呌閽憶赴臨汝兄出郊寺數載撫循寧知三日從容宴笑永隔九原人琴俱亡風流頓盡兹尚忍言先公盛德理宜有後烜赫衍繁兄實濟美修仁行義所聞必尊靖共厥位不肯噂沓封黨懷諼帝用嘉之擢紬史牒瑣闥詞垣詵詵天才付以調護聼其講論文陛進對三接奬詞玉色康溫謂當大用而躓中道孰究本元河通道達今啓藁殯歸駕輀軒追惟宦學我鞠我誨友愛特敦坐繫微祿小殮弗與初喪弗奔負罪至重遣辭寄哀聊侑一樽祭外姑夀安君文嗚呼夫人維三息女伯歸而亡季夭於處仲居幽閨弔影踽踽夫人慈之特慎所與惟時長漣猥見比數不媒不龜乃以嫁許自初親迎寓迹門廡濡留不歸再涉寒暑靡愛不加靡誠不吐薰然恩私指不可僂携提弱孫逮其絶乳衣食京師不我告窶浚橋之居益見拊傴自爾携孥適吳徂魯孰云契闊乃隔今古有酒盈觴尚其能舉祭亡嫂榮國太夫人盧氏文范陽之盧圭組舄奕夫人妙齡為兄繼室兄仕未顯家徒四壁幼稚滿前食衣罔給人以為憂乃獨弗戚撫循顧復鳲鳩均一爰逮中年兄仕顯榮紫微書命朱邸授經嶷嶷衆子簮笏滿門入覲禁闥冠緌寵旌人以為泰乃獨弗矜勱相夫子輯和宗姻爰暨於老益蕃戬穀疏封劇郡繼荒大國男女嫁娶母道既畢文褓㺯孫齋薰是力人謂當壽乃遽號復中外驚悼人百何贖某等每見嫂氏如兄之存今其薨逝茹痛黯魂且卜靈日祔兄九原輤車逺臨啓山之園聊陳薄醊尚其來歆祭施氏妹恭人文於穆令妹女憲睎兮蘭芬玉潔秀閫闈兮世父偏念遴所歸兮爰得卿傑賢足依兮幾三十年鳯凰飛兮亦既宦達家益肥兮雍睦姻戚譽莫譏兮屢封于朝象服輝兮子皆簪笏環頎頎兮身榮可願世亦希兮謂當益貴峻等威兮云何不弔殞病痱兮去年罷郡賦式微兮方諧燕笑事已非兮窆於新阡旒旐緋兮涕泣祖饋頥交揮兮
