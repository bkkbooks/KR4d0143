body:
  text: 丹陽集卷十一宋葛勝仲撰文汝州勸農文周以農事開國公劉七月之詩專言田萊之事當時井牧經界之制大備又設官分職以勸率之有遂大夫教其稼穡稽其功事有里宰治其稼穡趨其耕耨又有田畯者出入阡陌教民而聼則至誠以喜之於時風俗醇厚財用蕃殖黎民不飢不寒治功實跨二代今朝廷以郡守二若令為勸農之官且命乘春出郊勸課民事蓋倣古意也刺史承天子休命不敢惰則帥僚屬親蒞原野祗率厥職且籲告爾衆傳曰民生在勤勤則不匱以天子之尊極四海九州之奉猶且藉千畝之地躬三推之勤以先天下况為𨽻農者哉詩不云乎維莫之春亦又何求如何新畬今節届春莫農事急矣惟爾有衆念稼穡之艱難深其耕易其耨母鹵莽滅裂以自嗇其報則年穀登熟粒米狼戾仰以供賦輿次以養父母俯以畜妻子無不足者及收其贏餘以為凶荒之備生理足矣與夫偷頃刻之安以貽終嵗餓莩溝壑之憂者蓋相萬也古者田不耕者出屋粟垂緌五寸以罰惰游之士境內有惰農不敏刺史將酌古意而罰之各聽吾言無忽擬明節皇后奉上册寶前一日奉告太廟别廟德隆殿明節皇后本陵祝文維宣和三年嵗次辛丑某月朔孝曾孫嗣皇帝臣某伏維明節皇后奉上冊寶謹遣某官敢昭告於翼祖簡恭睿德皇帝伏以金臺想像玉冊圗徽昭懿範於中宸燕殊休於億載涓辰蕆事潔薦告䖍尚繫孚佑之純永胙鑒臨之賜初蒞任祀神文四首某罪大貶輕猶得為令實與有神均蒞此邑凡力所及者既自黽勉矣非力所及者惟神相之儻不瘝厥官其敢之神之命祀州縣之吏以事神保民為職然民之庶富必賴有神之陰隲則事神之謹尤所宜先某視職三日並走羣祀四郊不警五稼普收繄神相之使安厥位祗奉恩綸叩膺郡紱不學而入政未信而臨民大懼曠瘝以孤任使顧惟陰相實賴有神恪職之初承祭敢怠此邦之人肖神之像而祠事之者以神有功德於已也天子不愛爵寵以發揚潛懿復以徽稱榮其廟者以神有功德於民也長吏以尊君愛民為職不敢慢於神者以君之所尊崇民之所祈向也某於視事之始頓顙祠下唯是三者神其圖有以稱之天齊仁聖帝祀文禀聰哲徇齊之德制生育長養之功宅神岱宗隂隲寰宇爰有肖像此邦所欽視事之初特伸欵謁仰祈純佑克庇庶繁南郊赦後祝文三首命出朝廷恩流海縣哀矜庶獄既開釋於繫囚懷柔百神復吉蠲於命祀式陳芬潔仰翼迪嘗明禋吉土洽百禮於朝廷肆眚端闈秩羣祠於郡邑祗遵恩㫖肅舉祀儀仰翼迪嘗永垂孚佑蕆事郊丘既居歆於上帝疏恩郡國俾咸秩於郡祠肆練靈辰式陳嘉薦茂惟降格顯賜迪嘗祈晴文五首去嵗粒米不登民無庾釡之儲實賴牟麥以賙囏厄今既幪幪矣而淫雨害之惟神鑒之其忍安視乎躬率縣僚禱於祠下令或不足聽民不可不恤也長嬴之季新穀欲升天不祐嵗霖潦相仍田汙為池穟卧莫興𨽻農焦心憂苦嵗登烈烈神祠此邦所憑呼吸變化有號輒應反雨為暘豈曰不能吏或失職民則可矜菽粟既登滌場以待而淫雨不止載穫罔功刺史惟民事不可緩之義故雖視事始一日不敢以瀆神之遽而不以告也五穀順成且有年矣而淫雨害之人心惴惴焉惟神聰哲則宜知此窘急惟神仁恤則宜哀此困窮敢求十日之暘以濟一邦之命百穀普收庶幾嵗稔一雨連月更已心憂仰叩覺慈特申年祝敢祈開霽惠此羣生祈晴禱觀音文赤米驟貴民多菜色之虞赭衣橫行路有棄骸之戚獨期中熟得致小康天不靖民雨復害嵗吏實不德仰干隂陽之和民亦何辜俾罹饑饉之變惟補陀之淨聖嚴像設於此邦同水月之現形如谷音之答響仰叩神力特嚴道場願呵叱於雨師亟騰輝於日御儻䝉昭應誓永歸依謝晴文四首霖雨連月憂嵗荐饑並走羣望䝉應莫違泄雲褰剝晴日載暉願終其賜既報且祈欲暘而暘驟卷氛翳寬農之憂賴神之賜祀雖不腆禮則既至茂惟吾歆卒相嵗事隂雲解剝赫日麗天穀欲粃矣而欎為美稼嵗欲儉矣而轉為康年吏有求而昭答民無告而憫憐惟神賜此邦者甚渥敢不以牲酒而告䖍也間者淫雨彌月害於麥禾𨽻農焦然爭以病告惟二守以吉日辛亥既徼福於羣望幽靈昭通旋踵開霽今兹某既涖事矣職在劭農受賜惟一觴豆㫖豐敢忘禮報觀音廟謝晴文兼三十二化身最推殊應視二十五無學獨妙圎通垂金光手以接羣生逗海潮音而演勝法比緣霖潦恐害粢盛恭請睟容來臨法席潛通肸蠁遽獲晴暘農末由是慰心道俗驚為希有爰集官僚而膜拜廣延開士以香羞用薦微誠尚期卒相諸廟謝晴文二首連雨之後纍日霽晴推所從來實繇隂相吾邦之民咸曰刺史誠忱能動神如此神之惠慈能隱我民如此神之威靈能呼吸變化如此神歆其命祀而不曠其職如此則又相與歡曰粒米之菑者且出矣穀價之昻者且平矣菶菶於隴畝者且秀實矣倚叢薄而狐鳴者且戢矣刺史恭酌民言以為禮報雨暘欲時過則為沴神人雖異理有相求比以霖霪遍干靈響雲天炎赫感已拯於民窮水潦暵除冀無憂於嵗事益䖍歸仰曷罄報酬蔣山謝晴文近因積雨恭禱炎曦惟可恃於大慈果遄臻於休應黃雲刈畝麥不耗於已登翠浪翻田苖更欣於盛長報酬何有歸饗益䖍秋賽諸廟祝文維時正秋風日清亮百穀蕃熟五稼豐登繄神相之臻此富嵗報本反始明薦苾芬仰惟迪嘗益佑此土祈雪文二首臘止浹旬雪無膚寸深虞疵癘輒罄禱求仰冀念聞賜以優渥徂嵗欲單時雪未降大懼麥苗之槁且虞癘疫之興輒罄懇誠仰蘄命祀願迎三白之瑞以慰一方之民謝雪文三首月窮於紀嵗將歸兮雪無膚寸憂凶饑兮槃躃瀝懇干明威兮我窮左遷人所非兮有求於人輒輕違兮神獨降鑒從其祈兮嚴凝栗烈回氣機兮雲同霰集俄紛霏兮兩夕盈尺周封圻兮瀌瀌浮浮晴不晞兮坎坎伐鼓牲牷肥兮薦以悃誠神其依兮苦寒在候甘雪稍愆齊心禱求旋踵孚應祥生盈尺適當前臘之期潤及膴原知遂有秋之望式陳菲薦祗報神休惟單閼之元冥兮嵗冉冉其欲單日月窮而星回兮缺六霙之渙散憂兆衆之震愆兮心震悼而靡安走叢祠而敷袵兮紛陳詞而上干肅至誠之蠲潔兮扈江蘺而搴木蘭覡傳芭而告余兮神剡剡而揚靈也敕豐隆起同雲兮命青女與司寒也蹇勾芒之未立兮氣觱發而猶獵乍微霰之淅瀝兮俄瑶華之飄颯自浮浮而擁墀廡兮羌四封之普匝化驕陽之底鬱兮兆夢魚之豐年蹇余委瑣而坎壈兮世多仇而鮮合也衆不知余之修能兮獨荷靈之響答也揆靈辰而侈報兮即芷葺與藥房㪺湘吳之挂酒兮委余珮之琳琅鼓駭駭而中㑹兮靈連蜷而既留顧外心之匪報兮余又誓之以好修及年嵗之未晏兮擢蕙荃而自芳顔魯公祝文二首惟公以身徇義視死如歸英風峻節映照萬古初希烈矯據此邦雖忠逆殊途決不肯生公然穴地而不敢坑公於坎積薪而不敢投公於火養子拔刃爭進而顧以身麾之逡巡濡留至禍且及已始使人肆毒則仰公名德之重而欽畏之為何如也希烈豺狼蛇豕之性不利於公乃其判然猶知欽畏如此況士之生於數百嵗之後者哉況士之有知識而忠槩者哉某視職之初首修視謁以公行事告於邦人嵗時其敢乏神之祀公以危言峻節違忤柄臣國忠輔國元載楊炎盧杞之徒交相媢嫉相繼貶逐雖不能一日安於朝廷之上而生平名德暉映蓋亘萬世而不泯也某待罪二邦皆公廟食之地祗見貌像踧然改容其畏祗之誠何減公之於李憕盧奕哉
