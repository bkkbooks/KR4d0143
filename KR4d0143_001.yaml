body:
  text: 丹陽集卷一宋葛勝仲撰劄子進養士圖籍劄子臣竊以三代之盛班治顯設之方尤備於成周而周之隆教養作成之法獨推於文武文王之詩曰不顯亦臨無射亦保故其效至於多士以寧武王之詩曰豐水有芑武王豈不仕故其效至於無思不服雖聖人以神道設教其精神心術之妙不可推測意者殆將以作人籲俊為長久無窮之計非特用於一時以康庶事而已棫朴云周王夀考遐不作人下武云於萬斯年不遐有佐故子孫賴之而國以長楙嗚呼盛哉天佑斯文越𢾗千年而復生上聖應世覺民之迹若合符節惟皇帝陛下以徇齊淵懿之資履熙洽隆平之運聖學髙明道心昭徹燭見治本在崇化厲賢故自躬斷以來首議學政大開雍頖於以育衆才聨師儒而命之以賔興考勸之法革科舉循沿之陋升進之令類出於親製程試之文每塵於乙覽一嵗餼廪無慮𢾗百萬别為一司規畫均制不取於縣官而坐有餘資且命諸道各設常産以資永業行之十有餘年典法大備彬彬新美之才輩出而晏晏忠厚之俗已成雖詩歌文武之盛無以進焉既又命禮部以天下養士之額舍宇之𢾗費用之多寡田業之頃畝載之圖籍掌在有司臣等恭承詔㫖討論編次隨類編括克有成書取大觀二年嵗終為率既以逐州縣離為析數又以天下合為總𢾗凡二十有四路而中都兩學之費不與焉彼漢中世增弟子員三千人而唐太宗千一百區載之史牒已稱甚盛顧視今日何足道哉所有天下養士圖籍凡二十有五冊謹隨狀上進干冒宸扆無任戰悸屏營之至乞以學書上御府并藏辟雍劄子准大觀二年八月二十二日御筆禮部掌教養之事學之興內外協力今已就緒而養士之額舍宇之數費用之多寡田業之頃畝當職之圖籍掌在有司續准聖㫖就差禮部長二郎中編修并准聖㫖以大觀二年嵗終𢾗月供具本部即不曽乞置専局糜費廪給緣大觀四年罷縣學并州縣小學給食及裁减學費舊所取㑹却非的𢾗遂乞别㑹政和元年嵗終𢾗編纂未了間承去年五月十七日勑學校之令並依大觀三年四月以前指揮合依元指揮以大觀三年嵗終𢾗編纂今已成書總天下二十四路教養大小學生以人計之凡一十六萬七千六百二十二學舍以楹計之凡九萬五千二百九十八學錢以緡計之嵗所入凡三百五萬八千八百七十二所用凡二百六十七萬八千七百八十七學糧以斛計之嵗所入凡六十四萬二百九十一所用凡三十三萬七千九百四十四學田以頃計之凡一十萬五千九百九十房廊以楹計之凡一十五萬五千四百五十四既以逐州縣離為析𢾗又以天下合為總𢾗凡二十有五冊而中都兩學之𢾗不與焉恭惟陛下以有為之資灼見治本不愛𢾗百萬之費使𨽻學士之版者皆不家食所以加惠學者至深至厚又親灑宸翰製教養升進之法逮今一紀人材作成典法大備調度有餘盡由朝廷興學之初經畫永久之計嵗用不煩司農水衡而坐以贍足故其𢾗之盛如此蓋自虞帝兩庠文武東西辟雍以來未之有也顧視唐漢規模陋狹志氣蹇淺何足為盛時道臣等不勝大願伏乞以所編書依元詔書上于御府以其副藏辟雍并宣示史館使陛下甚盛德之舉詔億萬年垂示無極取進止辭免太子右諭德劄子臣伏覩御筆特除臣兼太子右諭德者螻蟻疏賤之臣濫膺聖擢循省恐悸不知所出竊以有周盛時妙簡賢智之臣以陪輔世子使日聞正言躬履正道如召公史佚之倫乃得為之下至導諭之官蓋亦未嘗不艱其選恭惟陛下盛德大業卓冠古初濬發明斷肇建儲位將以中春令日發冊路寢親御燕閒推擇僚寀而臣暗劣亦叩頭中選惟諭德之官委屬攸重非天下端士博聞有道術者豈稱拔舉伏念臣學識行誼無以加人雖屢塵科選薦被使令而瑣瑣碌碌訖無銖髮之效今又超躐使贊德春闈雖仰戴君父生成之恩而退自省量大懼上玷明公登選伏望聖慈特寢成命改授雋傑使朝廷無虛授之嫌微臣免幸進之誚豈勝大願重念臣官卑在法不當辭寵迫於私義不敢輒貪非據謹冒昧自列干瀆天聽臣無任隕越俟命之至辭免大司成劄子臣准東上閣門告報已降告命除臣試大司成者卑賤之臣驟膺親擢聞命震怖不知所為恭惟陛下大興庠序以興斯文聲教之逺外薄海表而成均辟雍之長實總中外學政非宿德名儒豈稱任使伏念臣孤愚一介經學淺薄徒知安分守義而行能器識無以逾人昨被選除再二國子夙夜黽勉覬有毫髮之效而訖未有聞方懼曠官以干罪戾敢謂天慈不遺微品特加因任就進從班雖曲澤所加在臣至為榮幸而公議可畏不敢輒冒非據之寵伏望睿明特行遷令追寢誤恩豈惟示名器之公亦以增學校之重所有告命臣未敢祗受干冒天威臣無任屏營俟命之至表賀皇帝元㑹御大慶殿表嵗統開端夙設九賔之㑹人正謹始還來四海之圗受福無疆惟皇作極中賀恭惟皇帝陛下推仁濟衆體道御時顯勳績則殆姚姒之所無闢土疆則皆漢唐之未復車惟同軌瑞必應圖築黃金之臺憂已消於北顧鏤白玉之牒禮方議於東巡屬三始之肇更宜百祥之交擁臣叨膺銅虎之寄阻望雲龍之廷稱萬嵗之觴莫陪飲柏率百獸之舞但切傾葵無任賀太上皇表聖謨獨斷神器傳歸綿宗社於無疆浹人神而胥慶恭惟道君皇帝陛下躋時嘉靖體道希微唐堯聞康衢之謡有熊喜大庭之館謂青宫之預建顧黃屋以何心爰降冊書俾嗣厯服巍巍蕩蕩難名不宰之功繼繼繩繩永享無為之樂臣出尸祠館阻造朝班無任賀孝慈淵聖皇帝登寶位表祗遵聖詔光紹皇圖厯數在躬華夷交戴中賀恭惟皇帝陛下睿哲天縱欽明日躋主鬯十年懋育震闈之德牧畿千里益宅寰宇之心駿命所歸神器允屬臣夙有厚幸蚤依末光奉匴以升實相阼階之冠建儲之始首叨潜府之僚方兹聖作之初阻預班朝之列無任賀今上皇帝登寶位表期安國步提億萬之全師遂享天心正九五之尊位黔黎有託社稷載安中賀竊以祖宗德澤在人國家鼎祚方永穹居叛渙神器震搖天純祐於我邦時篤生於真主恭惟皇帝陛下欽聰若古勇智在躬禀上聖之姿當中興之運慷慨奮發既宅四海之心委曲全安益驗三神之助欽承初載漙協歡心而臣久冒寵榮粗有知識體元居正既欣厯服之有歸戡亂定傾更識太平之可待無任賀冊元符太后表縟禮上儀肇舉宫闈之慶歡聲和氣鏘洋寰宇之傳家國同休人天咸喜中賀恭惟皇帝陛下慕武王之繼志同季歷之因心深惟寶祚之居臨實自先朝而弟及顧付託之恩無以報則友恭之義致其隆內則睦族而斯變於時雍外則繼猷而力回於國是矧翼室受遺之際賴椒房贊䇿之功屬憲府之建明委禮官而訂審肆頒孚號申進顯名懿範徽音益播管彤之美仁風孝治逺形華裔之瞻臣無任賀立皇后表帝度其心寅念人倫之本天作之合肆登邦媛之良化肇六宫歡騰萬宇中賀恭惟皇帝陛下唐虞明德夏子丕圖謂二南為王化之基而五教乃天叙之典爰諏榖旦大正長秋彤管垂休將輔戓於隂教慈闈致養見永嗣於徽音臣服職祠庭庇身藪澤欣聞椒掖之孚號阻造楓宸而奉觴無任代慰欽戓太皇后祔廟表寢園復土祗遵三月之期廟室寧神甫畢九虞之禮威靈燕預遐邇䀌傷恭惟皇帝陛下義極慎終孝深錫類篤叙乃父顧元豐宫掖之賢則友其兄念永泰母儀之重追崇特異躋祔有嚴雖紫庭永隔於音徽而清廟肅承於灌獻願寬惻怛少副瞻馳代慰欽聖太后祔廟表二首役回六遂悵復土於喬陵祭訖九虞肅躋神于清廟光靈肹蠁遐邇䀌傷恭以欽聖憲肅太后配德皇英軼功革摯决定大䇿援聖人于南面之尊退避寶圖復明辟於東朝之養欻上賓於仙闕俄升祔于祕宫恭惟皇帝陛下翼翼文心蒸蒸舜慕悼椒塗之長逝奉桑主以致䖍夢若平生時起悲於脂澤游於復道將永奉於衣冠願副瞻馳少寬悲惻徽音永閟徂運載周聖孝哀恫輿情藴結恭以欽聖太后道光周母聲掩虞嬪遭時危疑獨建大策躋民嘉靖遽復繁機豈徒修隂教於壼闈固已懋豐功於宗社流芳彤管將永播於億年脫迹紫庭欻甫更於朞嵗恭惟皇帝陛下堯仁因性舜慕以身疾方抱於嬛嬛孝日隆于業業願寬哀念式副禮經代慰欽慈太皇后祔廟表隆名懿冊追賁泉途縟禮盛儀祔升宗祏悲纒當寧感劇寰區恭以欽慈太后鍾慶髙閎流芳彤管夙效捫天之兆果臻夢日之祥正位東朝莫逮含飴之樂躋神太室空餘撫鏡之悲恭惟皇帝陛下政用湯中道隆舜孝昊天罔極願少抑於悲摧春露既濡將永親於灌獻徽宗皇帝顯肅皇后懿節皇后梓宫還闕表龍輴返國蜃紼戒塗儼七萃以護行森百靈而警侍照臨所逮哀慕攸同恭惟皇帝陛下舜孝日嚴堯仁天覆昨奉兩宫之諱躬服三年之喪目斷殯宫日動羮墻之念誠通宵夢每興奩鑑之悲由聖孝之感通致殊鄰之悔禍飭使旃而遐衛奉題腠以言旋粵惟中壼之喪亦見素輿之至列城沃酹行路涕洟匶易四重已極慎終之禮役興六遂行遵復土之期願少抑於哀恫庶永安於愛戴慰隆祐皇太后上仙表變起慈闈悲纒寰宇恭以大行隆祐皇太后慶鍾沙麓德懋管彤頃炎運之中微克保基圖之固暨逆臣之俶擾再扶宗社之安方南土之回鑾奄東朝之告祲恭惟皇帝陛下道光帝績孝篤母儀長樂問安極三牲而致養泰陵復土儼六遂以在行願寬罔極之哀式副有生之託慰懿節皇后上仙表椒風告䘲薤露興哀慟發六宫悲纒九土竊以大行皇后上天作合初載來嬪躬卷耳之憂勤服葛覃之節儉方專彤管之美遽陟白雲之鄉恭惟皇帝陛下治內而厚人倫追逺以基王化雖禕衣重翟永閟於中宫而匰主黼筵將祠于别廟願抑聖情之悲悼式副寰宇之瞻依代慰聖瑞太妃薨表柔儀長謝恤典致隆凡在幬臨伏深悲怛恭惟皇帝陛下化先治內禮極慎終自仁率親上動元豐之感因心則友更懷紹聖之傷追惟宫掖之賢曲軫宸闈之念哀榮特異升賁用光孚號大庭俾聫華於二后寧神寶剎將祔告於諸陵願少抑於恫傷庶永安於瞻戴賀正旦表二首年統載新禮重三朝之㑹陽功大凑氣滋萬寶之昌自天降康惟聖時克中賀恭惟皇帝陛下宅中圖大居正體元靈承帝以寅恭茂對時而化育方且錫符而有美蓋將嗣嵗於無窮齊七政於璣衡纒離攸叙受四方之圖籍蠻貊來同屬治象之載頒冝神休之滋至臣等叨恩服采籲衆造庭保合太和幸親逢於華旦緝熙純嘏期永佑於丕圖三朝肇祚之辰乾坤交泰萬國貢珍之㑹圖籍來同受福無疆惟聖時克中賀恭惟皇帝陛下御時以道敕命惟幾如日之升見文王之所以聖惟天為大同堯帝之無能名推餘緒而運化於陶鈞撫亨嘉而躋民於仁夀矢其文德絶域皆徠告厥成功珍符紹至惟繁禧之所介協嗣嵗以俱新厯受人時法頒治象惟皇作極大居正以體元與物皆昌首施仁而發政臣等䝉休盛旦代匱正司西陸發春喜迪泰元之吉南山薦夀仰祈時萬之祥天申節賀表衆非后何戴欣逢震夙之辰邦永孚于休適配長贏之月自天申命薄海均歡恭惟皇帝陛下亹亹文勤孶孶舜善亶聰明而紹前烈寶慈儉而懷永圖躬五載之焦勞已開興運介萬年之逸樂益擁殊祥臣限守虎符阻趨鵷列無任賀明堂大禮表大禮必簡誠對越於三神至仁無親澤均敷於萬㝢溥霑惠術交協歡心中賀竊以祭數則煩在竭誠而報本禮時為大必稱事以從宜尊天地以合祠陟祖宗而並侑意孚明察制備情文恭惟皇帝陛下德懋日躋政修時邁已即圓丘而毖祀未登陽館以宗祈甫臨三嵗之期遂度九筵之邃執瓉祼鬯遣宗英而嚴九廟之儀搢圭薦嘉被衮冕而極二儀之奉前期誕告先甲齊居列庶尹以駿奔亘百神而咸秩祝嘏告䖍於吉土輝胞俱被於湛恩臣早預從班晚分郡寄兼總條貫無因奉倪寬萬夀之觴宣布詔書尚能作王褒四子之頌天寧節賀表辰集木津實肇出寧之旦嵗臨單閼欣逢載震之期中外稱觴邇遐拱極恭惟皇帝陛下實天元子為世道君孝德著而九廟居歆祀事明而三神歡喜威能逺暢既收舊壤以來歸聖不自居方卻尊名而弗受福祥時萬憲度日新斗適次於房心夀必齊於箕翼臣逖違宸陛外剖郡符聽望嶽之三呼阻簉鵷鸞之列賡繼天之一曲第傾螻蟻之誠天寧節進銀絹表皇威逺暢坐收闢國之功夀節載臨遙祝後天之算共致藩方之貢交修庭實之儀山阜之珍織紝所出仰禆九賦少將臣子之恭䖍請萬年永保人天之慶天寧節進折銀錢表外撫侯封猥荷分符之寵前臨誕節聿修任土之恭祗率鍾官式遵幣貢塵三錢之府深慙不腆之儀稱萬夀之觴遙致無疆之祝進奉天寧節功德疏謝詔書表殊庭三祝䖍致悃誠細札十行誤膺褒詔齊心展誦舞手歡呼中謝恭惟皇帝陛下兆有作之聖神嗣無疆之厯服按六經而較德懾四裔而抗稜載遇誕辰實天人之交慶仰祈道䕃乃臣子之當然敢意慈憐申加慰藉永惟丕享之義誓罄不移之心賀燕樂表名與功偕肇建盛王之樂政由俗革遹新治世之音閲視燕朝頒傳寰宇既備乃奏永觀厥成竊以原樂之初聲相應故生變語形而上道可載而與俱厥惟聖明乃議述作禹取身而為度䕫制律以和聲雖諧鈞已格於三神而燕樂尚循於五季爰稽中正盡革哇淫增徴角之招而七律始全陳土石之器而八音初備有始翕從純之美無細抑大陵之傷蓋和聲既滌於姦聲則今樂遂同於古樂恭惟皇帝陛下道超器數治極盈成察和於清濁之間象事以始終之序曰惟嘉饗深厭溺音立度出均始逹神明之德登歌下管遂同天地之和順氣應之治道備矣臣等無裨政化猥預榮懷為韶九成聽鏗鏘而竊嘆大食三宥願保用於無窮賀日戴承氣表二首化牟乾運洪恩丕冒於邇遐祥開日華瑞氣並生於上下光騰羣目慶浹輿情竊以行中道以揚暉宗衆陽而循度旁出纓珥皆兆福祥見於戴者為國有喜之占名以承者示臣奉君之慶乃砥日之官程奏與說天之志協符陽春方中晷景正午韙兹並應實表多祥恭惟皇帝陛下盛德昭升至仁光被無思不服人文已應於豐亨將受厥明天瑞遂形於晉晝臣等具叨眷奬莫效燮調政察璿璣奚測彌綸之妙氣調玉燭徒深抃蹈之誠帝德誕孚仰格景炎之應天休滋至繼騰瑞氣之華殊祥相望於後先美證交輝于上下清臺雜候寰宇均歡竊以天惟隂隲而降監孔昭日乃陽宗而象類可考堯命四時之官而謹賔餞周以十輝之法而辨吉祥曰戴曰承曠千齡而莫睹乃神乃聖遂彌月而再瞻蓋一德新而又新則諸福至而復至賀日蝕不及分表官占前告知交數之當虧聖德上昭致蝕分之不及照臨所逮距躍惟均中賀竊以躔度相循實應大餘之𢾗隂陽有眚乃侵內壤之光惟精意之潛孚則沴氣之遽弭保章辨吉視祲觀祥有感必通蓋欽若寅賔之證方交俄吐示及遲蝕寡之符恭惟皇帝陛下道與豐亨德參離照雖運彌綸之妙用不忘寅畏之小心天且弗違人其皆仰臣等謬膺眷奬服在弼諧修六職以導和仰繄庇冒率四方而來賀但切歡呼賀日蝕隂雲不見表日當合朔前知薄蝕之期雲起崇朝潜護照臨之體坐銷沴氣溥洽歡心中賀竊以隂陽不免於交侵日月有時而同道蓋盈虛之定𢾗在分至以非災繄聖德之召和致天心之助順雲特瞻於游宇辰自應於集房恭惟皇帝陛下秉總泰元均調冲氣思其艱而制治正厥事以承休雖厯步日微莫逃常度而德孚陽感自隔妖氛臣等積在慈憐敷同慶賴抑隂用社既虛十輝之占籲衆造庭願上萬年之夀賀慶雲表氣襲一陽方誕膺於神貺雲舒五彩復昭示於天休登臺以書擊壤咸喜中賀竊以黃帝有華蓋之瑞因以紀官漢皇祀汾隂而歸嘗聞覆鼎載諸往牒已號殊祥矧當至日之漸長方即路朝而展采儼九賔而就列鏘六玉以導和紛郁呈祥輪囷曜色蕩紫霄之氛祲映黃道以昭回於稽盛德之符兹謂太平之應恭惟皇帝陛下欽聰稽古寅畏享天僕景命於無疆告成功於不宰克開厥事祕文兆見於堯天恭受于庭卿靄復光於舜日臣等備叨殊奬獲相上儀若烟非烟幸親瞻於瑞䕃既旦復旦願永播於賡歌賀收復湟州表爰整其旅起舊將以徂征克成厥功恢故疆而盡復捷音來上歡頌逺傳中賀竊惟湟水之封陲實邇橫山之走集地形控厄天聚富繁歸我版圖昔有招擕之效弛其檻緤誰為縱敵之謀屬聖武之紹興斡神機而獨運星文助順軍氣益張匪安匪舒遂有來鋪之效是致是附坐收無侮之功恭惟皇帝陛下遹求厥寧載用有嗣赫赫業業而天威逺憺蒸蒸皇皇而兵勢具嚴憬彼邈川故無勞於折箠蠢兹僞夏行亦見於消烽賀收復燕山府表取亂侮亡曽未施於三箭向風慕義遽求效於九州惸黎輸欵塞之誠渠帥有倒戈之請事光惇史慶溢綿區中賀惟幽薊之封疆本華夏之土宇粵從東晉始蹙版圖垂二百年擅數千里凡謀國之士議弗敢及致在天之聖志未克伸惡稔罪盈衆怨神怒冦戎越在草莾師衆日尋干戈仰怖德威如洪爐之燎毛髮蘄霑聖澤若大旱之望雲霓遂掃境以來庭同呌閽而請命恭惟皇帝陛下神武不殺睿智有臨救民水火之中玩敵股掌之上全付所覆仰承穹昊之休遹觀厥成大灑祖宗之憤舊壤再歸於中土經躔遂備於周星成兹不世之功盡出非常之斷臣叨膺郡紱阻獻夀觴撫鳴劒而馳伊吾徒深贊喜登泰山而建顯號行慶升中賀湟州芝草表青唐慕化籍疆土以咸歸朱草薦珍走驛郵而來獻凡依怙冒交劇歡呼竊以齊房之詩徒著九莖之異瀛洲所産第存三秀之名彼固推為盛時亦復號稱華觀蓋未有叢生千葉逺叩九閽截然新附之邦卓爾無前之瑞揚華菌蠢託質堅剛介夷貊以郵傳曠古今而創見此蓋伏遇皇帝陛下化由神運道與時行默調撫於五辰遂昭蘇於衆彚張咸池之樂以流於協氣定郟鄏之鼎以召於嘉祥因積人和且膺帝祉案諸圖牒共欣蔓蔓之形播以聲歌永配巍巍之治臣等生逢昭代獲覩上儀敢同來賀之四方共祝無疆之萬夀賀瑞石表二首臣某等言伏覩河東轉運司進瑞石一據待詔封士寧狀稱磨礪已凹尚見天正堯瑞字并御筆驗到詣實與元圭同宣示百官者告厥成功申錫久淪之至寶震于珍物是興前告之殊祥質雖玉石之殊意若節符之合中賀竊以禹砥濬川之績堯受延喜之圭雖孚尹尺二寸以標竒然湮沒三千年而莫覩天將授聖理欲斷疑爰出祕文以彰休應得自樊山之壤又為汾水之都究㸃畫則本于自然考符瑞則昔所未有披圖輝耀豈同鳳羽之成文結體瓌竒恍若龜書之再出屢磨礲而不泐將藏祕于無窮恭惟皇帝陛下仁以則天智惟稽古孝悌而致萬邦之協欽明而臻庶績之熙治既比隆福因緣類皆不求而自至蓋合異以為同臣等叨預近司親陪昌運地不愛其寶幸獲觀瞻邦永孚于休惟深呼舞圭呈元色將昭受于大庭右出祕文預協符于上瑞四方同賀百辟聳觀中賀竊以龍甲浮河伏羲因而畫八卦龜書出洛箕子所以演九疇厥惟自然之文每出大明之世不求而至獲于汾晉之都載考其繇欲正陶唐之瑞緘縢來上磨礪愈明究字畫則非筆墨之能工語休祥則實圖牒所未有闡神明之奧賾胙厯服之綿長道之將興國以長楙恭惟皇帝陛下則天覆燾如日照臨克明俊德而仁厚于惇宗不廢窮人而政修于無告巍巍之功既就赫赫之應遂昭臣等叨預近司預觀懿鑠何知帝力載賡野老之謡請夀聖人更類華封之祝賀水晶大花金碼瑙興發表天人精祲有感斯通山澤韞藏不求自至三邦程奏萬宇均歡竊以貴異物非聖哲之本心致大利乃帝王之盛節蓋仰膺於天祐必並顯於坤珍壤帶洛師發千年之水玉江連雍管粲萬鎰之精鏐顧惟寶石之英舊産大荒之逺乃於近甸併效殊祥恭惟皇帝陛下協諸福之休擅無倫之富政事修而錢流於地上年榖熟而粟腐於關中民各厚生地豈愛寶惟兹三幣並出一時掌在草人不假地圖之授藏之玉府永為邦賄之良臣等猥被眷求親陪熙泰治道備矣何施寅亮之功寶藏興焉幸預榮懷之慶進奉生擒睦賊渠魁馬謝詔書表師行左實旋掃逋誅貢效右牽蓋伸常禮顧煩神指曲降璽書誦讀知榮捧承失據中謝伏念臣守近服屬討凶渠方鞠旅於前茅曽乏先登之助暨致刑於獨栁徒將曲踊之誠弗悟溫言特光孤跡此蓋伏遇皇帝陛下宅師嘉靖基命漙將有此武功既宣威於暴亂矢其文德更加惠於臣鄰雖處外而亦臨俾增重於所涖道三二帝幸親遇於昌期文七六經永襲藏於蔀室謝收復燕雲進馬賜詔書表復境金臺師既殊於左次稱觴玉殿貢輒效於右牽敢意恩綸俯光衡字中謝恭惟皇帝陛下智勇天錫徇睿生知稽古則斷自唐堯以來治外則雜用采薇而下爰修羽干之舞同乎舜功之巍巍不遺蟣蝨之臣賜以周書之噩噩深惟榮遇實賁餘年願加拾襲之藏更殞百身之報
