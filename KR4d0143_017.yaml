body:
  text: 丹陽集卷十七宋葛勝仲撰五言古詩涉汝詩并序汝河在臨汝門外半里所余屢携客坐河橋上觀水石搏激為雷霆洶湧之聲然未泛舟也今嵗秋七月甲子連雨三月水暴漲數丈渺如湖海始招三舟携二子出泛以微熱不敢率去非昆仲歸作是詩居官行兩周出郭劣半里名稱臨汝守初未涉汝水今朝破巨浪萬頃寄一葦源從天息山此地乃其委青嵩正北踴紫邏復西峙兩岸千萬峯落影照清泚下瀨劇迅速舟輕如激矢周南滯留恨此假聊一洗悵無周旋人同載如郭李似聞汝隂湖揚塵清潁尾醉翁漾舟處無復碧染指嵗月供感概人事有遷徙兹水美洋洋正堪行樂耳再和涉汝詩呈去非伯仲清汝如荆溪不異我州里奔流相豗蹙敢謂衣帶水携賓泛漫汗畫鷁延緣葦出城散腰腳朱墨逃紛委却望城中塔烟林隱孤峙何人貌清景墨筆可就泚幽尋要關楗善飽未遺矢塵纓政堪濯凡髓亦可洗不須學東山韶顔載桃李顧當似白傅玉粒炊船尾膾縷斫鮮鱗遣客動食指風流得意事一官不願徙脫有戚戚時晤言消之耳送姪元延之官浮游五嶺南屐裙遍遷客寵以鼇冠詩獨步文章伯十年未得調浪有聲華白來寧未死叔知費幾馬䇿相携泛清汝壺酒映山碧肯嗣陳留風一笑飲為劇清途子初延我老欲投劾出處政參辰此歡寧易得俞居易俟兄弟並時為屬邑長示其父所藏東坡送行詩用其韻跋卷末吾州兩支邑伯季俱鳴琴清談一傾倒亹亹正始音文室賴芝蘭藥籠資桂參猥示晏楹書什襲緘藏深好事識雅趣揚美知孝心躋榮荷門基行矣勳業尋戊戌次福勝院錦溪足墟落髙陸推繁華豈惟邑屋富政自山水佳幽清背人境千柱梵王家巍巍二子亭雲表飛簷牙我生功名忤嵓壑為生涯山僧類祝田施薄求者奢乞書鳴剎疏無鵝惟潑茶一笑為涉筆勿笑蟠秋蛇比作青蘿山塔記并徐敏求墓銘皆䝉宏道為書作詩以謝文苑無飛聲碑板謬見赴結因時佞佛書美間諛墓從僚乞正書見許不嫌屢虞筋與柳骨濃纎皆合度浮海觀鴻戲抉石逄猊怒吾文敢言絶驥尾蠅所附它年翰墨場不朽知有助次長清寺迎賓一紅亭棟宇飛半嶺松筠引幽步以漸入佳境隂風起澗壑凛冽噤蛙黽歸雲擁僧裓飛溜入茶鼎搘笻薰風閣玉溪兩峯並中闕認牢山一㸃煙鬟整我來見所見賫恨在俄頃丘樊絶泥滓鍾鼎值機穽老逐黑衣居此心真炯炯至南陽却寄吳興諸僚震州推不去游食嵗月久尺一從天來換作秦頭守迎新無竹馬記舊已芻狗迂愚敢護前警發賴鞭後獨坐百花堂還憶百花酒原注南陽百花洲有百花堂而吳興上醖謂之百花酒與襄陽太守張亞仲顔幾泛漢江春波漲醱醅緑淨疑染黛神女昔江臯玩珠仍解珮沙光射目明浪影搖風碎樂哉今日逰放溜舞滂湃華觴挹空闊疊鼓助擊汰仰視白銅堤岑樓飛綵繪遊女憑危欄紛若五家隊真想謝窘拘意有千里快逺岸指煙藍飛流羅水磑尚想競渡時千船唱何在襄陽大悲院作善財叩補陀大千一彈指我行無神足重趼二百里中年逄百罹所缺但一死稽首聞薰王覬以俗障洗魚山彊讃述文汚梵書庋原注豫嘗為觀音讃文行於世自憐迷本聞云何見大士覺與所覺空根脫不用耳圓融聲度垣變現月映水臂目恆河沙如幻本一理以是見觀音文殊亦如是乾明院作我欲乞襄陽驅車峴山址文弔杜征南酒酹羊叔子披榛訪二碑事辭俱俊偉髙賢千載後遺魄猶登此一官推不去事故違願始不如造乾明山名亦相似交流千斛乳未減漢江水遐眺真不惡悲傷未燭理湮沒與垂名趨死皆一軌我與同逰人痛飲共擇㫖生前一杯重恨山無石髓預憂名不傳却笑鄒從事遊峴山山隨宇宙結千古真苒苒登臨足攬勝兹來余復忝山椒聳太華夷路謝躋險溶溶鴨頭水緑淨衣可染漁師網槎頭盡以紅鮮掩金刀鱠縷飛來佐華觴灔前修俱鬼録勳閥謾琬琰谷虛禽響答月皎煙華斂同登幸曠士形迹孰拘檢長嘯揖清流一洗鄒湛諂次韻葉夢得逰西余山秋霖喜新霽褁飯山中逰遙指大夫橋閒泛野人舟追隨得勝客雅趣同滄洲山路已清絶皓氣况蓐收亂石蹲狠羊蒼官聳髯虯古寺亦何有森森瀟灑侯忘懷一笑粲更以大白浮翰林廊廟姿席珍韞天球如何問三徑更復尋一丘升髙澀投足陟險眩回眸洞庭四萬頃旁占鐺腳州中有東西山千奴熟霜秋孤亭快寫望欲去更少休莵裘便可卜何必依先疇徘徊共懷古徂嵗真如流封侯昔此地顧余乃諸劉一朝失茅土窘急須人周雍門曲池嘆事往將何求雲木餘參錯烟嵓自深幽人生行樂耳慎勿曲如鈎柏悅堂宴集晚移望嶽亭德升有詩復次韻隂森美章園爽塏背塵陌紛紛辟疆家勝處此其伯登危覽幽竒寬敞蕩喧窄層層緑隂暗中有孤花拆三品玩伏虎兩部當鳴蟈主人延客眼清映壺觴碧茂宰工撥煩恢恢奏刀騞議郎兼語掾闔府畏局踳仇梅諸巨公燕笑歡一席蹇豫但空餐營職無半䇿文墨彊抽身林池同息跡金火爭伏見執熱如焚炙頗願百斛船浮浮兩頭拍嶽雲插晴空移尊及未夕清飈起四座肅肅生羽翮人生不謀歡帶眼計月瘠誰能較榮槁瑣尾論干澤相從飲文字一笑百憂釋歌呼到爾汝坐待霜月白歸軒踏清影光謝紗籠赫幽居夙興宴安毒于鴆嗜睡真成蛇攬衣待明發是味豈不佳天宇自澄穆羣囂肅無譁喔咿雞一鳴衆星猶撒沙皂莢頮頭目楊枝清齒牙爐中結願香淨几對名花澄懷覩道祕浮念無由邪缺伸起三昧雲錦升朝霞䝉莫伯鎔餉酒携即菁村元舉山莊賞菊坐客皆稱歎以詩二首謝野飲政自樂何庸拘束交窮居闕醇㫖逼此嵗欲凋冷仙歘照坐開嘗驚韻髙秋空映黃菊氣澄掃微霄携之夀佳客豈諱十里勞供釀者誰子頗疑人姓焦三杯反淳朴一盞破鬱陶酒材兼譜至我醉吟今朝迷塗不自覺坐見六秩交霜髮凛無幾况此日夜凋所寄在酒盞傾銀不辭髙澆我磊塊胸那復氣干霄手開赤泥封不辦呼孟勞乍紓愁腸回亦沃渴肺焦君甚似江州愧我非姓陶為僚且親串酌我非一朝謝洛師蔡尹靖餉酒叩門赤縣尹來餉青州酒砥貢上天閽餘瀝到衰朽開嘗正及卯醇㫖異失酉公不數瑶泉家還卑玉友我時苦無悰愁緒不論斗紛紛方寸亂飛絮起風栁呼兒共一尊盎盎純氣守豈惟詩膽大更覺魔軍走寄謝魏陽元頻望掃愁帚和韻答馬用宏毅朝散三吳汗漫逰彌月沐風雨歸來駭貧舍忽有金剛杵豈惟心疾失頓覺頭風愈句如氷壺清格類瓦棺古五言有奧境此段得箋詁吾衰久寂寂笑人憂鄧禹自貶豈不能趨競虞姍侮洞庭巖壑秀信美真吾土秋濤浮乾坤日月互吞吐中有七十山招提稱踵武歸命兩足尊一洗俗諦苦但喜經翻貝那知檄馳羽鐘魚走諸剎袵席詎安處洞天隔塵寰仙境一二數毛公金丹成拔宅已輕舉空餘朝斗壇遺址猶可覩法城有龍象今作西山主淨瓶逗真機松枝代揮麈示我第一義金箆破昏瞽清逰懷清標所恨隔笑語茅廬新塈塗戶牖木僅斧劇談佇公來相望十里許用宏見和復和一首荒雞號將晨不改風及雨髙賢兩投分定交從臼杵心期久彌堅膠漆比孰愈有初顧隙未賣友起中古五交有形狀孝標能訓詁邈哉彈冠契王陽知貢禹乘權獻巧妍失時輒輕侮管鮑貧時交此道棄如土孟嘗唾其面憤悶聊一吐翟公書其門薄夫常接武蹇豫不知量拔士偏寒苦見欺多校人核實失子羽歸來蓬蒿園弔影甘窮處知舊棄如遺那復見比數誰知荆州丞厚德能克舉任安窮不去平仲久更覩詩文連慰藉詞鋒設賓主剡藤快展讀如坐對談麈惜哉華國文乃以觀矇瞽舂容寫河漢寒窘笑三語才凡特爼豆德薄更藻斧玉巵實無當深恐纍稱許海昌從中散兄遊硤石東西山及讃山而别兄獨遊黃灣諸山寺寵寄三詩因追述前逰却寄相從十日歡預恐别淚滴重謀訪林壑庶復延晷刻好山塵一舍何惜蠟兩屐東湖浸坤軸浩蕩鵾鵬擊方舟穩睡餘帆已收硤石東山號紫微數殿聳金碧我祖鍊金膏井湫湛寒色飈輪已仙去千古留玉液當年善逝師福壤眼獨識上方子亭髙俯睨衆山脊空濛雲海寬想像人境隔夜投涵虛閣萬籟森已寂軟腳旋呼尊亦復兩顴赤黎明登西山岌嶪動人魄華榜揭靈池審公存故迹髙堂坐白衣巍巍妙智力道傍兩精舍聨步遍遊陟讃山特超峻四雙舊飛錫緑猗環髙竿蒼髯􅀈千尺吳越峯巒秀羅列在几席情賞未云厭六龍俄已昃轉溪遂分袂惻愴不能食還家得詩筒妙語粲珠璧具載黃灣遊恨不逐飛翼流光信駒隙薄宦只雞肋他年倦招尋畫圖追舊歷硤石寺聞繫豬明不能食夜聞刺豕聲哀號欲趨死黎明肉入饌念之難啓齒口腹我可賖性命彼所恃右軍惋烹鵝東家嗅供雉七月一日招道祖劇飲長卿已倦遊十年安澤國越鳥巢欲南鷓鴣飛懶北㑹豫亦蹭蹬從子寄岑寂有酒時相邀歡飲終未劇今當大火流似聞姊喪釋羽書靜追呼樂禁通考擊掃除北窗凉招速東床客暫勤車騎都來輟春秋癖白啖苦無賴紅顔因暫惜畦蔬擷菘韭園果剝梨棘金虀薦子鵝銀條膾𤣥鯽弓彎舞袖寬珠貫歌聲激景升陋三雅淳于能一石擬取醉轄投慵持詩燭刻浮生百年幻且盡一朝適莫待佐稽山對案空相憶諸人見和復次韻淵明事獨往謀酒不謀國引壺自酌罷髙卧幽窗北孤松供盤桓五柳伴幽寂時赴中道邀未覺體小劇八旬棄縣令欣若重負釋安石登冶城清談工剖擊竹林事遊燕百金費羣客絲竹聊寫情副此杯鐺癖嵗晚白雞夢頽齡天不惜二士俱好飲世運屬艱棘身今掃閒軒紅蕖䕃魴鯽逺挹環峯秀下臨湍水激得酒且盡歡何人夀金石不如更添燭夜漏淹晷刻醺酣便逃禪酩酊非閼適從教醉謬誤黎明不能憶次韻章壻道祖倧山居我本丘壑人負乘輒致冦歸來臥湖海夢斷三接晝尚餘憂國心帶眼日驚瘦騰裝居景山飄飄雲出岫門無長者轍相見誰肯就吾甥相國孫款我裹糧糗禪關有聖解已語則無咎兩庵同相攸卜鄰殆天授登盤無檳榔客居必見宥富貴應自知不詢唐舉夀病起二首春風散頑隂我亦除積痾客居有園林得暇輒一過殘梅雪尚積曲沼春已波儻或不近酒如此推遷何人生身後名孰得還孰失豈若一杯酒聊復得永日如何杜陵老感難百憂集不飲孰忘憂飲多或生疾惟其疾之憂已矣兩相直立方和韻復和一首屬疾大廢食始進一麥麻客至闕均禮呼兒辦瓜茶冷落乏勝事病苦將日加兒曹解人意為潑閩嶺芽山深生意足香味冠百嘉依稀仙掌露髣佛石橋花過盞謝新法失杯戒憎蛇甘我舌三寸澆我書五車餘瀝均學子少長各有差何須待鞠􅎽此段固已佳人生草頭露迅晷堪驚嗟適意貧亦樂鍾鼎來何賖今朝復何幸濯暑分流霞蘇息問蒼生欲泛牽牛槎錢氏通惠泉山翁徹骨清日飲一瓢水天公隱其窮殆將貽石髓先敕西神君一𣲖疏清泚初驚石罅出盈科來未已其瀦為淵潭其滙則沼沚酌比九隴泉餳味參差是一甌紫筍春牙頰留甘美餘波共濯纓濺沫邀洗耳山中有異事喜甚屐折齒長安昊天觀秦吳隔千里妄云脉絡通道人真疏矣寄語贊黃公未應停水遞謝興之餉魚肉二醬二首貧厨不舉火素拙沒與乾拾煤未為飢猶有食一簞拜嘉欣二醬顧尚闕晨餐快啖亂蒸肫那學武子奢瓶中乏儲米請粟望子華佳醢得新味羞豆應當加盎盎鵝兒酒風巵起微浪何以侑芳樽蓴羮調得醬彘肩與魚乙佳惠過臺餉黃雀釀披綿江鱘斫玉板對之無留觴固已號佳饌持此配藜羮更增貧士赧送同郡識上人逰圓覺問道慈受道人獨往韻半生服行衣專門施氏易編脫屢絶韋文詞粲藻火片語不救飢棄家學心法感歎悟昨非兩年飽三白屏棄甘與肥南行訪道師芒屩常輕飛側聞長者寺塔廟俱巍巍堂堂第一代龍天共瞻依騰裝來見語舍是將安歸勉㫋叩𤣥㫖心花發清輝東莊院此君如佳士得一不為少如何彌岡巒十里青未了泉源湛山椒紅亭藏縹眇奔流瀉萬丈穿林下縈繞居僧惜泉出少借作溪沼氷霜濺沫亂琴筑仙音杳水竹自莫逆獨厭逋客擾我亦願結交禪房寄深窈門前石盆潭奩鏡澄不撓寺後仙人壁崚嶒插雲表卜遊已經年此志幸不夭莵裘在何許清境吾將老中秋無月與伸仲飲書齊書呈伸仲我生不如意十事常七八窮巷屬中秋乃有長者轍相逄急呼酒坐待盛滿月那知天所閟不吐氷輪潔王孫神膚清與月真莫逆牛渚舫中人武昌樓上客千古明月句腹中無一闕我窮輒相纍昏燈照愁絶窗蕉響踈雨杯負琉璃滑豈無仍圓夜又恐間何濶呼童歌嗚嗚一笑助耳熱送伸仲歸漆塘以語及君臣際經書滿腹中為韻十首僑居始定交寄誠用縞紵命駕輕千里次亦推嵇吕衰俗日益偷此道棄如土如何五載間七返慰羇旅崢嶸聼崇論璀璨驚韻語江湖風浪髙愧子蛟龍苦家貧困百須祿廪不時給接淅不漬糠孤斟但飲濕長者車轍至園蔬親掇拾主禮不如意八九更論十牛心餉㑹稽猪肝售安邑兹事固么麼力亦不能及聚書三萬卷斷自典與墳籯金固已多是家那得貧平生謝雜好童習至白紛幽經與怪牒一一儲心君坐令說今古奮袖真如雲何當過藏室手披至宵分時時咀熊膽辛苦以佐勤君家髯御史百疏嬰龍鱗死喜作忠鬼生甘為旅人髙節渠無繼從子蓋其倫危言對便坐骯髒不顧身重道輕祿仕無寧常隱淪它年青史上牽聨書直臣潜山賦歸來卜築聊自憩巖壑發天藏桐竹如手藝寒泉西神𣲖那復問水遞割甘餉兒女伐木課童𨽻意行及趺坐宴然契真際誠從古人求三隱真可繼中年燈火讀閲遍汗簡青嵗晚得奧境領略在六經肯薰班馬馥要續丘軻燈只今未康濟斯人尚郊坰亂後等蓬轉風雨摧敝廬寄身菰城南誅茅縛幽居家山在何許清夢時一如南鳥每懷越北馬常嘶胡天狼今未落中原猶羽書歸歟不即賦此心耿朝晡一㕓肯相容卜室終桑榆失勢水投石得時山壓卵富貴親眷稠貧賤交情斷叔世澆薄中風誼如君罕生涯一舸風何門不堪款龍坂不著腳乃數訪幽散語離大匆匆寸心常不滿皎皎常易汚容容每多福為嫌狙賦三乃作龜藏六平生經綸手都在十圍腹似聞紗籠人盡力欲推轂柬之今已老鶴頭來要速頃年官黃岡清俸緣手空飽暖到惸獨吾寧守其窮朅來漆塘山𥝧稏收橫縱自言畏多纍不復愛畝鍾負郭鄙蘇子沉舟似龐翁絶勝南陽人辛苦耕隆中遺後但清德有子人中龍明日元舉赴召見别用前韻送行吾君急升平元凱登二八赤墀擁豪俊青雲啓塗轍巖居及川觀號召無虗月徴君筆瑞世制行圭玉潔向來端神羊不畏龍麟逆嶠南歸興動只作數旬客跡雖遁煙壑名常藹雲闕果膺尺一書赴隴催裝發遂恐長烏府席與羣工絶眷言國步艱敢憚泥塗滑牛刀剸繁劇鵬翅摩空濶相期扶中興何止得官熱丁已逰大雄寺有陳朝檜古殿藻井髙榱桷窮壯麗黃金四佛榜煌煌曼卿字廷中檜異狀封植天嘉嵗直幹龜鶴年樛枝龍蛇勢隂森歷九朝知閲幾興廢石根青銅柯孤髙方得地應笑凡草木俯仰見癯瘁緬懷陳季年三閣事瓌異後庭唱未闋已作墮井計獨此嵗寒姿與佛常閲世寄謝青牛宫勿輕大雄寺赭山承慶報慈禪院劉希範資政墳寺張參預為神道碑故人具雞黍相携登赭山松桂蔚回舍上已煙霄干隂風起天籟誤聼號驚湍新寺粲碧瓦突兀數十間君恩錫香火以報顧復艱亭亭無愧碑銀鈎墨初乾蓼莪避顧孝汝墳起周盤罔極疇不念致此良獨難彭城廊廟姿報國劔鋒寒末途禦魑魅鳶墮隔生還榮枯信反衍誰能保常安徘徊積慶堂老鼻一辛酸戊午出長興郭泛西溪至清果院朱藤花墮影罨畫因名溪林壑莽參錯鵜鴂挾春啼刺船未云久眼明古招提入門赤泥亭石梁亦可躋佛殿制淳古凌空飛拱枅凄其念陳祖此境嘗幽棲蝦灘弄竿線龍卧聊蟠泥一朝風雲㑹起舞隨荒雞興王豈細事荒陵出金犀賢愚同一丘莫厭青鞋胝戊午次吳山解空院乃端師子道場是日上已呈法中禪老尋幽勇鼓枻兹山初問津雲煙落吾手若水清潾潾蒼官舊千章類不赦斧斤以兹海藏湧突兀干蒼旻獨餘三大夫欹蓋皴龍鱗下閲往來輩蜉蝣不知春迎賓上人者貌古意甚真豈惟嗣老端勢到粲忍親陟巘既幽絶飛談復清新何庸浥寒波更祓元規塵已未次廣惠院下若水沄沄佛寺古邑西開帆但五里不到將噬臍懷古展清眺崇閣聊攀躋法生有鼻祖樂此山與溪自言孫子賢兹地興王基霸主受九錫二紀承梁齊空餘陽烏阜石人卧荒蹊緑滿天隨家嵓花伴幽棲留傳杞菊堂墨妙懸榱題秀色有他嶺招尋更杖藜山林且放誕邊城多鼓鼙次吳粹老觀我齊詩立我謹外揵逐物戒內熱樊然辨物我此意猶屑屑是身本虛空何者為六結雖慧念不起雖定照不滅無我與我所觀亦于何設右臂彈已化左肘柳方蘖願君進此道遺我自朗徹不見魯東家意與我俱絶
