body:
  text: 丹陽集卷二十四附録宋左宣奉大夫顯謨閣待制致仕贈特進諡文康葛公行狀曽祖惟甫故贈吏部尚書曽祖母吳氏贈陳留郡太君祖密故任承議郎致仕贈通議大夫祖母陳氏胡氏皆碩人父書思故任朝奉郎致仕贈少師諡清孝母侍其氏贈秦國夫人公諱勝仲字魯卿其先嬴姓夏后世封國於葛春秋時嘗見於經其後子孫因以為氏漢魏之世著籍廣陵唐天祐中有諱濤者避孫楊連兵之禍從江隂家焉其子㣑太宗時以髙年有德賜爵公士生詳隱居不仕於公為髙祖娶焦氏是生尚書至通議清孝皆以進士擢第通議早嵗歸休為鄉人所宗而清孝居官奉親清德孝行著聞既卒邑狀其事諗於州州聞於朝詔特賜諡清孝公幼警敏日誦書數千言九嵗能屬文初清孝篤志孝養未暇為公擇師一日公白清孝曰某人不足以為某師清孝駭問其故公徐於袖中出文藳清孝遽取視則語盡驚人而師所竄定皆非是乃笑而頷之遂為公易師清孝嘗與客論文偶有遺忘召公問之酬答如響一座嘆異自是賓朋㑹集必使公侍左右年十五而學成於經史無不精通年十六應開封舉中其選年十九丁內艱二十二再試開封為第四主文歐陽叔弼見其封建策愛歎之紹聖三年復預開封優選明年試南宫時再用經義取士知舉文節林公希謂公邃於經㫖乃擢置髙等遂登是嵗進士第朝廷方興律學公居學才閲月於法令貫通若素習試為第一國子監上其程文乞旌擢以勵衆元符二年調杭州右司理參軍杭為浙右都㑹民俗繁夥多鬭訟狴犴往往充斥而吏皆大姦宿贓舞文市獄無所顧忌公自以儒生且年少恐其易已乃痛繩以法而於鞫獄必委曲詳盡囚感公哀矜咸吐情無隱旬月間滯獄一空吏㿽畏憚不敢肆皇祐中有司理某者以院吏名次髙下立為定格每視役之劇易悉以序授任循用既久吏持必其上莫有懲勸事多不集公暇日取其格視之謂羣吏曰此非若衙規有成法不可動顧前官可為吾何為不可改索火焚棄不用衆皆譁公屹不變遂一以能否勤惰為升降而任劇易於是人人競奮事無不理府帥豐稷知公為一代偉人纍薦於朝事皆倚公而辦先是福州有士族不肖子因醉酒與其徒凡三人出郊偶見巨商行支徑隱關征者即詐為捕稅吏執之商窘甚以賂得釋已而病死其家乃以遇劫盜聞於官獲其二即抵法獨逸其一跡捕至杭得之繫州獄前官以其黨既伏誅謂是囚亦當死無疑鍛鍊成之獄具未决公至得其情曲折移牒福州請收商家詰問果辭窮自言實誣告遂直其寃衆皆服公之精明文節公赴召京師隂求天下竒士一見公謂曰君文詞經術宜為當今模範獄訟冗職奈何久居因薦試學官元符三年春公以詩書禮三經試於有司又試宏詞二科俱為第一特遷河中府知録參軍改登仕郎士林歆艷見其文以為不可及公之華問自是彌大矣建中靖國元年除兖州州學教授兖故先聖國師儒之任朝廷不輕畀以公有重名特命焉公居職㿽自勵日與生徒談經論文孜孜不倦人得所未聞心咸悅服鼓筍踵堂者輻輳至黌舍弗能容公乃移書部使者丐錢悉撤其舊擴而新之且豐其餼廩學校之盛遂冠一路崇寧二年始行三舍法於天下朝廷以太學首善之地故除授學官非第一流人不在選除公學正清孝喜謂公曰士積學非獨為已蓋將淑諸人汝其勉旃清孝自謝事髙卧未嘗出閭門公因力請迎養從之公官卑祿薄且處桂玉之地日營滫瀡之奉極其誠至崇寧三年八月以薦者遷文林郎是嵗天子幸太學公奏賦數千言時四方文儒之士上歌頌文章者以千計徽宗皇帝命中書省第其優劣公居其首十一月丁外艱執喪哀毀過制既舉大事貧甚無以贍其孥至全家食粥終喪未嘗飲酒茹葷居苫廬閲釋氏所謂大藏經者盡其卷帙大觀元年五月用幸學恩循承直郎差充提舉議歷所檢討官是冬天子祀南郊文武官通朝籍者例皆得封贈公以檢討在職若滿半嵗則於格當改奉議郎預計其日適在蕆事之後乃拜章乞減秩一等及大禮前授命朝廷嘉其孝特改通直郎由是恩霑泉壤鄉里榮之八月除知大宗正丞事檢討如故始朝廷以從臣提舉議歷所至是俾郭天信代之公深惡其人弗欲與共事謂之曰是局既易長則其屬義亦不可留堅請引退天信曰公譽望如此豈久為檢討官者茍能暫屈相從正字指日可得公曰富貴在天儒者但當顧義耳明日抗論於朝力丐罷天信聞之大怒公請不已併乞罷宗正職上喜其不可奪特許罷歷局搢紳稱其難能二年以皇帝受八寶恩轉奉議郎仍加武騎尉宗室仲瑈妄議學制公劾之上喜公能舉職特轉承議郎三月除祕書省校書郎五月遷尚書考功員外郎以親嫌改禮部貟外郎時方承平四方上符瑞者遝至公掌南宫箋奏或日草數牘曽無滯思時人服其敏而工三年六月磨勘轉朝奉郎八月以議廟制與時論不合責知歙州休寧縣歙地多巖嶮其民狠愎健訟嵗斷大辟以百計在江東號最難治而休寧尤甚故諺稱鑊湯滚處銓曹選注無願往者攝官嵗久弊滋甚㿽不可為公初至命吏於大辟中恣取其一且親决吏選久可疑者案牘數千紙俾兩人舁至欲因以困公公閲視不移晷呼獄吏曰於若干紙外亡去一節是必汝所匿吏駭汗失措度不可隱乃於其舍故牘中出之果皆中款情要吏叩頭曰囚罪本不至死某故當以死其所匿一節乃囚自白明甚懼令平反故匿之公引囚覆問皆合因釋囚而正吏罪一邑以為神明曽未踰月囹圄告虛公之始謫也衆皆謂公必不行既至又謂公必不事事及見公視職甚謹雖細務檢飭必親簿書錢穀悉井井有條次無絲忽不治然後歎公之才有餘而度量宏逺也每聽訟必先為民辨曲直已乃從容告以慈孝禮遜之節恂恂然猶父兄之詔子弟民多在庭中感泣願息所爭由是獷俗頓革鬭訟衰止暇日攜賓友登覽泉石吟咏酬唱略無遷謫之歎考課為江東第一外臺列薦諸朝政和元年磨勘轉朝散郎加雲騎尉三年復召為禮部員外郎以預議元圭轉朝請郎未幾遷吏部員外郎四年擢國子司業時興學久成均之士為文轉相模倣率一律公恐其漸入卑陋每考試必取卓然不羣者置之上列文格翕然大變士相慶以為得師質經叩疑者屨滿户外幾無食息之間其為當世推重如此朝廷命諸生習雅樂樂成上御崇政殿按試大悅學官皆增秩一列轉朝奉大夫七月以公在吏部編修大使臣名籍成轉朝散大夫九月遷太常少卿皇朝自建隆至治平初所行典禮歐陽文忠公嘗裒集刋定為書凡百篇號太常因革禮及是朝廷以公明習典章俾續其書公自治平迄政和四年用文忠公條目纂録為三百卷於是五十年間禮文之事粲然在目書成上覽而嘉之使與前書併藏太常焉五年初建太子府以公兼太子右諭德公每見太子未嘗不言治心修身之要且以仁孝學三言各著一論獻之勉之使進於是大䝉嘉納復採春秋戰國以來歷代太子善惡成敗之迹日進數事既久遂成一書號承華詔媺云九月磨勘轉朝請大夫六年七月移太府少卿時盛章以諂媚權貴驟用為開府尹勢傾中外忽遣其子并謂公曰外府左遷士論甚鬱某能為公即還舊物其許之乎公正色曰進退百官當自宰相某雖不佞顧安肯由他岐進以重速戻哉并歸以告章大慙遂與公為仇識者聞而韙之除國子祭酒七年遷大司成以前任司業訓導髙麗生有勞轉朝議大夫公慨然語家人曰吾自布衣致身侍從受國厚恩當圖報效前此位卑不敢越職論事今豈宜緘默乃數求對言天下治亂大計且陳時政得失雖歸削藁不以示人然貴要咸怒切齒公由是不能自安於朝矣俄落職提舉江州太平觀宣和元年朝廷明公非辜復右文殿修撰仍改宫觀作自陳繼除知汝州國初京西多曠土寶元康定間特輕其賦募民墾闢嵗久地無遺利而民㿽富饒政和初言利者始獻議增稅民已不能支其後宦官李彥為京西之民率盜占官地括其田而歸之官號西城新法由是破産者比屋有朝為豪姓而暮乞丐於市者公下車數月㑹彥至一境騷然苛暴肆行人多逃匿以避禍公見彥垂泣曰某任郡寄當為天子牧養斯民而坐視其離散如此深所不忍願公稍霽威嚴退而條具不當括者數千户請蠲之彥大怒曰是欲沮壞西城新法耶草奏劾公朝廷壯公敢為寢其奏不行自兹西城及貢奉之事専委通判而彥亦不復再至州境矣二年磨勘轉中奉大夫加丹陽縣開國男大河嵗修掃岸費稍草不資皆取辦旁郡而汝獨倍民大困不堪命公喟然嘆息上疏乞免且令民緩輸待命轉運使怒不及期符檄督迫日峻公奏免㿽急僚屬惶怖不知所為公慰撫之曰諸君苐勿書紙尾某當獨任其責頃之詔允積年重斂一朝而除民呌歡交賀家家畫公像嵗時率子孫環拜相語曰微葛公吾儕非餧死即流徙異鄉能復自保於此乎前太守常建言汝州崆峒山實黃帝問道之所宜築宫奉廣成子既得請則竭力以事土木工未究罷去及公至主觀道士出大言脅公促繼前役公叱之曰嵗饑民匱可困以不急乎即上疏乞須豐登有㫖特從公之內剛不畏彊禦多此類三年復顯謨閣待制四年四月磨勘轉中大夫七月轉太中大夫徙知湖州是行實過闕例得入覲時親黨當國將為燕山之舉公先以書遺之其略曰方今東南靖息西北歡盟相公之功業可謂大矣然天下無事則宰相安宰相生事則天下危願相公享宰相之安而無使天下危也省書不悅乃畫㫖令便道之任公之未至湖已聞有黠吏數輩持郡將短長肆為不法及視事數日盡得其姦贓流放之闔郡稱快燕山之役既興國用㿽屈乃科免夫錢於天下輸後期者俾以軍法從事民大驚懼時浙西連嵗水潦公持檄憂形於色顧其佐曰方兹艱食何堪重斂議減其半衆爭諫以為不可公曰茍利於民死非所憚卒奏減之前此浙冦方臘起青溪既破睦陷杭湖與杭接壤無賴輩乘時相劫掠州縣兵單弱弗能禁乃便宜使土豪捕擊有愚民無知因平昔纎芥遂誣其鄰以叛逆殺數人及事平鄰家訟寃有司推治連蔓不已因以求貨無辜逮繫者百餘家前二千石踰年不能决公究問則其首二三人皆瘐死久矣即日决遣之歡騰市里宣和六年移知鄧州公之在湖朱勔嘗求鸂鶒白雀之屬公拒之甚峻勔銜公入骨由是橫加媒蘖遂落職提舉江州太平觀七年加開國子靖康元年以淵聖皇帝即位覃恩轉通議大夫冬公寓平江敵人再攻東都圍甚堅四方音問莫通公憂悶殆廢寢食旋聞二帝北狩西嚮號慟白郡守曰公當帥師勤王又曰元帥在濟南以表勸進不可緩因呼左右索紙筆立草數百言俾守即遣官持詣元帥府詞㫖懇切讀者流涕及上即阼一時人士皆爭為攀附計而公未嘗一語及之建炎元年覃恩轉通奉大夫四年復集英殿修撰再知湖州自庚戌嵗敵人蹂江浙後盜賊蜂起破州縣殺官吏人情恟恟朝不謀夕公於是邦遺愛素著民見公復來歡迎蔽路㑹劇賊邵青大緝舟楫欲由江路入太湖窺伺湖州聲勢甚張公乃繕城郭搜卒乘作水戰艦數百艘以綵幟别其隊伍教之陳法日親閲試而加賞罰士皆精勇可用又命郊外團堡社明斥堠以堅防守民恃以不恐時髙彥張琦復相繼擁兵入安吉長興界公遣其屬李咸統兵與之力戰獲首級甚衆賊鋒既挫且聞有備一夕而遁邵青亦望風引去有頃孫誠於烏墩鎮殺傷官吏居民散走公亟遣單騎諭以禍福恩信賊徒乃相戒曰葛使君至誠吾儕聞之舊矣即投戈就降安吉頑民施四九見羣冦洊至郡境因起為盜旬日間嘯聚千衆鄰邦皆震恐公選將校之驍勇者俾統兵授以方略直搗其巢遂生擒誅之餘衆奔潰皆縱不問將吏請奏功曰捕盜守臣職也何功之有終不自言是嵗大饑米價翔貴一斛踰萬錢餓殍相枕藉公既發官廩又輸已穀數百斛遣官吏賑給右姓見公憂勞惻怛復爭出穀為助傍郡之飢者聞公荒政咸襁負而來至無以容乃自城邑及郊野命闢僧舍若亭驛以處之薪釡菅藉之屬無一不備䝉全活者不可勝計建炎初梁端守是州嘗獲謀叛軍人童照并其黨數十人被加職之褒告者張成沈賓皆命官人咸慕之至是復有將校告其營卒有謀叛語意公必樂聞而已因受上賞公夜半披衣集官吏訊治則營卒醉卧猶未醒公知其誣告笑曰吾豈肯殺無罪而利已乎遂録付獄果無迹狀因坐誣告者徙之旁郡有劉惇者自稱明節皇后弟官承宣使所至郡府皆接以禮盜請俸錢積數百萬公一見與之言覺其詐即加收治一問而服乃開封捕盜使臣也紹興元年六月轉左正議大夫冬復顯謨閣待制提舉亳州明道宫公在郡留心庶政事雖甚微亦不輕委其屬視其民如恐傷之有利立行有害立去邦人愛公如父母出境之日民挽車號泣祖送數十里不絶至今言及公猶以手加額頌歎不已五年加開國伯七年加開國侯九年磨勘轉左正奉大夫十三年加開國公食邑自三百户纍封至二千户實封一百户公官京師二十年遍歷華貫而在太學之日為多自學正以及長二皆天子親擢每嵗禮闈試貢士必使公預方是時羣試者幾萬人公考其文於數句中輒知其學之淺深是以多得天下竒士於書無所不讀一過目則終身不忘研窮經㫖雖通顯猶不輟祁寒隆暑手不廢卷議論常出諸儒意表學子得其說爭抄録藏去其誨人則必先德行而後詞章故諸生皆知自重而耻麗於罰每薦士必觀其器識而後剡奏其所推引位輔弼禁從臺閣者比比相望天下論知人必以公為稱首其為文汪洋雄健而復精深醇密衆製各自有體大抵悉極其妙所謂不煩繩削而自合者也於紀事尤不茍凡子之葬其親非得公文識墓則必歉然其為詩清麗有句法與賓客登臨宴賞即席援筆立成文不加㸃坐者莫不驚異嗟服公在孕時其母夫人夢鳯凰集於庭已而生公人知其為文字之祥及中兩科歸清孝公又夢歐陽文忠公授公以巨硯自兹公文益進遂以文章名海內夫豈偶然也哉公為人開蕩而樂易遇物盡誠勇於義若嗜欲不靳財費賙人之急惟恐不及從弟濟仲貧甚以郊恩官之先其子族女之孤不能自存者則為具奩橐選壻歸之江隂嵗租悉推以畀同産其仕於杭兖也得俸不敢輕用一毫菲衣糲食寸積銖纍以嫁二妹早年與長兄司成俱仕輦轂飲食燕遊須臾不暫捨宣和辛丑嵗司成不幸而公方守汝陽為位哭之盡期而撤復推已俸贍其孤晚與仲兄工部居故里公築堂山水佳處名以二老且日致珍異甘膬為奉探其志而先之其友悌蓋出於天性鄉閭慕而化之居官清慎所至必增市估之直敇家人非飲食日用之物不得輒市於民雖遊宦四方而不知其土地所産於竒器異物珍玩之具一無所好臨事敢為不畏禍患以白黑太分屢為權幸所中雖數齟齬處之恬然或問其故公曰吾道固當如是又何悔四為二千石綽有古循吏之風御僕妾亦以恩禮未嘗妄加鞭箠有不當意者以微言愧之而已自稱為湖州適時多艱疲於應接慨然有退休之志既遂奉祠之請乃築室寶溪之上山水環凑名人魁士杖策造門公為之賦詩飲酒樂而不厭客去則觀書著文優遊閒適凡十有四年與子孫講論文藝朝夕不置閨門之內弦誦相聞彬彬若庠序然有文集八十卷外集二十卷又取諸史考證異同發摘祕隱褒善貶惡皆古今名賢所未到者别成一書號考古通論合若干卷尤喜釋氏書謂與吾儒同道究其奧㫖每宴坐凝然終日或至夜分不寐易簀之夕數聞異香索水盥手合爪掌跏趺端坐久之乃北首右脅而卧薨於正寢合夫釋典所為如來涅槃相者享年七十有三時紹興十四年九月八日也初公屬疾命左右上章告老詔以左宣奉大夫致仕及遺表上詔又贈特進既捐館吳興之民雖居深山窮谷中聞者莫不泣下此豈有以彊之然哉蓋其感於中者深也公之夫人張氏金紫光祿大夫磐之女而禮部侍郎漴之妹有賢行先公二十年卒葬於江隂軍由里山之原諸孤以十五年九月壬申奉公之喪合葬焉明年太常考功以公之行治言於朝曰道德博聞曰文安樂撫民曰康宜賜諡文康詔從之於是人士益推為終始哀榮者嗚呼公之仕則遇昌時而位三品退則能自適而享夀考生則為大儒而見宗當世沒則有易名以發揚潛德亦可以無憾矣然人猶以為恨者以公之所藴者甚厚而所施者才一二也子六人長曰立方左朝奉郎行祕書省校書郎兼提舉祕書省編定書籍官兼吳王益王府教授兼權尚書考功員外郎登紹興八年進士科次曰立中右迪功郎提舉河北鹽香司幹辦公事嘗試開封為第五而立器立卓立豫立參皆早世女三人長適左朝請大夫主管台州崇道觀許暘前卒次適左承務郎監登聞鼓院劉封次適左奉議郎權通判紹興軍府事章倧孫男五人長曰郛右迪功郎臨安府於潛縣主簿次曰郯右承奉郎知建康府漂水縣丞次曰邵左承事郎新太平州州學教授紹興十八年中進士甲科次曰鄰右承奉郎臨安府鹽官縣丞後公三年卒次曰邲右承務郎孫女五人長適右修職郎監台州支鹽倉沈洵次適右迪功郎章湜次適左奉議郎主管台州崇道觀張本餘未嫁曽孫一人曽孫女三人惟公始為吳興倧時方冠拜公於稠人中一見䝉器遇遂歸以季女獲從公逰二十餘年故知公出處大節為最詳謹叙其事泣以授公子立方將求名世之士篤古而達於詞者表公之墓云壻左奉議郎權通判紹興軍府主管學事章倧狀故左宣奉大夫顯謨閣待制贈特進葛公諡議議曰先聖以文學政事析為二科惇史以藝文刑法各成一志以見才德充備兼而有之者為難故特進葛公經術政體兼而有之者也公自髫齔能自擇師通經業文嶄然有立未冠試有司以經義中髙第再試學官詞科俱為第一師表成均文體始變逮今粹然一出於正者實公啓之若續因革禮於曲臺著承華書於春坊皆稽古禮文治心修身之要兹邃於經術者能之試吏臨安鋒芒已露讞議刑辟則直死囚之寃欽擲欵牘則正姦吏之罪若乃立朝大節則見於敷陳時政歸必削藳力拒要人恥以幸進卻西城括田之役釋青溪株連之獄再臨吳興治如其初晚奉外祠忠不忘君主上龍飛嘗草勸進書以授郡將讀者感泣兹達於政體者能之謹按諡法道德博聞曰文安樂撫民曰康公以經學淵源致位通顯詞章一出傳寫成誦非道德博聞乎練達正經剛柔相濟所居有績去必見思非安樂撫民乎具兹二美宜有大名以傳不朽伏請諡曰文康謹議左承議郎行太常博士賜緋魚袋蔡宰撰故左宣奉大夫顯謨閣待制贈特進葛公諡文康覆議議曰文者貫道之器不通乎道而區區刻意於絺章繪句之間則遇事而失其所守臨民而不知所愛况於權豪患難相逢於得喪之地而能表見特立摧其長雄不汚寵利蓋亦鮮矣此後世博雅之士考儒林之全節而弔其不終未嘗不廢書而歎也故特進葛公詞場藝苑俱以文鳴學館儒宫號為師表訂曲臺之縟禮賦郊陛之多祥秀句竒辭間見層出髙文大冊追古耀今至於奉詔治民承流宣化摧姦汝水若張敞之治京兆遺愛吳興類朱邑之葬桐鄉俾前世謏聞曲學而素節靡然者亦可聞風少愧矣傳曰不侮鰥寡不畏彊禦公足以當之宜錫美名以為儒林之寵文康之諡僉以為宜請從初議謹議左朝請大夫監尚書六部門兼權尚書考功員外郎張頡撰
