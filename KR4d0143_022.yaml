body:
  text: 丹陽集卷二十二宋葛勝仲撰七言絶句讀史八首王嘉王嘉寃死有由緣峻節忠言照史篇最是一條堪恨處臨刑猶道孔光賢馬融為梁草奏枉忠臣李固夤緣遂殺身南郡何須施絳悵應無面目見時人陳蕃閹尹流凶遍海隅飛章露奏計誠疏黃門詔獄空忠鬼天下何因遂掃除鄧伯道賊掠家儲嵗阻饑將兒繫樹後無兒林回輕棄千金璧始信皇天是有知法真奬鑒人倫重法真親庭曽遺助求人牖間占察曽何補只得庸庸畨土臣王戎兒時黠慧豈尋常苦李徒教結道傍何事季年癡更甚為財鑽核長膏肓沈約革運稱梁出祕謀夀光不許范雲留赤章夜奏稱非已合向人間諡隱侯王維子昻文律唱唐家摩詰詩聲未易加場屋有誰深薦達坐令入彀賴琵琶泮水半璧清波勢自然鸞聲旗色想當年野芹不識興亡恨猶自牽風漾碧漣廟宅素王遺廟屋渠渠老檜隂濃耀碧虛無復升堂聞古樂尚傳開甕得丹書靈光故基蟠螭宛轉謾承楣東序西廂只廢基終與建章同圯壞浪言神力有支持望嶽亭迤邐羣山不識名天門日觀逺崢嶸地靈不見二宫迹聖作時聞萬嵗聲夀慶二丘巍巍寶甃聳青𡨕軒后開基向此生雲瑞已隨仙馭逺電光猶繞北樞明省習堂偶題格外官曹自在身闔門掃軌養天真何須更待年三十始約孤髙不詩人䝉文中縣丞以詩送苦笋走筆六首為謝豹皮羊角食無寃煩助先生苜蓿槃便敕佐饔淹苦酒春餘調筆要多酸張衡愁坐政煩寃下筯南烹照午槃老作禪癡多不肉每觀觳觫鼻辛酸爨無煙火歎厨貧嘉䔩䝉頒勝八珍苦口片時終雋永端如藥石盡規人茂林髠取未應貧政恐書材窘伯珍更請作橋通夜盜可憐辛苦涉溝人公圃荒凉此物無畦丁遣餉十餘枝他年京下憎羊酪莫忘溪亭㸃酒時碧潤那憂盛夏無駢頭聊取供齊枝辟疆園暗新蒼玉未害青柯貫四時四月八日䝉文中餉黑飯作詩二首紀謝熱際初經四月八磨香灌佛曉泉寒丞公忽致槃游飯兒輩驚看歡喜丸方歎流塵生范甑何圖香黍溢顔簞將軍尚未封侯貴推去那容學井丹比作黑飯新茶二首未䝉文中縣丞寵和走筆再賦以助一笑㸃漆飯䝉清淨供翻匙那敢配羊寒獨欣法味盈齊鉢尚欲詩辭看彈丸三歎屬厭閻沒腹十方皆滿淨名簞定中不敢逃禪飯卑景何因醉臉丹次韻張仲宗元幹絶糧五絶髙賢往往突不墨造化從來一小兒執㦸逐貧曾有賦柴桑乞食豈無詩二頃無田空好嵗四郊多壘已仍年遙知壁立書生舍只有溪藤與麝煙飄蓬聞說旅塗窮我有枯魚困轍中裹飯獨期來見客一杯當卜與君同冠玉何因常甕牖身名未泰少安之雀羅忽枉黃金彈驚怖還應震失匙中臺宏議裨初政學省雄文畏後生不悟宦逰成左計只今無米糝藜羮從仁叔求楷笏四首異種初從弟子栽東家宰木鬱泉臺誰知當日勤封植只作人間手板材好事頻求闕里堂文房裁斫已盈床講郎乞與非拋却已辦棼絲結紫囊橫斜文理秀斕斑分餉閒官尚獨慳凖擬遣人來檢料欲將拄頰望西山祗召行親尺五天書辭對命赤墀前人言此板多乖牾換試聊須覔褚淵陪亞仲逰習家池不攜妓偶作二首史君攜客習池頭不載連營女妓逰紅燭要須醉薌澤白雲何似老溫柔四序垂楊裊麴塵荆豪不見水粼粼何須倒載搖鞭問不是并州姓葛人少藴內翰示和朱氏新治澗泉之什依韻和兩絶桐川舊傳七里瀨洛宅仍誇八節灘樓聳橋橫墮波影未應能勝此山間北門學士居新卜南海使君家在中更有嬌雲兼健水吾邦從此冠玲瓏次韻叔才見貽二首舟隨風入亂山村流水桃花似武陵疊穎叢條煩寄語幸非逋客莫相憎紛紛寵辱不勞驚凛凛孤髙未易名聞有百錢供菜把下簾從此謝君平尋山檻泉依石古名馗細轉輕流有令姿不覺籃輿歸日暮坐憐清泚住多時山臺休言歌酒舊時好把酒髙歌今更新醉裏不知身是客寒城落日數行人鳳凰山泉石勝絶去城無幾里而前此未有知者偶因休吏與文中良器二士訪尋得瓌竒卓絶之觀於荆棘草莽間相顧大笑因崇基趾築亭榭疏泉甃池為登臨嘯詠之地九月二十五日游陟歸夜作小詩十首鳳凰山色鳯凰泉山下泉邊有隱仙同是荒榛埋沒久一朝題目萬人傳渾渾泉源㵼一溪碧漣方沼燭鬚睂便須牽率諸君賀却向山中得鳯池結宇南溪領老潛東亭復構半空簷書棋文義慚朱异獨向雲山號不廉暝靄昕霞景變移煙雲竹樹眇參差軟紅塵裏何因有遷謫江湖卻恨遲竹好祗生君子國松髙不受大夫名兩郎風韻都相似結作東南四友生濃淡峯巒低復髙林深依約見汀橋風流公子圖紈扇咫尺須論萬里遙鳯去丹山久不歸昔年曽此覽朝暉紫庭正帶黃紳望曷日重將九子飛從我登山未覺疏應將得失日乘除喜添桐葉千篇詠顧減茅堂一卷書隂森行盡古榕林别有幽竒路可尋漁舍傍溪人不見弄晴水鳥自浮沈消盡機心獨保真無情雲外合相親安心丈六竒礓石不是山間射虎人再賦十絶橫肱盤石俯清泉山澤臞儒似列仙泛水登山聊肆志著書萬卷果誰傳檻泉甘美勝梁溪來照泓澄得展睂盡道潺湲流不逺那知無路到天池子亭聊欲寄幽潛旋斸茅茨覆短簷北牖未妨施枕簟炎天坦腹卧飛廉雲峯遙看步慵移層碧三參更兩差天際餘霞似殘錦只堪收拾餉丘遲兩士端如蕭子顯求心已足不干名春朝秋夕風兼月辭藻居然嗜此生雲篷煙艇寄孤髙破浪乘風不礙橋豈待征夫問歸路始教輕漾日遙遙眺望雲巖每惜歸溶溶溪練照斜暉雙鳬容與還如我因戀滄洲更不飛清新十詠豈才疏俗韻蕪詞盡掃除佳句浪傳真可惜郊居齊壁莫輕書軟語相從喜道林碧流紫樹日幽尋是非那復談朝士懶作香方比麝沈蠟珠作鳯定非真真鳯惟梧與竹親鳯去臺空應不恨賦詩同有謫仙人走筆再和鳯凰山十韻酬良器解元兼呈文中宣德洞府桃花出泛泉只容劉阮見飛仙叢條疊穎嫌逋客好去人間莫浪傳不甘蒿藋蔽流溪混沌何妨一畫睂若遣周回插楊栁醴泉便是陸家池隱吏皆非謾誨潛夜燈花落廣文簷招尋月月攜連璧不用船中覔孝廉屈曲雲根屋旋移下窺鴛瓦碧參差不須欲速求儳路自地升天理合遲雲巘回環出逺青千層萬疊莫知名白茅峯獨如黃憲不見須臾鄙吝生催功下下與髙髙束火人歸閙小橋莫向九嵓生妄見須知采柏望中遙灘聲留客不容歸更盡西山一寸暉要看氷輪升紫磨繞枝寒鵲自驚飛秋殘景物更蕭疏愁寄憂埋盡破除埃壒是中無少分晝塵終恐誤君書聞有山房隱茂林髙人不與世相尋屋虛但有荒基在恐是宜僚遁陸沈結友忘懷契道真水雲情話似親親愛君葉落雲飛句知是才髙壓衆人送靈浩赴江州般若之請三首甚深真諦不容聲溢水爐峯照坐明悟般若人居般若鐘魚都是妙香城峴山峯頂五花堂曽見迷津賴法航霅水江流同一滴未妨作戲更隨場師今此去幾時回是法初無去與來一句但言無可得寶函封印不須開贈僧知先諸方行盡夙心諧澄碧歸來寄雅懷曽識禪那兩居士昭文齊主與髙齊庵僧善能求詩贈二絶句此生任運只騰騰聊作空山骨觀僧生死由來如幻夢道人因此識三乘一瓶一鉢早周游參遍雲門與趙州卷席歸家只趺坐了無一法可推求靈山紀逰慣穿蒼翠屬潺湲來伴髙僧半日閒鷲嶺談經元未散不應向此認靈山寄次顔叔時為蘇州庾官繞郭清蒿翠欲浮燕泉山水抱城流娃宫香徑終肥膩誰道蘇州勝汝州題龍興寺顔魯公祠二首幻界當年暫陸沈聊憑剪綵結知音清貧雖乏生前米飛裂還多死後金平原髙節映常山生死興亡本自天莫道排墻為鬼録請看裂鐵作形仙友卿病起二絶句相從天末慰羈愁屬疾書窗喜頓瘳休向友卿求竟論且從吳客話詩籌逺來著録寧非黠肯作長齊却是癡别久相懷應少廣朝來新得字如龜遊徑山藴常上人字無可以山中秋日十詩求和因次韻年大飄零馘已黃野麋難復厠鴛行山名一徑通天目便欲看雲老是鄉幽尋連日至如歸款聽清談木屑霏好乞一庵容一社只消枳落與松扉棘蓬禪老舌縱橫小閣談元夜氣清頓覺心空重及第信知兹理本無生五峯崷崒勢縈回國一當年手自開莫向蘭袍認遺像此心無去亦無來攀條葉脫驚徂嵗照影波清悵病顔好似蘭臺感秋客送歸臨水與登山嚴除賓館逺相迎挂壁殘缸夜自明卧聽秋聲鳴索索華鯨呼粥報參橫昻霄杉桂不知年風纛雲幢鎖暮煙狡獪老欽能縮地十洲移得别山川貞龍徙舍走風雲寒井猶餘舊漲痕老去文書但遮眼懶求寒淗洗眵昏擁書齊館水侵門當日靈芝秀一村碧落二卿今不見空餘喬木曉驚猿萬疊山深皓氣清泬㵳天宇鴈初橫真機已契偏中正世事聊將熟處生次韻劉無言燾山中五絶句敢請諸僚和之載酒陶春久不歸將花判斷定忘疲尋芳便作而今計莫待他年子滿枝命友登山共寄情亦逢佳處便班荆有時便取琴雙瑣寫出蒼髯夜半聲蕭閒谷飲更巖棲應笑癡人簿領迷萬頃青油行省舫懶黃輕拂栁條低川原紅緑逺交加春物關心夢到家體骨素輕惟燕子面皮最好是桃花榮槁如環浪自循一笻雙屐伴行春溪翁野老來爭席不識蓬山第一人逰真意亭得二絶句示良器相攜取意踏郊墟松拂芒鞋畢景俱灑落持君比佳竹幽人一日不堪無清波澄徹復縈紆照影湘纓得自娛寄語溪光容笑傲人愚那敢便相愚嘲淵眀粟貯瓶中能幾何頭巾漉酒苦無多雖然清操標千古試問還曽醉飽麼中庭雙柏羞為趙瑩婆娑樹懶作䖍徊旌節花獨立凛然霜雪裏惟將直節勸無邪約特進河東相公元樞河南相公遊菁山觀梅用前韻重賦五絶獨抱幽真嵗月長不甘取次為人芳紫樞黃闥垂青眼宿蘂橫枝特地香嚼蘂攀條趂日華懸憂面旋逐風斜若非鼻觀通清馥應道漫天無蒂花蔽谷連山萬樹多吳天今日驟晴和氷肌玉骨知誰似只向尊前許兩娥原注河東相公是日出二姬為愛寒英暫去家不辭溪路渺津涯山村盛事人應說第一人觀第一花春醪香㫖約同嘗玉雪花多獨此疆敢請對花同爛醉擬將酒債典衣償以梅花餉富季申直柔樞密有詩三首謝次其韻數枝幽艷逼人清望臘先馳淡日程往近樞光增嫵媚絶勝寒影照溪明姑射肌膚獨占清東南萬樹數烏程原注菁林𨽻烏程便須挈榼連宵賞要看瓊蕤伴月明葛山庵畔野梅清風便猶須半日程聞說數枝來几席何妨先賞到黎明次韻胡汝明舜陟梅花下小飲三首林間縞袂綴瑤英月裏輕盈畫不成拂石坐來花一眼神膚從此喜雙清南枝連夜犯寒開好事誰曽步屧來上客固知心匪石為花燒燭耻瓶罍輕隂池館潤無塵骨醉簮花任笑人先向孤芳一傾倒明朝更浥上都春汝明以詩謝餉菊次韻二首千本黃花嫩色深恍疑春色變家林禪翁護戒新停酒小宴無因費百金和氣凝陽更遞通露根移得自蠶叢分明般若圎明相誤落柴桑酒盞中二聖圗書宸章端與三墳並奎畫全將六義該湖海小臣如草木豈知雲漢有昭回夢良以書獻吉夢戲作二絶山林臯壤樂無厭况是寒灰豈復炎蹇足上天無是理固應此夢不須占枕中佳兆逺相誇未敢憑虛便拜嘉老去定心如止水不隨閒夢入人家書懷二首寂寂蓬門雀可羅不妨休影養天和詣人三十已當止年事那堪更倍過樗散知非濟世賢一官明道又踰年真人上界官都足甘向塵寰作散仙雪意暗淡同雲撥不開嵗陽云暮迫星回寄言大造洪濛裏速致青腰滕六來雪朔風一夕結層隂竒貨居來更易尋器異山濤仍玉璞坐無王衍亦瑤林雪中有懷舊逰次友人韻昔泛秦淮一舸飛角聲吹動塞雲悲如今獨聽寒忩雪憶殺梅花舊日詩陪樞密富公逰霅川即事呈三首飛樓百尺面巑岏萬頃溪光帶郭寒宵寐正求良弼夢雲山聊得暫時看龍庭一紀袖攜香磊落功名竹帛光敢請東周重復古肯同歌鳳接輿狂杖藜登覽更簮蒿莫學騷人獨餔糟奕世當傳張皓印三公行佩吕䖍刀疊前韻三首菁村小隱卜巑岏盟在前峯詎肯寒却把青鞋踏城市赤欄山色帶慙看某自菁山起赴州治青蘋風起遞秋香翠蓋紅粧襯水光暇日躋攀莫辭數人生百嵗似風狂晚凉湯餅㸃青蒿蔔瓠分甘笑楚糟好摘江蘺充雜佩不須嵗晚夢三刀甬橋道中雨跳濁水千漚亂風過橋林萬弩齊頃刻甬橋斜景在市人來去兩虹霓七夕朱閣瓊宫耀紫房翠翹下墮慰愁腸天中感遇非塵世不念癡牛念郭郎郭翰次韻德升七夕二首盈盈一水截長空烏雀橋成得暫通逗曉歸來裝萬恨舊機牢落響寒風霓旌鸞扇去央央雲路輕車駕七香靈㑹此宵才瞬息經年何苦夜偏長次韻德升頤軒詩五首晴碾春龍鬪小忩飲慳難遣睡魔降翩然夢繞滄洲去白馬波寒槳一雙轆轤聲到讀書帷草解招凉暑氣遲淨掃竹軒人不到戍樓哀角又空吹造物機緘屬小兒懶從寒燠究端倪緑隂晝寂孤花淨猶有黃鸝恰恰啼金鑾賜第新搴桂鐡幕官期未及瓜隱几蒲團無一事五車關眼未昏花外物年來論已齊眼看人事浪推移禨祥白犢何勞問寵辱黃粱共一炊次韻德升惠新茶寵餉頭綱北焙茶分甘應自五侯家午雞驚破槐安夢猶有新香在齒牙雙疊紅囊貯揀芽旋將活火試瑤花半生未有陽侯厄喜聽咿啞轉井車新茶當日火攻應有法此時水厄定無餘閒軒七碗宜頻試九隴清泉勝具區烹茶俗耳未容聽滴瀝水瓶聊遣挹泓澄晴軒小酌煎新茗紗帽籠頭似管寧鰣魚貫以栁條仍撥刺芼之筠笋佐鮮肥他年京洛憎凡饌莫忘河亭染指時烹笋味佳端可供羮梜韻勝尤宜薦酒螺自笑癡人叨口腹不求新竹透林多友人惠芍藥并青梅一枝偶成三絶窺園記我分名卉大似梁園重錦紅自愧江淹才已盡卻須還與主人翁芳叢的皪長明檻不似餘花頃刻春始信有常能耐久何須逐巧鬭尖新香雪一林初著子和枝分餉不吾慳含酸但止文園渴青瑣無人蹙逺山以糟水灌芍藥戲題年年國艷賞敷腴酩酊供人就燕胥此段固應先骨醉餔糟聊學楚三閭金邊山畔汁偏美玉井峯頭船最多未敢磨刀供大嚼却愁藏扎有修羅山谷以寒巖子詩十二首作藁書詞筆俱絶裴繼之出示求跋因題絶句百篇詩已露𤣥關欲免驚愚理亦難招得使君來帳下不應饒舌坐豐干跋子猷訪戴圖玉屑金波各眼塵如何牽役不知勤往來擾擾天機亂那似端居對此君跋陶淵明歸去來圖小邑絃歌始數旬迷塗才覺便歸身欲從典午完髙節聊與無懷作外臣吳道子畫鬼莫將幽顯較精粗人鬼從來理不殊磊砢拿雲傳怪狀論師天眼識工夫跋李伯時畫李元通隨虎圖三首華嚴寶軸掛於菟笑問翻經有地無引下福山三十里不應老馬獨知塗清樾寒潭土作宫楊枝柏葉五年中論成永作將來眼第一功歸大小空素幅工傳長者真龍眠端恐是前身只留散帶經行影不貌供齊兩玉人跋黃魯直畫江南黃䳺飛滿野徐熙畫此何為者百年幅紙無所直公每玩之常在把原注玉篇䳺鶉也說文䳺鶉奄也一曰牟母一曰鴑吕氏春秋注田鼠化鴽幽州謂之䳺畫竹二首萬箇霜筠保嵗寒風枝輕戛玉琅玕何人重作翩翩賦寫出髙標與諦看眼到竹邊知未是竹來眼裏亦全非諸人問我真如意不到山前帶笠歸
