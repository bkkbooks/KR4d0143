body:
  text: 丹陽集巻二十一宋葛勝仲撰七言律詩去南陽有日書懐二首奠食無勞合退休君恩誤付百花洲未温坐席已當去偶帶泥封得少留官意正如彊弩末歸心先問大刀頭畧無㳙滴蘇民隠空使閭閻説舊侯離吳州好冠西畿左竹纔交賦式微雲巘遐觀空杳靄春郊細履負芳菲薄逰頗似桑三宿重到誰驚栁十圍諾畫諸僚皆府望不容坐嘯久焉依郡齋書懐暫擺塵勞坐燕居野人偏與世情疎馬牛價雜慵鈎距鳬鶩行多厭簿書同醉徑須邀綠竹盜香無復念紅蕖不持黄巻来遮眼可惜炎天化日舒南陽諸僚和留别詩再和二首王事勤勞得少休全家喜復入汀洲懶於榮路占淹速尚有浮生任去留名譽未須驚谷口功名終亦困壺頭歸棲擬種千竿竹便與題為瀟灑侯十連名郡近天畿負重懸知困力微閒客已知無嘯諾鄰邦聊得看芳菲謀身舊似齊優拙罹咎今同魯酒圍囬首雋逰難戀嫪索居獨學果疇依還鄉有作二首菊潭才到便歸休年大何心泣楚囚南嶽獻譏無反覆東臯舒嘯有朋儔龜靈自古稱懐浦狐老從來只首丘便覺謳吟罷莊舄翛然隨俗且沈浮孑孑攜家反故園尚霑榮祿愧空飱官閒未辦夸腰組車過常先下里門塗巷依然榆社舊屋廬猶喜枳籬存浮生孰似還鄉樂謦欬吾前盡弟昆里中無居寓丹陽縣書懐呈邑宰張子䝉假守秦頭兩月彊往来遵路一年忙幸逢庇邑人惟舊蹔脱浮家計亦良退食井腴如就國原注某見封丹陽子遙尋祖系似還鄉原注葛稚川丹陽人南風未便輕蓬蓽也與虚窗拂袵凉戯書木彊與世異酸醎掃灑真祠屢入銜新格似聞惟半俸舊官那計是常參茶爐僧缽随時用手板朝衫竟月緘賴有班書貧可貼且謀蒲筍慰飢饞依韻和工部兄尋由里山泉眼葛帔練裙一散仙親攜畚鍤道䝉泉濫觴初見開微溜中準終能作止淵棲畆稻秧滋菶菶入池藕葉泛田田道人跬步不知處未遇髙賢名孰傳依韻和工部兄雪五首風撼柴門夜不闗黎明瓊玉徧人寰舉頭寒掩東隅日縦目髙疑西域山朝路昔曽飄袂上禪房今喜㸃爐間亦知塵霧難攖拂萬徑行蹤絶往還排寒聊與酒交闗呈瑞應先自帝寰初見同雲迷六幕漸驚飛鳥絶千山知酧素景風塵外坐隔清逰咫尺間飛灑卻羞来傍鬢安仁年少不重還従此何憂家事闗明年粒米厭區寰腰青不見飛花女頭白先看對面山絃凍未應停綠綺膠彊仍喜彀黄間平鋪萬頃茅簷冷欲問城居㡬日還門似柴桑畫亦闗歘驚閶闔堕人寰郊原那異熬波海壠阜渾疑聚米山望逺恨無樓百尺逃寒阻共屋三間阿兄詩句清竒甚格律都髙漢以還偶兹窮臘憩鄉闗無蔕花飛遍海寰粉飾門闈疑省户雲屯觀闕想神山飄狂不絶三冬裏積厚遙追二紀間原注鄉中二十五年無此雷聞説旗亭増酒價沈酣凖擬典衣還菁山梅花盛開予獨未之知十一月二十二日周元舉察院餉數枝以詩三首為謝香雪常開小雪天孤芳今占六花前欲従玉女互爭秀不分青腰誇擅權見事自知秦相緩著鞭甘被祖生先左轓不要宜春郡應戀南枝映水鮮原注元舉被袁州之命力辭不赴冬早寒輕測測天疎枝明秀忽来前土酥結色神仙種氷麝分香造化權三白共驚千樹發一年都占百花先廵簷索與氷姿笑凖擬攜壺更撃鮮山頭雲物凍吳天㡬樹寒英喚我前老不禁愁聊索笑病方止酒暫従權松篁傲雪堪為伴桃李酣春未敢先習隠菁山真不惡吟鞍十里看芳鮮次韻耿守咏雪低雲晻曖與天同剪水飛空候應冬沴氣潛消煩燮理歡謠藹布荷明農漾舟訪友乗清興授簡延賓繼舊蹤嵗好定知豐五稼倉箱行慶畆収鍾景山寺居大風步月溪邉空谷偶来逃散步虚廊破鬱陶庭户月華封玉雪林巒風響洶波濤氣寒秋盡衣裳薄夜靜山深殿閣髙欲識羈懐愁㡬許明朝攬鏡看霜毛十二月十日泛舟以北風寒囬棹雲山冬瘦露精神整棹溪邉試問津懸坎帶坻氷積厚緣甍冒棟雪飛頻出乗舴艋為龜手歸卧蝸牛分曲身已覺烏蟾不能活陽熙早晚定囬春正月二十六日雪後登子亭示道祖淑景因隂苦未韶峭寒於老不相饒竊香風韻歸梅萼刻楮工夫到栁條萬瓦雪消疑夜雨一溪波漲誤春潮連枝别後兒曺逺賴有吾人􅇺寂寥贈講華嚴恵照大師松陵講舌看瀾翻滯論氷消瞬息間覺性已明華藏海退身聊遁莫釐山識真久認魚筌假䖏靜因求麈尾閒我是殊庭仙隠吏二年雲水共躋攀贈深老折床學子厭如雲巻席歸棲震澤濱識了大千俱是幻理窮餘二即非真已辭白社拘方侣更笑紅樓應制人弟子安心安已竟不知若个是迷津贈福勝院老僧有宣諸方行盡已忘筌宴坐歸来水石邉五葉承来真的嗣七朝閲過到耆年鸞音衮衮閒猶振鶴骨昂昂髙更堅我特叩門来問道投針相值恐前緣春日野步二首一年春好是清明萬事都歸笑矣行卵色天容供逺興縠紋波面惬閒情門生陪従無參佐野服徜徉束珮纓午困乞漿先饋少已無形夢不須驚一春連雨少晴明曳杖郊坰偶意行嫵媚花枝空濺淚風流栁色但牽情長飢頻覺帶移眼大笑何曽冠絶纓北極朝廷今咫尺穰穰冦盜莫相驚二月十五日逰謝村福田院觀涅盤會寺乃靈運故宅呈道祖年来生計一輕舠晨出晡歸豈憚勞謝客兒山存勝致佛泥涅日往遊遨波間星斗沈光冷月裏山河結影髙何日菁山山上寺與君痛飲讀離騷天寜節感事示寳華鑑老詔語従天下九圍並嚴法㑹保宸闈山稱萬嵗誠尤切鑑奉千秋事已非已聴鸞音勤請祝故應龍輅慶遄歸孤臣拭血懐君處小坌峯前淚滿衣和西郊春事招元方同逰韻仙橋水殿照清流攘攘逰人聚九州光景従来夸輦轂風標况是富陽秋天開卵色春方好月上弓形夜更留勉作新篇書盛麗莫令少味似韓休和元方用韻見寄次韻奉謝兼呈元東詩二首人與嚴徐是一流英英儒雅冠吾州白虹吐燭呈文夜紅杏飄筵得意秋祿薄未應腰為折語多共歎舌無留令君舉善搜寒俊不進清華諒不休文律髙峯與激流五言佳處似蘇州寜甘鬲縣中漓酒不羨宣城賞奕秋白首同歸相器重青雲一蹙豈淹留外家門閥期君大作徳雖休更勿休追賢院食已度嶺歴宋胡諸庵轉山夜歸撃缶那能似漆園銷魂来訪小桑門仰衝雲陣尋峯頂細步泉流覔水源九里環觀山向背兩輿歸趁月黄昏春風不識愁人意栁暗花明自逐村定山寺入門松桂拂天長遣化誰来自衆香初剪蕨嶶豐菜把半殘桃杏露花房不辭峻極猶登踐免使幽尋墮𣺌茫原注欲逰此山中止者屢矣聞有山人宅巖頂試従度世覔神方章申公墳寺千章宰木䕃長城申枉行頒寵數新金薤文華才冠世銀鈎字畫品稱神佳城此日看馴鹿文保當年想夢麟定有玉璜傳後裔投竿端自渭城濱讀史二首祖尚浮虚事漆園生平圜府不曽言神峯峻若瑤林茂手色全如玉柄温翊輔但求三兎窟風流空擅一龍門季年喪國排牆禍綺靡諛言可得存曽侍東皇採紫芝朅來西土宴瑶池藻翁梁上休繁役灰刼池中認逺期數木故應煩鬼子竊桃那免號偷兒蒿廬不愛深山卧避世金門世孰知與工部兄邇嵗離多㑹少又樂少苦多述懐並寓僧藍得幾時原注同寓家太平某數日即赴官薄遊苕霅遽暌離一麾為郡乖同濟原注兄守琅琊某守南陽本約同途後以事參差百謫還鄉獨後期原注親友皆罷官歸鄉某留南陽數月方歸第隔東西希聚首原注相去正東與極西憂連宗戚罕伸睂原注到鄉遭排岸姪之戚繼有子崇之喪何時解組俱林下松菊園寛日共窺和工部兄遷中散述懐韻一嵗連膺四命書衣冠慶美近時無綿長本自天資厚憑藉由来地勢孤襆被昔髙蘭省去彯纓今喜棘班趨立言制行俱忠孝豈愧堂堂七尺軀寄獻中散兄生辰吉月迎秋萬寳成充閭瑞氣降耆英枌榆社裏藏身稳桐柏宫中庀職清原注今崇道觀即唐桐柏宫黄髪定應驚再少絳田端自保長生夀觴親薦猶彌月歸夢馳誠栩栩輕次韻大資節使薛公見貽二首黒頭自致已三旌暫寄江湖適性情五總龜逰欽學富九臯鶴立見神清西雍曽累飛章薦東閤頻䝉倒屣迎方幸台躔照苕霅以兹投劾未能輕劇談世事邇来慵時向烟波掉雪篷徳業未嘗矜久大光塵惟曲示和同十年輔政裨元化萬國賓賢振士風敢請中興重作頌衮衣不日見歸公依韻和薛大資將往仙潭久向巖廊侍禹湯歸身丘壑興尤長東阡方幸陪逰樂南浦難輕送别傷欲以中經諮詁訓更將竒字問偏旁勉留衮舄輝山郡不日天書下寵光次韻林茂南祀喜雪二首膜拜同祈海岸仙風雲奔走㑹諸天山巖恍若龍銜曜墀廡頻驚鶴奪鮮莫訝瑤英来有信都緣玉燭氣無偏化工應念催科拙乞與穰穰大有年吾僚齋禱極精誠俄見聫翩舞玉霙逞巧封條危不堕弄閒飄幌細無聲傾都竒貨歸王老侵戸寒威賴麴生天念春囘惟七日故教連夜趂嘉平僚佐再和復作二首雅步誰追鶴氅仙峭寒真是酒家天謝庭最愛因風起桓扇曽書遇象鮮逺覺歸巢禽翅重靜看當檻竹枝偏三吳此景宜増賞飄瞥郊原似昔年従来愛雪是真誠又見祥飛六出霙材薄敢招能賦客庭閒聊作詠詩聲瑤階誤向凡間見春蘤翻驚臘裏生賀板並来無答語自慙詞筆太平平次韻中散兄及諸弟寄顧渚茶二首苕溪溪上一茶神三表遺經品藻親輕拂競看雲態度初嘗應惬舌根塵草堂遙憶金沙水原注草堂有金沙泉君謨愛而名之花瀨聊分紫氣春原注事見陸龜䝉詩尤物従来常貴少彭城園外即非真原注顧渚今出劉希範㕘政家健步蒼頭捷若神露芽三日到情親輕甌延喜凝珍玉小磑鄰虚堕細塵便好相招十日飲莫教虚負一年春慇懃後訊當重餉月六齋時供應真哭衞卿弟三首搖毫射策逐羣裾獨以髙名唱玉除原注廷試第六人五斗抛来為詩酒三餘収得向樵漁固存夙悟無生理永訣親裁忍死書晚嵗異鄉成一慟大紅親破茂紅綀逺業相期未易量那知百嵗似風狂鵩来有恨催新賦鵲徃無醫識禁方鄰笛他年那忍聴人琴此日遂俱亡長空後夜西風急吹斷驚鴻不作行髙材磊落氣崢嶸命薄難將智力爭赤米白鹽生理窄紅蓮綠水宦情輕曽期虚閣憑欄醉不遂扁舟適野迎原注約赴調見過汝已反真歸大化山城空慟十年兄曽夢良傅恵然見存出示詩十有七篇偶摭所遺成三篇紀謝未有歸資可買山一封程奏便求閑睢睢去後容爭席碌碌羞来肯抱闗幻界已知都是夢真心自要識無還尊前衮衮聴名理坐遣窮愁一破顔清明時節訪溪山消盡機心大智閑元亮孤舟聊自棹尚平家事不相闗叩門雖幸千金顧戀徳翻嗟半日還並水幽亭同歴覽應憐瓢飲政希顔居然埋照向窮山誰識龍媒伏帝閑意氣雖吞雲夢澤功名未羨玉門闗身常靜退緣知止心不傾邪畏好還但恐搢紳公論在招延行見覲威顔中􅄆兄喜罷郡有詩次韻却寄上印歸来卧蓽門此心炯炯向誰論平生疎拙真天賦此去安閒盡主恩舊識愧真為我累近知凡百喪吾存原注一作幻體尚知非我有浮榮何足喪吾存好来同習菁山隠白髪仙臞兩弟昆次韻中散兄見寄晦迹纔須一畆間浮家暫寄五湖邉官抛印綬輕千里祿隠漁樵已十年眼對雲山偏爛爛腹藏篇牘自便便政緣欲遂幽棲樂豈是清時獨棄捐次韻錢伸仲紳見貽兼送别二首四年五度訪郊村苜蓿羮稀不厭貧清韻喜逢鬚展㦸奥篇仍覩筆書銀一笻巖壑幽棲地五兩江湖自在身他日願陪雞黍社貴鄰應不買増珍郊居牢落似東屯剥啄欣聞客叩門筆下波濤文貫道胷中瑜瑾學逢源西余未遂諧清賞南浦俄驚黯别魂金菊萬株秋露重此時重復望来轅題寄伸仲先塋瞻雲亭銜哀負土記當年白首来臨涕泫然宰樹成行無鹿觸佳城卜吉自牛眠已乖綵服親嘗膳猶幸綸封數漏泉反顧雲飛頻悵望孝誠寜愧斗南賢喜中散兄將至兩年僑寓為知音百指仍攜就泛金蠅集樹榛曽掣肘魚傳尺素喜囬心無邉紅芰邀同醉不盡青山得共尋白首居諸良㑹少對床免被别愁侵次韻中散兄將到先示詩雲山佳處復躋攀景物依然得破顔春事闌珊三月尾時光荏苒七年間重来懐紱成何事歸去抽簮幸有山且盡一杯今日樂投林飛鳥㑹知還次韻中散兄喜雪二首林薄風號兩日先俄驚剪水堕遙天坐看山路禽飛絶聊勝泥塗馬不前輕㸃紅爐呈妙意斜飄素髪映衰年寒霙與我官同冷莫笑柴扉日晏眠縹緲山頭白最先模糊雲物變吳天陸機玉圃無精觕王衍瑤林滿後前酒漲微瀾宜永夜麥翻翠浪看明年曉晴便是春消息梅萼包香栁欲眠次韻中散兄二首泉石清逰一月間風輕氣爽未驚寒唱經雲岫頻清梵佞佛爐烟費紫檀震澤魚肥聊獨酌包山橘熟阻同看歸来頓識南宗髓曽見彌天釋道安遍逰湖寺棹舟還重理殘書逼小寒衰鬢迎風似蒲栁貧爐無火取槐檀毫銖利祿囬頭笑翻覆人情洗眼看癡鈍老人堪底用故應衡宇自偷安友卿弟見和復賦二首嵗律崢嶸又欲還鳴條風急作清寒菊英媚日猶呈秀梅蘂包香未吐檀江水過門兼汐到鄉山當面帶雲看是身已覺都無事只有空飱不自安門無雜客往仍還趺坐澄心定水寒清凈苦嫌千日酒蕭閒惟事一銖檀眼中金屑全無用髻裏明珠得自看作止更能除任滅已無禪病自輕安次韻維心二首蕭衣無柰客愁多日飲那知酒有戈松徑﨑危羊石卧筠筒屈曲虎泉過懶尋丹竈山名葛且供禪龕人姓何共看今年龍集酉穰穰蕃熟慶時和側席求賢嵗又除如君徳盛孰儀圖軼材共仰人之傑讜議懸知帝曰都豈有簀中終去魏未妨廡下畧居吳蒲輪不日来徵聘禪句休誇雪㸃爐次韻葉少協夢齡泛舟水風斜日惬新晴初解銅章病骨輕逺寺藏烟増晻靄寒峯帶雪更鮮明尋幽屢辦揚舲出辱訪慚乖倒屣迎原注少協寵顧以出不果迎煙艇遙遙逐鷗颺淵明従此得浮生寄題拙臺講罷公堂得少休下簾清興與天悠書空怪事知無益為圃機心逝不留四至九卿空士笑一當萬乗豈人謀先生獨有摛詞巧奪盡人間重錦裘和小室韻一味伽那已黙傳隨機任運且忘年翻經不落摩騰後成佛仍居謝客前教海就舟方見聖宗門得髄始通禪蕭齋一炷寒沈水了盡因緣與自然次韻朝隠招飲二首千古興亡馬食槽醉鄉真可寄㢘髙功名戯事何須掛富貴危機詎肯饕幸有碧筩消暑溽休誇白堕執逋逃牢愁滯恨知多少凖擬都將付濁醪何須邏逤響檀槽獨喜杯中酒浪髙芰實深酧屈到嗜鱸魚仍足季鷹饕加籩亹亹情尤厚醉舞僛僛罪敢逃我亦頭巾漉家釀明當相速醉芳醪招中散兄飲飄零羈旅苦摧頽旬日希逢笑口開爐冷難施文武火氣寒聊雜聖賢杯牛鳴地去無多逺羊胛熟時宜便来聞説家山動歸興預愁疊鼓起髙桅次韻卿任賦立春陽和協氣起寒灰席上清歌聴落梅煖逐日華驚嵗換夜占天象覺星囬書籌屢㸃蟾蜍硯命釂連催鸚鵡杯願斂春祺錫黎庻熙熙一鏡似登臺次韻道祖賦立春棠華鞾韡綺筵開何用三行粉面囬金鴨香殘知漏永土牛色重喜春来飄霙著樹狂欺栁剪綵裝花巧鬬梅俛仰光隂驚嵗換誰將藍尾更銜杯喜晴補陁香供走人天赴感隨緣舊所傳霖雨方憂困桑户晚晴俄喜賦樊川階庭旋見収黄潦齋壁何因上綠錢多謝化工哀老子遨逰不復更祈年陳朝檜拏雲老檜欲千春㡬閲人間旦復曛風裏樛枝喧過雨月中清影碎流雲蟠根不願郎官谷聳榦宜㕘君子軍須信英靈神物䕶頻經兵冦惜揮斤春晝偶作次元述韻屏居岑寂似禪闗顧笑初無素與蠻晝棟差池曽識燕綺忩葱翠舊逰山時危謾自懐頗牧境靜聊欣接尹班二紀家園逋細履身閒今得一時還次韻元述漂泊身如不繋舟芙蓉湖上懶囬頭干戈時幸逃新鬼巖壑人能識故侯已覺功名真破甑却驚嵗月甚奔流仙庭五載空浮食恩重丘山豈易酧即事五載投閒隠薜蘿眼看時事只悲歌家貧不畏鬼来笑世變難教佛柰何髀肉生緣癡坐久帶圍減為客愁多他年莫忘菁山寺百口啼飢兩鬢皤青雲那肯羡雄飛前料山邊習遁肥名教固應多樂地賤貧聊幸脱危機虀無萍韭何妨醉羮有菰蓴自合歸格外一官垂欲滿便従神武挂冠衣諸公衮衮上巖廊濟世無能分退藏所止先名大隠洞平生本望祕書郎畫成顧失一巵酒箭蹶空穿百歩楊幻界光隂凛無㡬養生従此學長桑村人寫予像即景山飯道僧祈禱為㑹頗盛單車去位五年强初乏恩襦庇一方大姓殷勤攜老稚精藍祈祝飯緇黄此時美稷勤邀迓他日桐鄉必奉嘗為報庚桑相俎豆不如道術永相忘除夕郊居書懐晚塗蕭颯寄漁樵夢亦無因到上朝書在床頭脱復看客逢野外偶相要敢嗟祿薄難餬口大勝官麄毎折腰六十七年明日是亦逢村釀也浮椒次韻徳升頤軒書懐煙霄飛歩欲青春未信論甘肯忌辛三仕固應無喜色一鳴今復見驚人射如闗尹方知中畫若元君始識真早晚奏篇来拭目清塗聊為洗荒榛次韻中散兄慶立方賜第兒曹春榜預言揚竊吹知難服士鄉黄絹未能摛好語青氊偶幸繼前芳穿楊喜共東床客攀桂同標北寺房原注鹿苑寺以其肄業堂榜曰雙桂聖世選材如華嶽積塵曽不棄毫芒次韻邉公明知常放魚小鮮無數命臨危邂逅雲莊擴大悲巨浸何勞長者水親臨尤勝校人池依蒲俯視還真樂貫栁充庖那復知圉圉介鱗俱得所道人因得一伸睂次韻顔孝立天經同年亦識韶華不肯留時危那更事嬉逰羇懐不辦愁花雨空廪惟知望麥秋顧我端憂宜燥吻如公無事合扶頭麴生漫助齊睂餉清洗錢塘兩玉舟和必先龍圖謝酒兼呈沈次律琯中大學士臺閣髙賢卧里門清揚乖隔阻寒温尚賒宴豆陪三雅聊即烟郵寓一尊亂後官居同幕燕春来香味憶河豚溪亭午夜銜杯處應對梅花淡月昏贈史徳謙不入城闉已十年足音何幸聴跫然杯觴共樂三更後書史相従一世前鳥倦尚飛慚我老鴻𡨕何慕覺公賢錙銖得失何湏算聞健惟當數撃鮮贈鮑欽止愼由二首錦窠朱紱亦何榮辭劇求閒責自輕聊喜青葱供俯仰未應紅腐較竒贏久知飛鳥有真意誰信鳴雞非惡聲只恐朝端闕司𨽻又將斂手避威名紅塵衮衮厭朝班官寺深藏洛尾灣識擢早驚郎位峻招㝷今見水仙閒髙標自置羲皇上俗眼従教季孟間倉氏一官寜久困禁途供奉政才難挽致政奉議魯公夀寜歌詞翛然丈室老維摩不媿家聲舊曲阿事閲七朝推夀俊慶鍾六子半文科白蓮入社塵緣息朱紱通閨聖渥多空唱已聞生凈域可須薤露起悲歌原注南史庾詵傳詵且終家人皆聞空中唱云上行先生已往彌陀凈域矣張子䝉令君挽歌詞二首賦歸州里半年間豈料循題哭二難屢薦嘗為趨幕客數竒終困字民官清談竟日師夷甫寢瘵連年痛士安身後華名知不朽㡬多墨妙翠珉刋文義游従四十春艱難契濶見情親少年漣上初傾盖末路雲陽擬卜鄰萬室謳吟依愷悌一生志氣負經綸渭陽豈特兒曹慟老送佳城淚滿巾大卿表兄莫公平砥挽歌詞二首露奏求閒猛挂冠忽驚卿月堕雲端中年屢攬澄清轡末路堅辭矍鑠鞍自卜夀藏松已拱親裁幽刻墨方乾映溪清逺樓前月後夜登門忍獨看㳺従五紀荷勤渠白首来依霅水居郡閤箴規言有補家林書疏月無虚方期老驗長桑藥忽見神升廣栁車兄姊同時封吉壤不堪清涙屑衣裾先兄中散挽歌詞四首昻昻鶴骨素康彊微疢生朝罷舉觴尚冀魂隨香釡反那知人逐綺琴亡禁方不驗三茅洞原注兄就醫於三茅沈師遺墨空留二老堂原注某結屋青暘與兄日夕同處號二老堂従此幽棲風雨夜一翻姜被一凄凉徳與才髙位不酧大鈞杳黙向誰尤剖符政化傳沂水握節威名振宛丘心悟三乗真合覺原注兄結四方印而逝學該九域獨推優原注兄在京東進九域圗志為諸路之冠特進秩一等鴈行影拆元龜喪涙洒西風不忍収粉闈當日正逢辰興在滄洲猛乞身袖手旁觀真得計急流勇退更何人翺翔詞館全無累笑傲丘園不計春鼎鼐百年均此路惟公達識夐誰論流年八袠慶初開駒隙那知二豎催書聚五車緣嗜學家徒四壁為輕財幻身夢蝶自云適曲路増蠅何處来原注兄為平貨之属大閽欲以大勑特薦改官兄辭焉深恨滯留暌屬纊此生賫恨在天台原注今春欲歸省適先往天台期以秋歸遂不及見哀範卿學士弟萬巻胷中學已優安恬當向古人求有財謾説駒千里此路何殊貉一丘儒館芸香今寂寂親闈芝檢竟悠悠懸知簫鼔江村路茂栢深松結暮愁楊彦安植大夫挽歌詞英猷卓躒世無多用不酧材可柰何庀邑頌聲空製錦阜財智算謾熬波鱣堂積學家傳慶蟾窟登榮子繼科下里有車催遣奠上池無藥起沈痾心期於我勤知過肺腑従公久切磋十載飄流隔生死東風吹淚寄滂沲
