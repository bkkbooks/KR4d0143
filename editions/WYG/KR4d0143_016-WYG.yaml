body:
  text: 丹陽集巻十六宋葛勝仲撰四言詩嘲茶山吳興紫笋實産顧渚唐昔厎貢闞山芽吐隼􅒅出臨虎巖親駐鄰邦刺史金匏相遇木𤓰堂前穿雲浥露烹蒸包發及春未暮天子稱珍分甘當路今則不然名毀勢去金沙弗湘玉食弗御敷榮窮山牢落誰顧如女失寵空閨自嫮請以千金買長門賦茶山解嘲衆萬之生於世蹔寓一僨一興孰知其故退黜奚戚進升奚慕豈以通塞顧改常度有如我翁昔嘗掀翥戴纚垂纓去天尺五今屏山城亦皆時數左右佩劒疇可笑侮翁具退省前言大悞用與不用智力何預幸同此邦邂逅承晤結為金蘭安此貧素五言古詩閱訟訴忽疲起卧少頃復視事平明坐早衙投缿來相踵訟牘䑕雀暗吏行鳬鶩擁外臺竦風稜檄至亟須捧以身為形役劾去顧未勇病骨痩欒欒衰髮希種種送鄧寧民罷瑕丘簿火雲燒晴空大暑金石流行人口生烟千里無停輈胡為趣遵路僚好挽莫留自言為升斗往日辭親遊兒嬉膝前歡三載不可求所得較所失輕重真不侔于茲滿秩歸子職冀稍修微官亦何樂觸事有庶尤米鹽聒雙耳簿領昏兩眸畏首復畏尾人役不得休豈無讀書暇頃刻但少偷幸此案上厯數日獲到頭白雲已在眼喜色津津浮我亦厭羇官如苦南冠囚羡子有行色去若登崑丘更書縱未下投劾行當謀次韻良器真意亭探韻并序晉宋二史皆載陶淵明不肯束帶見鄉里小兒遂棄彭澤歸意謂淡於榮利足名髙隠不知適所以訾之也古之逹人勝士語黙隠顯如固有淵明襟量如止水澄之撓之未易清濁豈以把板屈腰嬰意遽違初心哉以陶集考之程氏妺新􅄔居急於撫親故在官纔六旬遽歸爾豈惟二史失辭杜拾遺王右丞輩固一臭味也然杜詩云淵明避俗翁未得為達道觀其著詩集頗亦恨枯槁有子賢與愚何其挂懐抱王書云陶潛不肯見督郵棄官後貧乞食詩云扣門言辭拙是屢乞而多慙也一慙之不忍乃終身慙乎葢人我攻中之累也世人不知淵明類若此淵明何訾焉某自年來頗知景仰其素風到海寧築亭於南溪之上取其雜詩句名以真意今顯東良器諸公相率飲酒賦鉅篇彊韻舂容豪逸配古名筆矣摸冩景物不復餘藴獨恨不道淵明因次良器韻呈五君子書其後我愛陶淵明脫頴深天機叢菊遶荒徑五栁搖幽扉生逢夘金興典午勢已非著書但甲子嵗晚頻歔欷仕宦聊復爾樽酒真焉依南畆猶種秫西山同採薇浩歌歸去來熹微恨晨暉迷途徃莫諌今是庻可幾蓄琴但取意不施絃與徽觀其四八目賢喆在所希出處固有意夫豈輕行違誰云憚束帶辭榮俄拂衣念彼同産人撫視因遄歸平生共志趣但有一翟妃少陵罪責子頗謂達道非右丞鄙乞食更以人我譏乃知第一流尚此知音稀妙詩發天奥流轉同衡璣自謂處人境喧無車馬騑心與塵事逺地偏堪遁肥東籬秋色晚悠然望翠微真意不可辨佳氣隨鳥飛詩辭向千載凛凛猶光輝我生但睎驥望之有等威行懐斜川游坐想栗里磯九原不可作築亭傍崔嵬獨取詩句名櫩宇殊飛翬嵓谷有杳靄花卉無紛菲修篁寒逼人坐如霜雪飛諸公賞清致野服馳韉鞿經丘復尋壑不憚歴嶮﨑壺觴更命釂藻翰各一揮高談破滯論妙處端解圍食冷或屢暖哦詩寧忍飢褒假猥見及責善非所祈願以靖節語佩之如絃韋送曽守罷任赴闕四首材大多不容論剛苦難受儒𤣥閱三朝偉馮今白首胷中有藏室設張動掣肘人言專城樂聊結新安綬獨喜衆毀言不及河東守三年四寳堂紅梅傾白酒出處固有在兒輩浪奔走豈復恨典籖得州大如斗老人聚扶杖兒啼使君前習知使君清一觴代一錢六城十萬户焉依刺史天刑清艾作韠俗朴蒲為鞭赭衣入佗郡闗户得晏眠州鄉大作社擊壤歌康年左轓忽照路更借知無縁願公治者廣此恵周幅員陽城拙催科賈誼困遷謫騎曹呼馬曹罰滿何止百一笑為闊畧坐免投此幘鈴齋父黨尊均禮不賜隔人疑典午公豈嘗有此客連年三露章慰薦飛絡繹自慙骨相屯顧使議見格途窮窘論報紙札謾搖擘紫陽如佳人晻靄送征舳含愁入長眉盡斂故時緑語兒已在眼歡迎走僮僕舊社問枌榆新逕開松菊還家聊作客行色催輦轂同升紗籠人㧞士有豐禄㑹當出水鏡一洗凡眼肉躋榮赤墀塗雁門詩可復兖學叙舊呈子充羲和無停輪年鬢日夜改惟有金蘭心嵗晚依然在頗憶四門舘研席同諸生聫名理朱穆結駟留陽城縞紵初定交車裘容共敝駿馬馳春風休沐章臺市年少未涉道惟論場屋文鼻息拂霄漢心期勇風雲春闈鎻儒仙試席兩心競閬仙時乞靈孤懿肯移病喜君先得桂時我猶飄蓬鳯凰黄鵠歎振手國門東離羣十周星為僚一都㑹涵牛鼎烹鷄邑小非材配理縣不用譜政如宻與蒲糗水代厨傳木索閒庭除肯憐冰子窮夜凍午不粒綈袍累故人口腹煩安邑更迂長者轍来顧空宇中坐令羈官興不復嘆秋風立秋日六兄將仕先入都赴銓試㑹飲東郊作詩送之缺月耿疎林凉飈拂輕袵荒溪趣遵塗客子敢安枕自言赴銓府試判取㣲廩清時廣招延選部雜流品門子萃金張文人富曹沈春秋兩較試器業一精審探珠到淵洄求金自沙墋騰裝分區區蓄志常懔懔家翁昔初仕恬退聲藉甚求閒絶外慕行義鄙中荏以兹乆淹蟠通籍才十稔飄然宦游倦遽以歸休諗優恩得世祿綸告下綈錦兄材濟世美聖讀近天禀所長皆盖人無一可鐫鋟摛辭昔賢均説經餘子噤臨書蛇蚓結搊琴魚鮪淰辛勤客虞庠藜藿就烹餁謂當妙穿楊百中羽皆飲如何遭刖頻歸步每踔踸兹行定焚舟已事空拾瀋將期冠羣英喜劇不能寢送友赴試鉅野送之西門時方有外舅之戚極目無聊歸不得卧作詩五首却寄以風雲入壯懐為韻三吳炊未熟祗命挈挈東鈆刀一何補糧食賦頖宫寥寥坐空廬寂寞如揚䧺引脰望南境不及馬牛風何如廣文飯終嵗與子同年顔吾老矣癡愚心尚童子雖齒髪少操行一老翁豈獨友于厚政賴博我功儒𤣥各精詣衮衮傾談叢欲知不常處乃在阿堵中此子早樹立抗志高浮雲委蛇處州巷頗以雋秀聞挾書從我遊追琢益自勤便便經與史用志初不分疑篇了咄嗟確論摧紛紜文辭近道要見者筆為焚差肩魯諸儒藹藹揚清芬秋風濟陽戰足掃千人軍只今呼賀酒佇子歸䇿勲寒齋篁竹間牆屋乆不葺旁穿及上漏雨過滿床濕忍飢哦詩書亭午或未粒先生自不飽濡沫豈能及出門有紛奢囊空自羞澁世事不如意八九更論十問君胡不歸肄業乃其急自言苦心志更覺聦明入誰能學仲卿夜抱牛衣泣說經已鏗鏗青紫真可拾寥寥里選空齪齪士風喪狂瀾欲東之汎濫不可障詞場自衒鬻相與計留放夸毗徒一名傾排至千狀不知厲術業徒欲擠輩行黄生獨往資風義古人抗悠悠衰俗中此士真可壯江南一紙書沉憂割中懐嗟予足憂患生世苦不諧怱怱子行色適與逺訃偕破涕彊出祖尊酒不及排還歸坐講肄寒篠搖空齋推門誤相従忽驚形影乖誰云阻一舍目斷真天涯念子早自力清明播朋儕觸熱赴夷路跨馬脚不鞋自言取鄉送通顯資其階臨别何以贈手板裁香楷寄題長安譚損之遐觀閣乾坤一浩蕩小智自窘拘低徊褌中蝨齷齪轅下駒達人獨矯首抗志在八區歸来繞荒徑所喜覺迷途時讀穆滿傳乍觀山海圖林木浄交䕃所見與道俱誰能逺羇宦五斗一丈夫築閣者誰子無乃柴桑徒次韻張宏道勸釋奠致齋齋居屏塵務况復儒宫清木落必糞本祭菜敢不誠瑚簋見三代錯落羅兩楹骨冷破夢境虛窗坐黎明祠官趣盥頮珊然環佩聲巍巍素王像視若四海營當時杏壇士與享彯華纓樂教属昭代弟子陳歌笙端如從陳蔡琴舞紛縱横元功流萬祀德大徧諸生次韻盧行之知原見贈元豐詩禮將勲畧傳萬口長城國西陲寄託十年乆折箠笞黠𦍑游魂屢窮走羊公緩裘帶李廣静刁斗黑頭已青雲日昃笑擊缶隂功與忠諫二俱宜有後繩繩丈夫子茂宰最稱首不裁猶能裁應有既盡有丘墳三十車習復不置手尚友千載人豈論骨已朽芳蘭秀深林嘉芑就菑畆宜為數旬客顧作三日婦行聞尺一來内閣延枚叟次韻季明我生任飄蕩所向如虚舟誰能涉險難入此正急流行止兩無累自遂逍遙游巉路豈不佳夙意非所留迎親四門舘登道初麥秋政喜寢門近敢言征路悠山陽雨連月平陸不可求居將雜蛙黽渚不辨馬牛淮湖共瀰漫以為行者憂今朝好風色歌笑輕陽侯紅鱗上圉圉可以供殽羞便呼拍浮船甘味苴兩頭坐待缺月掛玉斧亦可修酩酊聊自彊淹速非人謀數程次京國猶待半蓐収相從共蒲酒賴有嵇阮儔再和示季明劒不用置履柏非可為舟古來倜儻士渠肯甘凡流君材早邁往華問馳交游高文筆如掃雋辨舌不留白黒自了了皮裏藏陽秋擁巻得淵㫖奮辭祛繆悠身雖不求人政自人所求恢恢有餘刃所見無全牛亨衢恐不免位遇豈足憂初官三語掾審克裨藩侯退公豐暇裕問學日益羞行為孔獨誦端以賈長頭嗟余過立境沒沒謝藴修廣文一飯足其他非所謀勝境定時訪良書亦可收但恐與君别無復往朋儔誦金剛經滿二藏偶作我誦大智度非疾無日空銅爐海岸香亦復充浄供積數向洛义而實未嘗誦凡諸有為法實如幻泡夢一字本不立况有千百頌不受一切法乃簉預流衆於法有所得十八成不共妙理端㑹心筌蹄那復用妙浄院入門無行路十頃漲方塘藉葉受微雨瑟瑟㵼滄浪石梁一何偉延袤百肘長臨流兩華屋東西蔚相望雲堂始斷手潤蒸松桂香弛檐諧雲卧何殊贊公房夜步庭除月心與空水凉世人侈居第規永庇蒸嘗墓木未及拱破鬻何披猖何如施給園千載綿寳坊君㸔寺前村至今俞氏昌原注唐俞氏捨宅為寺故云禪静寺古寺鄰曹崇怪石羅庭户竒礓漫難名欝林不知數集虚竦蒼桂左紐真獨步兩詩照丹壁好在支與許原注寺有毛令及維琳詩却坐留芳軒松竹發佳趣山行未覺疲更問勞勞路採芝菴明辨師求泉名以月光命之方池洌寒泉湛湛纓可濯其源出陽崖其委則隂壑齋盂給晨炊茗椀共午酌道人習水觀趺坐閒兩屩性水了真空非以識心度浮幢諸刹海視身同不涸為名月光泉永配一宿覺已丑次梅溪樂平寺兄子宗丞嘗監鎮即寺為廨卒官晚之東莊蘭陵華腴姓數不到吾族何堪從子賢變滅石火速早搴東堂桂宗寺副惇睦迎親官就此半載歡水菽方開萬里塗一蹶遽折軸我時跼里居十起媿骨肉朅来訪遺蹤徙倚寒溪曲人與紫梅花二俱不可續憂端齊前山東莊寫松竹次去非韻簡元忠使君翻飛堕青㝠巖邑漫濡跡脫無賢已交乆矣去移疾興州天下士竒節非碌碌魁然索價髙未肯輕沽玉居閒時過我端若右尹夕文詞天分工沈詩更任筆蟬連語入微不覺聴更僕舊交半廊廟勲閥藏帝籙毋寧一麾出不屈數旬客五十始過二榮途尚努力才資况加人何止什與百是事姑置之秋日方在翼鮮鮮黄金花冷艷照墻屋郊原沐時雨枯槁蘇霑足城南天息河流水有令德相擕共擊汰泛此寒湜湜九月二十四日陪少藴左轄飲朱氏林亭以朱行中寄其弟詩為韻席上同賦蕭晨天宇澄雲物掃氛霿寒飈振飛藿䇿䇿商聲中官散無町畦出若孤雲縦仰懐山中相隠居隣二仲駕言訪精舍連日食指動午坐烹茶龍夜飲燒燭鳳殷勤數㗖我省煩慚閔貢美哉澄空隄松竹鎻巗洞怪石初平留嘉樹橐駝種山水有清音招隐詩可誦初如叩清角乍若聽幽㺯窺臨已不惡況乃陪營從清談木霏屑圓機盤走汞清寒逼吟魄不起梨雲夢半生了官事今假幸少空坐有第一流不飲宜自訟人生行樂耳急若奉漏甕東山恐不免衮職行登用槎通天衢升茅茹諸賢共惟有數竒人辛苦仍耘葑䝉左轄復次韻見寄復賦一首四海吳興公嗜學屏塵霿妙齡儀天朝獻納言必中軒軒雲鵬升洋洋壑魚縱内庭大手筆傅班真伯仲武庫富所藏砥柱矻不動骯髒妨居中大觀俄歸鳯歸来一丘壑彈冠謝王貢嶪峩懸霤山窈窕琦玕洞竒礓不待輦桐竹已前種神畀賈長頭天扶孔獨誦衡霍縮地来林深聽幽哢軒池攬風月杖屨屏營從山貲自足了不待燒鉛汞斯文未應喪審象俄入夢巖廊翊元化告猷無日空上游倚韜鈐出聽秣陵訟方將膾劉闢行酒贏萬甕急流自勇退惟深閟神用行藏亦何常此道聖賢共終為巖野霖且並苕溪葑盆池放魚呈曹文中小魚如針鋒大魚如栁葉舍之石斛中潑潑逝鱗鬛秋毫麩與籺腹果意各愜渺如在湖海不歎杯水狹笑之復自笑邑小大邦攝搖足已恐堕一動不敢輙廪人給五斗饘粥周兒妾雖然頗自適擕杖園日涉豈羡蟬冕窟遷擢等常獵漆園信知魚非惟常夢蝶辛夘次霧山大明院進士萬廷老介来謁石橋跨斯干路轉得佛廟叩鐘集黒衣迎我千指閙龍宫五十軸金碧爛相照空翠霑我襟冥濛認堂奥無乃張公超五里方術妙鄰居一逢掖作名屣為倒莫言山未深終當隠𤣥豹寄友卿窄韻一首昔子遊魯中飄然起幽棲翛翛一書簏長物無所攜辛勤涉長道足趼靣目黧自言寡聞識走俗多沉迷今不勇自奮蹉􅋸將噬臍類渇欲石髄如矇想金箆来簉胄子席求言學端倪嗟予淺聞道太倉之一稊松菊有荒徑桃李無成蹊胡能使糓似每每頳顔低晨昏不予舍三嵗改攝提對案但苜蓿有黍多無鷄一笑為流啜甘若羊新刲秋霜八九月絺綌臨風凄寧甘范叔寒不求故人綈夜窗經與史短檠照栖栖靡曼一不顧端如金日磾嘉子甚年少老成同齒齯照庭真玉樹飣座稱佳棃為文頗挺㧞絶去翰墨畦聲華出諸彦籍籍喧青齊遂收濟北薦謂即辭蒿藜如何尚齟齬時命多乖暌方今天子聖隆學古與稽美化浹遼夏文星動婁奎郡邑各黌宇夏屋華榱題師儒自廷授望實多金閨大烹極鼎味豈復嗟鹽齏月書季有考升舍兹其梯吾邦矧多士擅富浙水西文華燦星斗光彩騰虹霓似聞與二難同起公堂躋侃侃共輝映乳酪兼酥醍文高各揚邁質美皆懸黎生資固不凡器用况已犀先生力推引同志無傾擠亨塗可自致如車資軏輗明年抜寒俊一封下芝泥鄉校佇賔貢䟦馬登隋堤談笑取通顯豈直組與圭張周韓侍御遷居北市示詩次韻神羊厭峩冠銅虎出分土一區乆未卜薄遽歸無所寓居得爽塏衆口粗安堵委懐榮槁外長歌樂韶武自言倦霜臺筆端有蕭斧毋寧乞小愒松菊問衡宇未看武當山聊踏南梁鼓浮生皆寄耳莫作飄流苦要津況虚位掀騰在仰俯政恐尺一来均人隔綏撫朱偃吹笛李謨㺯梁州獨孤生竊笑聲既雜夷樂原注龜兹疊復誤水調區區許雲封女子稱商肖天寳小部樂能使玉妃釂論竹取雲夢不老不可少七月望一周生伐以此料韋郎衒名管半曲裂數竅風流渺無繼是子差可教安得君山翁漁艇巴陵道擫捻三五聲萬籟發天妙清音徹四山猿鳥驚飛噭大管藏合拱直俟元君召壬辰次靈峯山百福院豺虎縱欝攸此寺神獨赦樓臺倚山腹碧瓦粲相射奔崖挿雲霄縮地見衡華竹翠染僧裾泉聲喧佛舍峰巒佳有餘顧揖真不暇我欲陟山椒嶝嶮未應怕摩娑舊聖石政恐嫌俗駕感慨明義師徘徊一悲咤披雲崖深公出東都山色已清好流行滄江上快意時絶倒洗盡眼界塵招提迹如掃衆挽来靈山世故亦相惱平生愛山心不厭更幽討捫蘿開細岑脫履藉豐草聊煩坡陀石坐此突兀老是身端如雲去住殊未保孤峯起孤烟晴湖漾晴昊賓主兩忘言可為知者道跋胡德輝珵詩巻一官三語掾驅車大河北飯澁􅅅亦稀哦詩冩胸臆作者非難到已自入閫域郵筒逺相餉我豈今衡尺粗能擿隴雲亦不誤雌霓千里得行記了了所見歴士材有如此磊落固易識寄語直指公勿作寒蟬黙德輝次舊韻見寄復和䢴溝别清揚十稔限南北羈游多面交從誰吐心臆初筵羣玉府香譽藹區域如何窽言加進寸輙退尺歸来賦郊居邀客賞氷霓青雲一蹙易斜飛要游歴水鏡豈無人瑾瑜固易識君子有常道要不失語黙題柘城懐古亭陳本太姬封卒以夏姬亂君臣同宣滛父子並遘患直諫洩冶死詐忠巫臣竄郢兵討少西昊墟且為縣嗚呼女戎禍陳祚僅如綫餘波及羊舌伯石實首難我行徑株林懐古一興歎流波似當時惟有城東渙癸已次古浮山普慈寺老人百念冷看山獨不足未能㝷地肺聊復訪天目路出古浮山木杪飛華屋松迷突兀殿雲鎻窈窕谷髙閣藏複道朱欄穿屈曲羲和隠崑崙借此休騶僕小摘園中蔬充我屬饜腹緬懐峩豸翁草廬親卜築意恃金匕藥終亦戢一木不如學無生妙諦祖身毒甲午次東天目山紫陽觀梁武初置昭明太子勒碑紀當時恩奬之盛蕭公老寺主亦復知㝷真大同築精舍招延羽衣賔園囿廓數里嚴更紛徼巡東宫奮鴻筆紀事傳堅珉山基半吳境髙與帝所隣偉哉古石室空洞容千人當年許逺逰自此升玉宸至今雪山草靈苖雜荆榛幽池湛寒水亦說棲龍鱗靈物有變化誰能窮其神窺臨擬仙去未信隔兩塵乙未次普信院與首座惟表談道蓐食起紫陽憩寺始亭午清幽釋子居山影落窻户樓臺互相臨雲石粲可覩隂崖溜清泉甘美過牛乳山僧立勝事争以筠筒股表公久遊方妙諦明佛祖雖未衆拆床已見屨滿户相㩦環翠堂身覺度飛羽登臨固已往況乃真吾土余謫沙陽地僻家逺遇寒食如不知葢閩人亦不甚重其節也感而賦詩五首以杜子美無家對寒食五字為韻往嵗遇寒食親賔相與娛飄零客異土對之渾若無豈不念佳節寸心愁欲枯花間有好鳥勸我提胡盧一醉聊自適醉夢歸東吳異縣遇寒食悵然懐我家千里遙相望各在天一涯佳節無與同冉冉悲年華鳴禽花底聒舞燕風中斜物情各自在羈束誠可嗟天涯遇寒食嘉節無與對獨酌一盃酒慷慨使心痗来者復可追既往那復悔翛然畎畝心敢忘犬馬愛之推自欲隠去去何所懟嘉節遇寒食春隂猶作寒閩人不知重渾作等閑㸔餳粥不復煮青楓誰與鑽開窗延霽景脩竹正團欒翠眉雙侍女對此一樽殘逐客已淒涼矧復值寒食花深日遲遲院静春寂寂雨餘山吐青日落霞掃赤浙江渺何在三月無消息棄置勿復陳吾心乃如石
