body:
  text: 丹陽集巻六宋葛勝仲撰啓謝修撰啓庇身閒左分老明時通籍禁嚴忽膺譽命人皆憐其愈鈍已獨愧於乍賢伏念某拙昧趨時愚惟信古在紱冕則多仇少與於塗轍則數免稀遷昨罷一麾今踰六稔憔悴自驚於黄馘飢窮殆類於白丁雖榮滯推天分以自安而出處繫人臣之大義念國歩多艱之際乃臣工致命之秋既不能畫半䇿於聖天子之前又不獲效寸勞於賢大夫之後捫心自歎顧影知慙忽玷髙華實為僥冐此蓋伏遇某官中興佐命先覺上臣念掃河洛之塵將翕清於寰宇必擴山藪之量先廣㧞於人材愚智兼收功罪咸録袁安以不錮人為徳荀彧以能進善為功杳杳鈞天昔已甘於夢斷迢迢星漢今或望於槎通尚覬異時得酬洪造湖州到任謝兩府啓浮家四水初為習隠之謀出命九閽誤玷惟良之寄免寒塗之偃薄即官次之便安自為之謀不過如此伏念某材非大受學第小知少不自量冀亨塗之接武老而多難潔孤迹以投閒方且賦歸来篇於松菊之間詠招隠詩於雪月之夜躬營小隠以樂餘年欻奉誤恩俾臨舊治白骨再肉雖荷生成于思復来豈無姍笑此蓋伏遇某官中興倚仗吾道權衡不廢窮人知聾盲跛喑之有用若築大厦須棟梁棼橑之各安肆令寒谷之人上逹細氊之聽蘋洲花瀬敢事於燕游羽檄軍書第勤於警備湖州到任謝監職啓霅水便藩淛河都㑹承流自昔初無遺愛之在人申命督行獨荷隆恩之圖舊仰無以副朝廷因任之眷俯無以慰民俗挽留之誠奏職云初省躬多懼恭惟某官望髙時論徳冠士林當劇部之按亷竦百城之觀聽盤根錯節方知膚敏之才聳壑昂霄佇發經綸之藴顧惟昩陋辱在庇存幸㑹實多敷陳罔既上監職啓二首肅將明命乆欽直指之風退服冗僚莫展上交之禮逖瞻名徳坐役營情恭惟某官學無常師文有竒分書林論篹實繄潤色之工憲府弼諧夙著糾繩之譽眷兹劇部就委軼材豈惟資振職之中聊以副承顔之便佇聞召節擢寘禁途伏念某罪不逃刑貧猶仰禄量材揣分固難簉於英竒辯迹求心或未愆於名義幸茲委𤨏託在庇存章紱之榮撫孤老而竊幸獄市之寄豈衰朽之能堪自驚流落之餘猶玷選掄之渥幸兹昧陋託在庇存恭惟某官學冠世儒望髙時論盤根錯節而大才始見聳壑昂霄而逺器叵量被眷中宸觀風劇部將肅肅之明命已訖外庸賛巍巍之成功即躋近綴某方縻賤役阻造崇墉久深仰止之懐未遂景行之願恭俟按臨親承約束代謝改官啓服勤書槧雅無編削之勞拜命恩綸誤被超遷之寵仰膺僣賞俯激懦衷竊以職方辨九服之圖使同貫利外史掌四方之志以逹書名洪惟聖朝奄奠區域尺地莫非王土黎獻共為帝臣山川藪澤之混殽職貢族系之紛錯宜有不刋之典以垂罔極之傳肆命儒宗顓緫書局然地逺則咨諏必廣蓋事大則討論至難子雲欲纂於方言徧詢計吏太冲擬作於都賦逺訪蜀人因命方州各供圖志擇時髦而講貫設勸典以褒延茍非其人不在此選如某者性愚而志癖才薄而數竒躡屐擔簦乆擁經於學省濡毫操牘屢獻藝於文場弟兄並綴於辭科仕宦獨沉於門調失夀陵之歩雖負初心讀輪扁之書敢忘素業昨備官於曹掾獲簉迹於師儒猥奉檄書使詳輿地惟此海沂之境介于徐兖之間焚膏稽考者殆二年趼足訪求者周五邑刋除謬誤補綴闕遺無實之言固異景公之棗有得之慮輙獻野人之芹徒知職分之當然敢謂宗公之過聽特形奏牘俾進官聮眄睐所加遂起駑駘之價恩華下逮更包龍斷之羞此蓋伏遇某官道徳宗師文章哲匠敷求英雋以報聖主之知樂育人材上濟師臣之美有如疵賤曲荷矜憐卵翼已成盡出生成之賜㳙埃可效敢忘報稱之圖䇿問治法問傳曰明王即位建大中以承天心則庶徴序於下日月理於上又曰天子建中和之極兼總條貫以順成天慶故善治者莫大於建中又曰天下本無事庸人擾之爾苐澄其源何憂不簡邪又曰切恨國家釋樂成之業而虛為此紛紛也故善治者莫先於靖民湯之執中舜之㳟已盛帝顯王之稱煌煌于天下率循是而巳恭惟聖天子紹祚二年于兹精神所嚮天順之人應之雖庶僚百執不足仰望清光然竊意其萬一殆専以大公至正之術待天下也紀元詔書懇到切至士有一言及此者不以次而官使之此二三子所睹聞也夫居尊而制四極正始而慮萬世非大明法度不足以藩飾非廣延賢智不足以維持也今朝廷既皆知二三子其茂明之以著于篇毋使問以國事千轉萬變而不窮専美方冊也治功問蓋聞上古隆治之時俊良耆傑無不登用姦囬諛媚無不放斥四夷賔服百吏競奮黎民醇厚風俗移易天災時變昆蟲草木之妖無不消弭休符嘉瑞麟鳳龜龍之屬無不備至郊天祀地神示顧答跂行喙息無不得宜嗚呼何修何飾而至此歟本朝受命百數十年聖聖相授潤色宏業以今觀察治効之隆豈盡如古邪其亦有未至耶興利之要何先補弊之術何貴守成之道何以杜患之㡬何務諸君具言之毋有所隠治效問周室之興岐豳豐鎬四易都邑修仁累義受命配天積十七年至於成康然後兵寢圄空號稱極治何其難耶唐文皇仗義晉陽不三月帝天下投戈偃革之日未乆巳能使貞觀之民居者外户不闔行者旅糧不齎何其易耶然周道陵夷既乆諸侯彊大莫之敢傾郟鄏之卜卒過其厯唐至天寳海内已亂自安史首難悍鎮矯據四十八州乍服乍叛訖不能有豈治効有淺深之異故禍亂之作亦有淹速歟公孫宏誦語漢庭謂周公旦治天下朞年而變尚竊遲之則圖治疑若甚易李石抗對便坐謂十年養徳甫成爾天下治不治要自今觀之則圖治又若甚難孔子曰善人為邦百年可以勝殘去殺矣治果易乎又曰如有用我者朞月而已治果難乎歴觀前世通儒上才品議時政亦雜然不一或曰日中必熭操刀必割持是説者其言剛果而必行若賈誼告文帝失今不治必為痼疾不肯早為豈異秦之季世是已或曰物暴長者必天折功卒成者必亟壊持是説者其言寛緩而不廹若朱浮告世祖游意經年之外望化必世之後是已二端異焉將時勢使之然歟方文思天子在上逹孝紹先猷明徳臨海縣厲精治道宵旰念此至熟也將逺撫長駕井田學校比隆三代之盛又慮未可以嵗月幾也將興補滯弊持守盈成茍圖目前之治而已又慮不足以貽則萬代也然則奈何諸君學優智明通逹國體其盡言之于篇以啓告愚陋亦斆學相長之義也官制問在昔隆治之時分職以馭羣臣因能以裁列位治稷者不以涖水土之功典禮者不以居犴獄之任下至虞人之賤猶知守官典衣之㣲不敢出位故能同徳協義共圖康功何其盛也去古寖逺官制紊亂先後失當崇卑奪倫序爵之公無復可考神宗皇帝慨然念之逺稽成周之隆近約宇文之制肇修廢典董正治官始以階定品而省臺寺監之儀粲然一新矣名定而實應職分而事舉在下者思於競勸居上者易於循責品式周宻濟濟乎郷於六服承徳之時矣今朝廷紹隆前休増光潤色約循成書以詔萬世蓋將與唐之六典並驅而爭光也議者謂閒曹槩補則吏有冗員文移複重則局有滯事官司之遷徙太數司徒之弊蠧未清尚有可論者試條陳其端以復于上増損更化助成不刋之典豈不休哉官方問讀先王之詩攷其風聲氣俗士大夫㢘耻行義藹藹穆穆何其盛耶仕止之義雍容可觀羞于夸毗以倖爵寵故其詩曰靖共爾位正直是與引君當道不以拱嘿為智故其詩曰来游来歌以矢其音質實忠朴雖在隱陋無所蔽欺故其詩曰肅肅兎置施於中林赳赳武夫公侯腹心勤勞營職朝夕夙夜故其詩曰黽勉從事不敢告勞此其所以能振扶國是而宣賛時雍者也以今在籍考之垂纓戴褷充百執事之選者盖鉅萬計不為不盛矣然射進者以奔趍衒鬻為深謀患失者以抗直敢言為無策以至誕謾誣偽懐罔上之姦委靡因循為竊食之計殆不可縷數其能魁然振㧞流俗之外者亦無㡬人爾豈干禄之路狃于故習訖不可變歟將播告訓敕勸誘懲艾者未至也昔賈生有言人主所託財器職業者粹于羣下也俱亡耻俱茍安則國家最病今諸生受業學庭有日矣其宜據古驗今議所以矯革之方若夫庸庸守常之論非所欲觀也選舉問掌銓總者以用人為職能官人則振職矣若其所以振職不必問也司貢舉者以取士為任能得士則勝任矣若其所以勝任不必問也昔任昉指劉之遴謂王瞻曰此子學優未仕水鏡所宜甄擢瞻即處以要官是昔之能官人者亦因衆譽也崔郾試進士吴武陵將杜牧阿房賦為疾讀郾即處以異等是昔之能得士者亦採素論也今吏部之啟擬一以資格禮部之考閲一以文辭成法定令付在有司尸其事者雖逹官近輔猶不得毫釐加損也况敢開請寄之路乎雖足以示至公而掖寒素然欲人人稱其才分所宜未必盡能如古也議者欲少寛禁防兼採平日之衆論以為用人取士之術庶㡬已仕者無淹䘏之患未仕者無遺失之嗟不識其説可聽否試援古推今而論之考察問書曰無曠庶官天工人其代之語曰修廢官四方之政行焉此聖人垂世之格言也後世乃有官省則事省事省則心清之説蓋捜羅之不精課覈之無法人人偷合保置而漫不營職則雖多無益也若夫百執事之選皆得真才而官使之咸修智能効見於事則豈以多為憂哉仰惟主上焦勞萬務慎擇庶明不愛爵寵以示延納雖文王之能官未有以過也異時要官顯級虚位弗置與夫閒曹複員一官兼領者今皆推擇布滿而聮事合治矣又増六察以糾愆違置六尚以司服御鹺茗有使均輸有官建内外學校而聮師儒至於數百修山澤政令而命丞佐至於數千皆前日所未及者也尚慮百司庶尹不孚上意自奮於功名之塗而奉職因循姑為㳺食養望之計不識選除之方考課之令何修而可比於先王之盛二三子能知之乎取士問自鄉舉里選之法廢而以詞藝取士畧其平時而論其一日凡流倖進望士間黜非徒朝廷之深患待舉者亦病之裕陵稽古欲核實於庠序而漸革科舉㳂習之弊于是成均政令一新廣輪奐之居豐餼廪之秩慎師儒之選増弟子之員優遷補之條重請寄之罸以至于今人材之成比隆於多士濟濟之世徳至厚也今朝廷欲推廣美意増建州縣學擇其秀出於等類者升之辟雍論材而官之議固已定而法則未下也諸生試論著其詳以待講議局之採擇士習問古之儒者用於君則憂君之憂食於民則患民之患在下而不用則積學修身而已固未有救鄉鄰之鬭而代大匠之斵者也今之儒服者往往不能以分義自安投罅伺隙干時射進追逐時好章交公車甚者飾游辭以誣善類倡邪説以瀆先烈彼其居心積慮豈真有意於整紛救弊哉不過僥倖爵賞偷取少頃之榮而已迨夫時論載新國是既定則又盡變前日之説而更為趨附之計隠慝呈露上煩司敗之刑嗚呼古之所謂常心持操者固如是乎昔戰國之際處士横議朝從暮横而東京之衰太學諸生品覈公卿裁量執政以成黨錮之禍皆前世弊事也以今文明之時教養之盛而士無純一之操若此不識何以救之勸學問通經好學天下以鄒魯為稱首今列學士之版者殆以千計可謂盛矣郡學新書蔽自上意加恵學者恩意甚寵遵行寖乆雖十室之聚無不揭牆壁而昭示之業進士者皆所睹聞也是宜歸心慕義雲合霧集使泮林之上爼豆之容誾誾可觀絃歌之聲亹亹相屬追昔洙泗之盛顧不韙歟今則不然狃于宴安志在𤨏屑甘為自賊自暴之士而恬然無不若人之耻者尚多有之甚者掉臂於改築之宫其視黌宇廢興不啻如秦人視越人肥瘠豈能副天子樂育之意哉語曰學如不及猶恐失之傳曰懐與安實敗名昔人蓋有輕千里而迎師走百舍而問道者今不出父母之邦而得自進于學誠非旦暮遇也顧左計若此獨何歟議者謂攻異端闢邪説徐以聖人之精義誘掖而開逹使道徳性命之固有者瞭然神受然後能樂靈徳而趨嚮之勸學之序當如此諸生以為何如試士問國家三嵗一下明詔獵取天下俊傑考其經以觀其學考其論以觀其識䇿之世務以觀其才其軒然秀出者不旋踵而畀以爵位招延之路甚廣眷禮之意甚隆而禁防之術似未盡也論者謂近嵗場屋有四弊不書行實一也限以定數二也冐名代試三也挾書求售四也昔賈至議貢士欲使保桑梓者鄉里舉在流寓者庠序推庶㡬兼得士之行實今徒責一日之文而畧平日之行則可乎丁鴻議孝亷使郡國率户二十萬嵗薦一人不滿則二嵗一人故能革前日不均之患今諸郡取士寛狹至相倍蓰初不顧應書之數而一切限以定額則可乎假手旁坐借人外助此唐弊法也今欲得真才如之何不峻其防陳書庭中不肯露索此唐異事也今欲觀記問如之何不覈其實考言選士近在數月諸君智策甚髙通逹國體科選利害講之尤宜詳願悉意陳之將以告于春官氏焉富强問􅅷化居者理財之義訓游惰者彊兵之術語政者莫先焉元豐真人修明憲法加惠天下凡邦邑皆置平準局以權萬貨低昻使重装富賈不得擅豪奪之柄利源之入歸於公上此泉府治市之餘意也或曰設官籠貨與細民爭銖兩之得似非王人布利之意其説信乎陪京諸道籍剽勇之民保伍聮結教以技擊蒐閲漸可革冗兵待哺之費此鄉遂寓軍之遺法也或曰聚不逞之人授之凶器非惟妨農墮業且虞其嘯集生事其説信乎恭惟主上緝熈功緒纎巨畢舉惟兹二者或置之不論或復之未盡其故何邪豈時異事變終不可恢復歟議論之士不深覈其實而姑為是􅊱􅊱也諸君通知世務行作吏矣利害之實其詳著之有補於今日紹隆之政豈不休哉食貨問生人之本食與貨而已農與末相資而國以殷富箕子陳洪範推為八政之首而史家亦曰道御之而王權用之而覇古今一也方成周時天子自治者止於寰内千里而懋遷治穡之官至不可勝數後世以為海宇之大生聚之富而曽無官師及於食貨之務此民力所以多瘠也主上以孝友之徳紹休兩朝以神明之資勵精庶政比詔郡邑皆置農田市易之官蓋將挈提生靈納之富夀凛凛三王之舉矣今欲地無遺利而年榖常豐亡者使有利者使阜而民財不乏不識常有以裨朝廷憲令者乎藩鎮問唐自天寳失御㓂盜内訌桀黠為亂方鎮割裂史家雖具著于篇而制禦得失之方論述猶未備也魏愽七州傅襲六姓不沾王化者一失於僕固懐恩再失於馬希倩三失於李懐光四失於馬燧五失於田布六失於李聽其説信乎章武以元和九年秋討蔡至十有二年冬十月然後元濟授首嘗怪其以英鋭絶人之姿團天下之兵據人主之勢與三州之孺子敵顧乃老師曠日僅能克之杜牧謂由五敗不去詳考事實殆真有之至討成徳出入十年叛渙之臣訖不能覊致闕下或謂丁未詔書赦承宗而班師者謀失於白居易庚辰詔承宗受地者謀失於田洪正其是非又何如也盧龍之地已得復失議者皆歸咎崔植杜元頴不知制將蕭俛段文昌不知制兵或又曰始不用裴度而用張宏靖燕薊所以亡終不用裴度而視賊弗討燕薊所以不能復矛盾之説又將安據也㑹昌澤潞之功李徳裕一人耳觀其抵排浮議要結外援訓師使整而壯御將使専而勇謀猷有足稱者願并論之以觀諸君慱古之藴焉逺識問姦臣竊命諛媚成俗金匱大誥之書藏於海内西漢所以亡也而論者歸罪張禹閹尹擅朝擊斷無諱回天獨坐之謡譁于民間東漢所以亡也而論者歸罪胡廣豈其偏見異説茍欲惑衆歟將獨覽深識灼知基旤之自故探端揣本而誅之也齊晉之季也晏子叔向能預言吴虢之亡也子胥卜偃能先見隋文帝靖三方之難破五王之謀混一南北天下仰治而嫡庶殽亂房𤣥齡獨深憂之晉武帝用張羊之謀仗王杜之决役不二時揚越歸附而無經國逺圖何頴考獨深憂之已而陵土未乾板蕩同轍一何標鍳之明邪且天下大物也基廣根深故無傾㧞之慮茍目前之安而不思長乆之計則禍隙雖未露而識者寒心矣方策所載諸生講求熟矣悉條舉以告愚陋者靖民問槃瓠遺育介恃險絶敢以烏合之衆騷繹吾圉雖蚍蜉蟻子不足汙刀机然邉氓一有不被浸潤之澤者上聖所戚也於是起沉英於乆廢而屬以干城之畧僇任職之不䖍而詰其誨盜之因赫然興師洗滌區落詔使節方及境而兩路之㨗遽至矣歸我舊境錫之新名而慎揀守將以綏撫之甚盛舉也尚慮逺人歸附之始所以招懐安輯之方備豫乆長之計有當議者幸詳著之律令問律令之學號為較易然區别綱條貫通倫類意論輕重慎測淺深使纎㣲曲折無不與郵罰相當非積日䆒習者徃往不能通其㫖神宗皇帝睿慮及此始建東學以處士張法科以取人又命業進士者皆試律義庶家修人習知奉三尺以從事且蒞官弊訟之際無致紛紜枉橈之失而恵澤延及於齊民慮至逺也後之議者以謂經術儒雅自足飾吏事雋不疑北海一文學而能决疑獄徐有功東郡一明經而用法無寃至杜周張湯軰號明知憲令而弄文骩法至使人重足而立且吏道自有資材何至使待舉之士弊精神於末學由是附律之意廢格不用今欲取元豐之美意附益於取士法中二三子以為可否
