body:
  text: 丹陽集巻十三宋葛勝仲撰墓誌銘左朝議大夫致仕祝公墓誌銘公諱康字道濟崇寧元年守魯郡時某分教諸生公遇之厚因與公之子天輔周旋後十三年天輔之子將仕郎温彦踵門泣曰先大考𦵏宜有銘先考欲求夫子為之今敢以治命請讜行許之是賜逮三世也乃摭其狀叙曰祝氏著籍單州成武今為滑州韋城人公之父曰諮两第進士積官至太常少卿糾察在京刑獄贈金紫光禄大夫娶天水尹氏女生公是為永嘉郡夫人祖曰惟嶽卒官虞部員外郎贈户部尚書曽祖曰宻贈殿中丞公性夷澹無浮念外好獨喜觀書載籍畧皆誦記名能文辭四貢禮部一為舉首以門䕃補將作監主簿第試異等賜明經出身入刑部為習學公事法直官又為檢法詳定官入大理寺為法直官又為評事入書局為官制檢詳文字又為元豐編勅所删定官删定一路勅令又為元祐勅令所删定官入尚書省為刑部員外郎又為郎中除知趙晉潞兖四郡管勾南京鴻慶宫遂得謝官自承事郎十遷為左朝議大夫勲自武騎尉十一遷為柱國服佩朱衣銀魚初金紫公號文無害屢更中外法理之選小大之獄申理枉橈甚衆故公於刑名之學目擩耳染不習以能元豐中神宗皇帝欲入仕者通習文法始建律學又每嵗聚天下士課試刑法錄上第者顯擢之凡廷尉憲部臣屬皆推擇除授而公與兄庻首被識拔並游法寺衣冠慕之公於斷獄論議持平人謂不寃至刋定律令立言寓意非法家識慮所及故凡置局輒預累朝刑典悉關其手出刺全趙施張綱紀如世吏師大姓范某以姦俠亂吏治前二千石欲制者輒持短長公䟽其宿負逮繫累月案致其罪郡中股栗民吏大驚相戒毋犯公法蓋公前此未嘗更民事也逹官勢人薦其材者四十輩在上黨顓以愛利為心嵗比不登誘温户出粟廪餓者全活萬計死者具衣槥收瘞之遺愛至今誦民口在東魯為朝廷大興學嵗貢賢能辟廱復古賔興法公讀詔奮曰吾邦孔孟舊里周公封國也修起學宫宜甲他郡因撤舊宇一新之為夏屋三百區間從衆儒論難經訓文風大振𨽻弟子籍者數百人郡事靡宻煩碎必躬親之結課異等既受代天輔為鄆州州學教授近請之官崇寕四年三月丁夘以疾卒於鄆春秋六十有七公天資粹和志行髙整好延譽人而樂人規已接待僚吏恩施甚厚有過者平鐫使改不使麗罪人皆徳之内行甚修居母䘮毁瘠不食塩酪服除有出世間意以父命勉仕故訖其身惟衣䟽布進侍親油油翼翼寢食不敢先輟奉賜班宗族之貧者猶子天任早孤撫之盡其恩先已子而官之仕遵三尺因俗為政雖寛猛異施而所臨稱治先娶清河張氏贈旌徳縣君今夫人洛陽范氏封崇徳縣君改封永福君恭人皆有賢操男即天輔好學自立試吏部第一舉進士又舉宏辭皆中第終承直郎孫三人長即温彦次清彦冲彦女適武學博士李子竒亦屢登科選庻今為朝請大夫提舉西京嵩山崇福宫天任今為朝散大夫公以其年十月癸酉𦵏開封府長垣縣太平鄉永寕里鄧崗之南原銘曰陶唐之後中絶不續武王反商國之於祝單父大家再徙韋城自公顯考摠國祥刑申直頗纇為天下平鶱翔要塗公寔濟美决獄刋令不為峻抵入為䑓郎出長郡治以法為師得法外意在昔仁者子孫必興于門駟馬虞胄九卿公躬弗贏隠徳多有源深流長寔燾厥後朝散大夫致仕柱國賜紫金魚袋侍其公墓誌銘公諱瑋字良器姓侍其氏蘇州長洲人也世序自先漢廣野君之裔孫賜氏食其後有為武帝侍中者因又合官與氏而稱今姓曽祖仕李氏知吉州歸朝任監門尉大將軍贈左神武衛上將軍諱禎祖右侍禁諱憲考贈右正議大夫諱泳家世以武顯族大且貴聞天下公獨自刻習儒學詞章從進士試皇祐二年中第調杭州富陽開封陽武二縣主簿掌書記閬州改著作佐郎知池州建徳縣遭正議憂服除知光州固始縣監鄂州酒又知吉州之永豐簽書桂陽監判官稍遷通判全州移刺化州又刺池州表請致仕積官至朝散大夫勲柱國賜服佩視三品富陽故兩税局一𨽻主簿公至課輒倍他日專征者負殿且罷斥公悉推羨數畀之使償逋額課更以􅆟上而公以此稱長者陽武官僚繼踵坐法免公齒少獨當大邑風政凛然殊異府尹包孝肅公材之檄攝右軍巡判官至則為之盡力有亡命卒坐剽金論棄市獄具公覆視文案疑有寃訊得其情白尹為平停之囚以不死在職滿嵗申活枉橈以十數濟辦府事隠然名動諸公尹滋材之欲表為真人謂公且階此顯仕而公方薦所知自代尹義而從之河水怒溢嚙埽决壊朝廷出制使馳視公身臨水衝料丁壯早莫䕶作遂以塞聞任事者皆進秩獨不自言在固始詢求遺便嘗穿永清南津二渠漕粟溉田交頼之永豐大姓持吏短長因横恣漁食閭里又土俗以䑕莽蠱毒殺人公禁沮立絶全守武人不閑吏治公隂為處議每條教下自幕府不知由公出也化州僻陋下車築校舍置諸生誦説間為擁經親授義訓人士知趣學自公始也有州佐自海南代還經郡市征者故與有仇以匿貨文致其罪公亷知狀為處平之州佐欲挾公修憾則䟽其宿負求窮竟之公亦無所聽繇此兩人交徳公囚有坐至重辟者為奏讞得減罪一等已而録見囚縱出之佐史大驚公曰是羸痩不堪杖杖之必死讞之前而殺之後其去幾何人服其敢為居六年不代化行南土歸裝無嶺外一物當世清之在池州籍記桀猾主名或犯禁輒披籍與重比以故姦不迹境郡中翕然稱治未幾召還遂請老公性靖退知止足奉公孤立特介以質謹自將不肻橈節媚權近仕進淹晚一不綴懐夙嗜學問喜聚書自少訖老未嘗一日去篇籍不觀工草𨽻善屬文賦詩尤多時稱佳筆製續千文行於世内行孝友加人始官錢塘迎祖母賈氏夫人以養承顔盡其歡是時族千指賈方專家政能使忘歸焉服前後䘮皆哀臞不自勝呉中貲業前推以贍同産子晚節無所於歸因徙貫宣城招季弟共居視遇與已無厚薄退居十年論議本忠厚專以表善賙急為心江左衣冠仰為軌式春秋雖髙精明如壯人俄屬疾甚微沐浴更衣命左右掖坐若將寐者泊然而逝崇寕三年十月丙辰也夀八十有三五年九月丙申𦵏於宣城縣萬松山之原母夫人王氏太原郡君兩娶施氏封仙居永嘉二縣君皆有賢行男五人鈜桂州永福縣令錡前卒鍔通州司法參軍鍴釗舉進士皆有學守孝謹祥順名能世其家女三人皆嫁婿路慶隆為左班殿直蔣忱為藤州鐔津縣令王彦思為鄂州蒲圻尉孫男女十三人某侍其自出也先夫人北海君于公篤友愛平時道公事不虛口故其不肖子得公世次行治勞烈為詳義不敢以疵賤辭毋銘也因泣銘曰侍其之先髙梁啟封以官命氏繇漢侍中逮公曽祖脱迹建業以武奮功桓桓累葉公以學藝收科自躬與道進退不棘於逢龜紫朱輪吏二千石豈曰不逢未配名徳惟徳之配天則大之康寕夀耋子孫頎頎有窽新宫兆墨云食詔萬斯年篆此幽刻右朝散大夫侍其公墓誌銘右朝散大夫北海侍其公諱鈜字希聲紹興七年正月辛未得謝丙子終於宣城里第年數八十有一其孤升卿以其年三月甲寅奉公柩塴於縣仁義鄉萬松山先塋之東以某侍其自出謂公緦兄實熟公世次行治再抵書求銘乃泣為序而銘之曰侍其氏自漢廣野君之元孫賜氏食其又三世始因官改錫今姓而望出北海者尤多顯至公之髙祖諱禎仕李氏知吉州歸朝授左神武衛上將軍生右侍禁諱憲始自建鄴徙家蘇之長洲侍禁生贈右正議大夫諱泳名清正篤行君子正議生公之考諱瑋起進士歴刺化池二州焯有聲烈贈金紫光禄大夫公以父任調永州司法參軍前律後令夙曉習吏不敢弄嵗饑盜有强刼人禾而傷其主者州將且論死公固争曰嵗災不可麗以常法㑹徳音降從流坐公仍争之謂當以流為本罪而用赦末減已而讞以聞廷尉果是公議蓋公初仕不茍於職巳如此用薦者遷桂州永福縣令擊斷明審廷無留事且受代府帥若部刺史惜其去創州鹽倉闕表公就職府帥曰吾僚通敏無踰之者仍委兼幕府督司諸公曰我言其材規以自助因交屬以事公黎明坐曺夜漏下數刻始得休衆職俱辦魁然見頭角廣西並邊州縣例以官鹽逼新民使售公虞生變獨輦鹽入洞自置場鬻之民夷以為便課更大登以外艱去位服除㑹蠻獠初以平允從等州入版籍丞相唐公恪時將漕江東銜命撫諭詔以公為恪幹辦官公既馳至桂管代其長入險逺洞寨時酋渠情不測或請擁勁兵自衛公曰宜輸寫心腹綏懐之詎可以鎧仗市疑耶因單裝徃蠻人始衷甲荷戈逆境上望見使者惟一二儐從乃投兵免胄就燕犒公具宣天子徳音皆環公拜且泣曰不圖徼外蠻夷今霑聖化他種落艶寵相繼効土疆後使至不能如公示以悃誠變起尊俎間繇是廣人益追誦公之能使還策功第一特改秩授宣教郎除在京諸軍審計院出知潯州公不鄙其民膏枯撫羸一以恩信民化服之州置監冶鑄鐵錢以緡計者儲數百萬一日更圜法命悉消毁公獨奮曰事固未可知格詔存之後果復用省費不貲代還除在京諸司糧料院擢知蜀州時方復古賔興法公慨然以誠意助樂育鼓篋交至間有名士跅弛抵罪者輒縱舍之後多拔髙第巴蜀文雅遂光前世秩滿除開封府司兵曺事以郊祀恩賜朱衣銀魚府曺牒訴叢委異時劇吏抱成案持必於官公獨親裁事論貸輕重咸出巳見無銖髪枉橈尹頼之朝廷知其材任劇擢潼川府路轉運判官欲用矣遇妻䘮請郡便家除知徽州未行改均州遂請散局得主管亳州明道宫以歸初金紫公既倦仕樂宣城丘壑之勝築室居之蕭散十餘年而公名爵夀耋一與之埒談者推為仍父子之美云易簀前一夕與親友銜杯至夜艾體初無不平鷄一鳴呼侍媵取燭家人起視已正坐逝矣公為人外方嚴而内樂易仕惟平進所涖有明恕之響獨喜文籍視他世味如嚼蠟也官永福日忽起親念即假歸冐瘴獨徃返萬里不憚既除䘮悉推先業畀諸弟之未仕者族子貧困異縣招致共居調䕶之尤篤數官南服歸裝無珠犀一物中年從方士學導引吐納術故年殊八十而耳目筋骸堅悍不衰官八遷為右朝散大夫娶劉氏太子中舍敷之女封榮徳縣君累封宜人子長曰䂬早世次即升卿右廸功郎池州青陽縣尉女三人嫁撫州金谿縣丞王叔全左宣教郎前徐州州學教授徐楫左朝散郎前興國軍學教授桂南升孫光祖慶祖皆以公䕃補將仕郎銘曰昭亭之陽兮張祁之里泉播播兮石齒齒靈氛卜幽竁兮曰燾慶而儲祉楸柏相望兮父母孔邇公既脩夫姱節兮又申之以内美名光策書兮祭有孫子嗚呼公兮一無憾於生死神明其升兮體魄安此左承議郎致仕丁公墓誌銘呉興山水清逺世産第一流人本朝以文學政事風節致髙位稱名臣者磊落相望而髙蹈著聞者自祕書丞朱臨先生始先生皇祐進士以壯齒得謝里居自號少翁逺近慕其節師尊之自是邦人以知足自勵歸不待年者亦踵相躡公其一也公諱安常字權中世家湖州徳清以諱某者為大王父以贈中奉大夫諱某者為王父以中大夫贈光禄大夫諱某者為父而謂少翁外王父也公少有識量强立早成率諸弟游賢闗聲號籍籍光禄公遇恩當上一子公居長而請先其弟崇寕五年果自以經術擢進士第調開徳府法曺參軍年少耳所為已卓越動人劇吏不能骫法弄事閲三年將解秩轉運使許几器其才常表以自佐遷從事郎澤州司户曺亊㑹朝廷營室下河東調大木鉅萬異時役夫斬木太行頻陟險峻手足偶失措輒顛墜崖谷死者不可勝計部使者檄公䕶役且誘以重賞公曰薄人於險而已尸其利非仁也始吾不願仕者正以違已為病今豈戀此幘哉因求謝事郡守丞力挽留之抑其奏踰月不上而志不可奪遂以宣教郎致仕是嵗春秋纔三十八光禄公喜曰而夙慕少翁髙世行今不愧之矣宣和末給事盧公襄守呉興與公有學省同舍之舊每叩門問政已而被詔朝京師且率貴近交章起公因請俱行公笑曰門既杜脱復啟寕不畏北山叢條譏人耶卒不屈中年益厭城市喜菁山巖壑之秀且有葛稚川遺跡乃即其地築草堂環蒔松桂桐竹日倘佯其間未幾金人侵浙右士大夫南奔者無所歸公峙糧掃舍為之主有黄朝隠者素昧平生自金陵輿疾來求寓公為調䕶其疾俄不幸厚禮𦵏之公樂賑人之急概如此兩逢踐阼恩遷奉議承議郎加賜朱衣銀魚積俸錢百餘萬皆置不取紹興十二年九月某甲子公年六十有五終于家以其年十二月某甲子𦵏湖州烏程縣游仙里葛山之原配羊氏父曰奉議郎徽卿封孺人男曰士龍强學有文嘗薦禮部曰士遜士元尚㓜女長適右修職郎江南西路轉運司幹辦公事閻鑾次適右承務郎葛邵次適將仕郎姚端誠孫男女合三人公性嗜書遇警策必手抄而心記與客語纚纚可聽自奉孔薄至可以利衆若聚圖書聘師友一不靳對童賤禮意恂恂與人交無新故悉竭誠悃一話一言洞見肝膈或問死生之理憮然應曰彼怛化者行有不慊於心者也吾委順而已洎且死起居言語如平時家人迎毉及門已逝矣嗚呼豈退居二十七年之功用在是乎彼抵􅇖射進夜行不止而位髙禄富碌碌與草木俱盡視公所得孰多耶某再仕此邦晚復卜居近郊寔仰公行義且辱薦息女為孫婦方圖與公黄冠野服相從泉石間而公遽不幸悲夫初光禄公以進士起家入總𣙜貨出刺邠光二州有材力撥煩之譽官其子三人公與弟安止弟子雄飛復能挹世科而子姓與賔薦者相屬故今衣冠儒學盛家推丁氏興蓋未艾也銘曰丁公儀儀早謂瑰竒學於古訓弗懈弗隳一世所難獨勇為之一世所願顧謝不窺天相其功開迹宏大以壯為老浩然夙退才雖不施志則云遂媚于林丘優游卒嵗塗轍弗升於天奚懟天卒相之子賢而文圭組赫奕豈必其身承議郎王公墓誌銘公王氏諱登政和二年唱第宸筆賜名因字廷錫其先太原祁人自公五世祖始徙貫婺之金華縣公㓜孤困窮痛自奮激學問既長名通經能文詞逺近學子請業者甚衆再中鄉書一以郡上舍升貢辟雍省復兩預國學薦始擢第調衢州盈川楚州漣水二縣丞改宣教郎知越州諸暨縣秩滿差知潭州湘潭縣會課遷奉議郎逢今天子踐阼恩遷承議郎盈川嘗行令事人有詐為祠部度僧牒鬻於市者公發其姦捕得之格當增秩愀然歎曰寘人重辟而已顓其利仁者為是乎因縱使自言卒用首法減死政和八年秋郡國大水漣口當淮泗下流支川所匯公俟水之未至増築城牒已而水嚙城不沒者三版邑人讙曰微吾丞公吾曺其魚矣公復峙餱糧儲械用旁郡流移至者如歸全活數千計盜劫諸暨温户沈淵家久未得朝廷洎部刺史督捕苛峻前令執錢唐兵與盜同姓名者鞫訊成獄既具且上府會公視事以牘及囚辭氣參聽得其寃狀亟縱出之一府傳疑檄縣再録囚雜治公弗聽明年盜自通於河朔移文至邑聞者始大驚服公之聽斷明多此類也仕歴四邑外嚴中恕砥節礪操不可干以私湘潭官期滿踰年無趨治意方且市丘隴治棺絮若前知死生之數者俄屬疾語家人以去來常理易簀無憾以靖康元年四月某甲子逝年數六十有一大王考某王考某不仕考某贈宣教郎娶大理寺丞陳珫之女封儒人男長曰師醇次曰師心宣義郎監信州汭口排岸季曰師古長季俱嘗升名禮部孫男二人澐演諸孤將以二年三月丙申𦵏公赤松鄉黄枇塢而遣人抵書以銘見屬始某自大司成出領宫祠寓居襄賁因與公父子游見公静退不以榮槁措懐獨進諸子於學甚厲日論説文義以磨礲浸灌之方是時師心始冠已能用經術取上舍第而師醇師古皆軒然有邁徃之韻予固心器之矣其後師心為海州沭陽尉遇京東劇賊數千人浮海來㓂公適就養在邑命引兵邀擊境上馘渠酋數十人降其餘衆一道頼以按堵太上皇帝多之降御筆詔褒諭衆譁説交譽而不知計畫多自公出也嗚呼使公得為世用智畧効見當何如哉銘曰既艱其成始發其榮宜永其享而嗇其齡絃歌兩城位不配能有息俊英亦足除乗吉壤妥靈孝子所營我為之銘以逺徳聲奉議郎致仕周公墓誌銘公諱某字彦霑姓周氏其世序自晉左僕射顗繇安成渡江徙建康至公之髙祖復避五季亂繇建康徙毘陵芳茂山之陽故今為常州晉陵人公幼聰穎後母俞氏撫之均已出故公雖壯長不知復有所生母其兄子彬且死屬其故舊吏部侍郎霍公端友曰吾叔性淳至不知所生杭氏在外也可須其登第語之紹聖四年公以進士解褐調開封府鄢陵尉還里中霍公具以告公聞知感慕誓見母乃出仕即以所賜袍笏束寘承塵上易野服菲屨走逺近村疃物色求之一夕夢雨霽有指冢言曰此君母也詰旦之隔湖訪求有老父告曰我知之死再嵗既𦵏矣引而示之冢時雨初止宛與夢合公慟絶即易棺衾䕶歸具禮改𦵏税三年之服哭泣哀傷踰逮事者當是時同學諸儒共臨祭醊而霍公製文詞極酸楚後十餘年霍公執太史筆復作記叙本末以傳世云免䘮補泗州司法參軍持議平淮南饑多盜大率規微利輕殺人公哀之每當以輕比所全甚衆盜有匿人之車者他日失車家復失牛意前盜執之掠死州將欲以殺不辜坐之公争議請讞從之廷尉果當以不死遷通仕郎台州臨海丞嘗按他訟寓宿僧舍有僧暮夜為訟者以金餉公求橈法公録付郡寘于理秩滿户部辟監萬嵗院石炭塲用薦者改宣徳郎授建昌軍司録事歸數月屬疾請老遂以奉議郎致仕遇郊祀恩賜緋衣銀魚宣和六年十一月癸已終夀六十有二公性莊重而靖黙孝謹質厚篤嗜墳籍三薦始得第以禄不洎因薄其官不復干進既謝事嚴除一室取異書洎黄老浮屠之學手抄節不知寒暑飢渴晝夜如是者蓋十有二年疾猶不置巻嗚呼與夫志在名利而以學為市者殊科矣執前後䘮皆哀臞晚節每輿疾省丘墓著先塋訓誡一編引古今冢墓神靈顯著事數十條以詔子孫有遺藁二十巻曽大父某不仕父某贈朝散大夫繼母俞氏贈宜人所生母贈孺人娶沈氏封孺人子徳先行先以某年某月日𦵏公於某原而見委以銘某於公為同年進士且又喜公之子賢孝有學守不墜世緒因樂為論次竊復觀近時搢紳孝徳感通事迹類公者皆得表顯於朝具載天下耳目而公以位卑夙退事不大白因掇是莭表出之以為公銘其辭曰棘夭夭其峻茂兮莪蓼蓼而愁絶母聖善而昧平生兮將趼吾足而求索后皇命靈氛而降衷兮告以正夢而昭晣皤叟指馬鬛而相示兮痛春暉之永訣仰天泣血而心折兮雖税服其何濟也聊黽勉以出仕兮終守丘隴而卒嵗也蹇年位之甚瘠兮羌校徳而特豐我書姱莭於億年兮閟孝子之幽宫右奉議郎致仕賜緋魚袋魯公墓誌銘宣和七年天子冬祀上帝推恩廷臣提舉福建路市舶魯詹得其父為承事郎致仕嵗中逢淵聖皇帝受内禪恩進封父宣義郎且乞以當得朱衣銀魚改賜詔從之上踐阼覃霑若南郊明堂恩詹為直秘閣福建路轉運判官又累封其父為右奉議郎惟奉議公諱夀寕字景脩秀州海鹽人魯姓自魯滅于芊子孫以國為氏而扶風之魯漢晉代有顯人至横江將軍肅始踰淮居吳之曲阿中徙嘉興𨽻名數海鹽自公父始公家故貧既孤與兄弟共理貲業雍睦聞東南稍温斥所有闢文館延名儒教飭羣子弟巳而長子詹舉進士中某科開迹入仕未幾以才器自見膺被識擢更中外顯曺劇部而公身及享其寵規模智識之逺人士多之公為人外樂易而中方質出處取予常徇義而動恬於世味而奉已刻削中年敕諸子勿復以家政相闗屏居一室食不擊鮮非披佛書則習禪觀精苦如山中頭陀轉識誓必生净土紹興三年詹為樞宻院檢討官取告歸夀其親俄以疾不起人謂公老而哭子且不堪其憂公一慟即知自廣處餘年詧訔二子並特賜第閭里歆艶而公無津津喜色蓋公探道有得視死生榮辱如寒暑旦暮故哀樂不能汨其心如此公生皇祐癸已閲七朝更五百有二十四甲子而步趨視聽不衰顛髪猶黑九年秋七月屬疾丙戌召常徃還僧可觀謂曰吾誦彌陁經無慮二十餘萬他契經數不可紀已面佛自列師其證明吾且逝矣俄召婣族叙訣復呼子孫前教戒各盡其意且曰我聞佛説執持彌陀號七日心不亂决生安養吾雖净業已熟宜遵佛語復顓心七晝夜自是不復飲食語言惟口囁嚅若有所誦越癸已亭午始泊然善逝正七日也曽大父承秀大父延厚父惟辯比三世不仕而徳義有聞娶劉氏贈孺人亦篤奉釋教嘗嬰疾即醫錢塘命千僧禮迦文塔輿疾膜拜俄現毫光赫奕亘天傾城來瞻讃歎希有瀕死亦有善證嗚呼豈夙昔與公同為善知識乎何其縁契之符也子六人長即詹終朝奉大夫次慧静出家為比丘次謩右迪功郎監潭州南嶽廟次譽未仕詧訔皆左迪功郎女一人適進士陸紳及公之存孫男十有三人可度右迪功郎可久可傚右迪功郎新授江州彭澤縣尉可立將仕郎可封右迪功郎湖州徳清縣尉可復可傳可大可輔可觀可宗可受可羣孫女十四人曽孫男女七人公以歿之年十月癸酉窆於縣東武之原與劉孺人偕𦵏謩等清明邁徃力學問自立諸孫復嶷嶷見頭角今推儒學聞家必曰武原魯氏流慶蓋未艾也以某有素猥屬以銘不敢辭銘曰本自無生湛静真常寓形檇李豈曰公鄉本自無滅圓明虛寂藏魄東武豈曰公宅西方妙樂以净為縁净業相應報土現前不歴僧祗得大解脱銘以著之用警來哲
