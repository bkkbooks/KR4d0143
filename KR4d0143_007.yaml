body:
  text: 丹陽集卷七宋葛勝仲撰論孝論分之所賦有貴賤而孝亦有等差性之所造有淺深而孝亦有大小孔子以天子諸侯卿大夫士庶人之孝列為五等著之於經此所謂分有貴賤而孝亦有等差也若夫性之所造有淺深而孝亦有大小自論語觀之可得而言矣夫孝天之經地之義在人雖為不學之良能不慮之良知然擴充於心效見於事豈能無辨是故賢人之孝則異衆人矣聖人之孝則異賢人矣承顔順志而禮無違於事死孟懿子未必能知此也舉足不敢忘父母故非禮勿動出言不敢忘父母故非禮勿言疾病之外不當貽親之憂孟武伯未必能知此也盡敬孝之道而不以養口體為貴子游未必能知此也盡愛孝之道而不以有酒食為先子夏未必能知此也有父兄在聞不可遽行子路未必能知此也一朝之忿忘其身以及其親樊遲未必能戒此也是數子者性之所造尚淺故猶待聖人諄諄以誨之若夫賢人之孝則進乎此矣德行素修名譽素著交遊稱之朋友信之人雖欲間於父母昆弟之言而不得也若閔子騫者能之父母全而生之子全而歸之身體髮膚不敢毁傷不以且死為憂而以得免手足之傷為幸若曾子者能之是二子所謂賢人之孝者也若夫聖人之孝則大矣逹而在上者莫如禹窮而在下者莫如孔子有四海之奉而禮自貶於一身以一身之微而化可孚於四海是二人者豈賢人所能及哉人之情飲食欲厚也禹則菲飲食以自奉而致孝乎鬼神衣服欲美也禹則惡衣服而致美乎黻冕謂不如是則不足為民主也此所謂有四海之奉而禮自貶於一身者也入則事父兄而孝悌之化移於闕里其自處則曰孝乎惟孝友於兄弟施於有政是亦為政奚其為為政可謂以一身之微而化孚於四海者也記曰小孝用力中孝用勞大孝不匱其是之謂歟語載孔子論孝者凡十有四因論其小大淺深之序如此學論孔子以天縱之聖兆於變化而木鐸一世凡道之妙皆不勉而中豈待學哉其自稱蓋嘗曰默而識之則道不待於言傳一以貫之則道不涉於多見然論語之書載其好學特詳者何也蓋聖人之言所以為中人法聖人恐天下後世以已為將聖不可跂及而遂惰于學也故為說曰我非生而知之者好古敏以求之者也蓋學而加以敏求則就效速矣又曰若聖與仁則吾豈敢抑為之不厭可謂云爾已矣蓋學而持之以不厭則用心剛矣以世之學常失於躐等故為之說曰吾十有五而志於學三十而立示進道當漸也以人之患每失於自墮故又為之說曰吾嘗終日不食終夜不寢以思無益不如學也示入道當以誠也文武之道賢者識其大則固可宗不賢者識其小則亦未易棄故子貢曰夫子焉不學而亦何常師之有示求道當以廣也所造者深則不可以一指名所成者大則不可以一言蔽故逹巷黨人曰大哉孔子博學而無所成名示體道當以全也以生知之聖猶彊學如此况中人乎聖人所以為天下後世計者深矣故勸學者之說載於語者凡三十有六而不為復也其曰學而時習之則亦貴漸之意其曰學如不及猶恐失之則亦貴誠之意其曰就有道而正焉可謂好學則亦貴廣之意其曰三年學不至於榖不易得也則亦貴全之意是故於顔淵孔文子好學則稱而美之於子路之六蔽伯魚之詩禮則誘而進之於宰我晝寢冉有自畫則辭而闢之其大要欲學者日趨聖域而已嗚呼後之學者可不勉歟齊論昔太公望釣海濵而夾輔周室武王國之彊齊使表東海其豐功盛德必有大過人者而司馬遷為齊世家言文王拘羑里太公求美女竒物獻之於紂以贖西伯西伯歸而與吕尚隂謀修德以傾商政其事多兵權與竒計焉嗚呼審如此則書詩所載反妄邪且太公之嫉紂而欲亡之者何也為其侈麗淫湎而毒天下也使其一旦幡然悔悟咎前之為更為善政以幸天下則豈不偃兵息謀恬然臣服之耶詎肯以尤物蠱其心而稔其惡乎且太公之過紂也曰收天下美女金寶繒帛也武王之過紂也曰作竒技淫巧以悅婦人也如是而以貨色惑之是助其亡道抱薪趨火也其賢於紂幾何哉又况陷君於惡而已則圖利太公詎忍為之耶藉使太公為之文王其安受之耶嘗聞秦以女樂間戎矣又聞吳以珍貨惑魏矣未聞聖賢亦為是詭譎也此遷之繆一也夫紂之積惡久矣文王積善亦久矣上帝下民去彼而就此非一日也孰謂隂謀修德以傾商政哉詩曰周世世修德莫若文王則是周之德不待商而修也書曰獨夫紂洪惟作威乃汝世讎則是商之政不待周而傾也今奈何曰隂謀修德以傾商政耶夫在已之德則修之而使人附在人之政則傾之而使衆離是乃田常王莽篡齊盜漢之術爾太公豈肯以是導文王乎此遷之繆二也且紂有臣億萬武王亂臣十人而已紂兵七十萬武王虎賁三千而已然而牧野之戰前徒倒戈而勢若拉朽者何也逆順之勢異也太公雖有兵權何所施雖有竒計安所用嘗觀六韜萬有餘言大抵皆修仁行義聽諫用賢之說耳雖有隂謀之篇而惟以戒懼謙下為言也今奈何曰多兵權與竒計乎此遷之繆三也嗚呼遷之言必有稽證然百子虛濫之說不能逆斷而力排之猥存諸書以傳疑於後亦遷之過也南齊論人君恢廓大度以御臣下示以赤心無或疑間則人人感悅爭為報效雖有姦邪化為忠順茍或猜忌刻薄不情多詐橫誅濫罰逆防禍患則人人惴栗懷不自安雖有忠順化為姦邪此理之必至事之固然也昔者齊明帝以宗屬輔政首廢二帝攘神器而有之鰓鰓然畏異世之後旁枝踈派襲已之迹而帝天下者非其子孫也於是包藏禍心勦滅同姓違顯逹之忠謀而入遙光之僞䇿凡意所忌不戮不已使髙武諸孫無復遺育連頸受戮無慮六十餘人煮椒之酷燔香之僞有出於委巷小人所不為者而偃然為之其心遂以為基業之固晏然如日在天不足經慮矣不知身死肉未及寒而建業以墟其首兵倡亂者不在他姓而乃在於宗藩也嗟夫猜虐之慮果有益而未然之變果可曲防乎昔我先王並建宗英貴以爵位使之犬牙相制以捍王室居無事之時國邑茅社錯峙環列不失親親之恩假設不幸一國弄兵則糾合衆援環而攻之鮮不勝矣觀蕭衍之起也下郢魯如摧枯定潯陽如沃雪桴旝所臨莫不褫潰東墉新壘以次歸降則以無所畏憚而已鄉使江夏不誅衡陽猶在河東之屬噍類或存則緩急之際豈無義勇奮發以身許國者乎精兵毅卒循江而守長棘徑鎩望猋而奮則蕭衍雖善兵齊猶未亡也又况梁武之興雖曰仗義然本以復前世之仇而澡私户之耻耳則夫明帝之猜慮果利乎果害乎昔宋欲去羣公子樂豫以為不可晉大滅宗室叔向知公室之將卑蓋枝葉既落則本根無所庇覆股肱既刈則胸臆不能獨存是以君子知王族之重也有齊之亡非東昏之罪實明帝取之爾梁論古之興王既定天下莫不創立典憲維持後世逮其末塗子孫驕傲忘其先祖艱難然後殘命亡世殆其國家蓋自三代以下皆然至躬創大業而昧於持守禍亂四作親於其身者一梁武帝耳嗟夫武帝起襄陽褰裳奮劒百戰以集天下勤亦至矣一朝南靣而立號令四海矜夸前功心侈意廣經略注措顛倒謬戾凡季世昏主之迹皆取而踐之則國之顛覆不俟異世宜也尋其棄違嘉謀妖夢是踐弗戒洛口之奔弗監馮亭之禍而招納河南之叛既已王之矣而擕二於心衰其禮遇結好齊國欲止而歸之彼非偶人能無憤怨於心乎已而封豕長蛇突我黃屋又不能破以竒謀而羈以勝算徒拱手端坐以待覆滅低回紆鬱竟瘐死於臺城其幹略安在哉且武帝享御四十八載矣械用犀利宜倍於檀溪武旅精彊冝加於全雍往以人臣弄兵以逆攻順而有濟今以人君問罪以順討逆而無功往以一鎮之弱而取天下今以天下之疆而不能平一鎮是豈取之易而守之難乎特始勤終怠故耳且共平日信仗者朱异也而緩急非可用平日依憑者栁仲禮也而將略非所長異時耽味於內典而無益於攻戰之謀異時信向於桑門而難驅於兵刃之際則太清之禍其誰禦之鄉使移三蠧之寵以禮謀臣回同泰之費以給士卒沈約輩不以才誅劉顯等不以能黜則雖百侯景亦可談笑而臣之何至倉皇失圖而身以僇沒也其後簡文幽於永福元帝覆於江陵方智迫於陳氏三世皆不得其死祀亦不傳則以創業之不善耳噫創業以治猶懼其亂創業以亂則再傳而遂亡猶為幸也陳論兵無常機亦有成算審乎此者善用兵矣凡伐國之兵利速戰速戰則主必摧凡却敵之兵利持久持久則客必潰此在兵法必勝計也昔崔乾祐之攻潼關哥舒翰曰賊逺來思亟戰王師必堅守不幸牽制於權臣遽與之戰哥舒果敗僕固懷恩之冦奉天也郭尚父曰彼深入思亟戰吾緩之當自擕二于是堅壁待之尚父果勝觀二子之事則陳隋之計可知矣開皇之伐陳也掃境即戎兵五十萬是謂動衆八道並進浮江千里是謂深入勢如風霆飄忽振蕩所向輒下遂逼都境為隋計者固宜因利乘便而掃平之矣陳人誠能出輕鋭之兵北據蔣山南斷淮水閉關堅壘案甲飬威為持久之計以挫之則江左之地庶幾保有宗廟之祀未當絶也蓋方是時資儲尚富義勇尚彊臺城堅完未易可破彼以孤軍深踐吾境相持既久勢必困敝饋餉之費能無乏絶乎精鋭之氣能不沮傷乎根本隔逺能無內顧之憂乎師老兵疲能無棄甲之念乎吾之鎮戍豈無入援之人乎俟其引歸徐以竒兵邀擊歸路彼前不得鬬退不得還不敗何待嗟夫食肉滿朝而皆昧於良畫任忠司馬消難皆進是謀矣惜乎棄不可棄之忠言聽不可聽之謬算付文慶以經略仗孔範以機要驟舉輕發爭鋒於一日之間陳未及整而師已北矣使髙祖艱難之業剪焉傾墜壤地數千里入之長安為天下笑寧不痛哉嗚呼以叔寶之愚畏懦退縮苛嬈淫昏介恃天塹以傲大國則壓境之禍固有以召之矣一旦臨大利害方且效兒女曹晝夜涕泣為墜井自全之計又烏足責望以經國長算哉然愚深恨當時之失謀在兵法可不敗故慷慨而論之論魏博唐自天寶失御安史內侮拏兵轉戰歷世不解踰河以北莽為盜區王化不沾魏博者積二百載訖唐亡不能撫而有也竊觀舊史氏考核地形魏能蔽趙屏燕凡欲加兵于燕趙道必假魏故魏于山東最重黎陽新鄉距白馬盟津不數舍陴鄣一弛則指日而牧馬于鞏洛之郊故魏于河南亦最重又風渾俗厚人剽勇善戰土平馬健便于馳敵地壘巀嶭山河錯互伸則勝蟠則固王者不得不王賊得之則天下不安故不可淪失于異類奈何不思控制乎魏慱七州一失于僕固懷恩再失于馬希倩三失于李懷光四失于馬燧五失于田布六失于李聽由是傳襲六姓一縷一蹄不入府廄矣蓋自安史首亂州縣殘折當時茍欲招懷反側湔洗詿誤懷恩意恐賊平則已權不重又亂布羽牙欲廣應援請裂河北地付授叛將由是田承嗣得有魏慱擅爵人私賦入繕甲兵而駸駸不可制矣此廣德之失由僕固懷恩之為也其後承嗣益桀諸路進討磁既降矣德既拔矣瀛洺既下矣裴志清既附矣盧子期既執矣朝廷遣名將濟師則承嗣固機上肉爾顧以中人勞軍貪婪冒沒慢罵倨肆寶臣忿耻挾魏復叛于是兵不能制而與之更始矣故大厯之失由馬希倩之為也田恱叛渙三節度之師致討雙岡之捷俘虜略盡于是引輕騎奔巢穴自固魏將李長春牢關不納以傒官軍向使乘機疾驅前軍扼喉後陳撫背左排右掖則魏已瀦矣顧逗撓不進頓兵平邑經涉旬浹始薄城下使賊得以持久欺衆祝髮誓軍合燕趙以為援而王師卒無功故建中之失由馬燧之為也燕趙兵剽鋭與神䇿相絶固非敵矣懷光又疲曵逺來遽與滔武俊之師相抗㑹趙琳趙萬敵以徑騎橫擊我師大敗决河灌注餉饋路絶由是秋夏相持師不亟决四叛連衡壇坫僣擅故魏州之敗由李懷光之為也鎮人既殺田興于是其子布將魏慱之兵討亂謀非不善也奈何布無應變之才而徒以忠謹自將且不能以私讐激怒將士由是兵潰南宮而衆歸史憲誠矣雖刺心以謝君父何有銖髮之補哉故長慶之失由田布之為也滄景既平憲誠有齒寒之懼請納地效順詔以李聽代之魏人傳嗣纍世不樂天子約束久矣時議請假道以討开志紹為聽計者其亦宜倍道兼行乘未備而入境顧乃遷延館陶按軍不進謀泄計露于是魏殺憲誠而帥何進滔矣已而城閉不入師遂驚潰溫造以魏亂職由于聽豈虛也哉嗚呼懷光懷恩叛臣希倩閹尹固不足誅若燧輩皆一時以名將稱機㑹一跌喪威稔冦觜參之墟訖唐亡不能取是可太息哉論彰義憲宗以元和九年秋討蔡至十有二年冬十一月然後元濟就獨栁之誅嘗私怪憲宗以英鋭之資而制一孺子據人上之勢而討一叛臣圜天下之兵而搏蚍蜉蟻子之聚將李訴光顔之朋而與趙曄王仁清為敵當吳蜀江東澤潞易定魏博砥平之後破竹迎刃之勢而致討于蕞爾之三州以碬投卵未足為易宜其咄嗟談笑之間摧滅破蕩顧乃涉四年而後定嘗竊遲之論者曰自希烈盜蔡而少誠踵之彌四十年民不知天子之恩澤習暴掠嗜摶鬪宛然有夷貊風又趙翼其北承宗為之援齊隱其東師道為之謀內恃陂浸以為阻是以拏兵纍年官軍厪克其一縣砥定若此艱難也嘗竊迹其事政以當時廟堂有二失五敗而已討蔡之役未竟而堂堂之師又出于鎮冀之郊于時李綘謂蔡鎮不可並取韋貫之請釋鎮州專力淮西張宏靖謂戎事並興鮮克有濟請俟淮西平乃治承宗而謀適不用方且命劉總興武强之役諉郤士美舉柏鄉之戰是以勢分力屈兵不堅决其失一矣李逢吉險譎王涯暗沓非惟才識不足屬大事且忌裴度有功隂圖沮止排抵中傷訿訿百緒而帝不之察顧使與度併肩當國由是二子得與錢徽蕭俯輩共為首鼠而屢有休師之請逮至十二年逢吉始罷十三年涯始出不既晚耶其失二矣杜牧論兵謂元和誅蔡天下乾耗四嵗不能取由五敗不去也尋牧之言誠中時病蓋當是時調兵諸道名為客軍每戰客軍居前主人在後志羸力弱多致敗衄此董重質所深恨也則牧以不搜練為一敗信矣韓愈請四道置兵道率三萬乘時逐利一日俱縱則蔡首尾不救可以責功吳武陵欲分三大將環賊而屯以實期授瀕蔡諸將而以三期紿賊皆指日破賊計也而議不出此是以師老兵屈餉億不繼天子至出禁錢以贍軍程异諷諸路輸貨李鄘先諸道藉府皇甫鏄且因是得宰相則牧以不責實料食為二敗信矣韓宏為都統以官齊王鍔為耻陳書自列校遽授司徒班諤上他時諸將告捷輒纍日不怡逗橈若此而受賞每與諸將埓雖裴度猶畏之至避更張琴瑟之語則牧以賞重為三敗信矣袁滋去斥候與賊通好六月無功而止貶為刺史髙霞㝢輕悍寡謀統制不善敗於鐡城而旋召為將軍嚴綬有磁丘之衄令狐通有馬塘之敗而未聞斥責以勵將率則牧以輕罰為四敗信矣崔峻為監軍李議誠為制將謀畫不同進退掣肘一曰為偃月一曰為魚麗三軍萬夫日翔惝恍之間賊騎之來每致折北則牧以不専任責成為五敗信矣鄉使二失五敗無譏議之迹則緩不過嵗月無蔡州矣何至曠日持久而後勝相府有橫尸之禍陵㦸有燔毁之辱乎議者徒見德宗合十六道兵以討少誠溵河廣利五樓之役相次而敗尺地一級無得焉未幾怵韋臯之說聽賈耽之計而復其官封終其身不能臣也憲宗由裴度而得李訴由訴而得王士良而得吳秀琳由秀琳而得李祐遂定襲蔡之謀而赤叛者之族遂以德宗為稔冦憲宗為成功殊不知憲宗特賢于德宗耳兵法有役不再籍憲宗何預也論鎮冀憲宗再駕成德出入十年叛渙之臣訖不能羈致闕下問罪之師方興含糊之詔已行偷安留毒縱蛇豕而勿之摶元和史䇿未嘗書某日克趙而司農賦入卒無鎮冀之半菽焉論者皆以厭兵縱敵威令不振歸過章武愚則以為羣臣謀算乖失謗有所分矣丁未詔書赦承宗而班師者謀失於白居易庚辰詔書赦承宗而受地者謀失於田宏正初承宗拒命劫囚薛昌朝拒卻景忠信於是詔削官秩遣神䇿河中河陽浙西宣歙兵進討時元和四年冬十月也雖吐突承璀非制將之才酈定進有喪師之悔然精兵剽師雲翔電合張茂昭有木刀溝之勝劉濟有饒陽束鹿之捷髙霞㝢多獲鎧仗田季安自辦餉億盧從史逗橈顧望隂相嘯結又已縳送京師矣賊勢困蹙上書請罪譬釡魚喘息勢不支久朝廷誠能遣名將督戰以代承璀則削平逋冦咳唾間爾居易反謂不亟罷兵且有四害其說與李絳權德輿相表裏於是五年秋七月詔罷兵而全以六郡付之矣嗚呼居易風節挺正唐名臣也至此則不得無罪其後承宗益桀謀援蔡兵燔河陽倉斷建陵㦸殺丞相傷御史於是詔絶其朝貢出河東義武盧龍魏慱之師進討時元和十年秋七月也時雖營屯離置主總不一然諸鎮鋭兵凱捷踵至燕人敗之於武彊魏人敗之於南宫郗士美兵鋭整最有功帝以為能辦我事於是殷侑招諭而聽命柏耆脅說而承宗己破膽矣于時齊蔡既平而賊無脣齒之援譬如破竹數節之後迎刃而解朝廷誠能遣一乘之使緩頰鈎說使籍地自效不聽則舉兵勦滅之臨菑渤海之地可全有也宏正反因其請救而表于上欲效三郡質二子而緩兵朝議不欲忤宏正而猥狥其請於是十三年四月詔罷兵而赦承宗矣嗚呼宏正去汙效順唐功臣也至此則不得無罪機㑹一跌百年不復承宗得完首領憲宗有失刑之議成德之地終唐不能有不於二子而誰責乎帝之討蔡也沮議百出錢徽蕭俯之徒交請罷兵惟韓愈謂持之不堅傷威損費毅然致誅由是師出有功至成德之役則搖於浮議而志不堅决所謂師老力憊而訖無成也成敗異變功業相反無他斷與不斷而已論盧龍豐爵秩以塞其僥覬之心峻繩檢以抑其豪鋭之氣知是說者知御將無事而搜練則警急有備平居而撫養則倉猝可使知是說者知制兵今夫載筆之士追咎長慶之失皆曰崔植杜元頴不知御將蕭俯段文昌不知制兵由是燕薊之地已得而更失劉總挈八州效順懼部將潰亂先籍朱克融輩送京師欲朝廷劃疆土處之使北方歆艷其寵不復甘亂當時柄廟算者慮不經逺徒知五兩半通之命為可愛而不知慰其羈躓之心既又弛檻緤而縱豺虎由是克融披撅不可制實崔杜二子之為也穆宗初兩河無虞遽議偃革建請天下鎮兵嵗俾十之一為逃死不補謂之銷兵既而籍卒逋散嘯聚為盜克融一日收用之朝廷募烏合充戰疲瑣不能支敵遂失河朔實蕭段二子之為也愚以為不然蓋始不用裴度而用張宏靖廬龍所以亡終不用裴度而視賊不討盧龍所以不能復就使當時無御將處兵之失碣石之野亦未必不亂何者張宏靖傲虐自肆燕人苦之於是囚之薊門而挾衆為亂彼所欲逐者宏靖耳克融雖不北還彼謂軍中不可一日無帥將不取豪健得衆者擅立乎又况宏靖之囚也衆請朱洄為帥謝老疾而後以其子克融領軍務使朝廷狥總之請而以巨封劇鎮付之克融則洄且自為之矣父子影㑹舉兵連衡禍未必不更大也故愚以為崔植杜元頴之失未必能致亂元和十五年正月俯文昌始當國明年七月克融已叛銷兵之議甫一嵗耳十分天下之鎮兵而不補其一又始二嵗失職者未甚夥也王廷湊同時反趙亦收用之則克融所得又其半耳克融有畔渙之志雖無失職之兵豈不嘯引凶黨用之乎李懷仙朱滔犯順亦豈因朝廷所銷之兵耶又况克融拱手安坐坐享旄節朝廷未嘗致討而克融初不用兵也故愚以為蕭俯段文昌之失未必能致亂然則一日而亡地數千里由不用裴度爾劉總入朝請析八州為三道以弱燕薊之勢其䇿固善至請以宏靖盧士玫薛平分治之則用人固已踈矣奈何棄度不用又全以總地寵之宏靖之帥幽州也不能用俗制變遂致軍亂彼魏始降而度往宣慰也遍至屬部揚天子之恩澤魏人歡服使之代總必不肯如宏靖朘削軍費取緍錢二十萬供私費矣蔡始平而度往視也以蔡牙卒侍帳下使之代總必不肯如宏靖肩輿障蓋與士卒殊勞逸矣度嘗建請私第見士延俊英訪籌䇿必不肯委成參佐旬一决事罕見將吏矣度之入蔡悉除元濟偶語饋遺之禁必不肯専以刑法根治吏士矣總之降也誠能起度於河東而付之以宏靖之重寄彼將恤乏弔災豐犒而勤恤之則盧龍何自叛哉此䇿之失一也夫既不能用度而産患若此矣克融拒劉悟使不得入旋以易定為冦於是時誠能梟合鋭師北首燕路而以授鉞之寄屬度則已失之燕談笑可復觀夫克融之援廷湊也度移書開說遂請罷兵其執楊文端也度畫二䇿即日聽命韋處厚曰使度位廊廟則幽鎮自臣使二鎮還者皆曰裴度居東人情失望奈何帝冲逸而弗知用也且在先帝時戮師道而平齊誅元濟而平蔡承宗獻地程權入朝皆自度謀畫之致豈獨幽州而無功乎此䇿之失二也穆宗席前世之烈不馳一戈不亡一鏃而坐享全燕之地未及轉眄而復陷於賊議者謂幽州幽隂慘毒其民剛彊厥田沃壤逺慕田光荆卿之義近染思明祿山之風忘忠嗜亂殆非人力所能為愚獨以為皆不用裴度之過論澤潞用兵有六要而敵之堅脆不論也抵排浮議則計不搖要結外援則力不困師整而壯則有剽疾之功將專而勇則無折北之慮孤其勢則我益强搗其虛則我滋實六者兼備而敵已困於冥冥矣嘗觀㑹昌澤潞之役劉禎有可誅之形武宗有决誅之志而丞相德裕有能誅之功指縱授勝六要具舉兹所以堂堂潞子之邦訖不淪于篡逆也迹夫劉悟死而從諌欲主留務寶厯之君違李綘之計而狥王守澄之請于是舉五州而棄之已而擅兵長子隂連訓注致論二蕭欲清君側逮至從諫因崔士康而以符節自擅謝醫拒使檢商閣貨脅其君而剿其民上憤下怨所謂可誅之形也武宗以內地叛渙鋭意征討使者不入則謫𨽻恭陵賊使逺來則杖死京兆彼能緩茂卿之賞而不疑禽太原之兵而不赦李悟乞降而不從崔碣請納而逺逐羣臣議罷兵者誓戮之于境上兹所謂决誅之志也至于巨謀纎計算不失一而六要具舉則又一出於德裕何謂抵排浮議則計不搖始議用兵沮梗百緒或曰劉悟挈十二州還天子當使遺育或曰從諌兵强食足未易可破廷臣皆媕婀趣和并為一談獨德裕以贏縮勝負為兵家之常而慨然以身任責故謝却陳夷讓易置李宗閔而賊已喪膽矣何謂要結外援則力不困上黨之地前觸魏側肘趙魏人馳徑騎不三四日兵交于漳水西矣趙人出堅甲不五六日兵合于泜水東矣形利勢便封略相錯也德裕因勑李回諭㫖使二鎮出兵于是王元逵次臨洺何宏敬柵肥鄉左排右掖而賊無炊火焉何謂師整而壯則有剽疾之功異時團諸道兵有所討伐尺布斗粟仰給公上多遷延以耗供億甚者約賊令解守備得一屯一縣則獻公要賞德裕因敕諸將直取州勿攻縣故邢洺繼降而劉􅍬氣索矣何謂將專而勇則無折北之慮異時閽寺掌兵進退掣肘監軍取精剽士以自隨而以疲瑣者偹行陳師小不利則卷旗自遁大兵輒隨以北德裕請詔本道付宰司乃下監軍不得干凡事百人取一為衛又王宰觀望而薄責由是石㑹以勝聞李産佐逗留而遣代由是烏嶺以捷奏何謂孤其勢則我益强李丕善長短術軍中雅疾之脫族自歸議者疑為賊遣德裕建議討賊半載始有降者廪賜不厚何以勸餘于是擢刺欣州而賊嫗慟泣未幾裴問以邢歸趙王釗以洺欵魏髙玉魏元談輩以次降附而賊無與戰矣何謂搗其虛則我滋實先是河朔諸將死即加弔祀申以冊贈之使重以宣慰之人度軍便宜乃與節軍中不許始用兵大抵不半嵗不能定故謷將逆子因得固巢穴禎之叛德裕請乘其未備討之于是倉黃號慟而二十六載之逋冦平矣或曰劉悟以此始則郭誼以此終殆天道好還愚獨以為一出德裕之功也至賊平之後以郭誼釁斧而不赦畏諸將請地以宏正團結三州又見其謀畫之善詩云式固爾猶淮夷卒獲德裕有焉史臣謂武宗用一德裕遂成其功諒哉外戚論人君有天下而未知治亂得失之機胡不取前世之已事觀焉某事果利乎循而行之某事果害乎矯而變之庶幾可以逺禍亂基太平也今夫天子以一身而制天下者以有權利也惟利可以役人惟權可以制人是以不出殿陛而天下惟吾之聽茍不能慎惜名器而輕以假人倒持太阿授人魁柄則晚節末路抱持虛器而威勢下移矣又况外戚之倫少不知學狃富貴之居則志易以僣挾禁掖之勢則權易以専其始盜天子之威福為豫奪以劫持天下天下既側目而畏之則還以恐喝於上而邀望大利矣君人者奈何不加抑逺而使之立朝乎西漢之業以外戚亡愚嘗惜成哀之君縱不能逺取前世事以為規鍳胡不以祖宗之得失耳目未逺者觀之乎始文帝以后弟竇廣國賢有行欲相之既而曰恐天下以吾私廣國卒拜申屠嘉元帝以馮野王行能第一欲用為御史大夫既而曰後世必謂我私後宫卒用張談是二帝者矯私徇公若此其蚤也遏絶外戚之亂若此其甚也繼其後者若之何不循而行乎異時吕氏盜朝産祿肆亂不有太尉主兵而北軍助順則海內危矣霍氏繼起禹山專制肆行非度隂有異謀非宣皇帝毅然加兵則宗廟恐矣彼二氏者柄朝未幾而産害已若此繼其後者若之何不矯而變乎悲夫建始已後政柄旁落歸于王氏五侯羣弟更迭弄權威勢翕習青紫充滿排擯宗室孤弱公族誅戮亡忌擊斷不請而當時之君瑣瑣碌碌曽不敢舉手開喙以預天下事自王章以直言誅劉向以正諌黜而忠讜之士卷舌矣杜欽谷永之朋方且逆望風㫖揄揚贊頌而張禹孔光共為持祿計不肯吐忠實於上由是漢室雕弱不振至于賊莽則大事去矣彼且文飾休符招致琛贐作為石匱大誥之書以愚弄天下則漢欲不亡得乎噫自古天下敗於外家者惟漢與周然隋文帝東平全齊而西破巴蜀五王姦謀同日摘發則於字文氏不為無功方之安漢可異日談也衛青論衛青起於奴𨽻顯於戚里而終以閫外之功封侯裂土延及襁褓三子同日受封而裨校皆得爵土雖曰知兵勝敵然其德度亦自有以致之方是時武帝在上大臣少麗罪則誅戮隨之青獨能保身以沒可謂賢矣且天子之大柄二一曰爵賞二曰誅戮而青於此皆逡巡退避而不敢専此其所以能保身者嘗曰自魏其武安厚賔客天子常切齒彼親待士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士此不肯侵天子爵賞之柄也蘇建盡亡其軍周霸之屬皆請斬以立威青曰青幸得以肺腑待罪行間不患無威儻歸天子使天子自裁之示不敢擅專誅於境外以風人臣不敢専權不亦可乎遂囚建行在此不敢侵人主之誅罰也以此令終不亦宜乎
