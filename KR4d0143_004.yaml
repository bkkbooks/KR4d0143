body:
  text: 丹陽集卷四宋葛勝仲撰啓謝試宏詞及三經義入等啓享弊帚以千金誠乖自見取鉛刀於一割大竦衆聞感藏情塗愧溢眉宇竊以唐室致詳於取士詞科尤盛於得人陸贄以建議而濟興元之功李絳以忠謨而輔元和之治杜遵素削權於諸鎮裴中立服叛於兩河巍峩勳庸輝映簡牘乃若夢得夸毗於顯仕宗元附麗於要臣科選雖優操行何取先帝懋亷能之衆詔書復詞藻之科文治蝟興卿材輩出大明繼照衆畯鼎來推擇至公勸奬尤厚自非文列班揚之伯仲六籍探竒學通游夏之淵源三冬擅富服匿識單于之器實沉窮大夏之神則何以上副旁求允膺妙簡如某者㑹稡小伎褦襶頑姿風流莫簉於淹中恢博顧慙於稷下未識晏楹之竒字逈殊汲冢之多聞糟粕習傳豈免輪人之議蟲魚綴緝坐貽傖父之譏迫就養於親庭勉爭雄於場籍懷鉛學省每玷上游充賦王畿屢塵第等茂恩解褐榮路彯纓讀書未逮於五千補掾聊同於百六棲棲奧泄踽踽喧囂平亭日困於丹書商𣙜寖踈於黃卷聊吟招隱屢作抵疑耻為南郭之吹竽每望西山而拄頰靜言計議勉自激昂汨沒而抗塵則殆昧乘時進修而應令則未為枉已文戰更思於借一疲兵自賈於當千髦士雲翔貴游波委敏捷爭先於倚馬華菁各擅於雕龍豈期晚生首玷清舉矧是三經之選亦收一日之長丹桂騰芳已冒魯山之一第青錢中選敢圖陽嶠之入科揣分無堪歸恩有自此蓋伏遇某官丕揚賢業光輔聖時務長育於人材不遺忘於微賤黍力吹于寒谷芑過采於中鄉遂致瑣材獲階寸進駿稱千里由吳坂之提撕珍擅二都本華隂之拂拭某敢不退量僥冒更務就將不專事於辭華益惇修於器業黃香學淺方求未見之書任昉恩深行獻感知之賦兖州教授謝到任啓橫經之選猥及愚矇負䇿之流衆為指議僶俯就職凌兢戴恩惟熙寧元聖之嗣興起建鄴真儒而光輔闢邪說於去聖悠逺之後昭微言於舉世黯暗之中慱延師座於東州樂育儒生於北面喬野之俗寖成文雅記誦之習變為討論矧兹洙泗之濵上直奎婁之次泮宫芹藻多可薦之英才闕里弦歌有相承之聖化廣德心者尚餘多士立公門者何止一人宜得名流出領教法而某蘭陵族冷勾漏緒微性滯少通學僻自信鵬翼九萬雖妄意於逺圖雞跖數千每自慙於淺植侵尋仕路乾沒名場玷一第於儀曹粗承家學擢兩科於政府濫厠英遊夤緣君相之恩冒昧師儒之選術非博習貴異大知自愧拙艱之有餘猶喜斆學之相長鄭生東矣無著録之門人有子避之多獻嘲之弟子尚祈善貸得至終更與提學殿院啓人材至難能長育則下皆樂矣治具有要善藩飾則人必親之蓋敦龎忠厚之俗待崇養然後寖興雖溫良粹美之材非作成亦將胥竭逖觀周室大闢經黌謂就賢體逺未足化民故尊君親上然後興學道德之妙則崇之以四術四教技能之末則示之以六藝六儀弊獄訟者於此而獻囚恢武功者反歸而告馘閭胥州長誰非勸率之人家孰黨庠兹謂絃歌之地自俊士而升造士由小成而至大成故賢能之書獻于鄉大夫成均之法掌以大司樂曰觥曰撻小則為偷墯之懲或寄或移大則示竒邪之耻文風郁郁功化巍巍車書由是大同風俗於焉丕變古治既逺儒林益衰蔽小智之自私膠大惑之易枉放言自若詖行無慙學非根道而譊譊各有所宗辭不傳經而諓諓自以為是豈昔人曠絶而難繼蓋後世教養之無方漢有隆師之意而不能正踳駁於專門唐有訓儒之名而不能救奔趨於覔舉雖執經者有期門羽林之士而來學者或且渠伊秩之酋徒為美觀何關王化俗久安於鹵莽運始砥於亨嘉當熙寧元聖之勃興惟建鄴真儒而光輔革千載循㳂之弊作一時新美之材惡雕蟲害道而罷絀於辭章病邪說誣民而頒行於義訓列經以五分舍惟三遐不作人紹王公之伊濯肆于時夏蒸髦士以攸宜然書考之法方試於賢關賔興之令未行於鄉吏蓋欲徐徐而善俗庶幾寖寖以移風道之將行勢若有待洪惟上聖嗣撫下民遹求厥寧仰繼承於先志不遐有佐期廣育於英才首詔國南肇營郊學東窮出日西浹流沙南連嶺嶠之邦北極幽都之逺地雖僻陋人不鄙夷大開精舍而堂序翬飛衆建經師而人材麕至日講月試時考嵗升廪食之厚則綴費於户部右曹勸率之優則第名於儀曹南院新書始下宿學交趨尚虞崇養之云初或致奉行之不稱矧惟劇道尤藉通材因煩部刺史之尊兼綜外諸侯之學恭惟某官心源昭徹氣宇粹純智識深湛則古之謀人操尚髙明則今之君子爰從書局峻陟憲臺凛然白簡之威名髙掩青箱之前譽自下劘上以公滅私暫勞疏附之賢屈領將明之寄自典司於教法益簡注於淵衷久隆嵓石之瞻即有鋒車之召賀鄆帥岑待制啓膺承明命釐保大邦政任舊人聮九閽而䝉福戎有良翰合一道以歸仁恭惟某官命世望隆覺民任重言無枝葉夙獻替於朝綱學有淵源克贊裨於國論正容悟物直道事人回翔中外而將明敷納皆其所長出入險夷而敦朴靖共未嘗少橈階緣初政識擢從班龍已升雲蛇輔果聞於得所魚方縱壑鴻毛更迅於乘風諒惟舊學之甘盤即正具瞻於師尹伏念某愚無敏識拙謝清塗粗堅嗜學之心獲預擁經之選道山清切誰啓發於篇章泮水敞閒免沉迷於簿領繫官有守望履無階賀兖守祝刑部啓奉詔十行分符千里凡依庇賴共集歡欣竊以未喪斯文洙泗有聖人之化大啓爾宇龜䝉為叔父之封矧在祥符嘗迂清蹕落成琳館光昭受祖之休登祀岱宗誕啓格天之業在今尤為雄鎮擇守必付重人恭惟某官雅望濟時孤忠許國遇事奮敢為之氣祥刑推欽恤之仁凛凛清規夙著破邪之論優優美化久傳樂職之詩爰從潞子之邦改涖魯侯之國吏民慕德日期抗隼之來僚屬欽風預喜左魚之出伏念某謬悠單見委瑣凡材由仁義行期斆學半鳳凰翔千仞分隔華途鷦鷯巢一枝自安拙宦側聞命牧竊喜事賢倒屣以迎固非敢冀斂版而進庶或有期與運使啓四首督司行部􅋏觀攬轡之嚴履幕趨風甫遂披雲之願猥䝉折節稍賜俯眉曹事罔功一皆寬貸學徒艱食上軫哀矜仰玷照臨之私實踰分願之素凝嚴在候亷按少勞懋惟福履之膍來護寢興之適恭惟某官清識難尚大雅不羣智略凑上前言語妙天下美由世濟位以才升輟省户之名郎領計臺之膚使貯儲邦用陳陳相因薦拔時才武武不絶屬部望風而鄉往墨官投劾以去歸豈伊經濟之賢久屈將明之寄行選於衆詳延弼后之忠使暨乃僚丕顯佐王之業澄清劇部久聞公子之名臨按陋邦始識荆州之靣屈使華之貴重訪胄席之敞閒精廬頽廢而興考室之謀廪食觳薄而動傾囷之意捫心無報鏤骨有銘恭惟某官道直以方性剛而塞儒雅足以飾吏文章足以瑞朝端遇聖知肅將王命同何武之行部先即學官笑朱博之顯名不喜儒吏傳聞四逺慕仰一詞至於校嵗計於低昻豐匱之間鍳人倫於亷墨智瘝之際顧雖餘事綽有成功出裕邦儲已富陳陳之積入陪國論即諧赫赫之瞻外臺居部久欽握節之威黌舍繫官未遂披雲之便辱在輝庇尤切震惶恭惟某官人品髙華天資彊濟問學該富而守之以約材猷挺拔而持之以謙輸忠自結于主知抗議力排於邦論陳實未用公卿愧於先登左雄所言臺閣以為故事宜居端右協贊經綸然利器惟盤根而後知况良馬於平路無以别暫煩智略出總賦輿咄嗟談笑而仰給遽充移徙𢡟遷而調發俄集已裕九年之計即膺三節之趨仰髙希驥久約結於情塗入隩登龍未披瞻於神宇澄清使指託付吏師幸兹庇存施及冗末恭惟某官識資國是材助邦臧富學識則該綜乎九流一百三家擅政譽則并包乎四善二十七最暫違卿月出領使星傾殫心計之勞補葺利源之入挽粟斡貨居之便流錢知輕重之平官最升聞主知彌厚視厯案上行分優渥之恩覆名甌中佇見登庸之兆謝郟教授啓摛華試席命教泮宫識拔方初升騰豈晚恭惟某官材推秀頴學洞本源傑句凌雲逺過杜陵之三賦霏辭折角何止韋賢之一經果拔第於明庭復中科於省户敢圖駕見更抵袖書用重要輕弗悟眷存之重以多問寡徒欽謙挹之先謝宫使保和啓分符南土微績效之登聞序職西清荷寵光之狎至辭不獲命愧無以容伏念某才不適時學未聞道戇不能以燭古今之理拙不足以周事物之機技斷斷以無他但知平進老冉冉其將至實負初心分甘棄日於簿書敢期寓直於謨訓此蓋伏遇某官明恢公聽仁務曲成致兹壞蟄之幽亦預陽春之澤誓當黽俯上報恩勤謝除館職啓芝檢誕頒猥倚褒遷之寵蘭臺入直獲從英雋之逰退揣冥頑仰慙推擇竊以登延冊府號第一官紬繹祕文非具員吏歷觀前日率付可人為名流待用之途亦華姓起家之選故凡青錢學士不愧赤衣諸賢或由少訖老而手不置書或自甲至丁而卷能談事或聚七千帙而考練或課五十紙而校求衒瓌竒者旬日而了祕閣奧篇自標置者三年而隔同舍共語圖形東觀蔚為經術之宗奏賦南郊煥若辭華之美以岑文本之材而始願止此如張伯緒之望而固求不遷矧昭代之恢儒幸聖皇之崇學顯帝堯文章而飾萬物體周王夀考而蒸衆材槐市交興蓬山尤重肇新寶宇申揭雲章老人出授於神書童子不憂於朋字荀録虞志擁籖帶之紛紜任筆沈詩萃紳緌而商略間猶訛謬特重校讐言豕渡河者三實資是正書馬并尾而五更在研窮豈容素飱以纍清議伏念某人門具下年位並輕雖問學勉企於前修而聲望不髙於時輩規規求志踽踽固窮偶屢竊於詞科因數移於宦牒主青襟之學校久困虀鹽對黃卷之聖賢益勤鉛槧俄嬰艱棘深自屏藏摧傷甫逮於喪除收召俾承於官乏預清臺之較厯佐戚邸之司宗坐縻餼糧毫無功閥何言此假稍躐稠人秋熭簡編覺藝香之消蠧夜窺墳籍驚藜杖之分光顧惟久衰多難之姿豈圖偶得儻來之幸此蓋伏遇某官朝廷元老學者宗師以獻可替否贊時雍以激濁揚清昭人望顯致掄材之助仰禆序爵之公謂牛鼎烹雞用器固難於適稱然蟻封試馬歷久始見於非常當求未見之書更輔多聞之友措諸事業庶能酬覆載之仁作為文詞或可頌泰平之盛謝監職薦縣令應詔啓按譜治民曽微政績飛章薦士誤沐恩華自驚流落之餘有此遭逢之幸伏念某所學甚陋其愚不移寧甘三絀之窮羞為兩墮之計量材揣分固宜奔趨州縣之塵勞論事獻謀豈足陪輔朝廷之末議故從貶斥但自省循惟海寧夙號喧囂在江表獨稱繁劇處公綽於薛邑時謂非優責虞詡於朝歌人皆相弔念受祿固難擇事而抵罪不可逃刑徒知夙夜在公不覺日月逾邁俗粗安其朴拙嵗適㑹於豐穰民無推不去之謡士有念相聞之喜敢期過聽特借重言豈惟榮耀於觀瞻實亦激昂於衰懦束帶而輕五斗較德甚慙失船而得一壺戴恩惟倍此蓋伏遇某官位部刺史名世偉人以收恤淹滯為斂材之謀以拔舉公忠為報國之實取同為驗宜後而先乃如冗末之流亦在奬知之數益當黽勉冀逭譴訶雖絶望於亨嘉庶不孤於眷遇賀中書舍人啓疏恩黼座進職綸闈除目四傳輿情交喜竊以充朝廷文章之任固為儒者之至榮代天子謨訓之言尤極士林之髙選非緣素望曷稱明揚恭惟某官忠結上知材膺世用詞華溫麗追還三代之餘問學粹純洞逹六經之奧輟東膠之胄席領西掖之命書兼侍講帷仍分省事掌中抽草已光侍從之聮腹上生松行聽弼丞之命賀耿左丞啓光被宸輝進陪國論人惟求舊允資攀附之賢政貴有常行迪泰和之治華夏咸喜天人同符恭惟某官氣禀天和時推人傑備忠孝之令德兼文武之全才智謀天下之蓍龜文藻人中之星斗久負經綸之藴荐膺清切之除方睿神淵默以居潜賴耆明始終之庀職朱邸著講論之益青宫遍調護之官逮九五之時升擢二八以自輔俾司樞管實本兵權屬强敵之長驅擁全師而深入人心恟懼神器震搖建兹多壘之還盡出萬全之䇿料敵制勝有嘉右府之樞機經體贊元遂進中臺之綱轄惟兹舊學光輔初元諒辰告於逺猷以日下於膏澤愈峻具瞻之望行膺爰立之求伏念某涉世闊踈謀身拙直頃濫尸於禮寺亦叨預於宫僚寅緣親依仰窺千慮幸㑹奬與實積三年兹聞渙號之頒深激懦𠂻之慶四蛇入冗欣已附升雲之龍六鷁退飛無階同賀厦之燕上左丞啓被眷中宸升榮左轄欽聞誕告允副具瞻竊以經體贊元實賴翼扶之助繼猷述事方當祗遹之時厥基永孚於休惟后非賢不乂果聞耆傑入副登庸恭惟某官恪恭粹和莊重明敏學究真儒之藴文髙哲匠之華窺行已之始終古人是尚考立朝之本末天下共知自光贊於朝綱益允諧於人望同寅協恭而修政事逺撫長駕而熙事功民言惟嘉國是以定逮兹時舉蕃有恩言入告謀猷已見君陳之順后丕視功載行聞姬旦之齊工答何狀元啓冠名英俊之躔升華圖籍之府仲舒之為舉首啓發道真子政之校中經夙昭人望朝廷得士寰海趨風恭惟某官學奧離倫材髙周用元元本本博窮載籍之傳濟濟洋洋蚤預賔興之列果緣健筆力取殊科上興見晚之嗟人以覩先為快名驚學子筆藁至於欲燒文播都城紙價幾於驟貴敢圖謙謝亦附冗僚退揆菲材固難當於益美仰窺佳藻亦竊幸於珍藏回王狀元啓臚傳上第首冠羣英下明詔於九天恩先桂籍收大名於一日光映儒林凡在見聞孰不慶羡恭惟某官宏材聳壑英氣凌雲卓爾異人時推於間出偉然大器不俟於晚成以妙齡秀發之姿奉髙誼講聞之對諸老誰先於賈傅天子親擢於平津喜黌舍之有人掩名場而得雋展逸足而華塗方踐升大猷而逺業難量某久共虀鹽更窺珠玉知洋洋於流水偶贊文衡引皓皓於明星實由聖鑒擁長箋而肯顧溢陋巷以生光回第一人董狀元啓唱第中宸冠名上甲雖事從故典推龍首以居先而恩出清𠂻並桂林而擢秀恭惟某官文知體要學有淵源望久重於鄉閭聲特髙於場屋屢泣荆州之璞知者其誰獨騰豐劔之光終然莫掩遡春官而纍上霑皇澤以兼收有孤黃卷之心耻試紅塵之吏氣不衰於再鼓人忽驚於一鳴冕旒凝乙夜之觀軒陛首春雷之震對賢良而舉首遂繼家風起徒步而封侯更看晚節某頃因乏使忝預攸司設網于河偶值靈龜之入窺斑以管詎窮文豹之奇方喜得於真才忽過蒙於盛禮云云答盛學士啓占桂籍之上遊得蘭臺之舊物士歆稽古之力朝有得賢之榮恭惟某官學茂大知器非近用處貴遊而獨惇素尚在蚤嵗而已擅雋名混舉子以登場中有司之異等禁庭唱第名復甲於英髦宸筆評文語特嘉於警拔遂膺溫詔擢校祕文問倚相祈招之詩素欽博古讀杜牧阿房之賦竊幸知賢敢圖過謙猥形私謝豈特借重言以華衰品蓋將敦髙誼以激偷風答鄭學士啓延登內閣典校中經儒館增輝士流交慶恭惟某官識探聖域文播賢關自期國華不甘門調仕而優則學首登附試之科儒以道得民旋預說經之選談易無疑於九事著録何止於千人輟刺舉於南州擢刋讐於東觀得時則駕方逺步於亨塗飲人以和乃過形於謙謝佳筆但知藏弆厚意不敢當䝉賀韓學士啓被眷楓宸躋華藝省朝慶得人之盛士歆稽古之榮竊以挾冊校文實重圖書之府養材待用是為英雋之躔凡𨽻職於其間蓋選賢而後授恭惟某官器識俱懋望實兩髙學有淵源博宗九品之奧文無骫骳追還三代之醇預蕝禮於曲臺復讎書於內閣鳳將子而惟九豈愧前修豕渡河而曰三實資鴻筆愧未遑於叙慶顧先辱於縢緘佩感至深襲藏為好賀黃學士啓被眷中宸躋榮內閣儒館慶得人之盛士流歆稽古之榮竊以昭代右文闢三館而聚書籍上皇籲俊差九等以寵儒臣中朝方復試選之科册府必用俊髦之士恭惟某官豈具貟吏實不羈材早以雋名蔚有棟梁之器中緣鯁議頗妨塗轍之升道既久而日章理亦窮而斯變登龍尾之道已數近於清光復鴈門之踦諒即躋於要路答武學李博士子奇啓曳裾見臨削牘為賀翔鳳凰于千仞豈測雄飛享鶢鶋以九韶徒深眩視恭惟某官器凝方重學造精微收科若摘頷髭吐論如霏木屑文詞合處曹子建何足道哉時命鼎來謝安石恐不免耳豈伊右學能滯亨塗敢圖謙撝猥見標榜過情之譽雖非凉薄之敢當㑹友之文當永珍藏以為好與運使啓二首將命計臺著攬轡澄清之望尸官講肆有髙山景慕之誠未晉接於顔辭幸依棲於名德恭惟某官性天夙悟才地素優論器範則當從古人求較詞章則應是我輩語事每試而皆可政無往而不宜早獻直於霜臺屢對揚於雲幄忠規直節邦朋震懾以相驚崇論讜言國是雍容而自定暫枉將明之寄少分憂顧之勤原隰光華已上聞於功最威顔咫尺行入侍於清閒坐曹無補深虞直指之嚴行部載臨獲展上交之禮自惟冗散方託庇存遽爾暌離已深敦慕恭惟某官聲名籍甚器範自然軒軒雅操之獨持衎衎公才之屢試方在責實循名之際凛然赴功趨事之能省户司金名特髙於諸彥使臺握節威自懾于屬城從容計相之經營籠斡縣官之調度行選於衆詳延博碩之賢使復於王展盡經綸之業謝江隂曹縣尉襲啓言旋故鄉方有人琴俱亡之恨敢圖都騎示以金石相宣之文仰惟學省之俊英早挹天墀之右第仕而優則學不忘探討之勤因不失其親更切規磨之助逺貽華軸來賁郊廬自慙受粟之支離豈稱畫眉於渾沌徒欲借此言以增重敢不珍其貺而襲藏
