body:
  text: 丹陽集巻九宋葛勝仲撰頌端誠殿芝草頌竊惟先皇帝臨制海縣十有六載駿惠前烈億寧華戎凡民所不便若願欲而未獲者罷行之中外禔福咸有惬志曠典墜章以次蒐舉稽古禮文之事雅垂意焉紹聖制書若曰朕德不類獲執珪璧事上帝常恐馨香無以交神明惟躬祠泰壇號國大祀而前期齋祓宫止帷帟取具臨時已則廢徹玩嵗愒日茍媮弗䖍如此將何以配昭事而來福饗也哉有司毋諱勞其建宇以剗前陋共工匠人既奉詔則度地國南經營結築豐顯伉壯華質適中成於雍州薦璽之元年而錫名端誠日南至上有事於南郊大次小次咸即新宫於時初陽晏温榮光遶壇槱烟既升灌獻竣事幽靈肸響百鬼迪嘗孚佑降康簡簡著見越明年夏六月殿以産靈芝聞舒彩陽華映盪天宇卓哉煌煌圖牒之上瑞王者之偉觀不可貶已彼有生於穹山峻壑而蕘夫牧人偶掇獲之者世猶族觀聚歎以為創見也况乎雲梢清蹕展寀紫壇而上帝貺施響答昭晣如此其事豈特戔戔而已哉喑無詩歌以記響烈使芝房之奏專美前古是殆司翰墨者過也語曰君子有酒小人擊缶雖不可好亦不可醜徒取其意而已臣愚過不自料輙昩死再拜獻頌其辭曰於鑠圓精臨下有赫厥棐惟忱厥佑惟德蓄藏休符不輕付畀隂隲監觀以待聖智允文先王君臨昭代敬迓天休昭事匪懈圓丘大報將蕆上儀緼豫為紛以䖍以祇帝曰帷宫品式未備往建齋祠相我熈事元符謁欵即於新宫垓壇參陟灌獻有容金枝玉梢貳觴百末膋蕭始升辟公對越瀆鬼嶽祇百神受職靈斿晏娯胙以元吉煌煌靈芝産於端誠神仙之秀瀛洲之英蠲潔祥明彤楹是託走栱飛櫨輝映翕霍菌蠢異狀或駢或離厥色惟黄表珍露竒吐柯不凡汎彩惟茂蔓蔓九莖薿薿三秀神雀涵殿青龍習陽託質左陋靈華不彰紫脫匪珍黄􅓿匪異厯草佞枝是掩是蔽昔我章聖登封岱宗朱草薦祉其報在功於惟裕靈肇建原廟朱草薦祉其報在孝惟漢四世亦生齋房圖諜披案受福降康宜作聲歌式薦妥侑宜命繪素式傳永久曰惟景亳錫我神光式今之瑞與之相望曰惟咸陽胙我神璽式今之瑞與之兼美天佑聖宋子孫千億下臣作頌以詔罔極湖州烏程縣烏墩鎮普静寺觀音閣銘并序車溪佛刹普静最稱巨麗而西廡觀音閣尤宏傑實吳江道者元益創也道者姓楊氏生十一年而出家以寺僧惠清為師又七年而落髪又二年而受具一日膜拜佛殿歸語其師曰應真不受弟子禮起立云汝當為衆生作大縁事師異之自是不應齋供不事澡沐獨誦經昕夕不懈俄發心造觀音像一軀且築閣以棲之貲費未具每齎恨太息因以針刺左目炷香燃之復燼五指求化逺近見聞争委金幣躬即錢塘訪巧匠將斵旃檀預清齋七晝夜祈聖相與天竺相凖像成未惬志復燬右目匠者夜夢菩薩現形極了了覺而改刻遂成端嚴殊妙之相光趺皆具迎寘其上實元祐三年三月也既諧志願兩目瞭然復明鎮人每嵗首輙迎像市區大供七日逢水旱禱雨暘立應道者嘗分衛至濟逺橋忽棄僧伽黎服弗御自爾佯狂㕓肆飲噉儕俗歌笑怒罵人莫之測市人争醉以酒雜致餉遺桀黠者或探懐取之醒輙造門求索未嘗一誤嘗過天隠樓肆言今夕當慎火夜漏二更樓果煨燼大觀末忽結巾為黄冠之餙人始不悟後果詔改僧為道士其前知預告皆此類也政和二年七月二十一日以偈示衆云說時不曉曉時不說六月嚴寒臘月盛熱珍重去兮清風明月閱三日無疾右脇吉祥而逝闍維之舌根不敗隨煙燼所及得舍利甚衆得齡五十有九休夏四十有三世謂道者盖觀音化身来此土予謂二十五無學中觀音圓通為最由聞薰聞修三昩無作妙力成就三十二應入國土身現比丘身其一也彼悲願無盡故於微塵界現身亦無盡非演法度人則為衆植福何獨於楊道者而疑之法照大師仲珉請叙其事於石乃叙而銘之銘曰招提傑閣危干雲刻西阿相妙絶倫規摹天竺巧亂真鹿肩螺髻超憑塵伊昔創始經營人補陁大士来化身連抉兩目五指焚咄嗟金琲来紛綸普化一切入普門寳目八萬由聞薰翳除聲脫融六根喪明復瞭何足云百爾祈禱應若神欝攸横空巋獨存永警流宕歸旋聞歙州祁門縣青蘿山辟支佛舍利銘并序辟支佛一名獨覺於無佛世出現調伏有情然其始皆生人中嬰受衆苦起厭離想霍然解悟遂證果位如契經所載蘇摩大帝月愛月出之流皆是也自如来示滅凡夫異生不知背塵合覺觀本性空方迷謬顛倒流浪苦海而所謂獨覺者亦隠弗現則夫悲濟利生之士求其戒體之所自出者崇建塔廟使上智觸境而悟苦諦中人修供而植福田其饒益方便豈細也哉青蘿山在祁門東五里巖壑深複有瓌竒卓絶之觀自唐永泰中始建寺而湫陋褊迫不與山相稱来者以為恨元祐二年今住持道清師始嗣禪席惟行與解二俱超然道俗信鄉之未嘗求而人自施未甞勞而事自集改營舊宇百五十區卑隘者斥大之漫漶者丹堊之櫨栱相輝像設具嚴意猶懐不滿也將建浮屠七寳嵓山㑹郡通守李侯景淵施所寳辟支舍利二十而邑民張洪首開檀施逺近附和委貨利若材木者相屬遂以政和元年正月告成支撐巧竒規模宏麗露盤寳鐸皆應經式今昭慶軍節度使開府儀同三司莆陽蔡公嘉其勤為書六大字榜之塔雖託於幽遐之境而顯名四方者繄公書也是嵗七月十日夜毫光出輪杪亘數十丈色若火聚申旦不滅按阿含經云應起塔人一如來二辟支佛造塔功德經云未有塔處於中建立乃至小如菴蘿果福勝梵天然則光景出現殆營造翹勤之應也歟銘曰犀角喻覺第二乘見無佛世乃出興如日西入續膏燈五滓昏暗聊依憑寂不說法問莫應神足變現時飛升遺骨戒定相熏烝䭾都千億數莫能偶得少分嚴緘縢覆以斗藪波七層夜出光相輝玉繩赤髭白足見未曽岌岌榜字蛟龍騰永鎮江左高崚嶒景德寺新鐘銘擊鐘僧舍自我能仁幽息泥犁明警昏昕維擊既停音響雙絶當知此時聞性不滅呉興梵刹景德稱雄乃按鳬氏笵金作鐘寳液既融青氣純一制備甬欒聲無柞欝龍集辛亥紹興初元兹器維則億千萬年贊十八羅漢賛并序予頃官黟川以絹命水西老人陳慶搨禪月畫大阿羅漢十八軀其題識每軸三十餘字亦傚禪月筆跡慶束髮工畫至是畫羅漢已六十餘年能於闇中用筆盖佳本也每嵗考妣忌與生予之日與初得建茶與僧自恣日輙設供至建炎戊申值兵亂併與家蔵書畫散失於毘陵東門第中自是借本以供紹興丁已寓寳溪有鬻羅漢像一堂者筆法竒古疑蜀孫知微筆雖絹素已碎而裝幖尚新意忻然欲之以錢七萬售焉因續嵗供不輟已未遊天台山辛未次石橋前七日齋宿以四明茶及海南香作供且飯寺衆䖍祈靈應俄頃於西南峯現白黑衣尊者合三軀經行林間乍行乍駐乍俯乍仰道俗若從行兵𨽻皆瞻覩驚異既夕施俸錢命僧諷經歌唄於曇花亭俄相續現聖燈數十輝爍袤丈不類凡火亦衆共見壬申復設茶供五百盞皆結異花退伏念此山神秀上應台宿號不死之福庭靈仙之窟宅孫綽賦云應真飛錫以躡虚則四雙八隻所棲舊矣然化身示現亦曠數年而一遇蓋有名僧賢士捐軀毀體哀求而不獲者予以流落困厄之餘乃獲親覩光相豈於五百賢聖夙有縁契也歟六月巳未取家所藏像十八軸各為之贊且識石橋所睹以警世云一尊者手擎巨石通長臂一鬼舒掌一鬼䕶頭各怖走定力既堅肌骨如綿引而伸之可以擎山舒掌䕶頭二鬼咸怖汝墮幽趣以七情故一尊者面山石而立手執磬并桴下施斛食衆鬼争取音響雙絶聞性不空汝迷此覺墮餓鬼中佛子食已一念歸正若昏不知再聆我磬一尊者乘六牙象沙彌一人執手爐其前大道甚夷奚往而礙此香一銖徧熏沙界盲人摸象臆說據指堂堂應儀示汝全體一尊者坐石縫雲衲小童穿針供之逍遙泉石補紉衲衣洞視大千如掌訶犁云何貫針乃屬僮僕耆年大悲施汝微福一尊者坐嵓中眉長數尺自以二手持之旁有石盆銅爐六根六結如猴六䆫眉獨非結倍長何傷盆水澄白爐烟斂青蒲團宴坐有人之形一尊者在山中緑竹黄雲間桃花飄灑雲中現樓閣旌幡尊者執錫杖立水中飛樓自高飄花自下翠竹嬌雲無非幻者託足碧澗逝水馳奔無古無今不幻者存一尊者坐石上龍王遣鬼使持疏請齋尊者以手接之異象所招沙摶花落云何海宫以苦為樂供養我者非汝福田無来往相是甘露門一尊者坐磐石鬼使襆經於匣立其旁宰官錦衣玉帶合掌而立謂法為無持示衆目謂法為有秘之於櫝玉帶錦衣合掌何為不即不離為汝之師一尊者手執劒立大海波中成黄沙地旁有鬼使我有慧劒破煩惱魔能使海若不復揚波注視鬼王若以臆告勿謂二乘是溝港道一尊者立海波中左擎一珠右執錫杖有二怪魚昂首溟渤異生大小相食方一瞬頃海波為赤珠示正性杖指迷津足蹈天吳拯此介鱗一尊者白衣戴佛一軀一宰官端笏立飛鳥銜花三十二相難見如来端板銜花孰為來哉素衣預流如是如是習氣未除聊復爾耳一尊者乘一角獸有紅雲數層手執如意彼上人者乘獸一角佛日再明悠哉獨覺寂不說法示爾神通養和一指紅雲塞空一尊者坐磐石手執經策空中有鳥銜花契經在手不以口誦六用俱泯寂然不動飛鳥銜花徒勞致勤結習已空花不着身一尊者燕坐上有白雲蠻奴持經襆之僧及居士膜拜大士遊世浮雲無心淵黙端坐已如雷音此無所談彼將何聽靈刹學人一撥便正一尊者坐石上白毫光中現小紅塔鬼使擎拳禮拜白毫光中支提湧出有起有滅則非真實二鬼胡為膜拜擎拳我塔無縫一念萬年一尊者衣帶有刀尺拂子等手持衣帶而不繫旁有執錫杖人以力解取諸物而不可得六結已解豈復重繫執智杖人疑領此意寳誌饒舌說齊梁陳胡為三物亦帶我紳一尊者坐石上黄雲中有毒龍頭爪湧出尊者舒肘託鉢以手指龍若使入鉢中出淵騰拏奮爪揚鰓罪性本空毒從何來在昔迦文石室示異戢爾蜿蜒入我五綴一尊者倚杖濯足於蓮花池中八功徳水妙花敷披云何聖者濯足渺瀰空王法中無染靜相刹那現前西方安養
